name: wuxia_idle
description: "挂机武侠 · 写实武侠挂机游戏（Demo）"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # 状态管理（Phase 5 W6 升 Riverpod 3.x，与 isar_community fork 同步升）
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # 本地存储（Phase 5 W6 切到 isar_community fork，解 analyzer <6 上限）
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.0

  # 配置加载与时间格式化
  yaml: ^3.1.2
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.0
  isar_community_generator: ^3.3.2
  riverpod_generator: ^4.0.0

  # riverpod_lint 3.1.3+ 已抛弃 custom_lint,改用 analysis_server_plugin。
  # 2026-05-17 W17 D-#3 引入。
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true

  # data/ 直接声明为 asset（Mac 端的 numbers.yaml 与 DeepSeek 端的 narratives/lore/events 共用此根目录）
  # Flutter 不递归子目录，需逐个声明
  assets:
    - data/
    - data/events/
    - data/lore/
    - data/lore/_templates/
    - data/narratives/chapters/
    - data/narratives/stages/
    - data/narratives/codex/
    - data/narratives/techniques/
    - data/narratives/techniques/insights/
    - data/narratives/ascension/

    # M4 PoC #46 美术资源(2026-05-20 Stage 2 收官 89 张归位)
    - assets/equipment/
    - assets/characters/
    - assets/maps/
    - assets/ui/
    - assets/ui/mj/

    # M4 Stage 3 量产(2026-05-21 ~50 张 BOSS / 场景 / 心法卷轴)
    - assets/enemies/
    - assets/scenes/
    - assets/scenes/mj/
    - assets/techniques/

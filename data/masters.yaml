# 师徒角色配置（GDD §7.1 / phase3_tasks Week 4 T53）
# Demo 阶段固定 3 角色：祖师（玩家本人）+ 大弟子 + 二弟子。
# 飞升机制 Demo 不做，所有 defaultRealm 严格 < wuSheng。
# 决策依据：docs/handoff/week4_d_minimal_spec_2026-05-13.md 方案 A
# 三系锁死：starting 装备/心法 tier 必须 ≤ defaultRealm 对应的 cap。

masters:

  # === 祖师（玩家本人）—— 学徒 · 启蒙（新手开局，回归 GDD Ch1「学武出山」）===
  # 学徒境界 → equipment cap=寻常货 / technique cap=ruMenGong（入门功）
  # 2026-06-27：从一流 fixture 降为学徒新手 + 空手起家。Demo 期高境界 fixture
  #   （week4_d 方案 A：开局展示完整师徒队伍 / 全员<武圣避飞升锚点）理由已全部失效
  #   （弟子改终局拜入 / 飞升已实装），且与 GDD Ch1-3=学徒→一流 进程矛盾。
  #   师承遗物改游戏中获得（T55 起手要求已放宽，详 spec 2026-06-27-founder-start-realm-novice）。
  - id: founder
    lineageRole: founder
    slotIndex: 0
    defaultRealm: xueTu
    defaultLayer: qiMeng
    attributeProfile:
      constitution: 5
      enlightenment: 7
      agility: 5
      fortune: 5
    startingTechniqueIds:
      - tech_gangmeng_jichu
      - tech_lingqiao_jichu
    startingEquipmentIds: []  # 空手起家（学徒新手；师承遗物改游戏中获得，T55 已放宽）
    enabledInDemo: true
    portraitPath: assets/characters/founder.png

  # === 大弟子 —— 二流 · 启蒙 ===
  # 二流境界 → equipment cap=haoJiaHuo（好家伙）/ technique cap=mingJiaGong（名家功）
  - id: first_disciple
    lineageRole: senior
    slotIndex: 1
    defaultRealm: erLiu
    defaultLayer: qiMeng
    attributeProfile:
      constitution: 5
      enlightenment: 4
      agility: 6
      fortune: 4
    startingTechniqueIds:
      - tech_lingqiao_mingjia
    startingEquipmentIds:
      - weapon_haojiahuo_qing_feng_jian
      - armor_xiangyang_pi_jia
      - accessory_xiangyang_yin_jie
    enabledInDemo: true
    portraitPath: assets/characters/first_disciple.png

  # === 二弟子 —— 三流 · 启蒙 ===
  # 三流境界 → equipment cap=xiangYangHuo（像样货）/ technique cap=changLianGong（常练功）
  - id: second_disciple
    lineageRole: junior
    slotIndex: 2
    defaultRealm: sanLiu
    defaultLayer: qiMeng
    attributeProfile:
      constitution: 4
      enlightenment: 4
      agility: 4
      fortune: 5
    startingTechniqueIds:
      - tech_yinrou_jichu
    startingEquipmentIds:
      - weapon_xiangyang_gang_dao
      - armor_xunchang_bu_yi
      - accessory_xunchang_yu_pei
    enabledInDemo: true
    portraitPath: assets/characters/second_disciple.png

# =============================================================================
# equipment.yaml · 装备 fixture（Phase 3 Week 7 T63 扩 35 件）
# =============================================================================
# 共 35 件：7 阶 × 5 件（weapon 3 三流派各 1 + armor 1 + accessory 1）。
# 数值范围严格对齐 numbers.yaml `equipment.tiers` 段（每件 def 取 tier 全范围,
# EquipmentFactory.fromDef 实例化时再 roll 个体差异）。
#
# 字段命名遵循 schema data_schema.md §5.1（camelCase），
# 与 EquipmentDef.fromYaml 期望对齐；numbers.yaml 用 snake_case 是另一套约定。
#
# drop_source_tags 当前为占位（Phase 4 掉装备 service 完善后回填实际掉表）：
#   - 寻常货/像样货/好家伙 → mainline_ch1/2/3 + tower_5/15
#   - 利器/重器           → tower_25 + yiLiu_quest / jueDing_unlock
#   - 宝物                → tower_30 + zongShi_unlock
#   - 神物                → wuSheng_unlock（Phase 4+ 飞升机制后定义,Demo 玩家境界 ≤ zongShi 不可装备）
# =============================================================================


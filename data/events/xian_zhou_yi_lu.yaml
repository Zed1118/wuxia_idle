id: xian_zhou_yi_lu
title: 仙舟驿路
opening: |
  江上有雾，渡船在雾里慢慢走。
  老船家不抬头，只把桨划得不快不慢。
  你坐在船头，看见船的影子在水里时聚时散。

choices:
  - text: 听船家讲古
    outcome_id: lu_yu
    body: |
      老船家讲了一个剑客的故事——那剑客年轻时也乘过这条船。
      「他后来去了哪里我不知道，」船家说，「但每个剑客都得有一段水路。」
      下船时雾散了，你的脚步比上船时轻了几分。

  - text: 自顾观江
    outcome_id: lu_xing
    body: |
      你不说话，只看江水。
      雾散了又聚，水流过又流过，船一直在动，你也一直在动。
      下船时你忽然明白：有些道理不是听来的，是看出来的。

  - text: 闭目养神
    outcome_id: skip
    body: |
      你闭目假寐，船摇得人发困。
      上岸时老船家叫你一声，你才醒来，雾已散尽。
      他笑了笑：「客官睡得真好。」——你也没问他为什么这样说。

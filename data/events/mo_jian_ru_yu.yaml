id: mo_jian_ru_yu
title: 磨剑入魇
opening: |
  阴柔一路杀得多了，你的剑越发薄、越发利，人却也越来越静。
  这夜投宿荒村，你借了块磨刀石，就着月光磨剑。
  磨着磨着，剑身映出你的脸——眼底有一点你不认得的暗。
  你磨得入了神，分不清是在磨剑，还是剑在磨你。
  村外狗吠了一声，你才惊觉，掌心已被剑刃割开一道细口。

choices:
  - text: 收剑自省
    outcome_id: insight_success
    body: |
      你停了手，将剑横在膝上，闭目静坐到天明。
      那点暗你没去赶它，只是看着它——看它从何处来，往何处去。
      待东方既白，暗意散尽，剑反而更利了三分。
      磨剑相心，磨的从来不只是那截铁。

  - text: 借势再磨
    outcome_id: practice_partial
    body: |
      你顺着那点入魇的劲，又磨了半个时辰。
      剑锋薄如蝉翼，划过烛火，火苗竟被切作两段。
      只是这般取巧，伤了几分心神，你的悟性倒也精进了些许。

  - text: 弃石而眠
    outcome_id: skip
    body: |
      你忽觉心头发寒，把磨刀石一推，将剑入了鞘。
      有些剑磨到极处便会反噬，今夜的剑气不对，不磨也罢。
      你裹紧衣裳睡下。第二天醒来，那块磨刀石被你忘在了荒村。

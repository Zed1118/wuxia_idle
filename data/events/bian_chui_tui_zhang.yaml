id: bian_chui_tui_zhang
title: 边陲推掌
opening: |
  关外了。
  天高得没有边，地阔得没有头，一座烽燧孤零零戳在荒原上。
  你立在天地之间，忽觉自己渺小得像粒沙——
  风从背后推来，浩浩荡荡，不是你的力，是天地的力。
  左掌朝天，右掌按地，这一推，借的何尝是自己。
choices:
  - text: 立定，借天地之势推掌
    outcome_id: insight_success
    body: |
      你扎住下盘，左掌托天，右掌按地。
      一掌缓缓推出，竟觉身后的长风、脚下的大地，都顺着这一掌涌了出去。
      荒草伏倒一片——这一掌的劲，不全是你的。
  - text: 运一身蛮力推出
    outcome_id: practice_partial
    body: |
      你聚起浑身气力，奋力推掌。
      力是足，却只是你一人的力，借不到那天地之势。
      草尖晃了晃，心境倒开阔了几分。
  - text: 天地太大，独行太久
    outcome_id: skip
    body: |
      风越来越大，吹得人站不稳。
      你裹紧衣袍，朝烽燧的方向走去找个避风处。
      那一念托天按地的气象，散在了荒原的风里。

id: gu_si_qiu_shu
title: 古寺求书
opening: |
  深山古寺,你为一本失传的内功经书登山。
  古殿上,老僧扫着地,扫帚的声音盖过了你的脚步。
  你站在殿前,他没抬头。

choices:
  - text: 跪求三日
    outcome_id: seng_shou
    body: |
      你跪到第三日午后,老僧才把扫帚靠到墙边。
      「书我不给你,」他说,「我给你一本它没写过的。」
      离开时你怀里多了一卷无字经,但你已知道每一页讲的是什么。

  - text: 问而后退
    outcome_id: seng_zhi
    body: |
      你问得诚恳,但老僧摇头:「这书你担不起。」
      他给你斟了一壶茶,陪你坐到日落才让你下山。
      你没得书,但喝完那壶茶,你忽然不再急着要它。

  - text: 转身下山
    outcome_id: skip
    body: |
      古殿冷清,扫帚声响得让人犯困。
      你想了想,转身下山——书不是这样求的。
      山门外的松林里有人在等你,你这才记起来还有别的事。

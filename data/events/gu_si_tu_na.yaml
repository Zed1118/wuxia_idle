id: gu_si_tu_na
title: 古寺吐纳
opening: |
  破庙无门，香案上的泥胎佛塌了半边脸。
  风从梁上的破洞灌下来，卷着几片枯香灰打转。
  你盘坐在蒲团残骸上歇脚，听见自己的呼吸——
  一吸，胸口的浊气往下沉；一吐，丹田像被人轻轻推了一把。
  原来这一呼一吸之间，自有起落。
choices:
  - text: 调息一夜
    outcome_id: insight_success
    body: |
      你闭目坐到天明。
      到后来已分不清是自己在喘气，还是这破庙在喘气。
      睁眼时晨光入殿，丹田暖得像揣了块炭。
  - text: 试着引气几周
    outcome_id: practice_partial
    body: |
      你照着那点感觉走了几个周天。
      气是顺了些，却总在膻中那处打个结。
      天还没亮，你已觉得身上松快了一分。
  - text: 庙太破，不宜久留
    outcome_id: skip
    body: |
      泥胎佛的目光空落落地落在你身上。
      你拱了拱手，算是告罪，起身出了庙。
      那口将通未通的气，又散回了胸口。

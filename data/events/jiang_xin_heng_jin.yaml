id: jiang_xin_heng_jin
title: 江心横劲
opening: |
  大江到此一束，两岸石壁夹出一道窄口。
  江水撞在礁石上，碎成一片白沫，声如闷雷。
  你站在渡头看一艘货船逆流而上——
  纤夫在岸上喊着号子，那船硬是顶着急流，一寸一寸往上挪。
  水势再猛，挡不住那一股横着撑住的劲。
choices:
  - text: 对着江流凝一道横劲
    outcome_id: insight_success
    body: |
      你面朝江口，运劲于双臂，缓缓向前一推。
      劲力在身前铺成一道看不见的横墙，江风扑来竟被生生分开。
      像那逆流的船——再急的水，也撞不散这一横。
  - text: 试着扎稳马步抗流
    outcome_id: practice_partial
    body: |
      你下盘扎死，双臂前撑，学那撑船的劲。
      劲是出来了，却散在身前拢不成一线。
      站到腿酸，根骨倒是沉实了些。
  - text: 看够了，赶路
    outcome_id: skip
    body: |
      货船终于挪过了窄口，号子声远了。
      你也该走了，前路还长。
      那股横江的劲，留在了涛声里。

id: sect_recruit_desert
title: 漠路相逢
opening: |
  日头落到了沙丘背后,影子拉得老长。
  你正坐在火堆旁烤干水囊里渗出来的水,
  忽然听见远处骆驼铃响,慢慢近了。
  一个背刀的汉子牵着瘸了一条腿的骆驼走过来,
  在你火堆对面坐下,自顾自从布袋里取出干粮。
  他咬了一口,看你一眼:「你这火,借我烤会儿刀。」

choices:
  - text: 「这把刀走过多少路,我看得出。要不要找个归处?」
    outcome_id: accept_recruit
    body: |
      他放下干粮,把刀拔出半寸,看了半晌才答话。
      「漠行十年,这刀劈过狼,劈过马贼,也劈过自己。」
      「最难的一回,是去年在玉门关外——
      五个马贼围上来,我躲不开,只好用刀格开自己背上的旧伤口。」
      「血流了一夜,我才明白,人不能一个人扛太久。」
      「人到这个岁数,总该有个收处。」
      他把刀插进沙里,起身向你拱手:「漠行客,愿入师门。」

  - text: 「这沙海凶险,你这条路走得不容易。」
    outcome_id: decline_meet
    body: |
      他没多话,只把骆驼上一袋水递给你。
      「行路人,水比什么都金贵。」
      他又指了指远处的沙丘:「翻过那道梁,有眼活泉,
      你若再渴,记得朝北走,别贪近路。」
      你接过来,觉得这一程虽未结伴,
      但风沙里见过这一个汉子,身骨也跟着扎实了几分。

  - text: 转身离去
    outcome_id: skip
    body: |
      你把水囊收好,起身往北走。
      汉子没抬头,只哼了一声算作告别。
      沙海里见过的人,大多是这样——擦肩,不留名。

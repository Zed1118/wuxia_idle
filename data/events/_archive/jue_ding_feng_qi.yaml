id: jue_ding_feng_qi
title: 绝顶风起
opening: |
  山巅之上只剩一人——一个身着灰布旧袍的老者，面朝云海，背对着你。
  风把他的袍子吹得猎猎作响。他面前没有路，脚下就是万丈深渊。
  他听见你的脚步声，没回头，只说：「这山顶我站了二十年。
  二十年来上来过的人，都问我怎么下去。你是第一个没开口的。」

choices:
  - text: 与他并肩而立
    outcome_id: share_silence
    body: |
      你走到他身边，没有说话。云海无边，落日从云层下漏出最后一丝光来，
      把云染成了暗金色。老者闭上眼，深吸了一口气——不是运气，是满足。
      他伸出手，指尖在风中轻轻弹了一下，像是拨了一根看不见的琴弦。
      然后他后退一步，把崖边让给你：「轮到你了。站到你想走为止。」

  - text: 请教武学至理
    outcome_id: gain_wisdom
    body: |
      老者笑道：「二十年前，我也像你一样——满脑子招式、口诀、经脉。
      二十年站在这里，你知道我悟出了什么？——风是不讲招式的。
      但风比任何招式都厉害。不是因为它快，是因为它从来不停。」
      他弯曲手指，一股无形的风压从你耳边掠过，如剑不伤。

  - text: 后退三步行礼
    outcome_id: skip
    body: |
      你退了三步，抱拳一礼。老者点了点头：「知道什么时候该退，
      比知道什么时候该上更难。」他没赶你下山，只是重新把目光投向云海。
      你下山时，山顶忽然响起了啸声——不是悲啸，是老者对着天笑了笑。
      云被这笑声震开了一瞬，露出下面千里山川的影子。

id: qing_lou_can_meng
title: 青楼残梦
opening: |
  这不是你该来的地方。但今夜你没去处，全城只有这还亮着灯。
  楼上的琵琶已经弹了半个时辰。弹琵琶的女子隔着一道珠帘——
  帘子没拉，但你和她谁也不看谁。她弹到了一半，弦断了。断弦声
  在寂静中像闷雷。她停下手指，说了一句：「弦断有知音。」

choices:
  - text: 递上一根新弦
    outcome_id: connect_string
    body: |
      你从包袱里摸出一根备用的弓弦递进帘缝。她接过去，手指碰到你的手背——
      冰凉的，在发抖。弦续上，琵琶又响了。这回弹的是一首你没听过的曲子，
      没有名字，她弹完只说了一句话：「这根弦以后还会断。
      断了来找我。」说完把珠帘挽起来，人已经不在帘后了。

  - text: 静听断弦
    outcome_id: meditate_silence
    body: |
      你没动。琵琶就那么放着，断弦垂在半空轻轻晃。她倒了两杯酒，
      一杯放在帘外。你没喝，她也没勉强。「弦断了不一定是坏事。
      有的曲子不该弹完。」她站起来，把琵琶挂上墙，一盏一盏地吹灭了灯。

  - text: 留银离去
    outcome_id: skip
    body: |
      你在桌上放了一点银子，推门走了。夜风很冷，琵琶声没再响。
      走出去半条街，身后忽然响起了另一段旋律——不是刚才那首，
      是专门弹给已经走出去的人的。这段很短，不到十息便停了。
      你停下脚步，听完那最后一声弦响，才继续走了。

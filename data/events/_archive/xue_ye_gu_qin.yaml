id: xue_ye_gu_qin
title: 雪夜古琴
opening: |
  大雪封山那夜，你在破庙里生了一堆火。火还没烧旺，
  门外传来琴声——不是悠扬，是破碎。像是有人在极远的某个地方
  一根一根地拨断琴弦。琴声停了。门被风吹开一条缝，雪沫子飘进来。
  门外的石阶上，放着一张断了弦的琴。

choices:
  - text: 抱琴入殿
    outcome_id: restore_memory
    body: |
      琴很旧，琴身的漆裂成了龟纹。你伸手触碰断弦，指尖忽然一麻——
      不是琴弦割了手，是琴弦上还残留着上一任主人的内息。
      你闭眼，一首曲子在脑中响了三息。只三息，便如一场大梦。

  - text: 续弦试弹
    outcome_id: learn_melody
    body: |
      你拆散了弓弦，续在琴上。手指一拨，音不准。再拨，琴身的震动
      顺着指尖传入经脉。第三拨时，你忽然明白——弹琴的人没想把这曲子弹完。
      他有意留了一根弦不续。那是给你留的。

  - text: 放下琴，添把柴
    outcome_id: skip
    body: |
      你把琴靠在门边，回到火堆前添了两根柴。风雪还在外面。
      琴就那么靠着门，弦被风吹得偶尔嗡一声，如远山古寺的残钟。
      天亮时，雪停了。你推开门，石阶上的琴也不见了。

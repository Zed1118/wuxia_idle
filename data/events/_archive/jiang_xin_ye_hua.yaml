id: jiang_xin_ye_hua
title: 江心夜话
opening: |
  船家把船停在了江中央，说今晚不走了——今夜没有月亮，水上看不见水下的礁。
  船上除你之外只有一老一少。老少二人在船尾压低了嗓子说话，偶尔传过来
  只言片语：「……那件事你先别说……」「不说憋着，憋坏了你替我赔命？」
  老的发现你在听，愣了一下，然后拍了拍船舷：「这位老弟，过来坐。」

choices:
  - text: 听老人讲故事
    outcome_id: learn_legend
    body: |
      老人用一盏茶的工夫讲了一个三十年前的故事——一个少年渡江找人，
      人没找到，在江对面等了四十年。故事讲完，老人沉默了很久，
      少年在旁边把烟斗磕了磕：「爷爷，这个故事是真的。」老人没看他：
      「是真的。」

  - text: 接过少年手中的酒壶
    outcome_id: bond_with_young
    body: |
      少年把酒壶递给你，眼里的光是少年才有的那种——急、亮、藏不住。
      你想起了自己十八岁那年，背剑下山的第一天。你没说这些，只跟他碰了壶，
      一饮而尽。壶里没酒了，他摇了摇，打开壶盖把最后一滴倒进了江水。

  - text: 回到船头独处
    outcome_id: skip
    body: |
      你走回船头。身后那一老一少继续压低了嗓子说话，过了一会儿安静了，
      只剩下江水声。天将破晓时，老的在你肩头拍了一下——
      不是告别，是让你让一下，他要收锚了。船靠了岸，你跳上码头，
      回头时老少二人已经在船上跟你挥手。不是再见，是保重。

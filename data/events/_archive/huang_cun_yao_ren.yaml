id: huang_cun_yao_ren
title: 荒村咬人
opening: |
  村子空了。几十间土房没有一扇门是关着的——不是敞着，是拆了。
  村口的石磨上晒着一件没缝完的小孩衣服，针还插在上面，线已经褪了色。
  唯一还住人的是一间偏屋，屋里只有一个老头，蹲在地上烧纸。
  他抬头看你，眼神像一口枯井：「你走吧。这地方不干净。」

choices:
  - text: 追问缘由
    outcome_id: uncover_truth
    body: |
      老头蹲在火边讲了一夜。三年前这村里出了怪病——不是瘟病，是人疯了。
      好好的人忽然开口咬人，被咬的人过几天也疯。
      官府封了村，把没疯的人迁出去，疯了的人留在后山。老头自己不疯，
      但他是疯村子里最后一个清醒的人。他说完，灰烬里的纸灰翻了一下，
      像叹息。

  - text: 上山查看
    outcome_id: confront_horror
    body: |
      后山一片寂静。你看见了那些人——他们没有死，但已经不是人了。
      你退下山时，剑没有出鞘。不是因为怕，是因为你分不清他们算不算"敌人"。
      老头看着你回来，往火里又扔了一张纸：「你看见了。」你没答。
      他又扔了一张：「他们也是命。」

  - text: 给老头留药
    outcome_id: skip
    body: |
      你把身上的金疮药和干粮搁在石磨上。老头看了一眼，没拿，只说：
      「年轻人，有些病不是药能治的。」他起身把石磨上的药推开——
      推开的时候手在抖。你走出村口时，风吹得那件没缝完的小衣服翻了过来，
      露出里面的针脚。歪歪扭扭的，是小孩子自己缝的。

id: gu_chuan_deng_ying
title: 孤船灯影
opening: |
  江边泊着一艘旧船，船舱里透出一点昏黄的灯光。系缆绳的桩子上蹲了一只黑猫，
  绿眼睛直直地盯着你。船舱里传出咳嗽声，缓慢而吃力，像是已咳了太多年的肺。
  舱帘掀开一角，伸出一只枯瘦的手：「进来说话。江边的风过了夜就硬了。」

choices:
  - text: 掀帘入舱
    outcome_id: meet_hermit
    body: |
      舱里铺了一张旧席子，一个病恹恹的中年人靠墙坐着，膝上摊着一本书。
      书页已经被翻得稀烂。他说他是二十年前江水暴涨时漂到这船上的，
      从此再没下过船。二十年来这船在江上漂了不知多少趟，
      每一趟都有人上来，每一趟都有人下去。你是第四十三个。
      你问他那些人都去哪了。他指了指窗外的江水。

  - text: 在舱外倾听
    outcome_id: hear_poem
    body: |
      你没进舱，只在舱外坐下。里面的人自言自语了一会儿，
      忽然念起一首旧诗。声音不大，但每一个字都像被江水洗过。
      念到「江水流春去欲尽」时停了。停了很久。黑猫叫了一声，
      船舱的灯忽然暗了一瞬。然后那句诗没有再续。

  - text: 喂猫离去
    outcome_id: skip
    body: |
      你从包袱里摸出半块干粮，掰碎了放在桩子上。黑猫闻了闻，叼走一块，
      剩下的堆在那没动。船舱里的人从帘缝里看见了，咳着笑了一声：「它挑食。
      只吃鱼。」说完帘子放下了。你走的时候，桩子上的干粮碎还放在那里。
      猫没再回来。

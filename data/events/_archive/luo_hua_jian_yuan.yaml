id: luo_hua_jian_yuan
title: 落花剑缘
opening: |
  梨花开了满山。山径上铺了厚厚一层白瓣，踩上去没有声音。
  花林深处有人在练剑——是个青衣女子。她的剑不快，每一招都慢得像是
  在画画。梨花不断落在她的剑刃上，落一朵，被她轻轻"接"住一朵——
  剑刃是横的，花落在刃上，不碎，不落。她看见你，剑顿了一下，
  那朵花还是落了。

choices:
  - text: 拔剑切磋
    outcome_id: sparring
    body: |
      她剑法极轻。你每一次出招都被她用剑脊"托"了一下——不是挡，是托。
      像是把你的剑往上送，让你的力道自己滑走。过了十几招，她收了剑，
      弯腰从地上拾起一朵完整的梨花，放在你剑鞘上。「你的剑太快了。
      快的人很难留住花。」她说完便走，青衣转出了花林。

  - text: 席地观剑
    outcome_id: observe
    body: |
      你坐在梨树下，看她继续练剑。她练了很久，每一剑都慢得不像剑法——
      不像剑法但也不像舞蹈，是介于两者之间的一种东西。练完之后她转过身，
      像是刚发现你似的：「你坐了半个时辰。腿不麻？」你这才发现腿麻了。

  - text: 折花为礼
    outcome_id: skip
    body: |
      你摘了一枝梨花，搁在道旁的石头上。她看见了，剑没停，嘴角动了一下。
      你转身走出花林的时候，风忽然大了，漫天的梨花从身后追过来，
      落在你的肩上、剑上。你从来没被一朵花打过，那天被打了很多下。

id: yu_zhong_qiao_men
title: 雨中敲门
opening: |
  镇子不大，一条街走到头只要半柱香。大雨倾盆时街上已空无一人，
  只有一户人家的门廊下还亮着灯笼。你跑过去避雨，身后的门忽然开了。
  门里站着一个老妇人。她看见你背上的剑，手在围裙上擦了一下。
  「又来了一个。」她的声音不像是意外。

choices:
  - text: 借宿避雨
    outcome_id: hear_stories
    body: |
      老妇人给你盛了碗热粥，粥里有姜丝。她坐在对面，
      一言不发地看你吃完，然后从柜子里翻出一本油纸包着的旧簿子。
      簿子里密密麻麻记着一个个江湖人的名字、门派、兵器、目的地——
      全是在这道门廊下躲过雨的人。她翻到最后一页，问：「你叫什么？」

  - text: 询问缘由
    outcome_id: learn_legend
    body: |
      「又来了一个——什么意思？」老妇人倒了杯茶，不紧不慢地讲。
      三十年来，每逢大雨，就会有背剑的人在这道门廊下避雨。
      她已记下了八百多个名字。你问她为什么。她说：「因为总得有人记。」
      她没说的是——那八百多个名字里，有一大半再也没回来过。

  - text: 道谢告辞
    outcome_id: skip
    body: |
      雨稍小了。你道了声谢，起身要走。老妇人没留你。
      你走到门廊下，回头看了一眼——她已经拿起笔，对着簿子犹豫了一瞬，
      然后把笔放下了。你走出去时，雨还在下，但你知道自己还没进那本簿子。

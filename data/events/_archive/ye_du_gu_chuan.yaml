id: ye_du_gu_chuan
title: 夜渡孤船
opening: |
  夜半渡口，只剩一盏灯。
  灯挂在一艘孤船的船头，船尾蹲着一个艄公，斗笠压得极低。
  河面起了雾，对岸什么也看不见。
  艄公也不问你去哪，只伸出一只手，手心朝上。
  那手上没有指纹——三十年的桨磨平了。

choices:
  - text: 上船
    outcome_id: cross_danger
    body: |
      船到河心，雾忽然散了。
      水面下浮着沉沉的黑影，是沉船，不止一艘。
      艄公没有回头，只说了一句：「坐稳。」
      等你上了岸回头看，船已经不见了。河面上只剩那盏灯，远远地晃了一下。

  - text: 问价
    outcome_id: negotiate
    body: |
      艄公抬起斗笠。一张脸被河风吹得满是裂纹。
      「这河上往来的，不付铜钱。」
      「付什么？」
      他笑了笑，露出一口黄牙：「付个由头。」
      你说了个由头，他点了点头，伸桨撑开了船。

  - text: 等天亮
    outcome_id: skip
    body: |
      艄公收回手，卷了支旱烟。
      天边已经泛了青白色，河上的雾薄了一层。
      你再去看那盏灯时，已经灭了。
      天亮以后，渡口一个人也没有。

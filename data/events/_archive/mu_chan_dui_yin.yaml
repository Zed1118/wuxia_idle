id: mu_chan_dui_yin
title: 暮蝉对饮
opening: |
  夏末的傍晚，蝉声最盛。一棵老槐树下坐了个中年文士，身边搁了一坛酒、
  两只陶碗。他看见你便招了招手：「别急着赶路。蝉都要死了还叫成这样，
  人不如蝉。」他倒了两碗酒，推过一碗。「不问你名字。只听蝉。」

choices:
  - text: 喝酒听蝉
    outcome_id: share_moment
    body: |
      酒入喉，微涩。蝉声铺天盖地，密得分不清远近。文士闭着眼，手指在膝上
      敲着蝉鸣的节奏。敲了很久，手指停了。蝉声没停，但他已经不在听了。
      「我每年夏天都来这棵树下喝酒。夏天过了，就等明年。」他站起来，
      把酒坛子倒扣在树下：「明年见。你要是还在这，蝉也不在了。」

  - text: 问他为何独饮
    outcome_id: hear_regret
    body: |
      文士笑笑：「等的人没来。等了十一个夏天，没来。」他把碗中的酒
      倒了一小半在树根上，剩下的喝完。「前十个夏天我还写信。第十一个夏天
      我没写——不是不等了，是知道她来不了。」碗放在树根上，他没有再碰。

  - text: 婉拒酒，辞行
    outcome_id: skip
    body: |
      文士自己喝完了两碗酒，也不劝第三碗。你走出槐树的树荫时听见他在背后
      自言自语：「连蝉都要死了，还叫成这样。」说完笑了一声，笑得很短，
      像是被蝉声吞了。你走出半里地，蝉声还在。那坛酒大概还扣在树下。

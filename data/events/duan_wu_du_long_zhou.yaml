id: duan_wu_du_long_zhou
title: 渡龙舟
opening: |
  江岸上人声鼎沸，十余条龙舟一字排开。
  江水滔滔，拍在船舷上溅起白沫。
  你沿江而行，闻到空气里浮着艾草与雄黄的气味。
  岸边的老船工正往船头系菖蒲，抬头看见你，往船上努了努嘴。
  鼓声一震——江面骤然破开。

choices:
  - text: 跳上龙舟，与众人同划
    outcome_id: du_long_zhou_path_a
    body: |
      你纵身跃上船尾，抄起桨插入水中。
      鼓点越来越密，江水打在脸上，肩腰的劲道在这节奏里拧成一股绳。
      船到终点时你浑身湿透，却觉得筋骨里多了几分江涛的韧劲。

  - text: 默立江岸，想一段旧事
    outcome_id: du_long_zhou_path_b
    body: |
      你没有上船，只是看着江水东去。
      浪花拍岸又碎裂，反复不休——像极了某种固执。
      你想起了那个沉江的名字。千年已过，江还是那条江。
      原来真正的刚直，不是不弯，是折了也不改初衷。

  - text: 沿江独行，不理喧闹
    outcome_id: skip
    body: |
      你转身沿上游走，把鼓声和人声甩在身后。
      江面渐渐宽了，水流也缓了下来。
      你拔出剑，在浅滩上划了一道。江水冲过来，划痕瞬间不见。
      也好——有些事不留痕迹，不等于没做过。

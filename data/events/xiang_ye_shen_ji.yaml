id: xiang_ye_shen_ji
title: 乡野神祭
opening: |
  村口搭了一座祭坛，坛上摆了一只陶罐、一把旧剑、一面褪色的旗。
  全村老少围坛而跪，一个白发老者在坛前念念有词。他转过头，看见你——
  一个外乡人背着一柄剑，站在人群之外。老者对你招招手：「外乡人，
  你的剑借来一用。」他身后有人小声说：「祭完了就还。」

choices:
  - text: 借剑上坛
    outcome_id: bless_weapon
    body: |
      老者将你的剑横放在陶罐前，用一碗米酒浇了剑脊。酒顺着刃口淌下来，
      在祭坛上画出一道湿润的弧线。老者的念词中，你隐约听见自己那把剑
      的名字被反复念了三遍。事后你握剑时剑柄微微发热——不是附着什么外力，
      只是比往常更贴手。

  - text: 自荐执剑
    outcome_id: lead_ritual
    body: |
      老者犹豫了一下，把旧剑交到你手上：「你执这把，你自己的留在坛下。」
      你双手接过旧剑——剑很轻，轻得不像铁，像是历代祭祀耗尽了它的分量。
      仪式结束，老者说：「这剑在坛上放了六代人。今天它比往年亮了一点。」

  - text: 婉拒观礼
    outcome_id: skip
    body: |
      你摇了摇头，站在人群外侧看完了整场祭祀。祭完后老者走到你面前，
      把手中那把旧剑在你剑鞘上碰了一下：「外乡的剑也是剑。
      你让它来了，它就受了。」他没解释"受了"是什么意思，转身便回了村。

id: shan_jing_wu_bu
title: 山径悟步
opening: |
  山径窄，仅容一人。
  青石被千百年的脚板磨得发亮，一级叠着一级，看不到尽头。
  你走了半日，忽然发觉自己的步子不知何时合上了石阶的节拍——
  上一步的力还没散，下一步已经踩了上去，前后相叠，竟省了大半气力。
  脚下一轻，你停住了。
choices:
  - text: 顺着石阶再走一遍
    outcome_id: insight_success
    body: |
      你折回坡底，重新拾级而上。
      这一回不去想，只让脚跟着石阶走。
      到坡顶时，身后那串脚印深浅如一，像是同一步盖了百遍。
  - text: 停下来揣摩步法
    outcome_id: practice_partial
    body: |
      你蹲在石阶上，盯着自己的鞋尖比划。
      道理像是摸到了一点，腿脚却还跟不上。
      起身时膝头一软——想得太多，反倒滞了。
  - text: 赶路要紧
    outcome_id: skip
    body: |
      天色不早，山那头还有几十里。
      你拍拍腿上的尘土，提步又走。
      那点说不清的轻快，三两步就忘在身后了。

id: feng_xue_gu_dian
title: 风雪古店
opening: |
  大雪封了官道，方圆十里只剩这一家店还亮着灯。
  店里坐了三桌：一桌是两个猎户在喝闷酒，一桌是个算命先生对着残缺的罗盘发呆，
  第三桌空着。掌柜的在柜台后劈柴，看你推门进来，头也不抬：
  「住店二两，打地铺一两，柴火免费。」他把柴刀搁下，「打尖的——没有菜，
  只有豆干。风雪封了路，菜车进不来。」

choices:
  - text: 与猎户对饮
    outcome_id: learn_hunting
    body: |
      猎户讲了一夜的山中事。哪里的狼最多、哪里的雪最深、哪里的山路最滑。
      他们不懂武功，但知道怎么在风雪中活下来。临走时，其中一个塞给你一把
      铁砂——不是银子，是猎户的敬意。「这玩意平时没用，真到了要命的时候，
      撒出去比暗器好使。」

  - text: 与算命先生攀谈
    outcome_id: get_divination
    body: |
      算命先生把残缺的罗盘推到一边。「天机不在盘里。在你心里。」
      他用筷子蘸了酒，在桌面上画了一道线。「这条线上，有你找的人。」
      线歪歪扭扭，不知道指向哪里。他收起筷子：「西北。具体哪一天，
      到了你就知道。」

  - text: 烤火歇息
    outcome_id: skip
    body: |
      你坐到空桌前，靠墙烤火。风雪刮了一整夜，天亮时停了。
      推开门，积雪没过了门槛。昨晚那两桌人已经走了，桌上每一张
      都留了一个茶钱。掌柜的在扫雪。他没问你去哪，只在你走时说了一句：
      「客官，前头路滑。」

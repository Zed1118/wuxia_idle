id: tie_pu_lian_quan
title: 炉前问拳
opening: |
  铁砧上最后一锤落下，火星溅到你的手背。
  你在这铺子里坐了好几日，看着铁条被锤弯、又锤直。
  老铁匠把烧红的刀坯浸进水里，嗤的一声，白汽升腾。
  他未回头，只说了句："打铁和打拳，是一回事。"
  你看着水汽里的刀影，忽然想起自己挥过的每一拳。

choices:
  - text: 学这火拳
    outcome_id: forge_punch
    body: |
      你把手伸到炉口，掌面离炭火不过三寸。
      烧红的铁光映在掌纹上，红里透青。
      你握拳，再松开——指节噼啪作响，
      像是铁锤落在砧上的节奏。
      拳未出，掌心已滚烫如火。

  - text: 只学握锤
    outcome_id: hammer_grip
    body: |
      你接了老铁匠递来的小锤，照着砧上那块铁料试了几锤。
      腕力从虎口灌进去，铁砧的回震从掌心弹回来。
      你握着锤，觉着不只是在打铁——
      臂沉了几分，指力也紧了。
      这一握，比练三十日拳架管用。

  - text: 离开铺子
    outcome_id: skip
    body: |
      火气太燥，这路子不对你的脾性。
      锻造是锻造，拳法是拳法——至少在你身上不是一回事。
      你放下锤子，推门出去。冷风一激，
      手背上的烫痕还隐隐发红。

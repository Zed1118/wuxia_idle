id: shan_dao_wu_zhe
title: 山道雾遮
opening: |
  山道上的雾厚得似墙，三步开外便看不清人影。
  你放慢脚步，正辨认着路，便听见雾里传来踢踢踏踏的脚步声。
  一个行路人从雾中跌撞而出，满脸惶急。「这位兄弟，
  前方的岔路我不敢走——三条道，没有一块路标。」
  他说话时低咳了两声，嗓子已哑了大半日。

choices:
  - text: 为来者指路
    outcome_id: help_lost
    body: |
      你记得来时路。左道往樵径，右道通官道，中间那条是死路。
      你三言两语说完，那人眼中一亮，连连拱手。
      他走后，雾似乎薄了一层。你看着他的背影消失在岔路口，
      忽然觉得——在山里给别人指路，自己的路也更清楚了。

  - text: 默然绕行
    outcome_id: ignore_passerby
    body: |
      你没有停步。雾正浓，道正窄，你没多说什么。
      那人站在原地，看着你擦身而过，开口想说些什么，又咽了回去。
      你走了一段路，回头看——雾已把那人的身影完全吞没。
      这条路只容一人走，你选了低头赶路。

  - text: 折返原路
    outcome_id: skip
    body: |
      你不愿涉入他人之事。转身便走回了来路。
      雾越来越薄，路越来越亮，心里的重量却没减轻。
      也许是因为你在能帮的时候，选择了不帮。

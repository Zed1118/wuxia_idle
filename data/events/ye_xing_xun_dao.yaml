id: ye_xing_xun_dao
title: 夜行寻道
opening: |
  月色薄薄一层铺在山路上，树影在地上乱晃。
  你独自走着，脚步声在夜里传出去很远、很远。
  白天的招式和对手在脑子里反复浮现，如同在上一课——
  只是这一课的老师是你自己。
  你停在一棵枯树前，树枝指着的方向，风正硬。

choices:
  - text: 月下苦练
    outcome_id: moonlight_practice
    body: |
      你在月下摆开步法，把白天用过的招式反复走了十遍。
      每走一遍都琢磨一件事——脚落到第几寸、腰转到什么位置。
      月上中天时你收了势。汗已冷，但身体的记忆还热着。
      月光照在山路上，你脚下比来时轻了半步。

  - text: 隐入暗处
    outcome_id: hidden_battle
    body: |
      你不走月光下，反而退入树影最浓处。
      暗处什么都看不清——但正因为看不清，你开始注意声音。
      树叶的沙沙、远处的虫鸣、你自己的心跳。
      你在总被忽略的暗处找到一种节奏。那是夜袭者的节奏。

  - text: 赶路不停
    outcome_id: skip
    body: |
      你抬头看了一眼月亮，没有停步。
      道在脚下，不在月下。赶路比悟道更急。
      夜色在你身后越来越浓。你走你的路，月亮走它的路。

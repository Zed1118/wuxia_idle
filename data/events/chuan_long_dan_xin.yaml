id: chuan_long_dan_xin
title: 穿龙丹心
opening: |
  刚猛一道斩满两百五十敌，你的剑势已能开碑裂石。
  这日你行至一道深峡，两壁如削，中间一线天光。
  峡底有古人凿下的石龙，龙身贯穿整面崖壁，首尾不见尽头。
  你抚着那石龙的脊，忽觉胸中一股气血翻涌，竟与石龙的走势暗暗相合。
  你深吸一口气，想看看自己这条命，能不能也凿穿一面崖。

choices:
  - text: 贯气穿石
    outcome_id: insight_success
    body: |
      你运起浑身气血，一拳贯入崖壁，又顺着石龙的脊一路推过去。
      崖石簌簌而落，你的气血也随之贯通如一条长龙，再无半分滞涩。
      收拳时，峡谷回荡着一声长啸，连山鸟都惊飞了。
      穿龙啸歌，啸的是这一口贯穿天地的丹心。

  - text: 击壁试劲
    outcome_id: practice_partial
    body: |
      你不去强求贯通之境，只对着崖壁砸了上百拳。
      拳拳到肉，崖石碎了一地，你的筋骨也被震得发烫。
      虽未成那一条气龙，这身根骨却扎实了不少。

  - text: 拜石而去
    outcome_id: skip
    body: |
      你对着那石龙抱拳一礼，转身出了深峡。
      凿这条龙的人早已作古，你不知他想穿透的是石，还是别的什么。
      峡口风大，你拢了拢衣襟，没再回头。前路还长，崖壁不必你来穿。

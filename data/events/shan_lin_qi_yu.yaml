id: shan_lin_qi_yu
title: 山林奇遇
opening: |
  山林小径上，落叶积了厚厚一层，踩上去松软无音。
  你正走着，前方传来了人声——不是喊叫，是低低的呻吟。
  转过一棵歪脖子老槐树，一个行路的旅人靠在树下，捂着腿。
  再往林深处看，一只黑鬃野猪正拱着树根，浑不察觉你的存在。

choices:
  - text: 扶起旅人
    outcome_id: help_traveller
    body: |
      你走过去蹲下，从怀里摸出伤药递上。旅人抬头看你，眼眶红了。
      他撕下衣摆裹住伤腿，从包袱里掏出一块干饼塞到你手里。
      「山里人没什么好谢的。这块饼带在身上，能走远路。」
      你接过了。山风穿过老槐树，吹得叶子哗啦啦响。

  - text: 捕猎野猪
    outcome_id: hunt_beast
    body: |
      你压低身子绕到下风处，野猪还在拱土，浑然不知。
      一击得手。你蹲在野猪旁喘了好一阵，手还在抖。
      兽肉沉甸甸的，够吃好些天。但扛起它的时候，
      你忽然觉得——这山里，没有谁是真正的猎人。

  - text: 绕道而行
    outcome_id: skip
    body: |
      你站了一会儿，转身走回小径。
      旅人的呻吟渐渐远了。野猪也跑进了林子深处。
      山路很窄，窄得只容一个人走。你一个人走。

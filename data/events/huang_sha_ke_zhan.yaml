id: huang_sha_ke_zhan
title: 黄沙客栈
opening: |
  戈壁滩上独独一栋土房，门框上歪歪扭扭刻了"客栈"二字。
  推门进去，大堂里坐着五六个人，个个灰头土脸，桌上的碗底都铺了一层沙。
  掌柜的是个矮胖的婆娘，膀大腰圆，腰间别着一把切肉的短刀。
  她把你上下打量了一遍：「南边来的？」没等你答，她已经给你倒了碗水——
  碗底也有一层沙。这地方，没沙的水不叫水。

choices:
  - text: 与住客比试耐热
    outcome_id: endurance_test
    body: |
      几个住客常年跑戈壁的，打赌谁能在正午的烈日下站最久。
      你站到了最后。不是内力深厚——是你出招时的沉肩坠肘这基本功，
      刚好就是"不动"的功夫。输的人把自己的骆驼送给了客栈老板娘。
      老板娘给你碗里多加了一块腌肉：「吃。走得远的人，肚子里不能只有气。」

  - text: 帮老板娘卸货
    outcome_id: earn_gratitude
    body: |
      后院里搁着十多袋粮米，是三天前牵骆驼的商队留下的。
      你帮老板娘一袋一袋扛进了仓房。末了她从柜底翻出一块干粮——
      不是寻常干粮，是戈壁里一种耐存的馕。她没说话，把馕塞进你包袱里。

  - text: 坐在角落看风沙
    outcome_id: skip
    body: |
      你坐在靠窗的位置，看风在外面卷起一柱一柱的黄沙，打在窗棂上沙沙地响。
      这地方没有人问你来历，没有人看你背的剑。每个人只管自己的碗有没有沙。
      天亮出发时，一屋子人都还在睡。你轻轻带上了门。门外风停了，沙也停了，
      太阳刚出来就把整片戈壁烧成了金色。

id: huang_sha_fen_kong
title: 黄沙焚空
opening: |
  正午的大漠，天地像一座烧红的炉。
  连风都是烫的，吹过来一脸的火星子。
  你内力久积，掌中那股火气憋到了极处——
  抬眼望去，日头悬在头顶，白得发青，仿佛整片天都要烧起来。
  一念之间，你想把这一身的火，一掌泼出去。
choices:
  - text: 倾尽真气，焚天一掌
    outcome_id: insight_success
    body: |
      你聚起全身内力，一掌横扫推出。
      掌前的烈焰拧成一道火幕，卷过半边天空，黄沙被掀起一道墙。
      收掌时你几乎脱力——这一掌，掏空了周身真气，却不负焚天之名。
  - text: 留三分力，试推半幕
    outcome_id: practice_partial
    body: |
      你不敢倾尽，只推出七分。
      火幕是起来了，却卷不满，半空就散成了一片热浪。
      悟性长进了些，那焚天的气魄还差一口。
  - text: 烈日伤身，收功
    outcome_id: skip
    body: |
      头顶烈日烤得人头晕眼花，再催真气怕要走火。
      你压下那股火气，寻了片岩荫坐下。
      焚天的那一念，被晒化在了黄沙里。

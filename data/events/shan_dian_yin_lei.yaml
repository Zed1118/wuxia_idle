id: shan_dian_yin_lei
title: 山巅引雷
opening: |
  乌云压在山顶，伸手仿佛能摸到。
  雨还没落，闷雷已经在云里滚了半个时辰。
  你被困在山巅一块孤岩下，发梢隐隐发麻——
  忽然一道闪电劈在邻峰，亮得睁不开眼，那一瞬你看清了：天威落下，原也是从一线引下来的。
  浑身的血都热了。
choices:
  - text: 立于岩上，引这天威
    outcome_id: insight_success
    body: |
      你不躲了，立到岩顶，仰掌向天。
      又一道雷光劈下的刹那，你掌心一沉，似把那道天威引入了体内。
      一掌劈出，岩上的积水四溅，半边天的雷声都像在替你应和。
  - text: 借雷势运一遍内力
    outcome_id: practice_partial
    body: |
      你借着雷鸣运转内力，想引那股天威。
      气血是被激得翻涌，那道雷却引不进来，散在了岩石上。
      心境壮阔了几分，功夫还没到。
  - text: 雷太凶，避下山去
    outcome_id: skip
    body: |
      又一记惊雷炸响，孤岩都在震。
      你不敢再托大，猫着腰冲下山坳避雨。
      那道劈下的雷光，只在眼底留了个残影。

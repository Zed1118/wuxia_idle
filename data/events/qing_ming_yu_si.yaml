id: qing_ming_yu_si
title: 雨思
opening: |
  春雨绵绵下了整日，山道两旁的柳枝已抽出新绿。
  你行至一处山坡，远远望见几只纸鸢在灰蒙蒙的天上翻飞。
  一只断了线的纸鸢飘飘摇摇落向溪边，你顺着方向走去。
  溪水涨了几分，水面上漂着零星的梨花。
  你驻足片刻，忽觉这雨声里藏着什么。

choices:
  - text: 临溪而立，听雨思故人剑意
    outcome_id: yu_si_path_a
    body: |
      你立在溪边，雨丝打在肩上也不去拂。
      溪水从脚下流过，你想起多年前一位故人临水舞剑的身姿——
      他的剑势如这溪水，看似柔缓，实则无孔不入。
      你闭上眼，试着将这套剑意在心中走了一遍。
      再睁眼时，雨已停了，溪面上映出一角青天。

  - text: 沿泥路踏青，走上山坡
    outcome_id: yu_si_path_b
    body: |
      你沿泥路往山坡上走，鞋底沾满春泥。
      山风拂面，带着雨后草木的气息。
      你走到坡顶，极目远眺，田野一片新绿。
      深深吸一口气，觉得这趟踏青下来，浑身筋骨都松快了几分。
      远处有人牵着纸鸢跑过田埂，笑声隐约传来。

  - text: 转身离去，赶路要紧
    outcome_id: skip
    body: |
      你看了眼飘远的纸鸢，转身沿原路返回。
      雨丝渐细，远山如黛。
      山道上，正等着你的剑。

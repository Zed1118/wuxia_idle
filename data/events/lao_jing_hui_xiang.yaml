id: lao_jing_hui_xiang
title: 老井回响
opening: |
  一口枯井。井沿的青石被磨得发亮，不知多少人曾在这里弯腰打水。
  你探头往下看，黑沉沉的井底传来了风声——不是从井口灌下去的，
  是从井底往上吹的。风里裹着一股陈年的铁锈味。

choices:
  - text: 投石探底
    outcome_id: discover_secret
    body: |
      石子落下去，等了很久。传来的不是水声——是一声脆响，像是砸在了金属上。
      你顺绳而下，在井底的淤泥里摸到一截断剑。
      剑断了不知多少年，刃口上还留着一道未干的露水。

  - text: 侧耳细听
    outcome_id: hear_whisper
    body: |
      你伏在井沿，闭眼静听。风声里似乎夹杂着人声——不是一个人的声音，
      是很多人的，像是很久以前在这井边说过的话，被井壁记住了。
      有一句话你听得分外清楚：「下去的人，不必上来。」
      你睁开眼，风声停了。

  - text: 转身离开
    outcome_id: skip
    body: |
      井口的风还在吹。你退了两步，没有回头。
      有些井是打水的，有些井是吞人的。这口井属于哪一种，
      你不用试就知道了。

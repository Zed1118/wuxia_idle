id: cha_ting_dui_ju
title: 茶亭对局
opening: |
  官道边的茶亭，四面透风，只放了一张方桌、两条长凳。
  桌上摆了一副象棋残局。红方剩一帅两卒，黑方剩一将一马。
  茶已经凉了，但茶杯还在冒白雾——不是热气，是凉意。
  亭外坐着一个人，正低头削一根竹签。他抬头看你：「会下吗？」

choices:
  - text: 执红落子
    outcome_id: aggressive_win
    body: |
      你用一卒强换黑马，帅前只剩一卒。两子对一将，胜算在残。
      那人顿了一下，放下竹签，把棋盘一推：「下得好。
      但你知道的——赢残局不算本事。残局是前人留给你的。」

  - text: 执黑守局
    outcome_id: defend_draw
    body: |
      你用黑马死缠红帅，硬生生把棋拖入和局。
      那人笑了一声：「不错。守得住，有时候比拿得下更难。」
      他把棋子一颗一颗收进布袋，收了很久，不知在想什么。

  - text: 推棋不落
    outcome_id: skip
    body: |
      你摇头。那人也不勉强，一个人把残局下完了。
      你看着他走完最后五步——黑方赢，红帅无路可退。
      他站起来，竹签已削成一根细针。他把针插在棋盘中央，走了。
      亭子里只剩你、棋盘、和一根针。

id: da_mo_zhang_yan
title: 大漠掌炎
opening: |
  日头毒。
  黄沙烫得能烙熟鸡子，热气在地平线上扭成一片水光。
  你走得唇裂，掌心却比这沙地更烫——
  一路杀过来积下的火气憋在劳宫穴，搓一搓，竟有热浪从指缝里透出来。
  这火不在皮肉，在气里。
choices:
  - text: 借日头引这股掌火
    outcome_id: insight_success
    body: |
      你面朝烈日，缓缓推掌。
      一掌出去，掌前的热气拧成一道扑面的浪，沙粒被掀起寸许。
      收掌时掌心微红，却不见伤——灼的是气，烫不着自己。
  - text: 试着把热气逼出掌心
    outcome_id: practice_partial
    body: |
      你运气于掌，热是热了，却散得到处都是。
      推出去时威势去了大半，倒先燎得自己手背发痛。
      力道催得猛了，气反而拢不住。
  - text: 先找水喝
    outcome_id: skip
    body: |
      喉咙干得冒烟，再练下去要倒在沙里。
      你眯眼望了望远处的一线绿，朝那走去。
      掌心的热，被风一吹就凉了。

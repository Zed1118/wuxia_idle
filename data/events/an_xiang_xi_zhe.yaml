id: an_xiang_xi_zhe
title: 暗巷一影
opening: |
  夜深了，巷口的灯笼灭了大半，只剩一盏斜在风里。
  你在这条巷子来回走了几趟，青砖上的水渍还没干。
  拐角处忽然有一道影子动了——不是走，是贴墙滑过。
  那人袖中翻出一柄短刃，在指间转了一圈，
  又无声无息地收回去。檐下滴了三滴水，他练了三招。

choices:
  - text: 上前请教
    outcome_id: ambush_practice
    body: |
      那人回过头，月光照见他半边脸。
      他没说话，只是摊开掌心——一枚铜钱躺在虎口，
      指缝间又翻出第二枚。你看清了：袖中藏刃，
      指间藏锋，腕底藏着第三手。你伸手一接，学到了。

  - text: 学藏不学打
    outcome_id: hide_stance
    body: |
      你没有上前，只是缩在檐下学他的步法。
      脚跟着地、脚尖轻碾、贴墙一侧——
      你走了几遍，影子越来越稀。
      夜风灌进巷子，你的衣角没飘起来，
      像是整个人都轻了。

  - text: 悄悄离去
    outcome_id: skip
    body: |
      江湖路远，有些功夫不一定非学不可。
      暗器虽巧，终究不是你要走的路。
      你退了几步，没出声。巷中的影子还在练，
      你没回头。

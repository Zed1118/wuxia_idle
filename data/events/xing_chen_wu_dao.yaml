id: xing_chen_wu_dao
title: 星辰悟道
opening: |
  山顶的夜是真正的黑——没有村落、没有灯、没有月亮。只有星星。
  你躺在岩石上看天。北斗七星比任何时候都清楚，银河从东划到西，
  像是在天幕上用刀划了一道白痕。忽然有个声音在你脑中说：「看够了吗？」
  你坐起来。四周无人。声音来自星空的反射——是你自己的心在问。

choices:
  - text: 对着北斗练剑
    outcome_id: celestial_insight
    body: |
      剑在手，舞向北斗。不是打——是"描"。剑尖顺着北斗七星的方位轮转，
      七个方位走完，手心已微热。一股暖流自掌心渗进剑柄，走了七步剑法的
      过程中竟感觉到了星位与星位之间的空隙。这空隙里藏着七星流转本身的力道。

  - text: 静卧观星
    outcome_id: meditate
    body: |
      你不动，只看。看着看着，星星不再是一个一个的点了——它们连成线、
      组成阵。北斗七星缓缓偏转，像一个巨大的杓子在天上转了一圈。
      你知道这转一圈其实用了一整夜，但你看上去只过了一息。

  - text: 披衣下山
    outcome_id: skip
    body: |
      山顶的风硬了。你裹上衣襟往下走几步，回头——山顶上的星星比刚才更亮了。
      你忽然明白了，不是星星变亮了，是你的眼睛习惯了黑暗。
      知道黑暗的东西，才知道什么算亮。

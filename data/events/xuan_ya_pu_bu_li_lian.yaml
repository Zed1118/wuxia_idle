id: xuan_ya_pu_bu_li_lian
title: 悬崖瀑布历练
opening: |
  瀑布从数十丈高的崖顶砸下来，水花溅了你一身。
  雨水顺着山壁往下淌，和水帘混在一起，分不清哪是雨、哪是瀑。
  你站到了水帘正下方，寒水冲得肩膀一沉。
  水流在耳边炸开，反而什么也听不见了——只剩呼吸。

choices:
  - text: 硬扛寒水
    outcome_id: withstand_water
    body: |
      你咬牙站稳，任水冲了一遍又一遍。
      起初冷得发抖，后来身体不再抗拒，反而觉得水在替你捶打筋骨。
      出水时浑身通红，但脚下比来时刻实了许多。
      山还在下着雨，只是你已经不怕冷了。

  - text: 与水合一
    outcome_id: merge_with_water
    body: |
      你闭上眼，不再抵抗水势，顺着水流的方向缓缓抬手。
      水从你指尖流过的那一瞬，你忽然感应到了一种流动的力——
      不是对抗，是融入。不是去劈开水，是让水自己让路。
      再睁眼时，你已站在水帘之外，衣服竟然是干的。

  - text: 退回崖下
    outcome_id: skip
    body: |
      你在水帘前站了许久，终究没有跨出那一步。
      瀑布的轰鸣声太大了。大雨还在下，可你的心里太吵。
      你退回崖下的石壁边，靠了一会儿。水声渐渐变远了。

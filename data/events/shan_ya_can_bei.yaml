id: shan_ya_can_bei
title: 山崖残碑
opening: |
  断崖边上立着半块石碑，风蚀得字迹模糊。
  你蹲下来辨认，勉强读了几个字——「……十三岁入武当，十九岁下山……
  三十二岁败于……之手。此后……」以下的部分被苔藓遮住了。
  碑的背面刻着一个掌印，五指分明，竟是将石头按进了一寸。

choices:
  - text: 拓印碑文
    outcome_id: learn_history
    body: |
      你用炭灰和白纸将残留的字迹拓了下来。
      对着拓片细看，最后一行隐约是：「此碑立于元嘉六年，留待有缘。」
      元嘉六年——距今已百年。你将自己的手掌覆在碑背的掌印上，
      竟严丝合缝。

  - text: 运劲按掌
    outcome_id: resonate_power
    body: |
      你将手掌按在那个掌印上，催动内力。石碑嗡嗡作响，
      碑身上裂开一道细纹——纹路恰好补齐了被苔藓遮住的那行字：
      「败于己手。此后四十年独居山崖，每每扪心自问。」

  - text: 合掌敬碑
    outcome_id: skip
    body: |
      你双手合了一掌，对着残碑默立片刻。下山时，风从崖底灌上来，
      把碎石子吹得劈啪响。你忽然很想知道那个「败于己手」的人，
      后来到底怎么样了。但你告诉自己：不必问了。碑立在这，就是答案。

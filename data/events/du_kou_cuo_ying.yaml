id: du_kou_cuo_ying
title: 渡口错影
opening: |
  雨打在江面，密得像一层灰雾。
  渡口的乌篷船泊着，艄公缩在船头，斗笠檐上滴着水。
  你等船，无聊看那雨——
  忽见一只水鸟贴着江面掠过，雨点穿过它方才在的地方，它却已在三尺之外。
  快得不是翅膀，是那一闪的错位。
choices:
  - text: 盯住雨中的飞影揣摩
    outcome_id: insight_success
    body: |
      你立在雨里，看那鸟来回掠了十几趟。
      看到后来，眼前的雨丝都慢了下来。
      你忽然侧身一闪，雨没淋着，身后的旧影还停在原处。
  - text: 学着错身躲雨试试
    outcome_id: practice_partial
    body: |
      你试着在雨点间错步穿行。
      躲过三五点，便有一点正落在颈窝里，凉得一激灵。
      身法是活络了些，火候却还差着。
  - text: 上船过江
    outcome_id: skip
    body: |
      艄公扬声催了一句，船要开了。
      你跳上乌篷船，雨声被篷顶隔在了外头。
      那只水鸟的影子，散在身后的江雨里。

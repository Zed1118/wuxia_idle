id: sect_recruit_bamboo
title: 竹林听剑
opening: |
  竹林深处，雨声未歇。
  你拨开一丛湿叶，见前面石上坐着一个年轻人，
  长剑横膝，眼睛半闭。你脚步未停，他剑已出鞘半寸。
  雨珠从竹叶上滚落，落在剑刃上又弹开，像怕惊扰了什么。
  他睁开眼：「你也是听这雨声来的？」

choices:
  - text: 「你若愿意，可入我门派。」
    outcome_id: accept_recruit
    body: |
      他怔了片刻，似乎没料到你会开门见山。
      然后他笑了，把剑收回鞘里，起身揖了一礼。
      「在下竹影客，游剑七年，无门无派。」
      「自小听雨长大，母亲早逝那年，我便对着竹林练剑——
      因为竹叶上的雨声，是她最爱听的曲子。」
      「七年了，我一直在找一个地方，能让这一身剑有个归处。」
      「若蒙不弃——这一身剑，从今日起，归师门所用。」

  - text: 「这一片竹林，确是好剑场。」
    outcome_id: decline_meet
    body: |
      你与他对坐，听他说听雨悟剑的事。
      他说剑无定法，只在风雨中体会出招的节奏；
      又说独练七年，最难的不是招式，而是没人陪着切磋。
      他剑法虽未入流，却自有一脉清气。
      离开时，你忽然懂得了几分——
      原来悟性不在书本，而在能静下来的耐心里。

  - text: 转身离去
    outcome_id: skip
    body: |
      雨大了起来。你转身往林外走，身后剑光一闪而灭。
      他没追，你没回头。竹林里相逢的人，本就该这样。

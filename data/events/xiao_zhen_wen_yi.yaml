id: xiao_zhen_wen_yi
title: 小镇问隐
opening: |
  客栈大堂里烟熏火燎，几个跑镖的汉子围着一只大碗喝酒，
  碗底沉着半只鸡腿。你拣了个角落坐下，要了一壶茶。
  隔壁桌一个老者独自喝闷酒，忽然侧过身来，
  拍了一下你的桌角：「年轻人。你是练武的，对不对？」
  他没等回答，给你斟了半碗酒。

choices:
  - text: 把盏对饮
    outcome_id: share_drink
    body: |
      你接过碗，一饮而尽。老者哈哈大笑：「好——
      二十年没见到敢喝陌生人酒的后生了。」
      他从怀里摸出一张旧羊皮，推到桌中间给你看。
      上面画着几道线条，像是地图，又像是剑法。
      「送你。我留着也没用了。该有人带着走下一程了。」

  - text: 侧耳偷听
    outcome_id: eavesdrop
    body: |
      你没有接酒，只是低头喝茶，耳朵却听着隔壁桌的言论。
      镖师们在聊一趟走镖时遇上的麻烦——不是截道，是路。
      他们在说的路线、埋伏点、进退时机，跟武学中的攻防理路并无二致。
      你不动声色地饮茶。一杯茶喝完，像是多走了半年的江湖。

  - text: 起身离席
    outcome_id: skip
    body: |
      你摇了摇头，把茶钱放在桌上便起身。
      老者的手还停在半空，碗里的酒晃了一下。
      客栈的门帘在你身后落下，酒气、烟味、说话声都被隔断了。
      小镇的街很窄，很静。但那种吵闹还在你耳朵里转了一会儿。

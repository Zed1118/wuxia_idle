id: qi_xi_xi_qiao
title: 乞巧夜
opening: |
  夏夜庭院，星光垂得很低。
  几案上摆着针线与瓜果，年轻女子们正对月穿针。
  你路过时被一位大娘拦住，递来一根针、一缕丝。
  「来都来了，试试。」她笑着往你手里塞。
  你抬头望去，银河横过天顶，清澈得像能照见人影。

choices:
  - text: 穿桥而过，绕开赏星人
    outcome_id: xi_qiao_path_a
    body: |
      桥上游人如织，你侧身从人缝间穿过去。
      脚步在不自觉间轻了三分——左闪让过提灯少女，
      右转绕过观星老翁，下桥时竟没人察觉你走过。
      你忽然明白：真正的快，不是让人看不清，是让人感觉不到。

  - text: 接过针线，对月穿七孔
    outcome_id: xi_qiao_path_b
    body: |
      你拈针在手，月光透过针孔，细得像一道剑痕。
      丝线穿过去的瞬间，你想起出剑时最关键的从来不是力道——
      是刺出的那一瞬，剑尖必须分毫不差地落在它该落的地方。
      今夜这一根针，比平日百次挥剑更让你看清剑的本意。

  - text: 放下针线，披星离去
    outcome_id: skip
    body: |
      你把针线轻轻放回案上。
      身后传来又一阵笑声，大概是谁穿过了第七孔。
      你走出院门，星光照在前路上，远远的一带青山隐约可见。
      江湖总在前头——不急于这一根针。

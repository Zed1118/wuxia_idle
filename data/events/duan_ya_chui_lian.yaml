id: duan_ya_chui_lian
title: 断崖锤炼
opening: |
  断崖上的雪积了一尺厚，风从崖底灌上来，带起细碎的冰屑。
  你坐在崖边一块突石上，膝盖以下埋在雪里。
  天色灰蒙，分不清是黄昏还是破晓。
  你呼出一口白雾，它在空中凝了一瞬，便被风撕碎。

choices:
  - text: 凝神御寒
    outcome_id: endure_cold
    body: |
      你闭上眼，不再理会风雪。内息在周身游走一圈，
      冻僵的手指渐渐恢复了知觉。雪还在下，但落在肩上时，
      你已不觉得冷了——只是雪，不是敌。
      你站起身，抖落一身白。脚下的石面露出了青灰色的底。

  - text: 破冰一击
    outcome_id: shatter_ice
    body: |
      你盯住崖壁上那块最大的冰棱——足有一人高，挂在石壁外。
      你深吸一口气，出掌。冰棱应声而碎，碎片漫天飞溅。
      那一掌并非以力破之，是震断了冰根。
      冰屑落尽后，崖壁上露出了一道细如发丝的裂纹。

  - text: 折返下山
    outcome_id: skip
    body: |
      你拢了拢领口，把脚从雪里拔出来。
      这断崖的寒不是你能扛的——至少今天不是。
      你踩着来时的脚印往回走。身后有冰棱断裂的脆响，
      从崖底隐约传上来，像是裂了很远、很远的冰层。

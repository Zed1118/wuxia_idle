id: qiu_ye_wei_qi
title: 秋夜围棋
opening: |
  山道上有一块天然的大石坪，上头刻了一张棋盘。棋盘上的棋子不是黑白两色——
  是松果与石子。松果是白子，石子是黑子。残局未完，白子已经被围死了一角。
  石坪边坐着一个白发老翁，手边放了一壶凉透的茶。他看见你便指了指棋盘：
  「你，黑子还是白子？」

choices:
  - text: 执黑续局
    outcome_id: aggressive_win
    body: |
      你用黑子将残局收了。老翁看着棋盘，久久不语，忽然伸手把松果与石子
      推乱了。「年轻人，下棋和走江湖一个道理——占多了反而容易散。
      你方才少占一角，反倒把白子逼死了。」他站起来拍了拍衣摆：
      「记住这一盘。以后有人在棋盘外跟你对局的时候，知道自己该少占哪里。」

  - text: 弃局问路
    outcome_id: ask_direction
    body: |
      「不下了。问你路。」老翁笑起来：「几十年了，终于来了一个不问输赢的。」
      他从怀里摸出一张羊皮纸，上头画着一条山道，岔路口标了密密麻麻的字。
      他用手指在某处一戳：「这里。别的地方你可以不去，这里一定要去。」

  - text: 端茶旁观
    outcome_id: skip
    body: |
      你坐在一旁，看老翁一个人下完残局。他下得极慢，每一步都像是在回忆什么。
      天光渐暗时，他抬头看了你一眼：「你是不是在想，这棋盘上每一颗石子
      都有一个人？」你还没点头，他已经起身走了。茶壶还温着。

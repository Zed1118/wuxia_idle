id: huang_yuan_yi_zhong
title: 荒原遗冢
opening: |
  荒原上孤零零地立着一个坟头，土还是新的。
  坟前没有碑，只插了一根用旧了的齐眉棍。
  棍身上的漆早已磨光，唯有握柄处被手掌磨出两道深沟——
  这是练棍四十年以上才能留下的痕迹。
  棍的顶端系了一缕白布，被风吹得啪啪响。

choices:
  - text: 拔棍试力
    outcome_id: sense_echo
    body: |
      你握住那根齐眉棍，往上一提。棍是活的——不是轻，是有劲。
      四十年的腕力渗在木纹里，你一握便知。舞了个圈，棍尖所指，
      地上的碎叶自行散开。你放下棍，重新插回坟前，比刚才深了一寸。
      一寸是敬意。

  - text: 掘土探丘
    outcome_id: find_relic
    body: |
      你用双手刨开新土。底下没有棺椁，只有一只木匣。
      匣子没上锁。打开一看，里面空空如也——只在匣底刻了六个字：
      「此身已归棍中。」你合上匣子，重新盖好土。
      棍还在那插着，但你觉得它好像看了你一眼。

  - text: 撮土为香
    outcome_id: skip
    body: |
      你撮起一捧土，洒在坟头上。风把那缕白布吹得更急了。
      你站了一会，转身时发现身后不远处不知什么时候停了个人——
      也是一个用棍的。他对你点了点头，走过你，走到坟前跪了下去。
      你没问他是谁。你只是继续走了。

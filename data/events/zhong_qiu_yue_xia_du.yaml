id: zhong_qiu_yue_xia_du
title: 月下独酌
opening: |
  山顶空地，一轮圆月正悬。
  你独坐石上，身边一壶桂花酒。
  清光洒下来，满山草木都泛着薄薄的银边。
  远处传来几声雁鸣，近处只有虫声唧唧。
  你举杯对着月亮，杯中映出一轮小小的月影。

choices:
  - text: 静观月轮，思剑之圆缺
    outcome_id: yue_xia_du_path_a
    body: |
      月有圆缺，剑有起落。
      你放下酒杯，看着月亮从云边徐徐移出。
      原来一套剑法从起手到收势，正如月轮从亏到盈——
      真正的完满不在最后一式，在每一式都恰好是该有的样子。

  - text: 对月起舞，剑随影走
    outcome_id: yue_xia_du_path_b
    body: |
      你提剑起身，月光顺着剑脊流走。
      地上影子随着你的步伐拉长又缩短，像另一个人在与你对招。
      你越舞越快，影也越追越快——到最后已分不清是你带影还是影带你。
      收剑时你微喘，却觉得脚步比来时轻了许多。

  - text: 饮尽壶中酒，下山
    outcome_id: skip
    body: |
      你把壶中最后一口酒饮尽，对着月亮举了举空壶。
      清光正好，山路分明。
      你起身下山，脚步不紧不慢——这一壶月色，已经足够了。

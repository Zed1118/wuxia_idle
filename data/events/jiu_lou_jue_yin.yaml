id: jiu_lou_jue_yin
title: 酒楼绝饮
opening: |
  酒楼的雅间里只摆了一桌席。席上坐了六个人，一个空位——是你的。
  门口的小二战战兢兢地给你递了条热毛巾：「客官……那位爷说了，
  不论谁来，都让进来。他已经等三天了。」
  主位上那个中年人站起来了。他脸上带着酒意，眼里却没有。
  他倒了两碗酒，一碗推到你面前：「今天不比武。只喝酒。
  喝完这碗，你可以走。也可以不走。」

choices:
  - text: 一碗见底
    outcome_id: earn_respect
    body: |
      酒入喉，火辣辣地烧。你抹了把嘴角，把碗扣在桌上。
      六个人的脸都变了色——不是敌意，是敬意。
      主位的中年人拍了下桌子：「好。」他不再劝第二碗。
      因为他知道，喝完这碗酒还能把碗扣在桌上的人，不必多喝。

  - text: 以茶代酒
    outcome_id: clever_avoid
    body: |
      你把酒碗推到一边，斟了杯茶。「剑还没出鞘，酒不能喝。」
      中年人愣了一瞬，笑起来：「说得也是。我们这些人，
      六把剑出过几回鞘，我自己都数不清了。」他把自己那碗酒也倒了，
      换上了一杯茶。

  - text: 起身离席
    outcome_id: skip
    body: |
      你站起来，没碰那碗酒。六个人没拦。
      主位的人把酒慢慢淋在桌上——不是泼，是浇，浇成一个圈。
      「这圈你总有一天会回来的。」他的声音不高，但压过了满楼的安静。
      你推开雅间的门，身后六个人同时抬手——像是告别，又像是交手前的身形预备。

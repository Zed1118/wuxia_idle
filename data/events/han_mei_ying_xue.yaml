id: han_mei_ying_xue
title: 寒梅映雪
opening: |
  大雪封山第七日。你在山腰一座废亭里辟出一片干净地面，生了一小堆火。
  亭外的梅树开了花，雪压在枝头，梅瓣从雪缝里挤出来，白上一点红。
  梅树下坐了一个披蓑衣的人，蓑衣上积了厚厚一层雪。他手里端着一只
  粗瓷茶杯，杯里的水已经冰了。「这树我看了二十年。二十年，年年开花。
  年年在雪里开。」他看向你，「你说这花傻不傻。」

choices:
  - text: 摘梅煮茶
    outcome_id: share_tea
    body: |
      你折了一枝梅，摘下几朵放在热茶里——极苦，苦完之后有一丝回甘。
      那人蘸了一点茶，用食指在石桌上写了一句诗：遥知不是雪，为有暗香来。
      写完手指冻得通红。「你看，连宋朝人都说这是傻花。傻了一千年，还在傻。」

  - text: 问他守什么
    outcome_id: hear_vow
    body: |
      蓑衣人把茶杯翻过来扣在雪里。「守一个人。」
      他说二十年前他约了一个人在这梅树下决斗。他在雪中等了三天三夜——
      那人没来。此后每一年冬天他都回来。「我不是在等决斗。我是在等消息。
      死活都行，只要一个消息。」他等了二十年，没收到。

  - text: 添柴续火
    outcome_id: skip
    body: |
      你把火堆加旺了些。蓑衣人没道谢。天光微亮时他站起来，
      把蓑衣上的雪抖落干净，对着梅树鞠了一躬。然后他提着茶杯走进雪里，
      背影越来越小，直到和雪混为一色。你看不清他是真走还是就站在那不动了。
      梅瓣还在落。每天落一些。

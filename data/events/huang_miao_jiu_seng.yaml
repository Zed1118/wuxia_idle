id: huang_miao_jiu_seng
title: 荒庙旧僧
opening: |
  庙已经塌了大半，只剩半间偏殿还支着。
  殿里坐着一个灰袍老僧，面前摊着一本被雨水泡烂的经书。
  他没有抬头，声音像是从墙缝里渗出来的。
  「你来了。」
  你不认识他。但他说的那句话，师父临终前也说过。

choices:
  - text: 席地坐下
    outcome_id: learn_healing
    body: |
      老僧用手指在地上画了一个圆。
      「世间的伤，有七分是刀剑所留，三分是你自己不肯放。」
      他枯瘦的手指点在你胸口。一股暖意从指尖散开。
      你再抬头时，偏殿里已空无一人。

  - text: 询问来历
    outcome_id: learn_lore
    body: |
      老僧抬头看了你一眼，目光像是隔着几十年在看另一个人。
      「你师父当年在凉州城外，欠贫僧一碗茶。」
      他说完便笑了一声，笑声很轻，像是放下了什么。
      庙外的风忽然停了。

  - text: 恭敬告退
    outcome_id: skip
    body: |
      老僧垂下眼，继续翻那本泡烂的经书。
      「也好。贫僧的事，不急着说。」
      你退出庙门时，听见他在背后念了一句什么。
      像是经文，又像是一个人的名字。

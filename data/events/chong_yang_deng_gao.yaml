id: chong_yang_deng_gao
title: 登高
opening: |
  山道陡峭，石阶上落了厚厚一层松针。
  你从山脚往上攀，一路遇到不少拄杖歇脚的行人。
  转过几道弯，路旁有人支了摊位，卖菊花酒和茱萸香囊。
  你买了半壶酒，没停——山顶还远。
  越往上走，风越清冷，人也越少。

choices:
  - text: 一口气攀到崖顶
    outcome_id: deng_gao_path_a
    body: |
      脚下的石阶越来越险，你索性弃了杖，手足并用往上攀。
      最后一程是面陡崖，你深吸一口气，一寸一寸挪了上去。
      站在崖顶回望，来路缩成一条细线。你浑身酸胀，
      却觉得双腿里多了一股从石头里长出来的劲道。

  - text: 山顶遇异人，对坐饮菊酒
    outcome_id: deng_gao_path_b
    body: |
      崖顶上早已坐了一个人，灰袍白发，正自斟自饮。
      他看见你上来也不惊讶，只是往旁边挪了半个身位。
      "能走到这里的不多。"他递过一杯菊花酒。
      三杯下去，他说了三句话。每一句都像一把钥匙，打开了某扇你一直推不动的门。

  - text: 在山腰折返，踏松针而归
    outcome_id: skip
    body: |
      你走到半山腰便停了下来。
      松涛阵阵，山风把远处镇的轮廓吹得若隐若现。
      你转身下山，步子比上山时慢了三成。
      不是累了——是这山，已经给了你想要的。

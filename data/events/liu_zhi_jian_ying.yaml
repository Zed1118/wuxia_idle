id: liu_zhi_jian_ying
title: 瀑下问剑
opening: |
  瀑布日夜不停，你在崖边看了好几日。
  水势有时如帘，有时如线，有时如一条白练劈入深潭。
  崖壁上的柳条垂在水雾里，风来则拂，风去则直——
  像是有人握着剑尖，在水中写字。
  你的剑鞘上沾了几次雾，拔剑的手一次比一次慢。

choices:
  - text: 悟这清风剑
    outcome_id: wind_sword
    body: |
      你闭上眼，不再看水，只听着。
      水声里有柳条划出的弧、有风剪开的缝、
      有水滴撞石的碎响。
      你拔剑，剑尖从斜下掠向斜上——不是斩水，
      是借水势。水花散尽时，剑上只沾了三滴。

  - text: 学水势步法
    outcome_id: river_step
    body: |
      你收了剑，只在水边石头上走。
      每一步都踩在水花落下之前的那个位置。
      走了十余步，脚底不沾湿，身子轻得像是被水雾托着。
      你停下来回头看——脚印很浅，只在水边，
      没沉下去。

  - text: 收剑离去
    outcome_id: skip
    body: |
      水势难捉，剑道还远。
      你系好剑鞘，踩着湿滑的石阶往上走。
      瀑布声渐渐沉下去，柳条还在身后的雾里摇着——
      等你下一次再来。

id: du_kou_chun_yu
title: 渡口春雨
opening: |
  春雨绵绵密密地下了一整天，渡口的黄泥地踩成了浆。
  艄公的船拴在岸边，人却不在——大概躲雨去了。
  码头上等船的不止你一个。一个挑了两筐货物的汉子坐在石阶上，
  雨水顺着斗笠往下淌。他看你一眼，又看了看天。
  「这雨一时半刻停不了。你是赶路的？」

choices:
  - text: 耐心等船
    outcome_id: wait_boatman
    body: |
      你沉下心，在石阶上坐下等。春雨不紧不慢地落。
      约莫一个时辰，艄公从镇上回来了，手里提着一篓鲜鱼。
      他看见你还在等，愣了一下，从鱼篓里摸出一样东西塞给你——
      是一枚磨得发亮的铜鱼。「老渡口的东西。带身上，遇水不慌。」

  - text: 帮挑夫上船
    outcome_id: help_stranger
    body: |
      你走过去，帮汉子把两筐货抬上船。筐里装的是河石，沉得要命。
      搬完最后一筐，你直起腰喘了一口长气。汉子拍拍你肩膀，
      力道很大——他也是干活出身。「看你像是练过。这膀子够力，
      走江湖最吃香的就是能扛。」船离岸时，春雨还没有停。

  - text: 不等了
    outcome_id: skip
    body: |
      你在渡口站了一会儿，转身往回走。
      雨打在头上，路又滑又冷。可你心里想的是——
      不等船的人，有时候是不知道船来了会载你去哪儿。
      你也不想知道了。

id: xue_ye_xing_kong
title: 雪夜星空
opening: |
  灵巧一脉斩到两百敌手，你的步法已快得连自己都看不清。
  这夜大雪初霁，你独行至一片高原，四下空无一物。
  抬头时，满天星斗低垂，仿佛伸手可摘。
  你看那群星各居其位，却又随夜悄然移转——动而不乱，乱中有序。
  你试着以身法去合那星移之势，第一步落下，竟比往日轻了许多。

choices:
  - text: 踏雪追星
    outcome_id: insight_success
    body: |
      你循着星辰移转的轨迹，在雪原上游走起来。
      脚下不留实痕，身随星转，星随天移，竟分不出谁先谁后。
      待一夜将尽，最后一颗星沉入山后时，你的身法也圆满了。
      雪夜星移，移的是步，藏的是天。

  - text: 凭势疾行
    outcome_id: practice_partial
    body: |
      你不去参那星象之理，只放开了脚力，在雪原上纵情疾驰。
      风灌入袖，身轻如叶，一口气掠出十余里。
      虽未得其神髓，这一夜疾行，倒让你的身法又快了几分。

  - text: 卧雪观星
    outcome_id: skip
    body: |
      你不动，只仰面躺进雪里，看了大半夜的星。
      星辰自顾自地移，与你无关，你也乐得清闲。
      天快亮时你起身拍去身上的雪，那满天星斗已淡得看不见了。

id: fei_pu_lian_jian
title: 飞瀑练剑
opening: |
  瀑布从崖顶直坠下来，砸在潭里，水雾腾起半山。
  你立在潭边一块青石上，握剑出鞘。
  水声盖过了一切，连自己的喘息都听不见——
  忽然看清了那道水：它落下时并非一股，是一层叠着一层，前浪未尽后浪已至。
  剑，原也该这么走。
choices:
  - text: 引瀑势入剑
    outcome_id: insight_success
    body: |
      你把剑刺向飞瀑。
      剑尖至剑柄连成一线，层层震颤，竟与那叠落的水势合上了。
      一剑刺入水帘，激起的水花排成一道直线——这一剑，抵得三剑。
  - text: 照着水势比划剑招
    outcome_id: practice_partial
    body: |
      你对着瀑布使了一遍剑法。
      招式是顺了，那层层相叠的劲道却使不连贯。
      水雾打湿了剑穗，悟性长进了些，火候还浅。
  - text: 水雾太重，收剑
    outcome_id: skip
    body: |
      站得久了，衣裳尽湿，剑身上凝满了水珠。
      你抹了把脸上的水，还剑入鞘。
      那道叠落的剑意，随水雾散了。

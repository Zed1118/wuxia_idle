id: jiao_chang_chu_wu
title: 校场初悟
opening: |
  校场的尘土被风卷起来，打在木桩上沙沙作响。
  你在这一角已站了许久，拳脚在桩面上留下的裂痕，
  旧的刚被雨填平，新的又劈了上去。
  西边来了个老兵，不练拳、不踢桩，只是站着。
  他呼一口气，地面的尘旋了一圈。吸一口气，尘落回脚边。

choices:
  - text: 学这朴息法
    outcome_id: forge_basics
    body: |
      你学他站定。一开始气浮在胸口，乱七八糟。
      半盏茶后，你的呼气慢了，尘土被轻轻推开，
      吸气缓了，尘土又慢慢拢回。
      你忽然懂了——原来拳脚之外，还有这一口气。

  - text: 只观不学
    outcome_id: observe_stance
    body: |
      你在一旁看着，不跟他的呼吸，只跟着站。
      一炷香过去，你觉着肩膀沉了半分，
      两腿入地像是生了根。风再刮过来时，
      你不再晃。就只是站着，也是练。

  - text: 转身走开
    outcome_id: skip
    body: |
      你在校场已待了够久，这一口气——
      不是今天的事。你拍了拍裤腿上的土，
      往另一边走去。身后的老兵没有看你。

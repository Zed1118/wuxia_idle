id: xue_ya_ning_han
title: 雪崖凝寒
opening: |
  大雪封崖。
  天地一色，连呼吸都冻成了白雾，落在眉睫上结成霜。
  你避在背风的岩凹里，内力运转抵御严寒——
  忽然发觉，自己周身三步之内，雪片落下得竟比别处慢了半拍。
  寒气是从丹田里透出来的，握刀的那只手，关节都凝了一层霜。
choices:
  - text: 收敛寒气，凝于周身
    outcome_id: insight_success
    body: |
      你不再驱寒，反把那股寒气收拢，缓缓外放。
      三步之内，温度骤降，飘落的雪花悬在半空，慢得几乎不动。
      你抬手一引，连风都像被冻住了——慢了的东西，就再快不起来。
  - text: 试着把寒气逼出指尖
    outcome_id: practice_partial
    body: |
      你引寒气走向指尖，想凝出那片寒域。
      指尖是凉了，那股寒却散得太开，拢不成形。
      身法在这冷意里反倒灵了几分，火候还浅。
  - text: 风雪太烈，下崖避寒
    outcome_id: skip
    body: |
      朔风卷着雪粒抽在脸上，岩凹也挡不住了。
      你跺了跺冻僵的脚，扶着崖壁往下挪。
      那一身将凝未凝的寒意，化在了风雪里。

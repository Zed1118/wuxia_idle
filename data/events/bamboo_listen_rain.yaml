id: bamboo_listen_rain
title: 听雨悟剑
opening: |
  竹叶上水珠成串而下，雨声渐密。
  你立在林间，剑入鞘已半个时辰。
  忽然之间，你想起这百日来斩落的剑影——
  原来每一招的轻重缓急，都与这雨势暗合。
  你按剑的手停住了。

choices:
  - text: 闭目静听
    outcome_id: insight_success
    body: |
      雨声更重，剑意更轻。
      再睁眼时，林中已无雨。
      你提剑划出一道弧，竹叶纷落，无一片着身。

  - text: 拔剑试招
    outcome_id: practice_partial
    body: |
      你拔剑出鞘，依雨势使了一遍剑法。
      招式仍是旧招，却觉手腕灵活了几分。
      雨停时，你还在原地，剑尖朝下。

  - text: 转身离去
    outcome_id: skip
    body: |
      此情此景，未必再有。
      但雨终归是要停的，路终归是要走的。
      你提了剑，下山去了。

id: lu_pang_xian_xian
title: 路旁闲贤
opening: |
  镖路边的土坎上坐着一个老头，身边搁着一只半空的酒葫芦。
  他看起来不像是赶路的——衣服虽旧，却收拾得干净。
  脚边放了一根竹杖，杖头磨得发亮，不知用了几十年。
  他抬头看你，表情不咸不淡：「走镖的？不像。跑江湖的？
  也不像。你这种人，最难办。」

choices:
  - text: 坐下听故事
    outcome_id: listen_tale
    body: |
      你在他旁边的土坎上坐下。老头把酒葫芦递给你，你接过却不喝。
      他讲了一段三十年前的旧事——不是什么惊天动地的大事，
      是一个镖师为了一车货在雪地里走了十三天。
      讲完，他站起来拍了拍屁股：「世上没有白听的故事。
      你听的这桩，是别人用半条命换的。替你省了半条。」

  - text: 共分干粮
    outcome_id: share_food
    body: |
      你从包袱里摸出两块干饼，掰了一块递过去。
      老头接过，看了看饼，又看了看你。他吃得很慢，像是在品茶。
      「你这个人——看不出什么来历，但饼给得干脆。
      好。我教你一件事：走江湖最重要的是知道什么时候分饼，
      什么时候收手。」他说完用竹杖在地上画了一道线。
      「这条线以前，是给的。这条线以后，是你自己的。」

  - text: 点头路过
    outcome_id: skip
    body: |
      你对他点了一下头，继续赶路。
      老头也没留你，自顾自喝了口酒，对着空气说了句：
      「路边的闲人，本就不该挡路。」
      你走出很远才想起——他的葫芦看着不大，但喝了半天，酒没有少。

id: du_ke_wen_dao
title: 渡客问道
opening: |
  黄河渡口的艄公今天没有出船。一个陌生的中年人坐在系缆绳的石墩上，
  身边放着一壶酒、两个杯。他看见你，提起酒壶倒了一杯，
  推到你面前。「不是敬酒。是问题。」他袖口下露出手背上的旧疤。
  那是练某种掌法留下的——练了至少二十年。

choices:
  - text: 喝下这杯
    outcome_id: gain_wisdom
    body: |
      酒入喉，苦得你皱了下眉。中年人笑了笑：「世人喝酒，
      都想品出点味儿来。但有的酒，就是让你知道什么叫难受。」
      他用手在石墩上写了两个字，写完便擦。
      那两个字你只扫到一眼，却像是被钉在了心里。

  - text: 反问来路
    outcome_id: learn_secret
    body: |
      「你先说你自己的事。」你把杯子推回去。
      中年人愣了一瞬，然后大笑。笑声在河面上滚了很远。
      「二十年了。你是第一个把酒杯推回来的。」他站起身，
      在你耳边说了三句话。说完便上船走了。

  - text: 辞酒不饮
    outcome_id: skip
    body: |
      你摇了摇头。中年人啧了一声，自斟自饮了一杯。
      他站起来，拍了拍石墩上的灰：「这渡口我等了十年，
      不是在等你这一杯酒。是在等你摇头。」
      他走了，空酒壶留在了石墩上。

id: duan_qiao_can_yue
title: 断桥残月
opening: |
  桥断了。不知道断了多久。桥墩还在，桥面上的木板只剩三块，
  在风里嘎吱嘎吱地响。桥下是干涸的河床，石子缝里长满了枯草。
  一个拄拐的老妪站在桥头，望着对岸出神。她没看你，却开口了：
  「这桥断那年，我儿去了对岸。他说修好了桥就回来。」
  她的拐杖在地上戳了三下。「桥没修好。他也没回。」

choices:
  - text: 替她修桥
    outcome_id: build_bridge
    body: |
      你花了三个时辰，从河床上扛来废旧木板，一块一块架在桥墩上。
      桥不稳，但人能走了。老妪拄着拐杖踩过第一块板时顿了一下——
      她的脚在抖。走到对岸，她蹲下拾起一块埋在土里的木牌，抱在怀里。
      木牌上刻的字已经看不清了，但你看清了她的眼泪。

  - text: 询问往事
    outcome_id: hear_story
    body: |
      老妪讲了一个冗长的故事。她的儿子是一个镖局的趟子手，
      押一趟镖去了对岸，遇到了劫匪。人没了，镖也没了。
      镖局赔不起，关了门。她说这些时，语气平平淡淡，
      像是在说别人家的事。只在最后说:"桥断了又怎样。我去不了，他也回不来。"

  - text: 留银告辞
    outcome_id: skip
    body: |
      你放下几两碎银，转身要走。老妪没拦你，只在背后说了一句：
      「年轻人，桥断了没事。断了还能修。怕的是那边的人不在了。」
      你走出去很远，还能看见她站在断桥边的背影，在残月下越来越小。

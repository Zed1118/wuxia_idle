id: shi_dao_shou_hu
title: 石岛守护
opening: |
  湖心有一座小岛，岛上有一尊不知什么年代的石人。石人手里本来应该有一柄剑——
  剑不在了，只剩一只空握的手。一个少年坐在石人脚边，看见你便站起身来，
  拦在石人前面。他不说话，手里没兵器，但脚底站了一个桩法——
  是少林的外门起手式，改过的，改得很生涩。

choices:
  - text: 放下自己的剑
    outcome_id: disarm_gesture
    body: |
      你把剑放在石人脚边。少年愣了一瞬，脚底的桩法散了。
      他垂下眼睛，喉咙动了动：「师父说，石人手里那柄剑是等一个人来拿的。
      我在这守了三年。你是那人吗？」你没答。石人手中是空的，
      但阳光照在它掌心时，有一道极细的光线——不知道是反光还是什么。
      少年盯着你的剑看了很久。

  - text: 指点他的桩法
    outcome_id: teach_stance
    body: |
      你走过去，用脚尖挑了一下他后脚跟的方向。「偏了。这样才稳。」
      少年脸涨得通红，但认真地重站了一遍。你让他对着石人站了一刻钟，
      一刻钟后他额上冒了汗，不是累的——是第一次站对了。他咬着牙说：
      「你能不能……明天再来？」

  - text: 合掌敬石
    outcome_id: skip
    body: |
      你对石人合了一掌。少年看着你，眼里的警惕淡了一些。
      你转身离开时他在背后喊了一声：「你还会来吗？」你没回头。
      湖面上起了风，把少年的声音吹散了。石人还站在岛上，手里还空着。

id: cang_jing_ge_wu
title: 藏经阁悟道
opening: |
  藏经阁三层的木窗半掩，斜阳从缝隙里切进来，光柱中有细尘翻飞。
  你面前摊着一本泛黄的经卷，读到一半，停了下来。
  不是因为晦涩——是因为这一段，你在三天前梦到过。
  经卷上的墨迹未干，但纸边已卷了不知多少年。

choices:
  - text: 闭目禅定
    outcome_id: deep_meditation
    body: |
      你把经卷合上，双手叠放膝上，闭上眼。
      阁外的风声、铜铃、远处的诵经声渐渐远去。
      再睁眼时，斜阳已移到墙角。你感到脑中某一处被拨开了——
      不是学到了什么，是原本堵着的东西通了。

  - text: 翻读秘卷
    outcome_id: read_classic
    body: |
      你把经卷翻到最后一页，那里夹着一张薄纸。
      纸上抄了一小段文字，字迹极小，像是怕被人看见。
      你默念了三遍，每一遍都觉得字义在变。
      收起纸片时，你忽然想——也许这段经，根本不该被你看到。

  - text: 起身离去
    outcome_id: skip
    body: |
      你把经卷合好，放回架上原来的位置。
      有些道，不到时候，读了也是白读。
      阁门在你身后轻轻掩上，铜铃响了一声，像是送客。

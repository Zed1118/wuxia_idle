id: qun_xia_tu
title: 群侠图
opening: |
  校场上尘土飞扬，刚猛流派的武者们正在场中较技。
  出拳时的风声，塌腰时的闷响，每一步都踩得黄土地发颤。
  你坐在场边的木栅栏上，看了不知多久。
  有人被摔在地上，有人被扶起来——没有人真正受伤，
  但每一拳都像真的想要打穿什么。

choices:
  - text: 观摩学艺
    outcome_id: admire_master
    body: |
      你找到一个角落，不动声色地看。看了三个人的打法，
      渐渐看出了门道——刚猛流的精髓不在力道，在节奏。
      谁先动，谁就跟。谁变招，谁就后发。
      你从栅栏上跳下来，脑中还在转那些招式的来龙去脉。

  - text: 进场挑战
    outcome_id: challenge_winner
    body: |
      你跨过栅栏，走进场中央。周围安静了一瞬。
      你点了一个刚赢过三场的汉子。他看了你一会儿，点点头。
      交手只过了几招，但你摸到了他的底——刚猛路数是直来直去的，
      只要你知道什么时候拐弯，他就跟不上。
      你赢了。场外有人拍了两下手。

  - text: 转身离开
    outcome_id: skip
    body: |
      校场上又一场比试开始了，沙尘再扬。
      你看了一会儿，从栅栏上翻身而下，往外走。
      这些胜负的热闹，你还没到参与的时候。
      也许以后会来，也许不会。

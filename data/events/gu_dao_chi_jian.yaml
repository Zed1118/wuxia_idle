id: gu_dao_chi_jian
title: 孤岛持剑
opening: |
  你以刚猛之力斩过一百五十名敌手，掌中剑沉得像一截铁。
  这日你乘舟误入江心一座孤岛，四面是水，无人无路。
  岛上只一株老松，树皮被海风剥得发白，却仍直直地立着。
  你拄剑而坐，听了一夜潮声——潮来，松不退；潮去，松不追。
  天亮时你才明白，原来真正的刚，是站着不动也压得住一片海。

choices:
  - text: 临松立剑
    outcome_id: insight_success
    body: |
      你起身，学那老松的姿势握剑而立，一立又是半日。
      潮水一次次扑上礁石，又一次次退去，你的剑纹丝不动。
      待你终于动手，那一剑沉得连海风都压了一压——
      孤岛剑意，自此入了你的骨头。

  - text: 砍松练力
    outcome_id: practice_partial
    body: |
      你抡剑去劈那老松，想试试自己这身蛮力。
      松木极韧，劈了百余下才透半寸，你却觉筋骨松活了几分。
      老松还立着，你的根骨倒是又厚实了些。

  - text: 解缆离岛
    outcome_id: skip
    body: |
      你看了那老松半晌，终究解了缆绳，撑舟离去。
      孤岛在身后越来越小，那株松成了水天之间一个白点。
      你不知它立了多少年，也不打算知道。江湖很大，孤岛太小。

id: xuan_ya_ling_xu
title: 悬崖凌虚
opening: |
  崖边一棵孤松，半个身子探在虚空里。
  脚下是百丈断崖，云在崖腰处流，看久了人会发晕。
  你立在崖口，山风把衣袂吹得猎猎作响——
  风过的一瞬，你忽然想：若能借这一口气冲出去，落在那块凸石上，岂不是一步抵十步？
  念头一起，脚跟已经发痒。
choices:
  - text: 屏息纵身一跃
    outcome_id: insight_success
    body: |
      你深吸一口气，闭气，纵身。
      身子贴着风冲出去，快得心都空了一下，稳稳落在凸石上。
      回头看方才立的地方，已在一丈开外。
  - text: 沿崖边碎步快趋
    outcome_id: practice_partial
    body: |
      你不敢真跳，只贴着崖壁急趋了几步。
      步子是快了，那口该屏住的气却散了，到底没敢凌空。
      腿脚轻了几分，胆气还没跟上。
  - text: 崖太险，退回去
    outcome_id: skip
    body: |
      一阵狂风扑来，孤松弯成了弓。
      你心头一凛，退后三步，背靠住山岩。
      凌虚那一念，被风刮散了。

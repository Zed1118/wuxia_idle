id: qin_lou_fang_you
title: 琴楼访友
opening: |
  江南三月,你应旧友之邀登上琴楼。
  楼上一弦琴正起调,友人见你只是抬头一笑。
  「来得正好。」他说,把另一张琴往你面前推了推。

choices:
  - text: 合奏一曲
    outcome_id: qin_he
    body: |
      两琴相和,起初拘谨,渐渐你忘了「合」,只剩「奏」。
      一曲终了,你也分不清哪几个音是友人弹的,哪几个是你的。
      他笑着合上琴匣:「你比上次更通透了。」

  - text: 独抚一段
    outcome_id: qin_du
    body: |
      你接过琴,先抚了一段自己的旧调。
      友人静静听完,没说话,只为你斟了茶。
      离开时你忽然想到:有些话只能弹给自己听。

  - text: 告辞而去
    outcome_id: skip
    body: |
      你站着听完友人的曲子,礼数尽到便告辞。
      下楼时楼后又起新调——已不是为你弹的。

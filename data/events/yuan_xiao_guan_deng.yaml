id: yuan_xiao_guan_deng
title: 观灯夜
opening: |
  长街两侧悬满花灯，一盏接一盏连到天边去。
  你走在人潮里，耳边尽是猜谜说笑的声音。
  灯谜摊前一个白发老者拈须不语，正等着下一个敢揭榜的人。
  几个孩童提着兔儿灯从你身边窜过，留下一串笑声。
  远处有人端出了热气腾腾的甜汤圆，糯香混着灯火气息。

choices:
  - text: 揭榜猜谜，与老者对弈
    outcome_id: guan_deng_path_a
    body: |
      你上前揭了最难的那张谜条。
      老者抬眼打量你一番，忽然笑了——"练武之人，果然眼力不同。"
      他亲手盛了一碗甜汤圆推到你面前，附耳说了几句。
      话虽轻，却像拨开了某层雾气，你心头一亮。

  - text: 追着灯影穿巷，不争谜底
    outcome_id: guan_deng_path_b
    body: |
      你舍了灯谜摊，追着那群提灯的孩童钻进小巷。
      巷窄人多，你左穿右闪，脚步不自觉地快了起来。
      灯火把人影拉得忽长忽短，你在明暗交错的节奏中，
      忽然悟到了某种步法的窍要——原来快不在腿，在眼先。

  - text: 趁夜未深，退出灯市
    outcome_id: skip
    body: |
      你在灯市口站了片刻，转身走向镇外。
      身后的灯火渐渐缩成一片暖黄的光晕。
      山路上只有风声和你的脚步声——江湖不远，走就是了。

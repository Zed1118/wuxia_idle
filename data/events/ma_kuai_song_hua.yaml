id: ma_kuai_song_hua
title: 马快送花
opening: |
  雪后清晨，驿站客栈里老镖头拉住你。
  「顺路，顺路而已，」他说，把一封薄薄的信塞给你。
  信封很轻，但你能摸到里面夹了一枝枯花。

choices:
  - text: 亲送上门
    outcome_id: shou_xin
    body: |
      你按地址找到一户小院，开门的是位白发老妇。
      她接过信，没打开，只摸了摸信封里那枝花的形状。
      「他每年都这时候托人送，」她说，「告诉他，我也好好的。」

  - text: 驿站转交
    outcome_id: huan_yi
    body: |
      你把信交到驿丞手里，叮嘱他务必送到。
      驿丞看了地址一眼，神色复杂：「这条路我跑了七年。」
      你不再多问，出门时风更冷，但脚下走得稳了一些。

  - text: 婉拒不接
    outcome_id: skip
    body: |
      你婉言谢绝了老镖头，他没勉强，只是叹气。
      你出门时回头，看见他把信揣进怀里，自己背上行囊。
      你不知道为什么会想起多年没见的故人，但那一刻你想起了。

id: qing_lin_si_yu
title: 青林思雨
opening: |
  你斩了百名敌手，剑上的灵巧愈发圆熟，反倒生了几分滞意。
  这日途经一片青林，天将雨未雨，叶尖坠着将落的水珠。
  你停下脚步，看那水珠悬而不落——它在等风。
  风一过，它便顺着叶脉的纹路滑下，半点不费力气。
  你忽然想，自己出剑时，可曾这般等过一阵风。

choices:
  - text: 静观叶上水
    outcome_id: insight_success
    body: |
      你立了半个时辰，看了上百颗水珠落地。
      它们从不抢、从不争，只在该走的那一刻顺势而走。
      再提剑时，你的剑也学会了等——等敌手的破绽自己浮上来。
      天心听雨，原是这般听法。

  - text: 借雨试剑
    outcome_id: practice_partial
    body: |
      你拔剑，迎着初落的雨点划了一路。
      剑尖挑落几颗水珠，溅在腕上，凉意一激，身法又轻了几分。
      只是雨势太疏，你这一路使下来，终究只得了个皮毛。

  - text: 趁雨未落赶路
    outcome_id: skip
    body: |
      你不愿在此空耗，提剑便走。
      身后那片青林，雨终于落了下来，密密地打在叶上。
      你头也不回。林子是好林子，只是你还有路要赶。

id: gu_jian_zhong_yin
title: 古剑冢拾遗
opening: |
  浓雾贴着地面流过剑冢，断碑上的字已看不清了。
  你在冢间走了不知多久，脚下的泥土松软如灰。
  忽然，脚尖踢到一件硬物——不是石头，是铁。
  你弯腰拨开浮土，一截剑柄露了出来，锈迹斑斑，却未腐透。

choices:
  - text: 拔剑出泥
    outcome_id: find_relic_sword
    body: |
      剑身出泥的一瞬，你手腕一沉——这剑比想象中沉得多。
      剑脊上刻了三道横线，不知是哪位先人留下的记号。
      你握住剑柄静立片刻，剑尖微微颤动，像是醒了过来。

  - text: 拭锈寻铭
    outcome_id: polish_sword
    body: |
      你撕下一角衣布，就着雾气擦拭剑身上的锈。
      锈屑一层层掉下，露出一小片暗青色的剑脊。
      铭文已不可辨，但那种沉厚的手感让你明白——
      握剑的人不只是你，这把剑曾见过真正的战场。

  - text: 掩土而去
    outcome_id: skip
    body: |
      你在剑柄前蹲了很久，又把浮土推了回去。
      有些东西不该由你来惊动。
      雾渐渐散了，你起身离开。剑冢恢复沉寂，仿佛从未有人来过。

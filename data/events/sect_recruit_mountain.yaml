id: sect_recruit_mountain
title: 山隐遇贤
opening: |
  山林深处,溪水绕着青苔石转了一个弯。
  你正在溪边掬水,忽闻一声鞭响——细而长,
  像是空气被劈开,又合上。抬头看,溪对岸石上
  站着一位老者,腰间九节鞭还未收稳,目光已落在你身上。
  「来人不在山道上,倒是从溪里来的?」
  他声音不高,但很稳。
  「这一带,十年没人闯过了。」

choices:
  - text: 「前辈若不嫌弃,可愿出山看看后辈这一代?」
    outcome_id: accept_recruit
    body: |
      他沉默了很久,看了看自己的鞭,又看了看你。
      「曾是名门弟子,因事下山,自此不归。」
      「三十年不踏出这片山。」
      「但既然你问到这里——也罢,出山一遭。」
      他把鞭子缠在腰间,跨过溪水,向你揖了一礼。

  - text: 「前辈这一身功夫,是悟出来的吧?」
    outcome_id: decline_meet
    body: |
      他笑了一声,没答你的话,只让你坐下听他讲山中独居的事。
      讲到日头偏西,讲到鞭法不在快慢而在心境。
      你起身告辞时,觉得自己的眼界开了几分——
      原来真正的高人,从不抢着说话。

  - text: 转身离去
    outcome_id: skip
    body: |
      你掬完水,起身往林深处走。
      老者也没挽留,目送你一段就转身回了石头那边。
      山里人各有各的道,不必勉强同行。

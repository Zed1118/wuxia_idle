id: gu_dao_xue_ji
title: 古道雪迹
opening: |
  雪停了有一阵了。古道上的积雪没过了脚踝，白得刺眼。
  你放慢脚步，忽然注意到雪地上有一串足迹——不是人的，是兽。
  足迹很浅，方向与你一致，像是一刻钟前留下的。
  往前十余步，路边一座半塌的石亭露出檐角，积雪压弯了茅草顶。
  亭子里面是干的。

choices:
  - text: 追踪雪痕
    outcome_id: track_footprints
    body: |
      你沿着足迹走了一里路。雪上不止一种痕迹——有蹄印、
      有爪痕、还有被风雪覆盖了一半的旧脚印。
      你跟着它们翻了两个坡，渐渐发现自己的步子轻了——
      不是在学它们走路，是你的步法自己调整了。
      去适应滑的地、塌的地、雪底藏着石头的路。

  - text: 入亭避雪
    outcome_id: rest_at_pavilion
    body: |
      你走进石亭坐下，把脚从湿鞋里抽出来，靠着柱子闭了一会儿眼。
      雪在亭外无声地积着。你歇够了，活动了一下肩膀——
      这片刻的休憩，比在山下睡一宿还管用。
      也许是因为大山不收懒人，但也不亏待愿意歇一会儿的人。

  - text: 继续赶路
    outcome_id: skip
    body: |
      你没有停步。雪地上的足迹还新鲜，但与你无关。
      你走你的路，那些印记是它自己的故事。
      古道很长，雪后的路看不清，但目的地在前面。
      你只在乎这个。

# =============================================================================
# stages.yaml · 主线 15 关（Phase 3 Week 5 扩容）
# =============================================================================
# 共 15 关：3 章 × 5 关，stageType 全填 mainline。
# 每关 3 敌人（StageDef.enemyTeam 上限 3）；三流派分布尽量覆盖 gangMeng /
# lingQiao / yinRou。难度按章递增 xueTu → sanLiu → erLiu。
#
# Phase 3 Week 5 schema：在 T33 三段 narrative 基础上加 `narrativeDefeatId`。
#   narrativeOpeningId   —— 进入关卡前播放（联结 data/narratives/stages/<id>.yaml）
#   narrativeVictoryId   —— 战斗胜利后播放
#   narrativeDefeatId    —— 战斗失败后播放（**仅章末两关 4/5 配置**，对齐
#                           DeepSeek narrative 已铺设的 6 个 defeat 文件）
#
# Boss 关分布：每章 4/5 关为 Boss（isBossStage=true），章末 5 关为大 Boss。
# Boss 关同时配 narrativeDefeatId；普通 1/2/3 关战败直接返回 stage list，不触发剧情。
#
# baseHp / baseAttack 数值估算：
#   xueTu  (内力 500-1100)：HP 1500-3500、Atk 80-160
#   sanLiu (内力 1200-2000)：HP 3500-7000、Atk 260-470
#   erLiu  (内力 2200-3500)：HP 7000-11000、Atk 580-900
# 章末大 Boss 数值贴章上限，暗示需升下一阶。
# =============================================================================


# =============================================================================
# stages.yaml · 主线关卡（T07 占位 + T33 Phase 3 schema 升级）
# =============================================================================
# 共 6 关：3 章 × 2 关，stageType 全填 mainline。
# 每关 3 敌人，三流派各一（gangMeng / lingQiao / yinRou）。
# 难度递增覆盖学徒 → 三流 → 二流。
#
# Phase 3 T33 字段约定：
#   prevStageId          —— 章节内顺序解锁（章节首关为 null/缺省）；与本关同
#                           chapterIndex（GameRepository._enforceRedLines 校验）
#   narrativeOpeningId   —— 进入关卡前播放的剧情 id（联结
#                           data/narratives/<id>.yaml；缺文件由 NarrativeLoader
#                           兜底「[剧情待补]」，运行期不挂）
#   narrativeVictoryId   —— 战斗胜利后播放的剧情 id；战败不触发
#   narrativeId          —— Phase 1 字段，已 @Deprecated；Phase 5 整理时清
#
# baseHp / baseAttack 数值估算：
#   xueTu  (内力 500-1100)：HP 1500-3500、Atk 80-150
#   sanLiu (内力 1200-2000)：HP 3000-7000、Atk 250-450
#   erLiu  (内力 2200-3500)：HP 6000-11000、Atk 550-900
# =============================================================================


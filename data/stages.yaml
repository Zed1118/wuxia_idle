# =============================================================================
# stages.yaml · 关卡占位 fixture（T07）
# =============================================================================
# 共 6 关：纯测试关卡，stageType 全填 mainline（phase1_tasks T07 §7.3 指定）。
# 每关 3 敌人，三流派各一（gangMeng / lingQiao / yinRou），便于后续 T17 测试场景。
# 难度递增覆盖学徒 → 三流 → 二流。
#
# narrativeId 全留 null（占位阶段不挂叙事）。
# baseHp / baseAttack 数值估算：
#   xueTu  (内力 500-1100)：HP 1500-3500、Atk 80-150
#   sanLiu (内力 1200-2000)：HP 3000-7000、Atk 250-450
#   erLiu  (内力 2200-3500)：HP 6000-11000、Atk 550-900
# =============================================================================

stages:

  # === 测试关 1 · 学徒 / 启蒙（3 弱敌）===

# =============================================================================
# towers.yaml · 问鼎九霄爬塔（Phase 3 T40）
# =============================================================================
# 共 30 层：3 小 Boss [5/15/25] + 3 大 Boss [10/20/30] + 24 普通层。
#
# 境界曲线（每 5 层升一阶，phase3_tasks Week 2 拍板）：
#   1-5   学徒    /  6-10  三流  / 11-15 二流
#   16-20 一流    / 21-25  绝顶  / 26-30 宗师 (武圣留 Phase 4 飞升)
#
# 数值曲线：
#   - 普通层单兵 HP    800  → 10000 线性 (floor 1→30)
#   - 普通层单兵 ATK   200  →  1500 线性
#   - Boss 层 = 该阶 dengFeng baseline × 1.5
#   - 多人队 scale：1 人 ×1.0 / 2 人 ×0.7 / 3 人 ×0.55
#       → 团队总威胁 ×1.0 / ×1.4 / ×1.65 平滑递增
#   - 敌人数：1-10 层 1 人 / 11-20 层 2 人 / 21-30 层 3 人；Boss 层固定 1 人
#
# 红线（GameRepository._enforceRedLines 校验）：
#   - floorIndex ∈ [1, 30] 唯一连续
#   - bossKind 严格在 5/10/15/20/25/30；其他层 bossKind 必须 null
#   - 普通层 narrativeOpeningId / narrativeVictoryId 必须 null
#   - 数值守 §5.4（红线分两层 2026-06-14）：Boss HP ≤ 60000（boss_hp_max，终局周目膨胀 50000→60000）；
#     普伤为软红线（典型 build 设计目标 ≤8000，满强化神物极值 build 实战可见值不进十万），由战斗结算守、敌 baseAttack 间接约束
#
# Phase 4 待补：
#   - 21-30 层敌人 skillIds 暂用 mingjia 阶（已有最高）；补 menpaijuxue/jianghumiquan
#     等高阶 skill 后升级敌人技能配置
#   - 21-30 层 dropTable 暂用 liqi 阶装备 + item_xinxuejiejing；补 zhongqi/baowu/shenwu
#     阶装备后升级
# =============================================================================


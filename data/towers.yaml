      - id: enemy_tower_boss_10
        name: 黑风寨主
        realmTier: sanLiu
        realmLayer: dengFeng
        school: lingQiao
        baseHp: 5500
        baseAttack: 900
        baseSpeed: 175
        skillIds:
          - skill_lingqiao_jichu_basic
          - skill_lingqiao_jichu_skill
          - skill_lingqiao_jichu_ult
        iconPath: assets/enemies/tower_boss_10.png
        isBoss: true
        # 批二②:弱点/抗性。lingQiao 被 yinRou 克(灵巧怕阴柔)→ 弱点×1.25;
        # lingQiao 克 gangMeng(灵巧克刚猛)→ 抗性×0.75。
        schoolDamageTakenMult:
          yinRou: 1.25
          gangMeng: 0.75
        # 第七阶段批二 ①:爬塔大 Boss(floor 10·major)二阶段。满血起手 → 跌破 50%
        # 入「背水一击」,解锁同阶(changlian·sanLiu §5.3)大招 + 转攻势 + 蓄力反击。
        bossPhases:
          - hpThresholdPct: 1.0
            # hpThresholdPct: 1.0 = 起始阶段；无 titleKey（策略层仅为 next>=1 触发转阶段题字）
          - hpThresholdPct: 0.5
            unlockSkillIds:
              - skill_lingqiao_changlian_ult          # changlian 阶(对齐 sanLiu §5.3)
            aiMode: aggressive
            onEnterMechanic: chargeCounter
            titleKey: bossPhase_desperate
        cycleBossPhases:
          2:
            - hpThresholdPct: 1.0
            - hpThresholdPct: 0.75
              unlockSkillIds:
                - skill_lingqiao_changlian_fang_skill
              aiMode: focus
              titleKey: bossPhase_desperate
            - hpThresholdPct: 0.40
              unlockSkillIds:
                - skill_lingqiao_changlian_fang_ult
              aiMode: aggressive
              onEnterMechanic: chargeCounter
              titleKey: bossPhase_desperate
    dropTable:
      - equipmentDefId: weapon_xiangyang_gang_dao
        dropChance: 1.0
      - equipmentDefId: accessory_xiangyang_yin_jie
        dropChance: 0.50
      - inventoryItemDefId: item_xinxuejiejing
        quantity: [2, 4]
        dropChance: 1.0
      - inventoryItemDefId: item_silver
        quantity: [40, 60]
        dropChance: 1.0  # 银两(P1 占位,待 balance)
      - inventoryItemDefId: item_scroll_yan_zi_san_chao
        quantity: [1, 1]
        dropChance: 1.0  # 秘籍掉落(T5 balance:爬塔首通必得,tower_entry_flow isFirstClear=true 才 rollDrops,重打不 roll)
      - inventoryItemDefId: item_jingyandan_large
        quantity: [1, 1]
        dropChance: 1.0  # 经验丹大档(I-1 修:爬塔首通门控一次性 roll,0.20=80%永久错过→改首通必得 bonus 1 颗;主线大还丹保每次胜利概率刷=可farming主来源)


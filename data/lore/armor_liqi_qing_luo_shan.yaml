id: armor_liqi_qing_luo_shan
name: 轻罗衫
default_lore:
  - text: |
      蚕丝和银丝混织，薄如蝉翼却韧如牛皮。
      穿在身上像没穿一样轻，但刀剑划上去只留白印。
      织这种衫子的人全天下不超过五个，因为银丝太细，伤眼睛。

  - text: |
      有人问织工这衫子能挡几刀，织工说：「不知道，没人穿回来告诉我。」
      想了想又说：「但也没人穿着它被抬回来，大概挡得住。」

continued_lore_obtained:
  - text: |
      于「{source}」得此轻罗衫。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。轻罗衫上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此轻罗衫。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得轻罗衫。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，轻罗衫助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      轻罗衫在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      轻罗衫经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧轻罗衫，
      它比来的时候重了一点——是沾了故事的重量。

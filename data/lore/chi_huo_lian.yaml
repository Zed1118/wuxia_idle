id: chi_huo_lian
name: 赤火链
default_lore:
  - text: |
      一条细铁链，链节烧过烈火淬过冰雪——通体泛着暗赤色的光泽。
      这条锁链曾在哈密城外的石窟中被发现，盘在一尊残破的佛像手中。
      发现的商旅都说，链子摸上去是热的，不知是铁本身吸热，
      还是石窟里日积月累的香火把热度烙进了链子里。

  - text: |
      后来这条链被一个密教僧侣用来降魔——不是打妖怪，是降自己的心魔。
      每当他心中杂念翻腾，便盘腿坐下，用铁链缠住自己的双手，合掌不动。
      旁人问他为何，他说：链热一分，心凉一寸。

  - text: |
      赤火链从西域传入中土后渐渐失去了密教的宗教色彩，变成了江湖中
      阴柔一路的修习器具——缠腕练内力、绕臂化劲道。
      但每一个用过它的人都说同一句话：「这链子是暖的。不知道在等什么。」

id: weapon_xunchang_zhe_dao
name: 折刀
default_lore:
  - text: |
      刀身宽两指，背厚刃薄，使完能折起来收进鞘里，是走远路的人惯用的家伙。
      不占地方，不招耳目。河西一带的马帮几乎人手一柄，切肉、削木、防身都用它。
      有个老马帮说过：「好刀不在长，在于你想用的时候它就在手边。」

  - text: |
      有个跑河西线的老镖师，夜宿戈壁滩时从不生大篝火——怕引来沙匪。
      他把折刀摊在膝上，就着星光削一片羊皮。削完羊皮又削自己的指甲，
      削完指甲就把刀合上，放回腰间，闭眼。旁人问他怎么不点灯，
      他说：「你闭上眼还能摸到刀的时候，这把刀就是你的了。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此刀。第一次折开它时,
      听见「咔嗒」一声——比想象的要轻。
  - text: |
      于{source}拿到这柄折刀。刀鞘上有几道磨痕,
      磨在拇指刚好按到的位置——上一个人也是这么握的。
  - text: |
      初遇于「{source}」。借着光看刃口,
      薄而不利,但你忽然知道:这种刀不是为了利,是为了在手边。
  - text: |
      {source}得刀。合起来比一个馒头还短,
      你摸了一下袖口,它就在那里,像一直就在那里。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      刀刃卷了一线,折合时却比之前顺。
  - text: |
      {stage_name}收刀。「咔嗒」一声,
      比之前低一些,像它也累了。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      合刀回鞘,刀柄上的绳松了半圈,
      你拿手紧了紧——它知道你还会用到它。
  - text: |
      胜 {boss_name} 后闭眼,
      手摸到腰间。刀就在那里,像一直就在那里。

id: weapon_liqi_hu_tou_gou
name: 虎头钩
default_lore:
  - text: |
      钩头铸成虎首，一钩一带能卸人兵器，近身凶悍。
      虎头钩是短兵器里最难练的，因为它不是用来砍的，是用来勾的。
      勾住对手的刀，再带一下，对手的手腕就废了。

  - text: |
      用虎头钩的人不多，因为练钩比练刀苦三倍。
      刀可以劈砍，钩得算角度、算距离、算对手下一步往哪走。
      有个用钩的老前辈说过：「钩是兵器里的棋子，走一步看三步。」

continued_lore_obtained:
  - text: |
      于「{source}」得此虎头钩。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。虎头钩上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此虎头钩。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得虎头钩。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，虎头钩助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      虎头钩在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      虎头钩经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧虎头钩，
      它比来的时候重了一点——是沾了故事的重量。

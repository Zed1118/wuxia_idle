id: jingang_zhuo
name: 金刚镯
default_lore:
  - text: |
      一只极沉的铁镯，镯身粗若拇指，套在腕上叮咚作响。此镯非首饰——
      是外家硬功的练具。练金刚镯的人戴着它出掌，每一掌都比空手重三成。
      摘下之后手轻得像没有——但练久了的人不愿摘，因为它戴在腕上的感觉
      已经和皮肤成了一个整体。

  - text: |
      少林寺达摩院中有七副金刚镯。每一副的掌面都被磨得发亮——不是擦亮的，
      是历代僧人用自己掌心的皮肤磨亮的。七副镯按轻重排成一行，最重那副
      在末尾搁着，蒙了灰——已经有二十年没人戴得动。

  - text: |
      据说戴得动第七副镯的人，在戴上的一刻能听到钟声。钟声很远，
      像是从嵩山深处传上来的。不是所有练武的人都信这个说法，
      但每一个在达摩院碰过第七副镯的人，放下后都没再多说一个字。

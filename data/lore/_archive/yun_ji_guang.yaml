id: yun_ji_guang
name: 云极光
default_lore:
  - text: |
      晶莹如玉的剑身，不知是什么材质——不是铁，不是玉，不是冰，
      但它就是有了剑的形状。此剑在昆仑山巅的冰川中沉睡了不知多少年，
      被一支采药队意外发现。采药人把它从冰块中撬出来，剑自己弹了一下——
      不是跳，是呼吸。

  - text: |
      此剑身中蕴含着极高的自然之气——据说有人用它对着云一挥，
      云破开了一个洞，太阳光从洞里直直照下。目睹者说是吉兆。
      持剑的人从此不再与任何人动手——他觉得没有对手值得这把剑出鞘。

  - text: |
      云极光至今尚不知去向。最后一次有人看见它，是在秦岭大雪中，
      一个道人背着它行走。那人已走了不知多少年，衣袍冰结了不能再解，
      但剑身仍清亮如初雪。问他何时停，他没答。云还没散。

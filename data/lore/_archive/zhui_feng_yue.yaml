id: zhui_feng_yue
name: 追风钺
default_lore:
  - text: |
      月牙形的单手斧刃，柄极短，刃极薄，甩出去能划出一道半弧——
      弧未收回，钺已回手。此物原是草原上一个游牧部族所用，后来被一个
      在河西走廊贩马的汉人学了去，加以改造：钺尾系一根极细的丝绳，
      掷出去可绕敌颈而不断。

  - text: |
      据说用追风钺最出名的是一个哑巴马贩。他哑——但不聋。
      江湖中人嘲笑他"哑巴也配用兵器"，马贩不说话，只把钺轻轻掷出，
      钺擦着那人的鬓角过去，削断了一绺头发，又自己飞了回来。
      从此嘲笑他的人少了很多。

id: jing_hong_gong
name: 惊鸿弓
default_lore:
  - text: |
      弓身是一根完整的桑木弯成的，弓弦用的是麂皮——轻盈而韧。
      此弓不是战弓，是猎弓。但这柄猎弓曾在雁门关外射下一只金雕——
      雕翼展开宽过一丈，被一箭射穿左翼，坠落在城头上。
      满城将士围上来时，持弓的人已经走了。雕还活着，养在雁门关的鸽棚里，
      每逢日暮便朝北方长鸣三声。

  - text: |
      射雕的人始终没有回来取弓。弓后来落在一个老猎户手里，
      他用了三十年，打了几千只兔子、百余只狐狸、和无数野鸡。
      有人认出这把弓的来历，说这是羞辱。老猎户回了一句：
      「弓不打猎才叫羞辱。」

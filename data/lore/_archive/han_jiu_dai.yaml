id: han_jiu_dai
name: 寒酒袋
default_lore:
  - text: |
      一只羊皮酒袋，袋口用铜片箍住。酒装进去能保持温度——夏天冰凉，
      冬天微温。这不是兵器，也没有任何攻防效力。但走长路的人知道，
      战场上有时一口酒的功夫比一招剑法更救命。

  - text: |
      此袋是一个老郎中送给一个老镖师的临别礼。郎中不会武功，镖师身上中了
      七刀后拿着这酒袋喝了最后一口酒，笑了一声：「这酒真好。」说完便走了。
      酒袋被镖师的女儿收着。她说，袋里已经没酒了，但每次打开盖子都能闻到
      陈年的酒香——不是酒在袋里，是酒已经渗进了羊皮，永远不会散了。

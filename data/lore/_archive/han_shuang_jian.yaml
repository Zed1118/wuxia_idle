id: han_shuang_jian
name: 寒霜剑
default_lore:
  - text: |
      剑身通体银白，寒月之下有霜纹隐现。据传此剑乃南朝一位隐士
      在昆仑山北麓寻得一块天外寒铁，费三年之功锻成。
      剑出炉时正值大雪封山，隐士将剑插入雪中，雪未化，剑锋却更冷了几分。

  - text: |
      此剑在昆仑一脉传承九十余年，后因门派内讧失散。
      据闻此剑曾在凉州城外的一座旧庙中出现过一夜。
      当夜守庙的老僧说：「剑来了，剑走了。剑上落了一层霜。」
      此后不知去向。

  - text: |
      有人说寒霜剑的特性不在于利——在于"冷"。握剑之人，
      在出招时会感到一股寒意顺手臂逆流而上，不是伤人的冷，
      是让人清醒的冷。越是杀机越重的时刻，剑越冷。

id: tian_chan_shou_tao
name: 天蚕手套
default_lore:
  - text: |
      极薄的一层白色丝织品，戴上几乎看不出。触感细腻，
      隔着它摸任何东西都比徒手准三分。是南诏古国宫廷的织造秘法，
      中原鲜有人知。传言织它所用的丝取自一种只生在横断山深处的野蚕，
      吐丝极细，产量极少，一年凑不出一双。

  - text: |
      此手套在滇西北的江湖圈子里极有名。大理段家的暗器高手过手时都要戴它，
      不为好看——暗器小了，毫厘之差就是生死。
      曾有一位暗器名家在比试完之后将手套摘下，说了一句：「戴了十年，
      没戴的时候连筷子都拿不稳。」可见其贴合。

  - text: |
      后来此物流入中原，落入一个名唤"无影针"的阴柔流派手中。
      这个流派收女弟子，不收男弟子。收弟子时唯一的条件是：
      裸手穿针。穿不过去的人，不配戴这双手套。

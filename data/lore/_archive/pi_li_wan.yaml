id: pi_li_wan
name: 霹雳丸
default_lore:
  - text: |
      蚕豆大小的黑色丸粒，捏在指间轻若无物。掷出去触地便炸——不是烈火，
      是气浪。炉火纯青的炼丹术与硫磺硝石辅以密法制成。
      出自四川青城山一位炼丹道士之手——他是青城派唯一的俗家弟子，
      生平只炼丹，不练武。炼到第四十九炉时，炉子炸了。他炸断了两根手指，
      却炼成了这丸。

  - text: |
      霹雳丸极稀少，每颗都是孤品。炼丹道人过世前将仅剩的七颗封入一个
      铜匣，铁条焊死，托人送到青城派掌门手中。附了一封信，十二个字：
      「此物不可贪，不在杀人，在退人。」掌门将铜匣放入经阁阁顶，
      至今未开。

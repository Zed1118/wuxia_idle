id: xing_chen_jian
name: 星辰剑
default_lore:
  - text: |
      剑身暗蓝如夜，上面缀着无数极细的银点——是铸剑时融入陨铁砂的结果。
      夜的底色，星的碎光，剑刃微凉，握在手中不像是抓住了铁——像是抓住了一截
      凝固的夜空。此剑不知锻造者，不知出世年代，所有关于它来历的记录
      都只到"凉州城外深夜震动"那一条不入正史的县志为止。

  - text: |
      据县志中仅存的一行字：「元夕夜，地微震。有流星坠于城外十里。
      数日之后，一牧童拾得一剑，色青黑如夜，有星芒。」牧童后来入了江湖，
      此剑随他走过不知多少路。牧童老去后，剑在他膝上搁了一夜，
      第二日他没了气息。剑还在膝上轻轻震动——不知是地动还是自己动的。

  - text: |
      后来这把剑流入一位星座术士手中。术士不用它来打斗——他每晚将剑插在
      旷野中，剑身的银点如星图。对照天象，他便能推衍来年的寒暖。
      他说这柄剑从天上来的，它想回去。但什么时候回去，剑不说。没有人问。

id: jin_que_shan
name: 金雀扇
default_lore:
  - text: |
      一把铁骨折扇，扇面画的是金雀花——云南大理的国花。
      折扇合上是短棍，撑开是盾面，扇骨边缘开刃便是刀。
      此物乃点苍派一位女弟子所创。她原是世家小姐，
      家中不许她习武——说女子舞刀弄枪有失体面。
      于是她找了点苍的师父，用一把扇子练出了一套自己的功夫。

  - text: |
      她在江湖上走了七年，没人知道她会不会武功。知道的，
      都已经转身告辞了。后来回到大理故里，将这把扇子挂在了
      苍山一座尼庵的门楣上，削发为尼。有人上山寻访，
      只得到知客尼师转交的五个字：「扇轻，恩怨重。」

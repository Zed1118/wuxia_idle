id: xue_lian_hua
name: 血莲花
default_lore:
  - text: |
      一朵五瓣的金属莲花，瓣缘有锋刃。握在掌心不过鸡子大小，
      弹出瓣刃后便是一朵"开"在手中的凶器——形如暗器，巧如机关。
      此物乃南宋年间一位姓唐的暗器名匠在川西藏区观摩雪山莲花后所制。

  - text: |
      据唐门弟子私下传说，血莲花从不主动出手——它只在握持者的手心里
      被体温"暖"开后，自己会轻微地颤抖。
      唐门老人说那不是机关松了——是莲花在等血。这个说法外人听来骇人，
      但每一个用过血莲花的人都不反驳。

  - text: |
      血莲花传到第四代时忽然失踪。唐门找了二十年，最后在一个尼姑庵的
      香炉里找到——莲花被焚了三炷香，花瓣上的刃已经钝了。
      不知是哪一代的主人将它供在了这里。

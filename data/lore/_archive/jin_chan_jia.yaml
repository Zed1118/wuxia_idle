id: jin_chan_jia
name: 金蝉甲
default_lore:
  - text: |
      此甲以金丝蝉翼混编——蝉蜕极脆，但混以金丝之后结构骤变：
      轻如薄纱，每一层却难裂几分。制成时需整整三百只知了壳，
      一只一只用手铺平压紧。铺一只壳便要默数一次呼吸，急不成。

  - text: |
      据说这件甲出自襄阳城外一位八十岁的老妇人。她一生未出过十里方圆，
      但她的两个儿子都死在了战场上——一个死在朱仙镇，一个死在钓鱼城。
      她织这件甲时是在纺"后悔"——后悔没能给儿子织一件。

  - text: |
      此甲不久流入武当，被一位真人穿戴。武当真人在受此甲时说了一句：
      「天下甲胄皆挡寻常刀剑。此甲挡的是一个母亲的三十年。」

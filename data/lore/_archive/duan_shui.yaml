id: duan_shui
name: 断水
default_lore:
  - text: |
      剑名「断水」，据说是秦汉年间一位铸剑师在渭水边所铸。
      剑成之日，剑师曾舀渭水浇剑，剑身不湿。
      此剑先后经手六位主人，有三人死于战场，两人退隐江湖不知所踪，
      最后一位主人是个江南女子。她用这把剑守了十年寡。

  - text: |
      剑身极薄，薄到能透光。剑刃上有一条肉眼几乎看不见的水线——
      那是铸剑时淬火留下的纹路，六百年未消。
      不懂剑的人看它只觉得太轻。懂剑的人拿在手里便知道：
      这剑不是用来劈砍的，是用来在闪电之间做一次刀刃的交接。

id: xue_chi_jian
name: 血齿剑
default_lore:
  - text: |
      剑刃上有天然的暗红纹路，像是被血浸过——但剑一次也没沾过血。
      铸它的铁匠是个还俗的少林僧，用了三个月锻出此剑。出剑那日，
      他将剑浸入冷水中，水面泛起一层暗红。他自己也不懂——铁是普通的铁，
      水是普通的井水。那层暗红色至今仍浸在纹路里。

  - text: |
      铁匠将此剑送给了他在青冈山的师弟。师弟拿着剑看了半天，说了一句：
      「你是还俗的和尚，你打的剑有血气。」铁匠说不出为什么。或许剑知道
      他下山以后想做什么。

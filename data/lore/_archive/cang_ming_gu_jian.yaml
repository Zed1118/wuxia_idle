id: cang_ming_gu_jian
name: 苍冥古剑
default_lore:
  - text: |
      此剑的来历已不可考。有人说它是战国古物，有人说是魏晋名士所佩，
      也有人说它压根不是人力所铸——是陨星坠地后残留的铁核，
      被某个不知名的匠人磨成了剑形。剑身上没有任何铭文，刃口也不锋利。
      但用它的人都说同一个感受：每次握紧剑柄，都觉得自己不在了。

  - text: |
      此剑在江湖中露面不超过五次。每次出现，都伴随着一场改变格局的变故。
      上一次露面是在六十年前的泰山大会上，一个无名少年持此剑击败了当时公认的天下第一。
      事后有好事者问少年这把剑叫什么名字。少年说：「它不要名字。」

  - text: |
      剑柄上缠的布条已经朽得不成形了，但一碰便知不是凡布。
      曾有见多识广的老匠人辨认过，说是汉代的锦。老匠人把布条凑到鼻尖闻了一下——
      不是闻绣，是闻血。几十代人的血。

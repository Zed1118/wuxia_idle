id: mo_dao
name: 陌刀
default_lore:
  - text: |
      唐代步战第一刀，刀身长过七尺，刃宽三指，一刀可断马首。
      唐末以后制法渐失，存世愈发稀少。
      这一柄陌刀是许昌城外一座废窑里刨出来的，刀身锈了大半，
      但刃口还在。许昌府衙的一位老刀头用了一整年将它重新打磨开刃，
      刀出那日，他说了一句：「刀是旧的好，人是新的好。」

  - text: |
      后来这把刀在河南道的擂台上出现过一次，持刀的是个五十来岁的矮小老汉。
      他只用了一刀。一刀就劈断了对手的铁枪头。
      台下的人还没来得及叫好，他已收刀走了。

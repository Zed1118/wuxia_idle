id: weapon_haojiahuo_yuan_yang_yue
name: 鸳鸯钺
default_lore:
  - text: |
      一对短钺，左守右攻，用的人得两只手一样灵。
      鸳鸯钺讲究一个「双」字，出手必是一对，像左右手缺了哪只都不成。
      会使的人不多，会使好的更少。

  - text: |
      江南有对兄弟，哥哥使左钺，弟弟使右钺。
      兄弟俩闹翻后各执一只，再也打不出从前的威风。
      后来哥哥把左钺寄回去，弟弟第二天就上了门——「一对的东西，不能拆。」

continued_lore_obtained:
  - text: |
      于「{source}」得此鸳鸯钺。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。鸳鸯钺上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此鸳鸯钺。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得鸳鸯钺。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，鸳鸯钺助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      鸳鸯钺在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      鸳鸯钺经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧鸳鸯钺，
      它比来的时候重了一点——是沾了故事的重量。

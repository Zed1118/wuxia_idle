id: accessory_liqi_jin_chuang_gao
name: 金创膏
default_lore:
  - text: |
      秘制的金创药膏，抹上伤口就不流血，江湖人的命根子。
      金创膏比金创药粉贵三倍，因为多了一道熬制的工序。
      膏状的能粘在伤口上，不像药粉容易被汗水冲走。

  - text: |
      药铺老板说方子是祖传的，八味药里有三味他自己都不知道叫什么。
      只知道采药的人每年入山一次，回来时鞋都走烂了。
      「好药都长在人不愿意去的地方。」

continued_lore_obtained:
  - text: |
      于「{source}」得此金创膏。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。金创膏上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此金创膏。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得金创膏。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，金创膏助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      金创膏在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      金创膏经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧金创膏，
      它比来的时候重了一点——是沾了故事的重量。

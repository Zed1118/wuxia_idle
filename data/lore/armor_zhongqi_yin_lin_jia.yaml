id: armor_zhongqi_yin_lin_jia
name: 银鳞甲
default_lore:
  - text: |
      甲片是一片一片的银鳞，每片不过铜钱大小，叠起来像鱼鳞一般——
      密不透风，却能随身体弯折。做这件甲的工匠在苏州河边开了一辈子银铺，
      从没做过兵器。有人问他为什么破例，他说：'银能看不能打——但能护，护比打强。'

  - text: |
      这件银鳞甲总共用了一千二百片银鳞，每片都是手工锤出来的，用了整整八个月。
      工匠做甲的时候，他妻子天天在旁边帮他剪银片。甲做完那年他妻子去世了，
      他便把甲挂在铺子里，不卖，不让人碰。有人出过高价，他只摇头。

  - text: |
      三年后一个夜里，铺子遭了贼。贼偷了不少银器，唯独没动这件甲。
      第二天工匠发现甲还挂在原处，甲上多了一张字条：'此甲太重情义，
      不敢取。'工匠看了字条，笑了一声。第二天他把甲从墙上取下来，
      第一次穿在了自己身上——不是防贼，是觉得甲已经够分量了。

continued_lore_obtained:
  - text: |
      于「{source}」初得此银鳞甲。一千二百片银鳞，
      穿上时一片一片的凉，像无数手掌轻轻贴上来。
  - text: |
      在 {source} 拿到这副银鳞甲。每片不过铜钱大小，
      你想起苏州银铺那工匠和他妻子——一千二百片银鳞里，
      有他妻子剪过的那几百片。
  - text: |
      于{source}穿上银鳞甲。系带处的银扣有一处偏暗，
      被人长年握过——是工匠自己临死前还握着的。
  - text: |
      {source}一遭，银鳞归你。它太重情义，贼都不敢偷，
      今天却落到了你手里——你是它认的。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      银鳞前胸多了一处划痕，一片银鳞从中间裂开——
      你换上一片备用的，它没有怨言。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      脱甲时听见千二百片银鳞相碰的极轻的响，
      像她还在帮他剪银片。
  - text: |
      胜 {boss_name} 后，把甲挂起来。
      银面之上多了几处暗痕——
      你想起字条上的话：此甲太重情义。
  - text: |
      {stage_name}一战胜 {boss_name}。
      银鳞甲护了你一战，
      你今天替它过完了一次人的日子。

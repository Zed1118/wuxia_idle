id: armor_xiangyang_ye_xing_yi
name: 夜行衣
default_lore:
  - text: |
      黑色紧身衣，关节处缝了软皮，夜里行动不出声。
      做夜里营生的人穿这种衣裳，不是偷就是探。
      但也有正经人穿——比如夜里翻墙救人的那种。

  - text: |
      裁缝铺的老师傅只做白天的衣裳，唯独有一回破了例。
      来的人放了一锭银子，什么都没说。
      老师傅量了他的尺寸，用最黑的布、最软的皮，缝了一身。
      交货那天他问：「做什么用的？」来人说：「救人。」

continued_lore_obtained:
  - text: |
      于「{source}」得此夜行衣。黑布贴身，
      穿上后连影子都变薄了。
  - text: |
      在{source}偶然所得。夜行衣轻得像没穿一样，
      但关节处的软皮让你动起来没有声音。
  - text: |
      自{source}取得。穿这种衣裳的人
      不一定是坏人，但一定有不想被看见的理由。
  - text: |
      {source}得衣。试了试，
      蹲下站起来没有一点声响。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，夜行衣让{boss_name}慢了半拍。
      暗色衣料在昏暗中是天然的掩护。
  - text: |
      {stage_name}一战。{boss_name}的眼睛
      在黑暗中找了一瞬，这一瞬就够了。
  - text: |
      胜{boss_name}于{stage_name}。
      夜行衣上多了一道刀痕，黑布衬着更看不清。
  - text: |
      胜{boss_name}后整了整衣裳，
      夜行衣没破，但汗湿了一层。

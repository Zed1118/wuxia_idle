id: weapon_haojiahuo_xuan_hua_fu
name: 玄花斧
default_lore:
  - text: |
      斧身是黑铁打的，斧面上有一片天然的花纹——不是刻的，是铁矿里自带的纹路，
      淬火之后浮现出来，像是一朵墨菊。太行山下的「铁骨堂」老掌柜说，
      这种纹叫"玄花"，一百炉里未必出一件。出了便是缘分，不挑主，主挑它。

  - text: |
      此斧的第一任主人是个猎户，在太行山里追一头野猪时误入一个废弃的铁矿洞，
      在洞里发现了这块带纹的铁矿石。猎户自己不会打铁，扛着石头走了一百二十里路
      送到铁骨堂。老掌柜看了一眼石头，说：「我不收你工钱。我打了一辈子铁，
      等的就是这块料。」

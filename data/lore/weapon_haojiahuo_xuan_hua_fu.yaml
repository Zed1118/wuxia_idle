id: weapon_haojiahuo_xuan_hua_fu
name: 玄花斧
default_lore:
  - text: |
      斧身是黑铁打的，斧面上有一片天然的花纹——不是刻的，是铁矿里自带的纹路，
      淬火之后浮现出来，像是一朵墨菊。太行山下的「铁骨堂」老掌柜说，
      这种纹叫"玄花"，一百炉里未必出一件。出了便是缘分，不挑主，主挑它。

  - text: |
      此斧的第一任主人是个猎户，在太行山里追一头野猪时误入一个废弃的铁矿洞，
      在洞里发现了这块带纹的铁矿石。猎户自己不会打铁，扛着石头走了一百二十里路
      送到铁骨堂。老掌柜看了一眼石头，说：「我不收你工钱。我打了一辈子铁，
      等的就是这块料。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此玄花斧。斧面上的墨菊纹，
      你看了一会儿，觉得它也在看你——
      不是夸，是估你够不够。
  - text: |
      在 {source} 拿到这柄玄花斧。重得需要双手托住，
      你想起铁骨堂老掌柜的话：主挑它，不是它挑主。
  - text: |
      于{source}得斧。斧柄上还留着前主人手心的油光，
      你试着握上去——位置不对，但它没拒你。
  - text: |
      {source}一遭，玄花归你。斧身重三斤，
      抬起时手腕一沉——这一沉，你认了。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      斧刃没卷，玄花纹也没动——
      只是斧柄上多了一道你掌心的印。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收斧时听见斧面响了一声，
      像太行山那块原矿在百年前裂的那一瞬。
  - text: |
      胜 {boss_name} 后，擦斧。
      墨菊纹比之前清晰了一点点——
      你想起老掌柜说过：这种纹是活的。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你忽然知道：猎户扛石头走一百二十里的事，
      你今天也走了一趟。

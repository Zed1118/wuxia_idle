id: tie_gu_shan
name: 铁骨扇
default_lore:
  - text: |
      十六根铁骨，扇面是素绢，合上是短棍，撑开是盾面。这是点苍派女弟子入门
      三年后才能拿到的东西——前三年赤手，后三年掌扇。扇子练好了，比剑难缠。
      因为扇子可以合、可以开、可以甩。对方不知道你下一手是什么。

  - text: |
      这把铁骨扇的主人在扇面上用极细的针脚绣了一行小字：「不惹事，不怕事。」
      人远在云南，这句话却随着扇子传到了甘肃——一个商队把它带到了河西，
      沿途黑白两道的女人们争相传看。不是因为这句话写得多好，
      是因为用扇子的女人少，用得好的更少。

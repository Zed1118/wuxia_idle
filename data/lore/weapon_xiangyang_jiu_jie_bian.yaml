id: weapon_xiangyang_jiu_jie_bian
name: 九节鞭
default_lore:
  - text: |
      九节铁环相扣，收起来不过一握，甩开了能扫出三尺方圆。
      每节之间的环扣是最考功夫的地方——太紧了鞭身僵，太松了鞭身散。
      据说打这种鞭的师傅自己先要练三年鞭法，知道哪一节该紧哪一节该松，才敢开炉。
      扬州「铁连环」铺子传到第三代，掌柜的是个跛脚老头，他说：鞭子就是铁做的蛇，蛇活了，人才活。

continued_lore_obtained:
  - text: |
      于「{source}」初得此九节鞭。环扣还紧,
      一甩出去铁链相碰发出脆响——脆得像还没醒透。
  - text: |
      在 {source} 拿到这条铁鞭。盘在掌心是冰凉的,
      你想起扬州铁连环的跛脚老头说过的话:鞭子是铁做的蛇。
  - text: |
      于{source}得鞭。第三节环扣有点松——
      不是坏,是上一个使鞭的人在这一节用力多了。
  - text: |
      {source}一遭,这条九节鞭算是落到了你手里。
      你试着抖了一下,九节一齐弹起又落下,像一条没醒过来的蛇。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      九节里有一节环扣变形了,你扳了扳——扳不回来。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收鞭时听见某一节卡了一下——它在记这一战。
  - text: |
      胜 {boss_name} 后,把鞭收回腰间。
      第三节的松,松得更松了一点。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你想起跛脚老头的话:蛇活了,人才活。
      这条鞭比上一战多活了一寸。

id: weapon_baowu_yin_yang_ci
name: 阴阳刺
default_lore:
  - text: |
      一黑一白两柄短刺，淬了不同的毒，中者阴阳相冲。
      黑刺淬的是蛇毒，白刺淬的是蝎毒，两种毒单吃一种还有救。
      吃了两种，毒性在体内相冲，神仙也救不回来。

  - text: |
      造阴阳刺的匠人最后被自己的作品刺了一下——白刺。
      他从容地取了黑刺在同一个伤口上刺了第二下。
      旁人惊呼他疯了，他笑着说：「以毒攻毒。」然后倒下了。
      ——后来才知道，他是在试自己的毒配得对不对。配对了。人也没了。

continued_lore_obtained:
  - text: |
      于「{source}」得此阴阳刺。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。阴阳刺上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此阴阳刺。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得阴阳刺。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，阴阳刺助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      阴阳刺在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      阴阳刺经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧阴阳刺，
      它比来的时候重了一点——是沾了故事的重量。

id: accessory_haojiahuo_ping_an_kou
name: 平安扣
default_lore:
  - text: |
      白玉磨的平安扣，中间一个圆洞，取平安之意。
      走江湖的人不信佛不信道，但信一个「平安」。
      平安扣挂在脖子上不重，但知道它在就觉得安稳。

  - text: |
      这块平安扣是师父临走时给的，没说别的话，
      只说了四个字：「平安就好。」
      后来走了很远的路，平安扣温温的，像师父的手还在。

continued_lore_obtained:
  - text: |
      于「{source}」得此平安扣。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。平安扣上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此平安扣。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得平安扣。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，平安扣助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      平安扣在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      平安扣经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧平安扣，
      它比来的时候重了一点——是沾了故事的重量。

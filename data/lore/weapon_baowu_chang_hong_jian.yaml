id: weapon_baowu_chang_hong_jian
name: 长虹剑
default_lore:
  - text: |
      剑身细长，出鞘时能听见一声极轻的嗡鸣——像是雨后的虹光在铁里颤动。
      铸剑之人在洞庭湖边住了三年，每日对着湖上的虹光画图样，
      画了一千多张，最后只挑了一张。他说：'虹不能画，只能等。我等了三年，
      等到的那一道虹，刚好穿过剑尖和剑柄。'

  - text: |
      剑成那年秋天，洞庭湖上起了百年不遇的大雾，三日不散。铸剑人把剑挂在
      湖边的船桅上——他说虹被困在雾里了，剑能把它引出来。第三日傍晚，
      雾散了，天边果然挂出一道虹，颜色比寻常虹光更长、更透。

  - text: |
      后来有人在岳阳楼上见过这道虹——不是在天上，是在一个人的腰间。
      佩剑的是个女子，坐在岳阳楼最角落的窗边喝酒。有人上前问她剑的名字，
      她说：'没有名字。我叫它虹，它就应。'旁人再问，她指了指天边：
      '你看虹什么时候答应过人。'说完便不见了，只剩栏杆上一个空酒壶。

continued_lore_obtained:
  - text: |
      于「{source}」初见此长虹。出鞘时听见一声极轻的嗡鸣，
      像雨后那道虹被人从铁里轻轻牵了一下。
  - text: |
      在 {source} 拿到这柄长虹剑。剑身比寻常剑更长一寸，
      你想起洞庭那铸剑人等了三年，等的就是一道穿过剑尖和剑柄的虹。
  - text: |
      于{source}得剑。剑柄上有一处略润——
      是岳阳楼那女子坐了一晚握过的位置。
  - text: |
      {source}一遭，长虹归你。它从来没有名字，
      但你忽然知道：它不应人，它应一道光。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      收剑入鞘时，剑身上反着一截虹光——
      你忽然知道：虹应了你。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      剑尖未沾血，只有一线雨后的光——
      它不留痕。
  - text: |
      胜 {boss_name} 后摩剑。剑身上的虹光淡了一截——
      你想：它替你走了一道虹。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你忽然想起岳阳楼那女子的话：虹什么时候答应过人。
      今天它答应了一次。

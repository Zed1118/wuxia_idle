id: accessory_haojiahuo_yu_pei_lao
name: 古玉佩
default_lore:
  - text: |
      一块老玉，玉色发黄，边缘有一道细细的裂纹——不是摔的，是年岁久了自然裂的。
      玉的正面雕着一只回首的鹤，刀法古朴，不像是近三百年内的手艺。
      西安城外一个老农在挖井时从土里刨出来的，老农不识货，拿去集上换了两袋米。

  - text: |
      后来这块玉辗转落到了一个退隐的老剑客手里。老剑客晚年不练剑，每天只把这块玉
      搁在窗台上，对着日光看那道裂纹。有人问他看什么，他说：「看这道裂是什么时候
      走到头的。走到头那天，玉就碎了——万物都有走完的时候，人也一样。」
      玉至今未碎，老剑客已不在了。

continued_lore_obtained:
  - text: |
      于「{source}」初得此古玉佩。玉色发黄,
      边缘一道裂纹细而清——它还在走。
  - text: |
      在 {source} 拿到这块老玉。正面雕的回首鹤,
      刀法古朴,不像近三百年的手艺。
  - text: |
      于{source}得玉。绳是新的,玉是老的,
      你忽然觉得新绳配不上它——但它没拒你。
  - text: |
      {source}一遭,这块玉到你手里。
      你对着光看那道裂纹——它还没走到头,但比你想的近一点。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      玉佩在腰间撞了一下,你低头看裂纹——
      没走多,但走了。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收手时玉佩贴在腰上,凉了一阵。
      它一直在记你打过的每一仗。
  - text: |
      胜 {boss_name} 后,把玉摘下来对光看。
      裂纹比晨起时长了一线——
      你想起老剑客的话:走到头的时候,玉就碎了。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你今天还活着,它今天也还在。
      一起多走一步,就是多一步的事。

id: accessory_baowu_zi_jin_hu_lu
name: 紫金葫芦
default_lore:
  - text: |
      紫金打的小葫芦，里面装着续命的丹药。
      葫芦本身不值钱，值钱的是里面的药。
      但经年累月被药气浸润，葫芦壁也沾了药性，空葫芦都能镇痛。

  - text: |
      炼药的道士说，紫金葫芦是最好的药器：
      「金不走味，紫不渗药，密封好了放十年药效不减。
      人可以老，药不能老。」

  - text: |
      葫芦底部有一道细细的裂纹，被旧蜡封得严实。
      传它的药师说，裂纹是逃亡路上摔出来的；那一夜他背着师父过河，
      师父没有活到天明，葫芦里的三丸药却救了后来三个不相干的人。

continued_lore_obtained:
  - text: |
      于「{source}」得此紫金葫芦。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。紫金葫芦上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此紫金葫芦。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得紫金葫芦。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，紫金葫芦助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      紫金葫芦在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      紫金葫芦经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧紫金葫芦，
      它比来的时候重了一点——是沾了故事的重量。

id: weapon_zhongqi_po_zhen_chui
name: 破阵锤
default_lore:
  - text: |
      锤头是整块乌铁铸的，重八十二斤，锤面布满深浅不一的凹坑——
      不是铸痕，是砸出来的。每一道凹坑都是一次破阵。使锤的人不讲究招式，
      讲究的是力道和胆子——敢抡起来，就赢了一半。

  - text: |
      此锤原是河北沧州一位镖师的兵器。沧州镖局走的是北路的镖，
      路过太行山时常遇马匪结阵拦路——长枪在前，弓箭在侧，盾牌在后，
      寻常兵器打不进去。这位镖师便抡着锤子第一个冲上去，
      一锤砸断三杆枪头。马匪的阵一破，后面的趟子手便拥上来把残阵冲散。

  - text: |
      镖师后来老了，抡不动锤了，把锤子送给了沧州城外一座小庙里的武僧。
      武僧接过锤子掂了掂，说了句：'八十二斤，一斤不多，一斤不少。'
      镖师问：'什么不多不少？'武僧说：'刚好压得住一个人一辈子的火气。'

continued_lore_obtained:
  - text: |
      于「{source}」初得此破阵锤。锤头八十二斤,
      抬起一寸便觉得手腕沉——它在试你。
  - text: |
      在 {source} 拿到这柄破阵锤。锤面深浅凹坑里,
      你能数出几道——一锤断一枪,沧州的旧账。
  - text: |
      于{source}得锤。锤柄缠的是粗麻,
      被汗渍浸过的颜色——上一个使锤的人,握的位置在这里。
  - text: |
      {source}一遭,破阵归你。掂在掌心,沉得稳——
      你忽然知道武僧说的「一斤不多,一斤不少」。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      锤面又多了一道凹坑——
      不是 {boss_name} 砸的,是你抡断他兵器时砸的。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收锤回背,听见自己呼吸沉了三分——
      抡过一次八十二斤,人也沉。
  - text: |
      胜 {boss_name} 后,把锤放下。
      你忽然不躁了——八十二斤压住了一辈子的火气,
      武僧说得对。
  - text: |
      {stage_name}一战胜 {boss_name}。
      锤上的凹坑又添了一道,
      你想:下次再添一道,你的火气也再少一截。

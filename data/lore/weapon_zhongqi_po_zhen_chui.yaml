id: weapon_zhongqi_po_zhen_chui
name: 破阵锤
default_lore:
  - text: |
      锤头是整块乌铁铸的，重八十二斤，锤面布满深浅不一的凹坑——
      不是铸痕，是砸出来的。每一道凹坑都是一次破阵。使锤的人不讲究招式，
      讲究的是力道和胆子——敢抡起来，就赢了一半。

  - text: |
      此锤原是河北沧州一位镖师的兵器。沧州镖局走的是北路的镖，
      路过太行山时常遇马匪结阵拦路——长枪在前，弓箭在侧，盾牌在后，
      寻常兵器打不进去。这位镖师便抡着锤子第一个冲上去，
      一锤砸断三杆枪头。马匪的阵一破，后面的趟子手便拥上来把残阵冲散。

  - text: |
      镖师后来老了，抡不动锤了，把锤子送给了沧州城外一座小庙里的武僧。
      武僧接过锤子掂了掂，说了句：'八十二斤，一斤不多，一斤不少。'
      镖师问：'什么不多不少？'武僧说：'刚好压得住一个人一辈子的火气。'

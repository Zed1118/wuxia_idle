id: accessory_xiangyang_yin_jie
name: 银戒
default_lore:
  - text: |
      一枚素面银戒，没有刻字，没有镶石，圈口打磨得光滑如镜。
      这种银戒在滇南的银铺里多的是，但手上戴久了会有一层温润的哑光——那是银子记住了人的体温。
      大理城外有个老银匠，一辈子打了上千枚这样的戒指。他说：「金银都是死物，戴上身才算活过来。活过来的东西，不会忘主。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此银戒。素面无字,
      戴在指上冰凉,要等戒圈贴合体温才有了重量。
  - text: |
      在 {source} 拿到这枚银戒。圈口刚好卡住指节,
      你想起大理老银匠的话:戴上身才算活过来。
  - text: |
      于{source}得戒。戒面映出天光,
      像一面小到只够看你自己半张脸的镜子。
  - text: |
      {source}一遭,这枚银戒落到你手里。
      素面有一处极浅的指纹——是老银匠打磨时留下的,他没擦。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      戒面多了一道极细的痕,像发丝——
      你不知是哪一拳磕到的。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      出拳那一刻你忘了银戒还在,
      收拳时戒圈微温,贴在指根像还没退烧。
  - text: |
      胜 {boss_name} 后摘下银戒看了看。
      素面又添了一处浅光——
      银子记住了一战,人也是。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你忽然想起老银匠说的话:不会忘主。
      你也不会忘这一战。

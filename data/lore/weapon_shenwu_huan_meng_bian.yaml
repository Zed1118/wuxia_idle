id: weapon_shenwu_huan_meng_bian
name: 幻梦鞭
default_lore:
  - text: |
      鞭身是近乎半透明的——不是蚕丝，不是牛筋，没有人知道它到底是什么材质。
      使鞭的人说，这鞭子是从一匹白骆驼的尾巴上采下来的——那匹白骆驼只在月圆之夜
      出现在戈壁深处，见了人就跑，追它的人追到天亮才发现自己在原地打转。

  - text: |
      此鞭最早出现在敦煌一带。当地的老人们说，鞭子是一位西域僧人所制，
      他用了七七四十九种香料熏过鞭身——不为驱虫，不为辟邪，只为让人闻了之后
      分不清自己是在醒着还是在梦里。交手之人一旦闻到那股香味，招式便慢了半拍——
      不是因为鞭子快，是因为脑子已经进了幻梦。

  - text: |
      鞭子最后一次被人看见是在莫高窟前。一个汉人女子拿着这条鞭子走进了一座窟，
      在壁画的飞天前站了很久。有人说她是去还鞭的——鞭子本是壁画里飞天手中之物，
      借给凡人用了几百年，该还了。后来那个窟里的飞天壁画确实多了一道鞭影。
      是不是原来就有的，谁也说不上来。

continued_lore_obtained:
  - text: |
      于「{source}」初见此幻梦鞭。鞭身近乎半透明，
      你握住时——不像握住一条鞭，像握住一缕月光。
  - text: |
      在 {source} 拿到这条鞭。指尖有一丝若有若无的香——
      敦煌僧人四十九种香料里的某一种，你说不出是哪一种。
  - text: |
      于{source}得鞭。它不像是从凡人手里递过来的，
      像是从壁画里探出来交到你手里的。
  - text: |
      {source}一遭，幻梦归你。你忽然觉得手里这条鞭子，
      是替莫高窟那个汉人女子继续走的——她去还，你来借。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      {boss_name} 在你出手前慢了半拍——
      那股香从鞭身上散到了空气里。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收鞭时你忽然分不清这一战是真是梦——
      香气还在，鞭子还在，你也还在。
  - text: |
      胜 {boss_name} 后立着片刻。
      鞭身在掌心又凉了一线——
      你想：它走了一截梦，你走了一截醒。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你忽然知道：这条鞭子最后会还给壁画。
      你只是它借给凡人的几百年中，被借的一段。

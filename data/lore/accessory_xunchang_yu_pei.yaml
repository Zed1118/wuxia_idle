id: accessory_xunchang_yu_pei
name: 玉佩
default_lore:
  - text: |
      一块寻常青玉，磨成平安扣的样式，用红绳穿了挂在腰间。玉质不纯，对着光看能瞧见絮状的纹路。
      这种玉在当铺里值不了几个钱，但在走江湖的人眼中，腰间有块玉便算是有个念想——
      或是家中妻子系的，或是师父随手给的。走着走着，玉养出了润光，人的心气也没那么燥了。

  - text: |
      一个走镖的中年人，每次出门前妻子都把他腰间的平安扣取下来擦一遍。
      不是用水——是用她自己的衣角。擦完再系回去，打一个结，拉紧了。
      有一回镖队走了三个月才回来，他跨进门槛第一件事不是喝水、不是坐下，
      是把玉摘下来递给她。她接过去，没擦，只是握了一会儿。玉上还有他的体温。

continued_lore_obtained:
  - text: |
      初得此玉于「{source}」，绳是新的，还没沾上人的体温。
      青玉里有絮状的纹，对着光看像云。
  - text: |
      于{source}得这块平安扣。握在掌中冰凉，
      要捂一会儿才能暖过来。
  - text: |
      {source}一遭，这块玉算是落到了你手里。
      青玉里的絮纹像云，你看着看着觉得它在动。
  - text: |
      于「{source}」初见此佩。它还没有被人系过——
      绳结打得很紧，像怕被人摘下来。

continued_lore_boss_defeated:
  - text: |
      斩 {boss_name} 于 {stage_name},
      玉佩在腰间撞了一下，凉了一下又暖回来。
  - text: |
      {stage_name}一战。{boss_name} 倒下时，
      你低头看玉，绳结松了半分——是被你的呼吸撑松的。
  - text: |
      胜 {boss_name} 后回身，玉还在。
      你忽然想起出门那天，有人给你系上它时打的那个结。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      回到客栈把玉摘下来，放在桌上凉了一阵——
      它在记的，你不知道。

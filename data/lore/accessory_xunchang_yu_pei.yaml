id: accessory_xunchang_yu_pei
name: 玉佩
default_lore:
  - text: |
      一块寻常青玉，磨成平安扣的样式，用红绳穿了挂在腰间。玉质不纯，对着光看能瞧见絮状的纹路。
      这种玉在当铺里值不了几个钱，但在走江湖的人眼中，腰间有块玉便算是有个念想——
      或是家中妻子系的，或是师父随手给的。走着走着，玉养出了润光，人的心气也没那么燥了。

  - text: |
      一个走镖的中年人，每次出门前妻子都把他腰间的平安扣取下来擦一遍。
      不是用水——是用她自己的衣角。擦完再系回去，打一个结，拉紧了。
      有一回镖队走了三个月才回来，他跨进门槛第一件事不是喝水、不是坐下，
      是把玉摘下来递给她。她接过去，没擦，只是握了一会儿。玉上还有他的体温。

id: armor_haojiahuo_jin_pao
name: 锦袍
default_lore:
  - text: |
      此袍是三十年前江南织造府的贡品，面料是云锦，夹层纳了一层极薄的犀皮——
      轻软如常服，却能卸去寻常刀剑的劈砍。后来不知为何没能送进宫里，
      流落民间，被一位姓秦的武师所得。秦武师穿了二十年，从未对人说过这袍子的来历。

  - text: |
      秦武师晚年收了一个徒弟。收徒那日正是立秋，他将锦袍叠好，双手捧给徒弟，
      只说了一句：「穿得久些。」徒弟跪接了，发现袍子的里衬上不知什么时候绣了
      一行小字：'秦门第七代传。'秦武师的字迹。原来他不是不说来历——他是在等
      这件袍子自己积攒来历。此后每代传人都在衬里添一行字，绵延不绝。

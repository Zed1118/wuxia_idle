id: armor_haojiahuo_jin_pao
name: 锦袍
default_lore:
  - text: |
      此袍是三十年前江南织造府的贡品，面料是云锦，夹层纳了一层极薄的犀皮——
      轻软如常服，却能卸去寻常刀剑的劈砍。后来不知为何没能送进宫里，
      流落民间，被一位姓秦的武师所得。秦武师穿了二十年，从未对人说过这袍子的来历。

  - text: |
      秦武师晚年收了一个徒弟。收徒那日正是立秋，他将锦袍叠好，双手捧给徒弟，
      只说了一句：「穿得久些。」徒弟跪接了，发现袍子的里衬上不知什么时候绣了
      一行小字：'秦门第七代传。'秦武师的字迹。原来他不是不说来历——他是在等
      这件袍子自己积攒来历。此后每代传人都在衬里添一行字，绵延不绝。

continued_lore_obtained:
  - text: |
      于「{source}」初得此锦袍。云锦面里的犀皮夹层,
      你穿上时不觉得重——是它习惯了被穿。
  - text: |
      在 {source} 拿到这件锦袍。里衬上有一行字,
      你借光看了一眼——「秦门第七代传」。
  - text: |
      于{source}穿上锦袍。袖口比想象的窄,
      你抬手时,袍子先动一拍——它在适应新主。
  - text: |
      {source}一遭,锦袍归你。江南织造府的贡品,
      流落到你手里——它走了三十年才走到这一步。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      袍子前襟添了一道横痕,
      云锦上能看出来,犀皮夹层挡了。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      脱袍时发现里衬比之前略松——
      你忽然知道,秦武师说的「穿得久些」是什么意思了。
  - text: |
      胜 {boss_name} 后,将袍叠好。
      里衬的字行还在,
      你想:有一天你也会在下面加一行字。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你不知道这袍子之前替几个人挡过,
      但你知道,从今天起它又添了一笔来历。

id: tian_que
name: 天阙
default_lore:
  - text: |
      青灰色的剑身，剑脊上一条浅浅的云纹——不是刻的，是淬火时自然形成的。
      铸剑之人在华山绝顶上搭了一座草庐，对着苍岭云飞整整一百天，
      然后下山，将自己关在铁铺里又待了一百天。剑成那日，他提剑上山，
      在华山北峰上把剑插入石缝，自己转身走了。

  - text: |
      五年后，一个上华山的少年把它从石缝里拔了出来。剑插得太深，
      少年拔得虎口裂了，血流在剑身上——血顺着那条云纹淌下来，
      像是云下面忽然有了霞光。少年后来成了华山派掌门，但他在任何场合
      都不说自己这柄剑是"拔"出来的。他说：「不是拔。是接。」

id: weapon_shenwu_po_jun_dao
name: 破军刀
default_lore:
  - text: |
      刀长四尺，刀身漆黑，只在刀锋处泛一线白光——那不是磨出来的，
      是铸刀时在刀刃上嵌了一线陨铁。陨铁的硬度远超凡铁，
      这一线白光便是此刀最要命的地方：它不劈，它只是「过」。

  - text: |
      此刀的前身是一个谜。没有一个可靠的记载能说明它是何时、何人所造。
      只知道它第一次出现在世间，是在一场大雪之后——
      雁门关外的雪地里横七竖八躺着一整队溃败的骑兵，刀刃上还挂着霜。

  - text: |
      后来这把刀在军阵之间流转了不知多少手。最后一次有人看见它，
      是在潼关外一个老卒的手中。老卒坐在城门口，膝上横着这把刀，
      用一块油布慢慢地擦。有人路过问他这刀卖不卖，老卒说：
      「不卖。这刀从军阵里来，要回军阵里去。我只是替它看着路。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此破军刀。刀身漆黑，刀锋一线白——
      你试着对光看那一线白，像有人在远处叹了一口气。
  - text: |
      在 {source} 拿到这柄破军刀。陨铁嵌入刀锋，
      你想起雁门关外那场大雪——刀刃上还挂着霜。
  - text: |
      于{source}得刀。刀柄上有一处油布擦过的痕，
      是潼关老卒擦了很多年留下的。
  - text: |
      {source}一遭，破军归你。它从军阵里来，
      你今天替它走一段——但它知道，你不是它最终的主人。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      陨铁那一线白没暗——
      它不劈，它只是「过」。{boss_name} 没能挡。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收刀时你听见刀刃上极轻的一声——
      像雁门关那场雪的回响。
  - text: |
      胜 {boss_name} 后，擦刀。
      油布上留下一道暗痕——
      你忽然觉得自己接住了潼关老卒的位置，替它看着路。
  - text: |
      {stage_name}一战胜 {boss_name}。
      破军刀又走了一战。
      你想：这一战之后，它离回到军阵里的那一天又近一步。

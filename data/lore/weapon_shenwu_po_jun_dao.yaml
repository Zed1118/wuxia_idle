id: weapon_shenwu_po_jun_dao
name: 破军刀
default_lore:
  - text: |
      刀长四尺，刀身漆黑，只在刀锋处泛一线白光——那不是磨出来的，
      是铸刀时在刀刃上嵌了一线陨铁。陨铁的硬度远超凡铁，
      这一线白光便是此刀最要命的地方：它不劈，它只是'过'。

  - text: |
      此刀的前身是一个谜。没有一个可靠的记载能说明它是何时、何人所造。
      只知道它第一次出现在世间，是在一场大雪之后——
      雁门关外的雪地里横七竖八躺着一整队溃败的骑兵，刀刃上还挂着霜。

  - text: |
      后来这把刀在军阵之间流转了不知多少手。最后一次有人看见它，
      是在潼关外一个老卒的手中。老卒坐在城门口，膝上横着这把刀，
      用一块油布慢慢地擦。有人路过问他这刀卖不卖，老卒说：
      '不卖。这刀从军阵里来，要回军阵里去。我只是替它看着路。'

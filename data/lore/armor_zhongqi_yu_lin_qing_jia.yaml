id: armor_zhongqi_yu_lin_qing_jia
name: 鱼鳞轻甲
default_lore:
  - text: |
      极薄的鱼鳞铁片密密缝在软甲上，轻便且不碍身法。
      鱼鳞轻甲是重器里的异类——它不重。
      但薄不等于弱，每片鱼鳞都是百炼精铁打薄的，薄到极致反而韧。

  - text: |
      造甲的师傅说，打薄一片铁要锤三百下，一副甲要一千二百片。
      算下来是三十六万锤。「每一锤都不能偏，偏了那片就废了。」

continued_lore_obtained:
  - text: |
      于「{source}」得此鱼鳞轻甲。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。鱼鳞轻甲上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此鱼鳞轻甲。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得鱼鳞轻甲。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，鱼鳞轻甲助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      鱼鳞轻甲在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      鱼鳞轻甲经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧鱼鳞轻甲，
      它比来的时候重了一点——是沾了故事的重量。

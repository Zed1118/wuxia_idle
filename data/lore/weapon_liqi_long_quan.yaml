id: weapon_liqi_long_quan
name: 龙泉剑
default_lore:
  - text: |
      此剑铸于浙江龙泉县，铸剑师姓沈，是南宋龙泉沈氏一门的传人。
      剑成之日正值惊蛰，春雷乍响，沈师傅将剑身插入溪中淬火——
      溪水翻起一蓬白汽，半条溪的鱼都翻了肚。他把剑捞出来，
      剑身上有一道天然的水波纹，像是惊蛰那日的雷声凝固在了铁里。

  - text: |
      沈师傅临终前将剑传给了大弟子。传剑时有句话：'此剑到谁手里便姓谁，
      但它身上那道水波纹，永远是惊蛰的雷。'传了四代，剑鞘换了三次，
      剑柄的缠绳也换过两回——但剑身的水波纹依旧如新铸之日。
      第四代传人是个女子，她在剑鞘里藏了一张纸，写的是前三代传人的名字。
      她说剑不说话，但剑记得。

continued_lore_obtained:
  - text: |
      于「{source}」初见此龙泉。剑身上的水波纹细而清，
      像谁把一蓬春雷压在了铁里。
  - text: |
      在 {source} 拿到这柄龙泉剑。剑鞘是新换的——第四次换，
      但水波纹依旧如新铸之日。
  - text: |
      于{source}得剑。剑柄缠绳是雨后采的青丝，
      你想起沈师傅临终的话：此剑到谁手里便姓谁。
  - text: |
      {source}一遭，龙泉归你。剑鞘里有一张纸，
      写着前几代传人的名字——你忽然知道，从今天起也得添你的。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      水波纹还在，雷还在——
      它没记一战，它记的是所有战。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收剑时剑身仍温，你忽然想起女传人说过：
      剑不说话，但剑记得。
  - text: |
      胜 {boss_name} 后摩剑。剑身上没新痕，
      但你的指印在剑脊上停了片刻——
      它在收存这一指。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你把剑鞘里那张纸取出来，看一眼，放回去。
      今天还没轮到你写。

id: accessory_special_xin_mo_zhu
name: 心魔珠
default_lore:
  - text: |
      渡过心魔后凝结的珠子，握在手里能听见自己的心跳。
      心魔珠不是外物，是从自己身上长出来的。
      渡过心魔的人才知道——最难对付的敌人从来不在外面。

  - text: |
      珠子是黑的，但不是死黑，是夜空那种黑。
      仔细看能看见里面有东西在动，像一缕烟，像一个影子。
      那是你的心魔，它没有消失，只是被你关在了珠子里。

continued_lore_obtained:
  - text: |
      于「{source}」得此心魔珠。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。心魔珠上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此心魔珠。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得心魔珠。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，心魔珠助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      心魔珠在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      心魔珠经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧心魔珠，
      它比来的时候重了一点——是沾了故事的重量。

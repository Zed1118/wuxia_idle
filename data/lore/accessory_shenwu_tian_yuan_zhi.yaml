id: accessory_shenwu_tian_yuan_zhi
name: 天元指
default_lore:
  - text: |
      不知何人所铸的指环，戴上后内力自行周天运转。
      天元指是传说中的物件——戴上后不需要刻意运功，
      内力自行沿经脉流转，日夜不息，像多了一颗心在替你跳。

  - text: |
      有人说天元指是上古修士留下的，也有人说是天上掉下来的。
      没人知道它是什么材质，摸上去不像金不像铁不像玉。
      唯一确定的是，戴上后摘不下来——除非你不想再练功了。

  - text: |
      指环内壁刻着七个浅点，按北斗排布，却少了勺柄末端一星。
      有老医者说，那不是星图，是经脉周行的记号：少的一点留给佩戴者自己补上。
      所以天元指不替人练功，它只是把该走的路一遍遍摆在指间。

continued_lore_obtained:
  - text: |
      于「{source}」得此天元指。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。天元指上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此天元指。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得天元指。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，天元指助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      天元指在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      天元指经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧天元指，
      它比来的时候重了一点——是沾了故事的重量。

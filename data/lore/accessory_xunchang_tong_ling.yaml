id: accessory_xunchang_tong_ling
name: 铜铃
default_lore:
  - text: |
      牛脖子上摘下来的铜铃，摇一摇能听见老远。
      走夜路的人揣一个在身上，铃声能壮胆。
      不是辟邪，是告诉自己还在走，没有停。

  - text: |
      山里有个放牛的哑巴，走丢了三天三夜。
      找到他时他蹲在崖下，手里攥着一只铜铃，摇个不停。
      后来问他怎么撑过来的，他摇了摇铜铃——声音还在，人就还在。

continued_lore_obtained:
  - text: |
      于「{source}」得此铜铃。铜锈斑驳，
      摇一摇还是清脆的，像很久以前就在等人来取。
  - text: |
      在{source}偶然所得。铃铛不大，
      揣在怀里走路时轻轻响，像有人在身后跟着。
  - text: |
      自{source}取得。铜铃声音清亮，
      在安静的夜里能传出很远。
  - text: |
      {source}得铃。有些东西值不了几个钱，
      但关键时候比金子管用。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，铜铃在怀中不住作响。
      好像它也知道{boss_name}不好对付。
  - text: |
      {stage_name}一战。胜了{boss_name}后
      铜铃安静下来，你才发觉方才它一直在响。
  - text: |
      胜{boss_name}于{stage_name}。
      战后摸了摸怀里的铜铃，它微微发烫。
  - text: |
      胜{boss_name}后，铜铃的声音
      似乎比之前清亮了一分。

id: armor_shenwu_tian_can_bao_jia
name: 天蚕宝甲
default_lore:
  - text: |
      天蚕宝甲，传说中的神物，刀枪不入水火不侵。
      天蚕宝甲与冰蚕衣不同——冰蚕衣轻，天蚕宝甲重。
      重是因为天蚕丝里绞了金线，金线是从地底熔岩里抽出来的。

  - text: |
      据说天蚕宝甲只出现过三次：一次在帝王的陵墓里，
      一次在深海的沉船上，一次在一个老乞丐的包袱里。
      三次都没有人能穿上它——它会认主。

continued_lore_obtained:
  - text: |
      于「{source}」得此天蚕宝甲。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。天蚕宝甲上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此天蚕宝甲。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得天蚕宝甲。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，天蚕宝甲助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      天蚕宝甲在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      天蚕宝甲经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧天蚕宝甲，
      它比来的时候重了一点——是沾了故事的重量。

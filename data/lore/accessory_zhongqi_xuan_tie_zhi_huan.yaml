id: accessory_zhongqi_xuan_tie_zhi_huan
name: 玄铁指环
default_lore:
  - text: |
      玄铁打的指环，出拳时加重拳劲，一拳碎石。
      戴上后手指沉了一分，但这一分在拳头砸到人身上时会变成十分。
      练铁砂掌的人都戴这种，戴到最后指环跟手指长在了一起。

  - text: |
      铸环的匠人只铸了三枚就封炉不做了。
      因为玄铁太硬，每铸一枚就崩掉一把锤子。
      他说：「三枚够了。三枚碎三块石头，够一个人用一辈子。」

continued_lore_obtained:
  - text: |
      于「{source}」得此玄铁指环。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。玄铁指环上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此玄铁指环。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得玄铁指环。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，玄铁指环助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      玄铁指环在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      玄铁指环经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧玄铁指环，
      它比来的时候重了一点——是沾了故事的重量。

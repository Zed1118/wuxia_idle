id: weapon_xiangyang_chang_jian
name: 长剑
default_lore:
  - text: |
      剑长三尺二寸，比寻常佩剑多出两寸。多这两寸，出手便快一分，收招便远一截。
      江南「洗剑庐」的师傅们最善打这种长剑——他们说剑如字，长一分则舒展一分。
      洗剑庐有个规矩：每把长剑打成后要在庭前的水缸里浸一夜，第二日取出时若剑身上凝了露珠，才算过了关。

continued_lore_obtained:
  - text: |
      于「{source}」初见此长剑。比寻常剑多出两寸,
      出手时手臂要往前再送一分——你忽然知道为什么这种剑配着江南。
  - text: |
      在 {source} 拿到这柄长剑。剑身上还凝着洗剑庐的水气,
      你用拇指抹了一下,水珠走了,光留下来。
  - text: |
      于「{source}」得剑。试招时多出的两寸落在了空处,
      你想:多这一寸,才是江南的气。
  - text: |
      {source}得长剑。鞘是新的,内里却已被剑身磨出一道暗纹——
      是上一个佩剑的人,反复抽出又入鞘留下的。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      收剑时剑身仍温,你想起洗剑庐的规矩——
      过关的剑要在水里浸一夜。
  - text: |
      斩 {boss_name} 于 {stage_name}。剑身上多了一道极浅的痕,
      细看才知道,是 {boss_name} 最后一招擦过的轨迹。
  - text: |
      {stage_name}一战。{boss_name} 倒下前,
      你听见剑身发出一声极轻的鸣——是它,不是你。
  - text: |
      胜 {boss_name} 后回身,剑尖滴着汗,不是血。
      你忽然觉得江南的剑,确实比北地的剑多一份温和。

id: armor_baowu_wu_jin_zhan_jia
name: 乌金战甲
default_lore:
  - text: |
      乌金铸就的全身战甲，百战不坏，传了三代。
      乌金比铁重两倍，但硬三倍。穿上像背着一座小山。
      只有体格最壮的武人才穿得动，穿上后就是移动的堡垒。

  - text: |
      这副战甲上有一百零八道刀痕，每一道都是一场恶战。
      传到第三代的主人手里时他数了一遍说：「还差九十二道就凑个整数。
      希望我不用凑。」

continued_lore_obtained:
  - text: |
      于「{source}」得此乌金战甲。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。乌金战甲上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此乌金战甲。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得乌金战甲。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，乌金战甲助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      乌金战甲在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      乌金战甲经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧乌金战甲，
      它比来的时候重了一点——是沾了故事的重量。

id: weapon_baowu_xue_lian_bian
name: 血莲鞭
default_lore:
  - text: |
      鞭身赤红，红得发暗——不是染的，是苗疆深山里一种血藤，采下来便带这种颜色。
      血藤只长在雪线以上的石缝里，十年才长一尺。这条鞭子用了九尺血藤，
      是一对苗家母女花了三代人的时间攒出来的。

  - text: |
      苗寨有个传说：血藤是山神的筋。砍血藤的人会被山神记恨，但血藤做的鞭子
      却能驱邪——山神的筋太硬，邪物不敢碰。这条鞭子在寨中传了五代，
      每代都由寨中最善舞的女子执掌。逢年过节，鞭子便在篝火前舞起来，
      红色的鞭影映在雪地上，像雪里绽了一朵莲花。

  - text: |
      后来有一个汉人武师进山，想拿重金买这鞭子。寨主对他说：'你可以试试——
      鞭子挂在寨门口，你拿得走就拿走。'武师伸手去取，手还没碰到鞭柄，
      鞭身自己颤了一下。武师吓得缩回手。寨主说：'血藤有记忆——
      它记得三代人握过它的手，不认第四种。'

continued_lore_obtained:
  - text: |
      于「{source}」初得此血莲鞭。鞭身赤红，红得发暗——
      你握上去，鞭身轻颤了一下，像还认得三代之前的手。
  - text: |
      在 {source} 拿到这条血莲鞭。九尺血藤，
      你想起苗家寨子里三代人花了几十年才攒出这一鞭。
  - text: |
      于{source}得鞭。山神的筋认不认第四种手？
      你试着抖了一下——鞭身没拒你，它在试。
  - text: |
      {source}一遭，血莲归你。你忽然知道：
      它认不认你，要看你后面的几鞭。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      鞭身上有几处颜色比之前更深——
      血藤在记你的每一鞭。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收鞭时鞭身颤了一下——它认你了，
      像三代之前的手在替你握。
  - text: |
      胜 {boss_name} 后盘鞭回腰。
      赤红比之前更红了一线——
      山神的筋活在你这一战里。
  - text: |
      {stage_name}一战胜 {boss_name}。
      血藤十年长一尺，这一鞭九尺花了三代人。
      你今天替它打过的人，它记着。

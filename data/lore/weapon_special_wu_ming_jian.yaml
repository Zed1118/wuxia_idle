id: weapon_special_wu_ming_jian
name: 无名剑
default_lore:
  - text: |
      没有名字的剑。铸剑的人说，剑成之日，名字自会来。
      剑身素白，没有花纹，没有铭文，连剑格上都光秃秃的。
      但握在手里的时候，它比任何一把名剑都安静。

  - text: |
      这把剑从来没有被谁取过名字，不是因为没人配，
      是因为每个拿起它的人都觉得——它还在等。
      等什么？没人知道。但等待本身就是它的名字。

continued_lore_obtained:
  - text: |
      于「{source}」得此无名剑。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。无名剑上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此无名剑。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得无名剑。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，无名剑助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      无名剑在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      无名剑经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧无名剑，
      它比来的时候重了一点——是沾了故事的重量。

id: armor_baowu_jin_si_jia
name: 金丝甲
default_lore:
  - text: |
      此甲以极细的金丝与蚕丝混编而成，薄如单衣，却能卸去三成刀剑之力。
      相传此甲乃北宋年间一位宫廷御用匠人所制，专为不会武功的文官上战场督军而造。
      甲重不过三两，叠起来能塞进袖子里。

  - text: |
      后来这件金丝甲被一位巡抚带到雁门关外。巡抚死在任上，
      金丝甲便被他手下一个亲兵留下。亲兵靠着这件甲，从雁门关一路杀回了中原，
      身上中了十三刀，没一刀伤及筋骨。

  - text: |
      亲兵晚年出家为僧，将金丝甲捐给了少林寺。
      少林寺的僧人看了，说：「防身不是杀生，此物与我佛门有缘。」
      但不知为何，这件甲后来从少林寺的藏经阁里消失了。

continued_lore_obtained:
  - text: |
      于「{source}」初得此金丝甲。薄如单衣,
      你穿上时几乎不觉得它在——但你知道它在。
  - text: |
      在 {source} 拿到这件金丝甲。金丝与蚕丝混编,
      你想起那个亲兵从雁门关一路杀回中原。
  - text: |
      于{source}穿上金丝甲。叠起来能塞袖子的甲,
      你抚胸时摸到一处略硬——是十三刀中的某一刀留下的痕。
  - text: |
      {source}一遭,金丝归你身。它从少林寺的藏经阁里消失过,
      今天又出来了——它的命比一座寺庙长。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      胸前金丝有一截被刀划过却没断——
      金丝甲卸去三成,你自己卸了七成。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      脱甲时金丝相磨发出极轻的响,
      像北宋御用工匠在远处看了一眼。
  - text: |
      胜 {boss_name} 后,把甲叠起来。
      薄薄一卷塞进袖子,
      你忽然觉得它比袖子还轻——但又比剑还重。
  - text: |
      {stage_name}一战胜 {boss_name}。
      金丝在你身上未断,
      你不知道它在你身后还要走多远。

id: xuan_tie_zhong_jian
name: 玄铁重剑
default_lore:
  - text: |
      剑身以天降玄铁铸成，色如墨，无锋无刃。寻常剑客一只手举不起来。
      此剑原存襄阳城外一座废旧的守城军器库中，没有任何人知道它是怎么到那的。
      第一个把它扛出去的是一个十六岁的铁匠学徒——他不是要偷，
      是觉得这么好的铁扔在那可惜了，想扛回去打锄头。

  - text: |
      玄铁在炉火里烧了三天三夜，纹丝不动。铁匠铺的师父看了看，
      说这不是铁的事，是人。玄铁不服炉火，只服气——不是蛮力，
      是内力。少年铁匠后来弃了铁锤去学武，学了三年，
      回来还是扛不动。

  - text: |
      关于这柄剑的来历，只有一句古话可供推敲：
      「重剑无锋，大巧不工。」但这句话是哪朝哪代、何人所言，
      所有版本都对不上。或许它本就是某人自己造的典故——到后来，
      典故和真剑融为一体，再也分不清是真是假。

id: weapon_xiangyang_xiu_jian
name: 袖箭
default_lore:
  - text: |
      藏在袖筒里的短箭，弹簧机括一扣就射，三丈内要命。
      正经武人不屑用，但保命的时候不讲正不正经。
      袖箭贵在出其不意，第二支就没第一支好使了。

  - text: |
      有个老捕头退了差，把袖箭传给了徒弟。
      徒弟问他一辈子用了几次，老捕头伸出两根指头：「两次。
      第一次救了我的命，第二次救了别人的命。」

continued_lore_obtained:
  - text: |
      于「{source}」得此袖箭。机括精巧，
      套在手腕上不仔细看根本看不出来。
  - text: |
      在{source}偶然所得。试射一次，
      箭矢入木两寸，三丈外的准头不差。
  - text: |
      自{source}取得。袖箭只有一发的机会，
      所以每一发都得准。
  - text: |
      {source}得箭。藏在袖子里的东西，
      关键时刻比腰间的刀还快。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，袖箭射中{boss_name}。
      {boss_name}没料到暗器来得这么快。
  - text: |
      {stage_name}一战。{boss_name}挡住了刀，
      却没挡住袖口射出的箭。一寸之差。
  - text: |
      击{boss_name}于{stage_name}。
      袖箭只有一次机会，这一次没浪费。
  - text: |
      胜{boss_name}后，从箭筒里取出新箭装上。
      下一次还只有一次机会。

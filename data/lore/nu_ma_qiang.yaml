id: nu_ma_qiang
name: 怒马枪
default_lore:
  - text: |
      此枪原是岳家军一位骑兵都头的兵器。枪头宽厚，枪杆是铁心木，
      马上使出来势不可挡——故曰「怒马」。
      朱仙镇一战，都头持此枪连挑金兵七骑，第八骑没能挑起来——他自己也中了箭。
      枪落在战场上，被一个逃难的老农拾了去。

  - text: |
      老农不知道这柄枪的来历，他只知道枪杆结实，做扁担正好。
      这柄枪在鄂北的山村里做了三十年扁担，挑过稻谷、挑过粪桶、挑过嫁妆。
      三十年后，老农的孙子觉得这根"扁担"不对劲，掂了一下——沉得不像木头。

  - text: |
      后来这柄枪被送到了许昌府衙。府衙里的老刀头只看了一眼就说：
      「岳家军的怒马枪，一共打造了三百柄。现存的不超过三柄。」
      他双手托着枪，半天没说话。

id: armor_xunchang_duan_gua
name: 短褂
default_lore:
  - text: |
      粗麻短褂，袖口收紧方便干活，跑起来不兜风。
      码头扛包的、赶骡子的、跑堂的，都穿这种。
      穿旧了也不扔，补一补还能再穿三年。

  - text: |
      有个镖师说过：「好衣裳怕血，差衣裳不怕。
      穿这种短褂上路，溅了血搓一搓就干净，不心疼。」
      后来这话在镖局里传开了，新人入行头一件事就是换短褂。

continued_lore_obtained:
  - text: |
      于「{source}」得此短褂。麻布粗糙，
      穿上身不好看，但挡得住风。
  - text: |
      在{source}偶然所得。褂子袖口收紧，
      跑起来不碍事，干活的人才知道这有多要紧。
  - text: |
      自{source}取得。穿了别人穿过的褂子，
      肩膀处磨出的亮色告诉你前人扛过不少重物。
  - text: |
      {source}得褂。短褂不好看，
      但挨了刀不心疼，这比好看重要。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，短褂挡住{boss_name}一刀。
      褂子划开一条口子，但人没事。
  - text: |
      {stage_name}一战。{boss_name}的刀砍在褂子上，
      布帛的声音比想象中闷，没破到底。
  - text: |
      胜{boss_name}于{stage_name}。
      低头一看，褂子又多了一个补丁的位置。
  - text: |
      胜{boss_name}后脱下短褂看了看，
      刀口堪堪划到第二层布，没见血。

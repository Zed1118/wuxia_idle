id: weapon_xiangyang_liu_ye_dao
name: 柳叶刀
default_lore:
  - text: |
      刀身窄长如柳叶，适合快刀连劈，讲究的人才用。
      南方刀客好这一口，说柳叶刀走的是巧劲，不是蛮力。
      刀轻手快，三刀里有两刀是虚的，最后一刀才要命。

  - text: |
      扬州有个卖鱼的，刀工是祖传的。
      一条鲤鱼放在案板上，三刀下去鱼骨鱼肉分得干干净净。
      有人问他师父是谁，他说：「杀鱼的不需要师父，需要一把好刀。」
      后来有人看见他拿柳叶刀练刀——不是在杀鱼，是在杀人的路上。

continued_lore_obtained:
  - text: |
      于「{source}」得此柳叶刀。刀身薄而窄，
      迎光一照，刃口像一弯月牙。
  - text: |
      在{source}偶然所得。拿在手里比想象中轻，
      但划过空气时发出的声音告诉你它不是摆设。
  - text: |
      自{source}取得。柳叶刀讲究快，
      快到对手看见刀光时，血已经流了。
  - text: |
      {source}得刀。刀鞘上刻着一枝柳，
      柳条在风里弯但不折。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，柳叶刀三出三收斩{boss_name}。
      最后一刀最轻，伤却最深。
  - text: |
      {stage_name}一战。{boss_name}没看清第几刀是真的，
      等看清的时候，柳叶刀已经收了。
  - text: |
      斩{boss_name}于{stage_name}。
      快刀贵在收，收得住才叫快刀。
  - text: |
      胜{boss_name}后甩刀入鞘，
      刀身上没沾血——不是没砍到，是太快了。

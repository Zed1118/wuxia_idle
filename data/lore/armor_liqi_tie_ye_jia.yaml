id: armor_liqi_tie_ye_jia
name: 铁叶甲
default_lore:
  - text: |
      铁叶层叠如鱼鳞，每片单独铆接，中刀不会整块崩。

continued_lore_obtained:
  - text: |
      于「{source}」得此物。
  - text: |
      在{source}偶然所得，握在手中有些陌生。
  - text: |
      自{source}取得，尚未习惯它的重量。
continued_lore_boss_defeated:
  - text: |
      击败强敌后，此物似乎也沾了几分锐气。
  - text: |
      胜了一场硬仗，低头看它，上面多了一道新痕。
  - text: |
      敌人倒下时，它在手里微微一震。
id: armor_liqi_tie_ye_jia
name: 铁叶甲
default_lore:
  - text: |
      铁叶层叠如鱼鳞，每片单独铆接，中刀不会整块崩。
      铁叶甲比铁片甲讲究，每片铁叶都打成弧形，刀砍上去会滑开。
      穿上后活动不受限，比死铁板灵活得多。

  - text: |
      老甲匠说铁叶甲的秘诀在铆钉：「铆钉松了甲就散了，
      紧了人就动不了。松紧之间差一点点，这一点点就是手艺。」

continued_lore_obtained:
  - text: |
      于「{source}」得此铁叶甲。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。铁叶甲上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此铁叶甲。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得铁叶甲。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，铁叶甲助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      铁叶甲在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      铁叶甲经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧铁叶甲，
      它比来的时候重了一点——是沾了故事的重量。

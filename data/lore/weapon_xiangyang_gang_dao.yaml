id: weapon_xiangyang_gang_dao
name: 钢刀
default_lore:
  - text: |
      刀是熟钢打的，比寻常铁刀重三分，刀背加厚了一线，劈下去带着自身的分量。
      刀柄上缠的是浸过桐油的麻绳，握久了不滑手。南阳府的镖局子里，趟子手们配的多是这种刀——
      不是多金贵的东西，但走完一趟远镖回来，刀上添了几道豁口，豁口里也添了几分底气。

continued_lore_obtained:
  - text: |
      于「{source}」初得此钢刀。比寻常铁刀沉三分,
      握上去带桐油味——这味要走完一趟镖才能淡。
  - text: |
      在 {source} 拿到这柄钢刀。麻绳柄还扎手,
      你知道:握上几个月,绳就会塌下来贴住虎口。
  - text: |
      于{source}得刀。刀背上的锤纹没磨平,
      你试着摸了摸——「南阳府」的趟子手都摸过这样的纹。
  - text: |
      初遇于「{source}」。刀身上有一道极浅的旧痕,
      不是豁口,是磨刀人留下的——他在告诉你这里曾经卷过刃。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      刀上添了一道新豁口,豁口里也添了几分底气。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      桐油麻绳柄上多了几道汗渍,你下意识紧了紧——
      它现在贴你的虎口,贴得比之前更熟。
  - text: |
      胜 {boss_name} 后收刀,听见鞘里「咔」一声——
      刀身比刚拿到时,多了一截分量。
  - text: |
      {stage_name}收刀回鞘。豁口添新,
      你想起南阳府的趟子手们说的话:
      走完一趟远镖回来,刀上的豁口里也添了底气。

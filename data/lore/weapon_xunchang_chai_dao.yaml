id: weapon_xunchang_chai_dao
name: 柴刀
default_lore:
  - text: |
      乡下人劈柴用的刀，刀背厚实，刃口钝了也能砍。
      山里人家户户有一把，不是兵器，是吃饭的家伙。
      但真到了荒郊野外，遇见狼，遇见匪，抡起来也不含糊。

  - text: |
      有个樵夫在终南山砍了三十年柴，刀换了七把，唯独刀柄没换过。
      后来有人问他为什么，他说：「手认得这根柄，换了就砍不准了。」
      下山那天他把刀挂在门框上，再也没取下来。

continued_lore_obtained:
  - text: |
      于「{source}」得此柴刀。刀背上有劈柴留下的缺口，
      握把磨得发亮，是用老了的痕迹。
  - text: |
      在{source}偶然所得。刀口虽钝，
      但掂在手里沉稳，像握着一截实心的铁。
  - text: |
      自{source}取得此刀。刀背厚实，
      比剑笨重，但砍下去的东西不会只断一半。
  - text: |
      {source}得刀。有人说柴刀上不了台面，
      但上不上台面，得看谁在用。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，此刀斩{boss_name}。
      刀口多了一道豁口，但刀背没弯。
  - text: |
      {stage_name}一战。{boss_name}没料到这把钝刀
      砍得下去就收不住，一刀到底。
  - text: |
      斩{boss_name}于{stage_name}。
      柴刀不讲招式，讲的是一刀到底的狠劲。
  - text: |
      胜{boss_name}后，刀口上沾了血。
      你用草擦了擦，像擦完柴灰一样自然。

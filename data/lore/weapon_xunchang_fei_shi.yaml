id: weapon_xunchang_fei_shi
name: 飞石
default_lore:
  - text: |
      河滩上捡的石子，磨圆了揣在怀里，遇事往人身上招呼。
      小时候打鸟用的，后来发现打人也一样准。
      江湖上没人把飞石当正经暗器，但吃过亏的人不这么想。

  - text: |
      镇上有个卖馄饨的老头，年轻时走过镖。
      问他带什么兵器，他从兜里摸出三颗石子，说：「够了。」
      后来有人试过，三丈外打灭一盏油灯，一颗就够。

continued_lore_obtained:
  - text: |
      于「{source}」得此飞石。石子磨得溜圆，
      握在掌心凉沁沁的，正好一把。
  - text: |
      在{source}偶然所得。几颗不起眼的石子，
      揣在怀里不占地方，用起来却比刀剑快。
  - text: |
      自{source}取得。石头本来就是石头，
      但被人磨圆了揣在怀里，就成了暗器。
  - text: |
      {source}得石。掂了掂重量，
      正好能在出手时不偏不倚。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，飞石击中{boss_name}。
      石子嵌在柱子上，入木三分。
  - text: |
      {stage_name}一战。{boss_name}没看见石子从哪来，
      只觉得太阳穴一疼，眼前就黑了。
  - text: |
      击{boss_name}于{stage_name}。
      飞石无声，这是它最厉害的地方。
  - text: |
      胜{boss_name}后，从地上捡回石子。
      还能用，擦干净揣回怀里。

id: accessory_zhongqi_bi_xi_shou_chuan
name: 碧玺手串
default_lore:
  - text: |
      碧玺珠子串成的手串，冬暖夏凉，戴久了通体舒泰。
      碧玺不是普通的石头，采于深山，经年累月吸了地气。
      戴在手上运功时，内力流转似乎快了几分。

  - text: |
      有个老道士戴了一辈子碧玺手串，珠子被磨得温润如脂。
      他说碧玺通灵，戴久了能感应主人的心意：
      「你心不静，珠子就凉。你心定了，珠子就暖。」

continued_lore_obtained:
  - text: |
      于「{source}」得此碧玺手串。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。碧玺手串上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此碧玺手串。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得碧玺手串。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，碧玺手串助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      碧玺手串在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      碧玺手串经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧碧玺手串，
      它比来的时候重了一点——是沾了故事的重量。

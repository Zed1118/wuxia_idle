id: armor_shenwu_bing_can_yi
name: 冰蚕衣
default_lore:
  - text: |
      冰蚕吐丝织成，穿在身上百毒不侵，刀剑难伤。
      冰蚕只活在极北苦寒之地，一生吐丝一次便死。
      织一件冰蚕衣要百只冰蚕的丝，而百只冰蚕可能要找一百年。

  - text: |
      穿过冰蚕衣的人说，穿上它的感觉像被冰水浸泡：
      「不是冷，是清。清到五脏六腑都透亮了。
      百毒不侵不是因为它能挡毒，是因为穿上它的人，毒进不去。」

continued_lore_obtained:
  - text: |
      于「{source}」得此冰蚕衣。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。冰蚕衣上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此冰蚕衣。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得冰蚕衣。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，冰蚕衣助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      冰蚕衣在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      冰蚕衣经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧冰蚕衣，
      它比来的时候重了一点——是沾了故事的重量。

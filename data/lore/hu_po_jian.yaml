id: hu_po_jian
name: 琥珀剑
default_lore:
  - text: |
      剑柄末端嵌了一颗很大的琥珀，琥珀里封着一片不知多少万年前的树叶。
      此剑出自大理国一位剑匠之手，剑作好后，剑匠将它浸在洱海中——
      不是淬火，是"养"。他说剑和人一样，出了炉需要静养。

  - text: |
      此后辗转多人，最后落在一个云南茶商手里。茶商不会武功，
      把剑挂在茶庄的正堂上，说是镇宅。有一年茶庄失火，剑从梁上掉下来，
      毫发无损——但那颗琥珀里凝着的水珠被火烤活了，化成水淌出来，
      顺着剑身滴在地上。围观者都说：这剑哭了。

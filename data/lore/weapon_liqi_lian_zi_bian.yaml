id: weapon_liqi_lian_zi_bian
name: 链子鞭
default_lore:
  - text: |
      一条极细的铁链，每节不过指甲盖大小，首尾各缀一枚菱形的钢镖。
      收在袖子里是一条链，甩出去是一片光。练这种兵器的人手腕要活，
      手指要灵，耳力要好——链子破风的声音便是准头。

  - text: |
      此鞭原属川西「青城派」一位女弟子。她在青城后山的竹林里练了六年链子鞭，
      六年里只练一招——把链子甩出去缠住一根竹子再收回来。六年后，她能在一眨眼间
      缠住七根竹子。后来青城派和山外的马匪打了一仗，她用这链子鞭缴了十三匹马的马蹄。
      马匪退了，链子也断了三节。她把断了的链子埋在竹林里，说：「六年换十三匹马，值。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此链子鞭。指甲盖大小的铁环细密相连,
      收在袖里像一缕安静的光。
  - text: |
      在 {source} 拿到这条链子鞭。首尾两枚菱形钢镖,
      你想起青城派那女弟子在竹林里六年只练一招。
  - text: |
      于{source}得鞭。链子有八十四节,
      细数才发现有三节是后补的——比其他节略短半分。
  - text: |
      {source}一遭,这条鞭落到你手里。你试甩,
      破风声落在耳里——你忽然知道:这声音就是准头。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      收链子时听见两节相碰的响,比之前低半音——
      它沉了一些,沉的是这一战。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      后补的那三节没断。
      你忽然想起女弟子说过的话:六年换十三匹马,值。
  - text: |
      胜 {boss_name} 后盘链子回袖。
      两枚菱形钢镖上有一处沾了血,
      你抹了一下——抹过的位置,光暗了。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你听见某一节铁环响了一声极轻的——
      不是裂,是疲。它也累。

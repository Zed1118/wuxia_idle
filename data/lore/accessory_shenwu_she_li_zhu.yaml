id: accessory_shenwu_she_li_zhu
name: 舍利珠
default_lore:
  - text: |
      高僧圆寂后留下的舍利，戴在身上神清气爽，百邪不侵。
      舍利不是骨头，是修行一辈子凝成的东西。
      有的亮有的暗，亮的是功德，暗的是执念。

  - text: |
      传舍利珠的老僧说了一句话：「不是珠子保佑你，
      是你配不配被它保佑。」
      后来戴上的人说，有时候珠子会变烫，像在提醒你做错了事。

continued_lore_obtained:
  - text: |
      于「{source}」得此舍利珠。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。舍利珠上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此舍利珠。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得舍利珠。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，舍利珠助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      舍利珠在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      舍利珠经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧舍利珠，
      它比来的时候重了一点——是沾了故事的重量。

id: armor_liqi_xuan_tie_jia
name: 玄铁甲
default_lore:
  - text: |
      甲片取自天降玄铁，色黑如墨，入手极沉。寻常铁匠见了玄铁便摇头——
      这东西太硬，捶不动。襄阳城北有一位退役的老军匠，花了整整一年工夫，
      一块一块地把玄铁打薄、打弯、打出弧度，最后串成一副完整的甲。

  - text: |
      这副甲在襄阳城外挡过一次夜袭。那夜月黑风高，穿甲的人站在寨门口，
      身上中了不知多少箭，箭扎在甲片上叮叮当当落了一地，甲没穿。
      事后有人问那老军匠：玄铁甲和寻常铁甲到底差在哪？老军匠说：
      「寻常铁甲挡箭，玄铁甲挡命——命比箭重。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此玄铁甲。色黑如墨，入手极沉，
      你抬手扣甲时听见铁片之间的低响——它认你了一半。
  - text: |
      在 {source} 拿到这副玄铁甲。甲片接缝处的串铆，
      你想起襄阳那老军匠花了一年打薄打弯每一片。
  - text: |
      于{source}穿上玄铁甲。比寻常铁甲沉一倍，
      但你忽然知道沉的不是甲，是它替你挡过的命。
  - text: |
      {source}一遭，玄铁归你身。胸甲上有一处旧凹，
      不是这次磨出来的——是襄阳那场夜袭留下的痕。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      左胸甲上多了一道极浅的擦痕——
      寻常铁甲挡箭，玄铁甲挡命。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      脱甲时铁片相碰发出闷响，
      像有人在襄阳城外说了一句：命比箭重。
  - text: |
      胜 {boss_name} 后，卸下玄铁甲。
      甲片上没有新凹，只有你的指印——
      今天的命，你自己也挡了一半。
  - text: |
      {stage_name}一战胜 {boss_name}。
      玄铁色黑如墨，但贴过你身的那一处略亮——
      它在记你的温度。

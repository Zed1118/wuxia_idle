id: armor_liqi_xuan_tie_jia
name: 玄铁甲
default_lore:
  - text: |
      甲片取自天降玄铁，色黑如墨，入手极沉。寻常铁匠见了玄铁便摇头——
      这东西太硬，捶不动。襄阳城北有一位退役的老军匠，花了整整一年工夫，
      一块一块地把玄铁打薄、打弯、打出弧度，最后串成一副完整的甲。

  - text: |
      这副甲在襄阳城外挡过一次夜袭。那夜月黑风高，穿甲的人站在寨门口，
      身上中了不知多少箭，箭扎在甲片上叮叮当当落了一地，甲没穿。
      事后有人问那老军匠：玄铁甲和寻常铁甲到底差在哪？老军匠说：
      「寻常铁甲挡箭，玄铁甲挡命——命比箭重。」

id: armor_haojiahuo_chou_shan
name: 绸衫
default_lore:
  - text: |
      上好丝绸缝的衫子，轻软贴身，刀剑不容易割破。
      穿丝绸的不一定有钱，但一定讲究。
      讲究的人活得久——因为他们连穿什么都在想怎么挡刀。

  - text: |
      有个裁缝说，丝绸的好处不在于好看，在于韧。
      一层丝不经撕，但十二层丝绞在一起，刀砍上去只进半分。
      「所以有钱人穿丝绸不是摆阔，是怕死。」

continued_lore_obtained:
  - text: |
      于「{source}」得此绸衫。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。绸衫上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此绸衫。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得绸衫。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，绸衫助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      绸衫在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      绸衫经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧绸衫，
      它比来的时候重了一点——是沾了故事的重量。

id: armor_haojiahuo_chou_shan
name: 绸衫
default_lore:
  - text: |
      上好丝绸缝的衫子，轻软贴身，刀剑不容易割破。

continued_lore_obtained:
  - text: |
      于「{source}」得此物。
  - text: |
      在{source}偶然所得，握在手中有些陌生。
  - text: |
      自{source}取得，尚未习惯它的重量。
continued_lore_boss_defeated:
  - text: |
      击败强敌后，此物似乎也沾了几分锐气。
  - text: |
      胜了一场硬仗，低头看它，上面多了一道新痕。
  - text: |
      敌人倒下时，它在手里微微一震。
id: armor_xiangyang_pi_jia
name: 皮甲
default_lore:
  - text: |
      熟牛皮硝制，肩肘处多叠了一层，缝线的针脚密密麻麻，一针一线都是手工。
      走镖的人爱穿皮甲——铁甲太重，布衣太薄，皮甲刚好。
      关中「段家皮坊」出的皮甲最有名，据说每件皮甲做好后都要挂在院子里淋三天雨，淋不软才算真熟透。
      段家老掌柜有句话：「皮甲保的不是命，是让你有命继续挨下一刀。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此皮甲。肩肘处的双层叠得厚，
      穿上时听见缝线绷了一下——它还没认你。
  - text: |
      在 {source} 拿到这件皮甲。皮革味冲鼻，
      段家皮坊的皮甲必须淋过三天雨，你闻到的就是那雨气。
  - text: |
      于{source}穿上皮甲。系带子的时候系得有点紧，
      你松开半寸——它需要呼吸，你也是。
  - text: |
      {source}一遭，这件皮甲算是落到了你身上。
      左肩处缝线有一处更密——上一个穿它的人在那里挨过一刀。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      左肩处的双层挡住了一击，你脱甲时看见皮被划开一道浅沟。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      皮甲多了一道划痕，缝线被扯开一针——
      你想起段家老掌柜的话：让你有命挨下一刀。
  - text: |
      胜 {boss_name} 后下雨。皮甲上有几处先湿——
      都是这一战替你挨过的地方。
  - text: |
      {stage_name}收手，卸下皮甲。
      皮革味淡了一些，你忽然觉得它认你了。

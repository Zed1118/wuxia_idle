id: armor_haojiahuo_suo_zi_jia
name: 锁子甲
default_lore:
  - text: |
      细铁环一环扣一环，穿在里面外头看不出来。
      锁子甲的好处是轻，坏处是闷。
      但跟命比起来，闷一点算什么。

  - text: |
      铸甲的老师傅说，锁子甲最难的不是打铁环，是扣。
      一万两千个铁环，每个都要跟旁边四个扣上。
      漏了一个，那个位置就是一个窟窿，窟窿的位置刚好够一刀。

continued_lore_obtained:
  - text: |
      于「{source}」得此锁子甲。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。锁子甲上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此锁子甲。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得锁子甲。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，锁子甲助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      锁子甲在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      锁子甲经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧锁子甲，
      它比来的时候重了一点——是沾了故事的重量。

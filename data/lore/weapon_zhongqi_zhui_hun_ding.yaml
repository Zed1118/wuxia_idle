id: weapon_zhongqi_zhui_hun_ding
name: 追魂钉
default_lore:
  - text: |
      乌铁铸的短钉，拇指长，使暗劲弹出能入石三分。
      追魂钉讲究的不是准，是穿透力。
      一枚钉子弹出去，穿过三层棉甲还能入肉两寸。

  - text: |
      铸钉的匠人说，追魂钉最难的是淬火：「火候差一点，
      弹出去碎了反而伤自己。火候到了，连石头都穿。」

continued_lore_obtained:
  - text: |
      于「{source}」得此追魂钉。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。追魂钉上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此追魂钉。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得追魂钉。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，追魂钉助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      追魂钉在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      追魂钉经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧追魂钉，
      它比来的时候重了一点——是沾了故事的重量。

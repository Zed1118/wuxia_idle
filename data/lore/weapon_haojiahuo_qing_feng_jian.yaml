id: weapon_haojiahuo_qing_feng_jian
name: 青锋剑
default_lore:
  - text: |
      此剑出自洛阳「春水堂」，是十年前万掌柜亲手所铸。
      剑身青莹，入水不沉，斩铁不卷。
      万掌柜当年放话：此剑当配三流以上的人，方不算糟蹋了它。

  - text: |
      剑柄缠的是雨后采来的青竹皮，握在手里凉而不滑。
      据说万掌柜的小徒弟曾用此剑赢过一场比武——
      挑落了对手帽上的红缨，却没伤分毫。
      此事在洛阳茶馆里传了大半年。

continued_lore_obtained:
  - text: |
      于「{source}」初见此青锋。剑身青莹，
      你提起来时入水未沉的传闻，忽然觉得不夸。
  - text: |
      在 {source} 拿到这柄青锋剑。柄上缠的青竹皮还凉，
      你想起春水堂万掌柜的话：此剑当配三流以上的人。
  - text: |
      于{source}得剑。试招时剑尖应手而起，
      像被春水堂万掌柜在远处看着——他要看你配不配。
  - text: |
      {source}一遭，青锋归你。剑身上有一道反光，
      细看才知道是十年前淬火留下的痕。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      剑尖没沾血，只擦过 {boss_name} 头顶的发梢——
      你想起万掌柜小徒弟挑落红缨的旧事。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      剑身青莹依旧，没卷。
      你忽然觉得万掌柜十年前的话不是夸，是认。
  - text: |
      胜 {boss_name} 后回身。剑身上有一截薄红，
      不擦也不会留下——青锋斩铁不卷，血也沾它不住。
  - text: |
      {stage_name}一战胜 {boss_name}。
      收剑入鞘那一刻，你忽然明白：
      春水堂当年的话不是给剑提价，是给剑提主。

id: weapon_shenwu_hun_yuan_chui
name: 混元锤
default_lore:
  - text: |
      一对铜锤，看着不大，拿起来重逾百斤，非大力者不能用。
      混元锤不讲招式，讲的是力。
      一锤下去，巧也好妙也好，在力面前都是纸糊的。

  - text: |
      传说混元锤是用陨铁铸的，落地时砸出一个三丈深的坑。
      铸锤的匠人把它从坑里挖出来，试了一下——
      抡起来砸在铁砧上，铁砧裂成两半。
      从此以后他再也没有铁砧可用，因为没有铁砧扛得住这对锤。

  - text: |
      锤柄里藏着一截黄杨木，不是为了轻便，是为了认手。
      旧主人每次练锤前都会在木上划一道浅痕，数十年下来，柄内密密麻麻全是细线。
      后人剖开重修时才明白，这对锤最重的地方不在锤头，在那些没人看见的日课。

continued_lore_obtained:
  - text: |
      于「{source}」得此混元锤。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。混元锤上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此混元锤。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得混元锤。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，混元锤助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      混元锤在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      混元锤经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧混元锤，
      它比来的时候重了一点——是沾了故事的重量。

id: accessory_liqi_hu_xin_jing
name: 护心镜
default_lore:
  - text: |
      铜镜大小的铁板，缝在衣服里护住心口。
      不好看，也不值钱，但关键时候能挡住要命的那一下。
      心口是人最软的地方，软的地方就得用硬的东西护。

  - text: |
      有个老镖师的护心镜上有一个深深的剑印。
      他说那是二十年前在潼关挨的一剑：「剑穿了衣裳，
      穿了棉甲，到了护心镜上停住了。差一寸。」

continued_lore_obtained:
  - text: |
      于「{source}」得此护心镜。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。护心镜上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此护心镜。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得护心镜。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，护心镜助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      护心镜在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      护心镜经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧护心镜，
      它比来的时候重了一点——是沾了故事的重量。

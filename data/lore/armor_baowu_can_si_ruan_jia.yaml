id: armor_baowu_can_si_ruan_jia
name: 蚕丝软甲
default_lore:
  - text: |
      天蚕丝编织的软甲，刀劈不断火烧不着，世间罕有。
      天蚕不是普通的蚕，活在万丈悬崖上，一生只吐一次丝。
      一件软甲要七只天蚕的丝，而七只天蚕要找七年。

  - text: |
      穿过蚕丝软甲的人说它像第二层皮肤：
      「你感觉不到它在，但挨了刀才知道——它一直在。」

continued_lore_obtained:
  - text: |
      于「{source}」得此蚕丝软甲。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。蚕丝软甲上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此蚕丝软甲。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得蚕丝软甲。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，蚕丝软甲助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      蚕丝软甲在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      蚕丝软甲经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧蚕丝软甲，
      它比来的时候重了一点——是沾了故事的重量。

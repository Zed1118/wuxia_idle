id: weapon_shenwu_tian_wen_jian
name: 天问剑
default_lore:
  - text: |
      剑身修长，剑锷处刻着两个篆字：'天问'——取自屈原《天问》一篇。
      铸剑的人不是铁匠，是个落第的书生。他读了一辈子屈原，考了一辈子科举，
      人到中年忽然不考了，把自己关在屋里打了三年铁。剑成那日他在剑身上刻了
      十七个问句——每一句都是屈原问过天而天没有答的。

  - text: |
      书生自己不会武功。他把剑挂在自家的中堂上，谁来看了都问：'你打这把剑做什么？'
      书生说：'屈原问天，我替他打一把能问天的剑。'后来有个游方的剑客路过，
      看见这把剑，在剑前站了一个时辰，临走时说：'这把剑不是用铁打的，是用'问'字打的。
      '问'字比铁重。'

  - text: |
      剑客走后第二年书生便过世了。他的妻子把剑送给了那个剑客——她不会武功，
      但她知道剑在墙上挂着会锈。剑客接过剑，问了一句：'他这辈子问了多少问题？'
      书生妻子说：'十七个。全在剑上。'剑客低头看剑，忽然发现剑身上不知何时
      又多了一行字——是书生的笔迹，写的是：'第十八个问题，问剑。'
      但剑上只刻了这一句，没有答案。

continued_lore_obtained:
  - text: |
      于「{source}」初见此天问剑。剑锷上「天问」二字篆刻深沉,
      你忽然觉得这柄剑不在等你用,在等你问。
  - text: |
      在 {source} 拿到这柄天问。剑身上十七个问句的篆痕,
      你逐一数过——每一句都是屈原问天而天没答的。
  - text: |
      于{source}得剑。剑客之妻把剑递给剑客时的那一刻,
      今天落到了你手里——你接得有多稳,问就有多准。
  - text: |
      {source}一遭,天问归你。剑身上有一行新刻——
      「第十八个问题,问剑」。没有答案,只有问。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      剑入鞘的一瞬,你听见剑身上有一字轻动——
      不是新刻,是旧的一字浮出。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      剑身依旧,十七问依旧,
      但你忽然觉得第十八问的答案,藏在这一战里某个瞬间。
  - text: |
      胜 {boss_name} 后摩剑。十七字皆温,
      你想起书生说过:屈原问天而天没答。
      今天有一字,天答了你。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你又问了天一次。
      剑替你问,天替它答——但你听不懂,你只是受。

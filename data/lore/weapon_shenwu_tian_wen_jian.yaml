id: weapon_shenwu_tian_wen_jian
name: 天问剑
default_lore:
  - text: |
      剑身修长，剑锷处刻着两个篆字：'天问'——取自屈原《天问》一篇。
      铸剑的人不是铁匠，是个落第的书生。他读了一辈子屈原，考了一辈子科举，
      人到中年忽然不考了，把自己关在屋里打了三年铁。剑成那日他在剑身上刻了
      十七个问句——每一句都是屈原问过天而天没有答的。

  - text: |
      书生自己不会武功。他把剑挂在自家的中堂上，谁来看了都问：'你打这把剑做什么？'
      书生说：'屈原问天，我替他打一把能问天的剑。'后来有个游方的剑客路过，
      看见这把剑，在剑前站了一个时辰，临走时说：'这把剑不是用铁打的，是用'问'字打的。
      '问'字比铁重。'

  - text: |
      剑客走后第二年书生便过世了。他的妻子把剑送给了那个剑客——她不会武功，
      但她知道剑在墙上挂着会锈。剑客接过剑，问了一句：'他这辈子问了多少问题？'
      书生妻子说：'十七个。全在剑上。'剑客低头看剑，忽然发现剑身上不知何时
      又多了一行字——是书生的笔迹，写的是：'第十八个问题，问剑。'
      但剑上只刻了这一句，没有答案。

id: accessory_xiangyang_cui_yu_zhui
name: 翠玉坠
default_lore:
  - text: |
      翡翠磨成的坠子，戴在胸口凉沁沁的，据说能安神。
      不值大钱，但比铜铃体面。
      有些走江湖的人把它藏在衣领里，别人看不见，自己摸得到。

  - text: |
      翠玉坠是从集市上买的，摊主说是缅甸来的好料子。
      真假不知道，但握在手里凉得舒服。
      夜里睡不着的时候摸一摸，心就静下来了。

continued_lore_obtained:
  - text: |
      于「{source}」得此翠玉坠。玉色微青，
      贴在胸口有一股凉意慢慢渗进来。
  - text: |
      在{source}偶然所得。翠玉坠不大，
      但通透得能看见里面的纹路。
  - text: |
      自{source}取得。戴上后心跳
      似乎慢了半拍，呼吸也平稳了些。
  - text: |
      {source}得坠。玉养人，人养玉，
      戴久了它的颜色会跟着你变。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，翠玉坠在胸口微微发凉。
      好像在提醒你面对{boss_name}时保持冷静。
  - text: |
      {stage_name}一战后，摸了摸翠玉坠。
      胜了{boss_name}，玉还是凉的，你的手却是热的。
  - text: |
      胜{boss_name}于{stage_name}。
      翠玉坠完好无损，它不挡刀，但能安心。
  - text: |
      胜{boss_name}后握了握翠玉坠，
      凉意从掌心一路传到心口。

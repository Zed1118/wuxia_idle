id: armor_shenwu_xuan_huang_pao
name: 玄黄袍
default_lore:
  - text: |
      袍色玄黄——玄是天的颜色，黄是地的颜色。据说此袍是用西域进贡的天蚕丝织成，
      又在中原的染坊里浸了九道天然染料：五道取自黄河泥，四道取自终南山的松烟。
      天地之色集于一身，穿袍的人不怒自威。

  - text: |
      此袍的第一任主人是终南山一位隐士。他在山上住了四十年，从不下山。
      但他每年立秋那天会把袍子挂在崖边最高的松树上——他说是让袍子看看山下的烟火。
      有人问他为什么不自己下山，他说：'人下山就回不来了。袍子下山，回得来。'

  - text: |
      隐士去世后，袍子在松树上挂了三年。风吹日晒，玄色和黄色混在了一起，
      分不清哪里是天、哪里是地。第三个立秋，一个上山采药的少年把袍子取了下来——
      他穿上袍子的那一刻，崖边忽然起了一阵风，把松树上积了三年的松针全吹落了。
      少年不知道这件袍子的来历，但他下山之后再也没有人见过他穿别的衣裳。

id: armor_shenwu_xuan_huang_pao
name: 玄黄袍
default_lore:
  - text: |
      袍色玄黄——玄是天的颜色，黄是地的颜色。据说此袍是用西域进贡的天蚕丝织成，
      又在中原的染坊里浸了九道天然染料：五道取自黄河泥，四道取自终南山的松烟。
      天地之色集于一身，穿袍的人不怒自威。

  - text: |
      此袍的第一任主人是终南山一位隐士。他在山上住了四十年，从不下山。
      但他每年立秋那天会把袍子挂在崖边最高的松树上——他说是让袍子看看山下的烟火。
      有人问他为什么不自己下山，他说：'人下山就回不来了。袍子下山，回得来。'

  - text: |
      隐士去世后，袍子在松树上挂了三年。风吹日晒，玄色和黄色混在了一起，
      分不清哪里是天、哪里是地。第三个立秋，一个上山采药的少年把袍子取了下来——
      他穿上袍子的那一刻，崖边忽然起了一阵风，把松树上积了三年的松针全吹落了。
      少年不知道这件袍子的来历，但他下山之后再也没有人见过他穿别的衣裳。

continued_lore_obtained:
  - text: |
      于「{source}」初得此玄黄袍。玄黄相融,
      你穿上时分不清哪里是天,哪里是地。
  - text: |
      在 {source} 拿到这件玄黄袍。终南山隐士四十年不下山,
      你想:他的袍子今天比他自己走得远了。
  - text: |
      于{source}穿上玄黄。袍上有几处旧痕,
      是松针落了三年又被风吹去留下的——它知道时间。
  - text: |
      {source}一遭,玄黄归你身。你忽然觉得自己穿的不是袍子,
      是一片秋天的山。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      袍上没有新痕——
      玄之色挡住了一截天,黄之色挡住了一截地。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      脱袍时玄黄之间起了一阵极轻的风,
      像隐士那个立秋的崖边。
  - text: |
      胜 {boss_name} 后,把袍叠起来。
      你忽然想起隐士的话:袍子下山,回得来。
      今天它替你下山回来了一次。
  - text: |
      {stage_name}一战胜 {boss_name}。
      玄黄之色又混了一线,
      你不能下山就回不来,但袍子可以。

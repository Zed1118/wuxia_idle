id: weapon_liqi_pan_long_dao
name: 盘龙刀
default_lore:
  - text: |
      刀身宽厚，刀背上盘着一条锻打出来的龙纹——不是铸的，是一锤一锤敲出来的。
      打这柄刀的师傅在终南山下开了四十年铁铺，从不给人打兵器，只打农具。
      这柄刀是他破例打的唯一一件——来求刀的是个三十来岁的汉子，在他门下跪了三天。

  - text: |
      刀成之后，师傅在刀柄末端刻了两个字：'不折'。那汉子拿了刀走了，再也没有回来过。
      十年后有人在潼关外的一家当铺里见过这柄刀——当票上写着：
      「刀主阵亡于阵前，刀归当铺。无人赎。」当铺老板说，这刀在架子上躺了五年，
      来看的人不少，试了试分量又都放了回去。太重，寻常人使不动。

continued_lore_obtained:
  - text: |
      于「{source}」初得此盘龙刀。刀背上的龙纹一锤一锤敲出来的,
      你摸着突起,知道终南山那师傅用了多少夜不睡。
  - text: |
      在 {source} 拿到这柄盘龙刀。刀柄末端刻着两个字——「不折」,
      你想起第一任主人跪了三天求来的,后来阵亡在阵前。
  - text: |
      于{source}得刀。刀身重得超出寻常,
      你试着握上去——手腕一沉。寻常人使不动,这话不假。
  - text: |
      {source}一遭,盘龙归你。你想起当铺老板说的:
      架上躺了五年,试分量的人都放了回去。
      今天它没被你放回去。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      刀身没崩,「不折」二字没磨——
      它替第一任主人续了这一仗。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      刀刃添了一道豁口,豁口里能看见盘龙纹的一截——
      龙纹之下,刀骨更黑了一线。
  - text: |
      胜 {boss_name} 后,把刀靠在墙上歇着。
      刀身仍重,但你不再觉得它沉——
      你忽然明白寻常人使不动的「重」是什么意思。
  - text: |
      {stage_name}一战胜 {boss_name}。
      终南山那铁铺至今未关。
      你想:它如果听说过这一战,会再开一炉。

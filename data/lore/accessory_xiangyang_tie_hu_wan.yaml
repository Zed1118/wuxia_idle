id: accessory_xiangyang_tie_hu_wan
name: 铁护腕
default_lore:
  - text: |
      铁皮弯成的护腕，挡刀用的，上面有旧伤痕。
      不是什么精良的物件，但在紧要关头抬手一挡，能保一条胳膊。
      练硬功的人都戴这种，戴久了手腕上会磨出一圈老茧。

  - text: |
      护腕上有三道深深的刀痕，每一道都差点把铁皮劈穿。
      前一个主人把它卖了换酒钱，说：「三条命换三碗酒，值了。」

continued_lore_obtained:
  - text: |
      于「{source}」得此铁护腕。铁皮冰凉，
      套在手腕上沉甸甸的，但安心。
  - text: |
      在{source}偶然所得。护腕上有旧刀痕，
      每一道都是前人拿命挡出来的。
  - text: |
      自{source}取得。戴上后试着挡了一下，
      叮的一声响，手腕没疼。
  - text: |
      {source}得护腕。铁护腕不好看，
      但刀砍到手腕上的时候你会感谢它。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，铁护腕挡住{boss_name}一刀。
      护腕上又多了一道刀痕。
  - text: |
      {stage_name}一战。{boss_name}的刀砍在护腕上，
      崩出一串火星，手腕发麻但没断。
  - text: |
      胜{boss_name}于{stage_name}。
      铁护腕上的刀痕又深了一道。
  - text: |
      胜{boss_name}后看了看护腕，
      铁皮被砍出一个浅坑，但没穿。

id: weapon_xunchang_tie_jian
name: 铁剑
default_lore:
  - text: |
      寻常铁铺里打出来的剑，铁是生铁，淬过一遍水，剑脊上留着锤印没磨平。
      这种剑在江湖上不值一提，但走镖的、看家护院的、刚拜师的少年，腰间挂的多半是它。
      洛阳城外有一家「老周记」铁铺，三代人只打这种剑，招牌上写着六个字：「够用，不贵，不折。」

  - text: |
      有一年腊月尾，一个少年在铺子外站了大半个时辰，雪落了一肩也不拍。
      周家老三把刚淬完的剑递出去——剑身还是烫的，少年的手掌被烙出一道红印。
      他没换手，也没吭声。周老三看了他一眼，说：「这把剑不折，你也不折。」
      少年走后街坊问那是谁，周老三说：「走镖的，刚死了师父。往后他自己就是师父了。」

continued_lore_obtained:
  - text: |
      于「{source}」初见此铁剑。剑身粗糙，刃口未开，
      握在掌中沉甸，像一截还未开声的钝铁。
  - text: |
      初遇于{source}。是把寻常的铁剑，
      但用过的人都知道——寻常之物，反而经得住磨。
  - text: |
      于{source}得此剑。剑鞘上还留着前人的指印，
      指印的位置告诉你他握剑的姿势，与你不同。
  - text: |
      {source}得剑。剑脊上的锤印没磨平，
      你摸了一下，像摸到一处没合上的伤口。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，此剑斩 {boss_name}。
      剑身上多了一道豁口，豁口的形状像 {boss_name} 最后一招的轨迹。
  - text: |
      {stage_name}一战。此剑虽寻常，
      但你将 {boss_name} 的来路看清了，剑就稳得住。这一次它没有崩。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      你不知道此剑还能撑几战，但至少这一战，它没有让你失望。
  - text: |
      胜 {boss_name} 后回身，剑还在手里。
      你想起老周记招牌上的六个字：够用，不贵，不折。

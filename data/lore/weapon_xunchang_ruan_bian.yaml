id: weapon_xunchang_ruan_bian
name: 软鞭
default_lore:
  - text: |
      鞭身是熟牛皮绞成的，三股并一股，握在手里软塌塌的，一抖出去却能抽断拇指粗的树枝。
      使软鞭的人多是女子——不是女子力气小，是软鞭不走刚猛路子，走的是巧劲。
      洞庭湖边有个渔家女，用一条软鞭在船板上抽蝇子，一鞭一只，从不落空。

  - text: |
      渔家女有个弟弟，五岁。她教他使鞭，把鞭身缩到最短，用草绳缠了鞭梢——
      怕抽到自己。弟弟甩了一下午，一鞭都没甩出去，急得哭。
      她把弟弟的手握在自己手里，说：「鞭不是甩的，是送的。你把手送出去，
      鞭自己会跟上。」弟弟似懂非懂，但第二天一早，船板上的蝇子少了大半。

continued_lore_obtained:
  - text: |
      于「{source}」初得此鞭，鞭身是新熟的牛皮，
      握上去软软塌塌，一抖才知道软不是没力。
  - text: |
      于 {source} 拿到这条软鞭。鞭梢还白，没沾过尘。
      你试了一下，手腕没甩对，鞭抽到了自己脚背。
  - text: |
      此鞭于「{source}」交到你手里。皮绳上还有上一个人的指印，
      指印有点斜——是把手送出去时本能往回收的痕迹。
  - text: |
      初遇于{source}。鞭身比想象中沉，
      但只沉在握手那一截，越往鞭梢越轻。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      鞭身上多了一道勒痕，是皮绳被自己绞出的浅纹。
  - text: |
      {stage_name}收鞭时，听见鞭梢响了一声——
      不是甩响，是它自己在挣。{boss_name} 已经倒了，鞭还在记。
  - text: |
      胜 {boss_name} 之后，把鞭盘起来。
      比之前难盘了一些，但只难一点。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      鞭身白了三个月，这一战之后，白色淡了一截。

id: ma_an_xue
name: 马鞍靴
default_lore:
  - text: |
      靴底是三层熟牛皮缝的，靴筒高及膝弯，铁扣束口。这种靴子原是塞外骑兵
      所用——马上夹马腹时靴底抓镫、下马走路时靴底的牛皮垫防碎石伤脚。
      后来被许昌镖局的趟子手们拿来改造成了步战靴：在青石板上飞奔不滑，
      在泥地里站桩不陷。

  - text: |
      许昌一位老镖师穿了这双靴子走了四十年的镖——从嵩山到潼关、从洛阳到
      荆州、从大别山到桐柏山。靴底早磨出了大洞，他用野猪皮补上继续走。
      后来他走不动了，靴子挂在了镖局的祖师爷画像下头。有人问他怎么不埋了，
      他说：「靴子不是死的。它在等有人再走四十年的路。」

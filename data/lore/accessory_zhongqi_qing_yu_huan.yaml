id: accessory_zhongqi_qing_yu_huan
name: 青玉环
default_lore:
  - text: |
      一只青玉琢磨的圆环，外圈光润，内圈刻着一圈肉眼几乎看不见的细纹——
      不是装饰，是一整篇《清静经》。刻字的工匠用的是绣花针，花了三年工夫，
      刻到最后一字时眼睛便瞎了。他说：「值。眼瞎了，心里的字更清楚了。」

  - text: |
      环在道士圈里流传了很久。据说戴在腕上能让人心静——不是玉有什么奇效，
      是那圈细纹贴着皮肤，微微发涩，时刻提醒佩戴者：浮躁之人不配读《清静经》。
      青城山有一位老道长戴了二十年，腕上勒出了一圈淡淡的印子。

  - text: |
      老道长临终时把环摘下来递给守在他身边的小道童，说：「这环上刻了一整篇经，
      但我戴了二十年，真正读到心里的只有四个字——『清静无为』。其余的字，
      是让你用一辈子去摸的。」小道童接过环，玉还是温的。

continued_lore_obtained:
  - text: |
      于「{source}」初得此青玉环。外圈光润，内圈细纹密密麻麻——
      你不会读，但你知道内里刻着的是经文。
  - text: |
      在 {source} 拿到这只青玉环。戴在腕上微微发涩，
      你想起工匠那句：眼瞎了，心里的字更清楚了。
  - text: |
      于{source}得环。环口有一处略宽——
      是青城山老道长戴了二十年勒出来的痕。
  - text: |
      {source}一遭，青玉归你腕上。
      你忽然知道老道长说的：其余的字，用一辈子去摸。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      收手时青玉环擦过手腕——内圈的细纹，
      你忽然觉得有一字浮出来，你不会读。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      战毕你立着不动，听见自己呼吸渐平——
      那是「清静无为」的「静」字到了腕上。
  - text: |
      胜 {boss_name} 后摘玉对光看。
      内圈的字依旧密密麻麻，
      但你今天看清了多了一个字——你不会念，但你认。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你忽然想，老道长戴了二十年只读到四个字——
      你今天只读到一个，慢慢来。

id: weapon_haojiahuo_mei_hua_biao
name: 梅花镖
default_lore:
  - text: |
      五瓣梅花形的飞镖，出手带旋，扎进肉里不好拔。
      梅花镖是暗器里的雅物，用的人讲究手腕上那一转。
      一转是梅开五瓣，不转只是一块铁片。

  - text: |
      京城有个铸镖的匠人，一辈子只铸梅花镖。
      说别的形状不好看。别人问好不好用才是正经，
      他摇头说：「好看的东西扎进去，对手死了也体面些。」

continued_lore_obtained:
  - text: |
      于「{source}」得此梅花镖。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。梅花镖上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此梅花镖。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得梅花镖。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，梅花镖助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      梅花镖在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      梅花镖经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧梅花镖，
      它比来的时候重了一点——是沾了故事的重量。

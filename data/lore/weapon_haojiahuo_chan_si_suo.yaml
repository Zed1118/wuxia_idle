id: weapon_haojiahuo_chan_si_suo
name: 缠丝索
default_lore:
  - text: |
      索身以蚕丝与细钢丝混编，柔可绕指，韧能承千斤。原是蜀中「天机阁」的工匠
      用来吊装重型机关零件的绳索，后来被一个阁中弟子改成了兵器——
      在两端各缀一枚铜扣，甩出去能缠对方的兵刃，也能缠人的关节。

  - text: |
      天机阁的机关术冠绝蜀中，但这弟子却对师父说：「机关做得再好也是死的，
      人是活的。」他把绳索改成的兵器命名为「缠丝」——缠的不是死物，是活人的招式。
      师父没骂他，只回了一句：「既知人是活的，就别把活人缠死了。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此缠丝索。索身在掌心轻得不像兵器,
      你试着甩了一下,铜扣绕回手腕——它在试你。
  - text: |
      在 {source} 拿到这条缠丝索。蚕丝与钢丝混编的纹理,
      你想起天机阁那弟子的话:缠的不是死物,是活人的招式。
  - text: |
      于{source}得索。两端的铜扣还亮,
      还没被人用招式磨花过——这状态不会久。
  - text: |
      {source}一遭,这条索落到你手里。
      你忽然明白为什么天机阁的师父让弟子别把活人缠死。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      收索时铜扣在掌心转了半圈,你松了手——
      它自己回得来。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      索身上沾了一线汗,蚕丝那一股先暗下去,钢丝那一股反而更亮了。
  - text: |
      胜 {boss_name} 后盘索回腰。
      一个铜扣有了划痕,另一个还亮——
      你想:活人的招式,留下来的痕也不对称。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你做到了天机阁师父叮嘱过的——没把活人缠死。

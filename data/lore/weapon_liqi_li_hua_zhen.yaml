id: weapon_liqi_li_hua_zhen
name: 梨花针
default_lore:
  - text: |
      银针细如牛毛，一筒三十六枚，暗器中的上品。
      梨花针贵在密——不是一根根射的，是一筒全出。
      三丈内三十六枚银针同时到，挡得住一根挡不住三十六根。

  - text: |
      铸针的工匠说，每根针都要一样长、一样重、一样直。
      差一厘，射出去的扇面就偏了，有的地方密有的地方疏。
      疏的那个地方，就是对手活下来的缝隙。

continued_lore_obtained:
  - text: |
      于「{source}」得此梨花针。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。梨花针上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此梨花针。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得梨花针。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，梨花针助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      梨花针在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      梨花针经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧梨花针，
      它比来的时候重了一点——是沾了故事的重量。

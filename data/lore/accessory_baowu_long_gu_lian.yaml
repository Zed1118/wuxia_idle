id: accessory_baowu_long_gu_lian
name: 龙骨链
default_lore:
  - text: |
      不知什么骨头磨成的珠子，戴上后内力运转快了三分。
      有人说是龙骨，有人说是古兽的骨头，没人说得清。
      但戴上后运功时丹田处隐隐发热，这不是心理作用。

  - text: |
      卖龙骨链的老人说这是从深海捞上来的：「海底有种东西，
      骨头比铁硬，比玉润。磨成珠子戴在身上，能引天地灵气。」
      信不信由你，但戴上后的确不一样。

  - text: |
      链上共有十九颗骨珠，每一颗的纹路都不相同。
      老船工辨过其中三颗，说那不是鱼骨，也不是鲸骨，倒像常年压在暗流里的旧物。
      最后一颗珠子上有刀刻的小字，只剩「归潮」二字，像是某个海边帮会的暗号。

continued_lore_obtained:
  - text: |
      于「{source}」得此龙骨链。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。龙骨链上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此龙骨链。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得龙骨链。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，龙骨链助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      龙骨链在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      龙骨链经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧龙骨链，
      它比来的时候重了一点——是沾了故事的重量。

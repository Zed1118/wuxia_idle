id: armor_xunchang_bu_yi
name: 粗布衣
default_lore:
  - text: |
      粗麻织的短褂，染了靛青色，洗过三水便发白。领口和袖口磨得起毛边，但胜在厚实耐磨。
      练武场上十个弟子有八个穿这种衣裳——挨得起摔，经得起汗，破了也不心疼。
      师父常说：「衣裳破了可以补，功夫破了补不回来。」

  - text: |
      有个弟子衣角破了三个月也没补——不是懒，是觉得补了还会破。
      有一天师父把他叫到跟前，什么也没说，拿针线把衣角缝了。针脚很粗，
      像是第一次拿针。师父缝完说：「我也曾是弟子。我师父也给我补过。」
      那弟子后来每天练完功都把衣裳挂起来，不是看破没破，是看针脚还在不在。

continued_lore_obtained:
  - text: |
      于「{source}」得这件粗布衣。麻线粗，贴着皮肤有点扎，
      但你忽然想起师父说的：挨得起摔，经得起汗。
  - text: |
      初遇于{source}。靛蓝染得不匀，袖口有一处颜色淡了——
      像之前的人在那里出过很多汗。
  - text: |
      于{source}穿上此衣。领口磨得起毛边，
      你下意识用手压了压——压不平，但平不平不重要。
  - text: |
      {source}穿上它。布料没贴身，松松垮垮，
      但你跑了一段路，衣裳没掉。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      衣角添了一道新的破口，你看了一眼，没补。
  - text: |
      {stage_name}收手时，发现衣袖上汗渍洗不掉了——
      像 {boss_name} 的力气留下来的。
  - text: |
      胜 {boss_name} 后回到客栈。脱下衣服挂起来，
      你没看破在哪里，只看了一眼针脚还在不在。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      衣角被扯了一线，但只扯了一线。
      你想起师父说过：衣裳破了可以补。

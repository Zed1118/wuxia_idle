id: armor_xunchang_bu_yi
name: 粗布衣
default_lore:
  - text: |
      粗麻织的短褂，染了靛青色，洗过三水便发白。领口和袖口磨得起毛边，但胜在厚实耐磨。
      练武场上十个弟子有八个穿这种衣裳——挨得起摔，经得起汗，破了也不心疼。
      师父常说：「衣裳破了可以补，功夫破了补不回来。」

  - text: |
      有个弟子衣角破了三个月也没补——不是懒，是觉得补了还会破。
      有一天师父把他叫到跟前，什么也没说，拿针线把衣角缝了。针脚很粗，
      像是第一次拿针。师父缝完说：「我也曾是弟子。我师父也给我补过。」
      那弟子后来每天练完功都把衣裳挂起来，不是看破没破，是看针脚还在不在。

id: accessory_baowu_yu_long_pei
name: 玉龙佩
default_lore:
  - text: |
      一块羊脂白玉，通体莹润，对着日光能看见玉里有一条天然的石纹——
      弯弯曲曲，状如游龙。这块玉出自昆仑山下的河床，采玉人在河边筛了
      整整两个月，才从满河的石头里挑出这一块。他说：'龙在玉里困着，不取出来可惜。'

  - text: |
      玉佩后来被一位走西域的商队头领所得。他在沙漠里遇到过沙盗、遇到过断水、
      遇到过迷路，每次都在绝境里摸一摸腰间的玉龙。他说玉里的那条龙是活的——
      每渡过一劫，龙纹就多弯一道。别人笑他痴，他不在意。

  - text: |
      商队头领老后把玉龙佩传给儿子。儿子接过来看了看，问：「龙纹怎么弯了这么多？」
      头领说：'因为你爹这一辈子拐了很多弯。人拐弯，龙也跟着拐。'
      儿子又问：'那我这一辈子呢？'头领说：'你拐你的弯，龙拐龙的弯——
      龙随人走，人随命走。'

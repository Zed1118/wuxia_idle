id: accessory_baowu_yu_long_pei
name: 玉龙佩
default_lore:
  - text: |
      一块羊脂白玉，通体莹润，对着日光能看见玉里有一条天然的石纹——
      弯弯曲曲，状如游龙。这块玉出自昆仑山下的河床，采玉人在河边筛了
      整整两个月，才从满河的石头里挑出这一块。他说：'龙在玉里困着，不取出来可惜。'

  - text: |
      玉佩后来被一位走西域的商队头领所得。他在沙漠里遇到过沙盗、遇到过断水、
      遇到过迷路，每次都在绝境里摸一摸腰间的玉龙。他说玉里的那条龙是活的——
      每渡过一劫，龙纹就多弯一道。别人笑他痴，他不在意。

  - text: |
      商队头领老后把玉龙佩传给儿子。儿子接过来看了看，问：「龙纹怎么弯了这么多？」
      头领说：'因为你爹这一辈子拐了很多弯。人拐弯，龙也跟着拐。'
      儿子又问：'那我这一辈子呢？'头领说：'你拐你的弯，龙拐龙的弯——
      龙随人走，人随命走。'

continued_lore_obtained:
  - text: |
      于「{source}」初得此玉龙佩。羊脂白玉，
      对着光看，里面那条天然石纹的龙——比想象中长。
  - text: |
      在 {source} 拿到这块玉龙佩。绳是新的，玉是几百年前的，
      你想起昆仑山下那采玉人筛了两个月才挑到它。
  - text: |
      于{source}得玉。玉里的龙纹弯了几道，
      你忽然知道：这玉之前的主人都拐过弯。
  - text: |
      {source}一遭，玉龙归你。你忽然觉得腰间多了一截光，
      不是玉的光，是龙的光。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      玉佩在腰间撞了一下，你低头——
      龙纹好像又多弯了一道。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收手时玉佩贴在腰上凉了一阵——
      龙随人走，你今天拐了一个弯，它也跟着拐。
  - text: |
      胜 {boss_name} 后摘玉对光看。
      龙纹清晰如旧，但你忽然觉得它笑了一下——
      你不会信，但你认。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你今天又拐了一个弯，
      玉里的龙也跟着拐了一道——它会记。

id: pan_long_zhang
name: 盘龙杖
default_lore:
  - text: |
      杖身是一根老枣木，天然拧着三道弯，形如盘龙。
      原是终南山脚下一座小道观门前的老枣树，树长了一百二十年，
      被一道雷劈断后，守观的道士将树干取下来，削成一根杖。
      道士不会武功，只用来走路。后来这道士在潼关城外遇到三个劫道的，
      一杖一个，把人打进了水沟里。

  - text: |
      杖身有一处被劈开的裂纹，里面嵌了一枚铜钱。
      不知是风雨刮进去的，还是有人故意放进去的。
      铜钱上那枚年号，现在已经没有年号可查了。

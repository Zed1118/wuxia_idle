id: armor_xiangyang_tie_pian_jia
name: 铁片甲
default_lore:
  - text: |
      铁匠拿铁片一片片铆在皮衣上，笨重但实在。
      穿上走路叮当响，藏不住。
      但挨了刀就知道——响不响不重要，挡不挡得住才重要。

  - text: |
      老铁匠一辈子打了上千副铁片甲，每副都不一样。
      因为每个人的身量不同，铁片要贴着人的骨头铆。
      他说：「甲是第二层皮，不贴着骨头就白穿了。」

continued_lore_obtained:
  - text: |
      于「{source}」得此铁片甲。铁片铆得密密麻麻，
      穿上走路有轻微的金属碰撞声。
  - text: |
      在{source}偶然所得。甲虽重，
      但敲了敲胸口那块铁片，声音很实。
  - text: |
      自{source}取得。铁片甲上有修补的痕迹，
      说明前一个主人挨过不止一刀。
  - text: |
      {source}得甲。穿上闷热，但安心。
      有时候安心比凉快重要。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，铁片甲挡住{boss_name}重击。
      铁片上多了一个深深的凹痕。
  - text: |
      {stage_name}一战。{boss_name}一刀砍在甲上，
      火星四溅，但刀没进去。
  - text: |
      胜{boss_name}于{stage_name}。
      铁片甲叮当作响，像在替你庆祝。
  - text: |
      胜{boss_name}后脱下甲，
      里面的衬衣湿透了，但皮肤完好。

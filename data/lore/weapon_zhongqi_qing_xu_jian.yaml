id: weapon_zhongqi_qing_xu_jian
name: 青虚剑
default_lore:
  - text: |
      剑身极薄，薄到对着光看能透出淡淡的青影——铸剑的师傅说这叫「透骨青」，
      是铁打到了极致才有的颜色。剑重不过一斤三两，挥起来几乎没有风声，
      对手听不见、看不清，只觉得脖子上忽然一凉。

  - text: |
      铸剑之人是峨眉山下一个无名铁匠，年轻时曾入过道观修道，后来还俗打铁。
      他把道家的「虚」字用在了铸剑上——剑不是越厚越好，是越轻越好；
      人不是越用力越好，是越不用力越好。此剑便是他这一生「虚」字功夫的顶点。

  - text: |
      剑成之后他在剑身上刻了一行字：「虚则实之，实则虚之。」后来他收了一个徒弟，
      徒弟问这八个字是什么意思。铁匠把剑递给他，说：「你握在手里走三十里山路，
      走到手不酸了、心不躁了，你就知道了。」徒弟走了三十里，回来只说了一个字：「轻。」
      铁匠点头：「对了。轻到极致，才是重。」

continued_lore_obtained:
  - text: |
      于「{source}」初见此青虚剑。一斤三两，挥起几乎无声——
      你试着对光看，能透出淡淡的青影。
  - text: |
      在 {source} 拿到这柄青虚剑。剑身上「虚则实之」四字，
      你想起峨眉那铁匠的话：轻到极致，才是重。
  - text: |
      于{source}得剑。手腕一抖，剑尖没听见落点——
      它落了，只是没让你听见。
  - text: |
      {source}一遭，青虚归你。鞘是新的，
      但剑入鞘时只有一声极轻的吸气——它认了。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      剑身上没新痕——
      太薄的剑，留不住痕，但带得走命。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      {boss_name} 倒下时，你没听见剑响。
      剑只在你的指尖颤了一颤。
  - text: |
      胜 {boss_name} 后收剑。轻得几乎不在手里，
      你忽然觉得「实则虚之」的那个「虚」字，
      不是空，是不留。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你走三十里没酸过手——
      铁匠那徒弟当年说的「轻」，你今天才懂。

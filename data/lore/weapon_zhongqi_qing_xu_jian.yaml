id: weapon_zhongqi_qing_xu_jian
name: 青虚剑
default_lore:
  - text: |
      剑身极薄，薄到对着光看能透出淡淡的青影——铸剑的师傅说这叫'透骨青'，
      是铁打到了极致才有的颜色。剑重不过一斤三两，挥起来几乎没有风声，
      对手听不见、看不清，只觉得脖子上忽然一凉。

  - text: |
      铸剑之人是峨眉山下一个无名铁匠，年轻时曾入过道观修道，后来还俗打铁。
      他把道家的'虚'字用在了铸剑上——剑不是越厚越好，是越轻越好；
      人不是越用力越好，是越不用力越好。此剑便是他这一生'虚'字功夫的顶点。

  - text: |
      剑成之后他在剑身上刻了一行字：'虚则实之，实则虚之。'后来他收了一个徒弟，
      徒弟问这八个字是什么意思。铁匠把剑递给他，说：'你握在手里走三十里山路，
      走到手不酸了、心不躁了，你就知道了。'徒弟走了三十里，回来只说了一个字：'轻。'
      铁匠点头：'对了。轻到极致，才是重。'

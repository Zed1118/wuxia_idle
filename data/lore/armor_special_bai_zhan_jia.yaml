id: armor_special_bai_zhan_jia
name: 百战甲
default_lore:
  - text: |
      经历百战的甲胄，每一道伤痕都是一次九死一生。
      百战甲不是一开始就叫百战甲的。
      它原来有个别的名字，但打了太多仗，旧名字不够用了。

  - text: |
      甲上有一百道刀痕，像一百条河流汇在一起。
      穿过它的将军说：「每一道痕都是我活下来的证据。
      不是甲救了我，是我跟甲一起活了下来。」

continued_lore_obtained:
  - text: |
      于「{source}」得此百战甲。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。百战甲上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此百战甲。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得百战甲。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，百战甲助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      百战甲在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      百战甲经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧百战甲，
      它比来的时候重了一点——是沾了故事的重量。

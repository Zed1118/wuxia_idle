id: accessory_haojiahuo_she_dan_wan
name: 蛇胆丸
default_lore:
  - text: |
      毒蛇胆晒干碾粉做的丸子，吞一粒精神百倍。
      味道苦得能让人掉泪，但吞下去后四肢百骸都热起来。
      走夜路的人揣几粒在身上，困了嚼一粒比打自己管用。

  - text: |
      药铺的掌柜说，蛇胆丸不能多吃，一天一粒顶了天。
      吃多了虎虎生风停不下来，心跳快得能从胸口蹦出来。
      「但跟命比起来，心跳快一点算什么？」

continued_lore_obtained:
  - text: |
      于「{source}」得此蛇胆丸。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。蛇胆丸上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此蛇胆丸。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得蛇胆丸。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，蛇胆丸助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      蛇胆丸在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      蛇胆丸经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧蛇胆丸，
      它比来的时候重了一点——是沾了故事的重量。

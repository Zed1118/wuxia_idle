id: ri_yue_shuang_ren
name: 日月双刃
default_lore:
  - text: |
      两柄短刃，一柄刃白如昼，一柄刃黑如夜。双刃同出时刀光交错，
      攻者眼花缭乱，守者无从判断哪一刀是实哪一刀是虚。
      相传这对兵刃出自西域，是一位拜火教的长老在火焰山边所铸。
      白刃迎着朝阳淬火，黑刃在月食之夜淬火——间隔了整整六个月。

  - text: |
      日月双刃传入中原后，经手四人。这四人的结局有三种说法，
      每一种都相互矛盾。唯一可以肯定的是，每一个经手它的人都
      不后悔。这在一个"随身兵器多半送命"的世界里，已经足够稀罕。

  - text: |
      江湖中公认的神物兵器不超过三件，日月双刃是其中之一。
      但比起它怎么来的，更耐人寻味的是——
      每一任主人在将双刃交出之前，都说了同一句话。四个不同的人，
      在不同的年代、不同的地方，说了一模一样的话。那句话是什么，
      没有人传下来。

id: accessory_shenwu_kun_lun_pei
name: 昆仑佩
default_lore:
  - text: |
      一块墨玉，产自昆仑山深处海拔五千尺以上的玉矿。玉色如最深沉的夜，
      但对着日光转一个角度，能看见玉里隐隐透出一座山的轮廓——当地人说是昆仑山
      的影子封在了玉里。采玉人说，这块玉是他祖父的祖父从山上背下来的，
      背了一辈子，只背下来这一块。

  - text: |
      这块玉在昆仑山下的一个村子里传了五代。每一代传到下一代的仪式都一样——
      上一代人把玉放在月光下照一整夜，第二天交给下一代人。
      不是白天交，是日出那一瞬：因为日出时昆仑山的影子最清楚，
      那时玉里的山影也最清楚。传玉的人说：'玉里的山影淡了，说明昆仑山不认你了。'

  - text: |
      传到第五代是个女孩。她接过玉佩时问了一句所有前人没问过的话：
      '昆仑山为什么要住在玉里？'她爷爷愣了一下，想了一夜，第二天说：
      '可能是山太大了，大地装不下——所以分了一小块住进玉里，
      让人带着走。人走到哪，山便跟到哪。'

continued_lore_obtained:
  - text: |
      于「{source}」初得此昆仑佩。墨玉沉如夜——
      你转一个角度对光看，玉里有一座山的轮廓。
  - text: |
      在 {source} 拿到这块昆仑佩。绳是新的，但你不敢系太紧——
      怕勒到玉里那座山。
  - text: |
      于{source}得玉。昆仑山的影子在玉里清晰如旧——
      它认你了。你想起传玉的人说：山影淡了，昆仑山就不认你了。
  - text: |
      {source}一遭，昆仑归你腰间。你忽然知道：
      你今天起，走到哪，山就跟到哪。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      玉佩在腰间撞了一下——
      你低头，玉里的山影没动，稳稳的。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收手时玉佩贴在腰上凉得透骨——
      昆仑山的雪，从五千尺以上一路凉到你这里。
  - text: |
      胜 {boss_name} 后摘玉对光看。
      山影清晰如旧——
      你想：它没淡。昆仑山今天还认你。
  - text: |
      {stage_name}一战胜 {boss_name}。
      山住在玉里，玉跟着你——
      人走到哪，山便跟到哪。

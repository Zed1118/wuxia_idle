id: accessory_shenwu_kun_lun_pei
name: 昆仑佩
default_lore:
  - text: |
      一块墨玉，产自昆仑山深处海拔五千尺以上的玉矿。玉色如最深沉的夜，
      但对着日光转一个角度，能看见玉里隐隐透出一座山的轮廓——当地人说是昆仑山
      的影子封在了玉里。采玉人说，这块玉是他祖父的祖父从山上背下来的，
      背了一辈子，只背下来这一块。

  - text: |
      这块玉在昆仑山下的一个村子里传了五代。每一代传到下一代的仪式都一样——
      上一代人把玉放在月光下照一整夜，第二天交给下一代人。
      不是白天交，是日出那一瞬：因为日出时昆仑山的影子最清楚，
      那时玉里的山影也最清楚。传玉的人说：'玉里的山影淡了，说明昆仑山不认你了。'

  - text: |
      传到第五代是个女孩。她接过玉佩时问了一句所有前人没问过的话：
      '昆仑山为什么要住在玉里？'她爷爷愣了一下，想了一夜，第二天说：
      '可能是山太大了，大地装不下——所以分了一小块住进玉里，
      让人带着走。人走到哪，山便跟到哪。'

id: weapon_baowu_xuan_tian_fu
name: 玄天斧
default_lore:
  - text: |
      斧身乌黑，斧刃却泛着一层幽蓝的光——那是淬火时用了华山绝顶的雪水，
      水中的寒气渗进了铁里，再也出不来。铸斧的工匠是华山派还俗的铁匠，
      他在斧柄上刻了一行字：「天高地厚，斧到山开。」

  - text: |
      此斧的第一个主人在华山上劈了一辈子柴——他不是武林中人，
      是华山派的伙夫。每天天不亮就抡着斧头上山劈柴，劈了二十年。
      华山派的弟子们都认识他，叫他「斧叔」。有人问他每天劈柴烦不烦，
      他说：「斧头不烦，人怎么会烦。」

  - text: |
      斧叔死后，他的斧头被华山派掌门收进了兵器库。有人不解——
      一把劈柴的斧头，进什么兵器库？掌门说：「你们看见的是劈柴，
      我看见的是二十年不间断。华山派上下几百人，能做到『不间断』三个字的，
      不出五个。这把斧头比你们腰间挂的剑贵重得多。」

continued_lore_obtained:
  - text: |
      于「{source}」初得此玄天斧。斧身乌黑，斧刃幽蓝——
      你抬斧时听见斧柄轻轻一颤，像它在数你能不能不间断。
  - text: |
      在 {source} 拿到这柄玄天斧。柄上刻着「天高地厚，斧到山开」，
      你想起斧叔在华山上劈了二十年柴。
  - text: |
      于{source}得斧。斧柄被人长年握过的位置略凹，
      你试着握上去——你的虎口正好嵌进那个凹里。
  - text: |
      {source}一遭，玄天归你。这是从兵器库里走出来的劈柴斧，
      今天起你也得做一件事——别间断。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      斧刃幽蓝依旧，华山雪水的寒气还在——
      它替你压了一截火。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收斧回背，你听见斧柄那句字仍清：斧到山开。
      今天它开过一座小山。
  - text: |
      胜 {boss_name} 后，把斧靠在地上。
      你忽然觉得抡这一斧的姿势，
      和斧叔每天抡柴的姿势，是同一个姿势。
  - text: |
      {stage_name}一战胜 {boss_name}。
      斧没间断。
      你忽然知道华山掌门为什么把劈柴的斧头收进兵器库。

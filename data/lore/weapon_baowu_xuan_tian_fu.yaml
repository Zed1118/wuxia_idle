id: weapon_baowu_xuan_tian_fu
name: 玄天斧
default_lore:
  - text: |
      斧身乌黑，斧刃却泛着一层幽蓝的光——那是淬火时用了华山绝顶的雪水，
      水中的寒气渗进了铁里，再也出不来。铸斧的工匠是华山派还俗的铁匠，
      他在斧柄上刻了一行字：'天高地厚，斧到山开。'

  - text: |
      此斧的第一个主人在华山上劈了一辈子柴——他不是武林中人，
      是华山派的伙夫。每天天不亮就抡着斧头上山劈柴，劈了二十年。
      华山派的弟子们都认识他，叫他'斧叔'。有人问他每天劈柴烦不烦，
      他说：'斧头不烦，人怎么会烦。'

  - text: |
      斧叔死后，他的斧头被华山派掌门收进了兵器库。有人不解——
      一把劈柴的斧头，进什么兵器库？掌门说：'你们看见的是劈柴，
      我看见的是二十年不间断。华山派上下几百人，能做到'不间断'三个字的，
      不出五个。这把斧头比你们腰间挂的剑贵重得多。'

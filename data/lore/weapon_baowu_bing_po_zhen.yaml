id: weapon_baowu_bing_po_zhen
name: 冰魄针
default_lore:
  - text: |
      千年寒铁淬成的银针，出手无声，中者经脉冻僵。
      冰魄针不需要毒——寒铁本身就是毒。
      针入体内，寒气沿经脉蔓延，比蛇毒慢但比蛇毒狠。

  - text: |
      铸针的人住在雪山上，一年只下山一次。
      他说寒铁要在雪山上放三个冬天才能铸，放少了不够冷。
      「不够冷的针扎进去只是疼，够冷的针扎进去是冰。」

continued_lore_obtained:
  - text: |
      于「{source}」得此冰魄针。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。冰魄针上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此冰魄针。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得冰魄针。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，冰魄针助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      冰魄针在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      冰魄针经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧冰魄针，
      它比来的时候重了一点——是沾了故事的重量。

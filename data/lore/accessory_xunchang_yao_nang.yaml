id: accessory_xunchang_yao_nang
name: 药囊
default_lore:
  - text: |
      走江湖的都别一个，里面是金创药和止血粉。
      不值钱的东西，但挨了刀能保一条命。
      老镖师说：「刀可以丢，药囊不能丢。」

  - text: |
      药囊是师娘缝的，用的是做鞋面剩下的碎布。
      里面的药是师父配的，方子不外传。
      师父说：「药方值千金，但药囊值万金——因为它救你命的时候不收钱。」

continued_lore_obtained:
  - text: |
      于「{source}」得此药囊。解开系绳闻了闻，
      药味苦涩，但闻着心安。
  - text: |
      在{source}偶然所得。药囊缝得结实，
      里面的金创药已经被人用过一半了。
  - text: |
      自{source}取得。别在腰间，
      手伸下去就能摸到，这很重要。
  - text: |
      {source}得药囊。走江湖的人
      腰间总要有点能救命的东西。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，药囊中的金创药救了一命。
      {boss_name}那一刀若没有药粉止血，后果难料。
  - text: |
      {stage_name}一战后，药囊见了底。
      胜了{boss_name}，但药囊需要补充了。
  - text: |
      胜{boss_name}于{stage_name}。
      战后从药囊里抓了一把药粉敷在伤口上，疼但管用。
  - text: |
      胜{boss_name}后，低头看药囊，
      血迹已经干了，药味还在。

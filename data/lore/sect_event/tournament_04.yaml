id: tournament_04
type: tournament
title: 师门切磋
opening: |
  入秋之后,门下弟子修为渐显参差。
  你择一晴日,召集众弟子于演武场,以师门切磋之名,分组试招。
  既验弟子根基,也使本派内息得以印证。
choices:
  - { text: 亲自下场示范, outcome: accept }
  - { text: 旁观即可(reputation -2), outcome: refuse }
victory_text: 你一招一式皆讲解清楚,弟子们眼神发亮,演武场上士气大振。
defeat_text: 你略觉今日招式未调到位,草草收场。弟子虽未明言,你心知教学略失。

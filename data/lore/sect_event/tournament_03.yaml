id: tournament_03
type: tournament
title: 群英围攻
opening: |
  四方擂主联手挑你于擂台之上,以多打一。
  你立于阵中,见对手布阵渐紧,知此战非一招制胜可成。
  本派弟子在台下静观,目光皆落在你的剑上。
choices:
  - { text: 持剑应战, outcome: accept }
  - { text: 退避三步(reputation -3), outcome: refuse }
victory_text: 你以一敌四,剑势沉稳如山,众擂主皆退一步拱手。本派威名远播。
defeat_text: 寡不敌众,败退山门。本派威名暂挫,你闭关苦练以图再起。

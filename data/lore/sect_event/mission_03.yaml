id: mission_03
type: mission
title: 镇魔伏寇
opening: |
  山下村落连失三人，村正登山求援，言夜半有黑影出没，似非常人。
  本派遣弟子下山探查，回禀确有妖人盘踞于后山一座废寺。
  你思忖此事关乎一方安宁，亦显本派担当。
choices:
  - { text: 率众下山, outcome: accept }
  - { text: 转交官府, outcome: refuse }
victory_text: 你于废寺中破阵伏寇，擒得妖人两名交于官府。村中老幼焚香相谢，本派声名远播。
defeat_text: 妖人狡诈，你伤退山门，村中又失一人。你设灵堂自省，闭关半月。

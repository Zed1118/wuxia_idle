id: armor_xunchang_mian_jia
name: 棉甲
default_lore:
  - text: |
      几层棉布缝死，里面塞了碎铁片，穿上闷热但扎不透。
      这种甲在军营里最常见，士兵们叫它「闷罐子」。
      不好看，不透气，但箭射上去只进半寸，人能活。

  - text: |
      有个老兵退伍时把棉甲留给了儿子，说：「你爹靠这身甲活着回来的。
      里面的铁片是从死人身上扒下来的，一片一片缝上去的。
      穿上它你就记住——活着比好看重要。」

continued_lore_obtained:
  - text: |
      于「{source}」得此棉甲。穿上闷得出汗，
      但拍了拍胸口，感觉踏实了不少。
  - text: |
      在{source}偶然所得。甲里的碎铁片
      走路时轻轻作响，像带着一身旧故事。
  - text: |
      自{source}取得。棉甲沉重，
      但想到挡刀的时候就不觉得沉了。
  - text: |
      {source}得甲。里面有人缝过的针脚，
      粗糙但结实，每一针都是认真的。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，棉甲挡住{boss_name}重击。
      铁片被打得变了形，但没有一片掉出来。
  - text: |
      {stage_name}一战。{boss_name}一拳砸在甲上，
      你退了两步，但没倒。棉甲里的铁片替你受了这一下。
  - text: |
      胜{boss_name}于{stage_name}。
      脱下棉甲时里面全是汗，但人还站着。
  - text: |
      胜{boss_name}后检查棉甲，
      碎铁片嵌得更紧了，像它也学会了怎么挨打。

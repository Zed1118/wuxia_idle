id: weapon_shenwu_kong_que_ling
name: 孔雀翎
default_lore:
  - text: |
      孔雀尾羽削成的暗器，出手如天女散花，三丈内无死角。
      孔雀翎是暗器之王，不是因为它最快或最毒，
      而是因为它出手时的覆盖面——三丈之内，没有安全的角落。

  - text: |
      传说世上只有三支孔雀翎，每一支都沾过至少十个人的血。
      用过的人对它又爱又怕：爱它的万无一失，怕它的赶尽杀绝。
      「孔雀开屏，要么是求偶，要么是杀人。」

  - text: |
      孔雀翎的匣子里垫着一层旧绢，绢上画的不是暗器图，而是三丈内的脚步方位。
      旁边有一行小字：「出手以前，先给人留路。」
      可惜匣角后来被血浸黑，那句话也只剩后半句清楚，像是提醒，也像是讥讽。

continued_lore_obtained:
  - text: |
      于「{source}」得此孔雀翎。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。孔雀翎上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此孔雀翎。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得孔雀翎。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，孔雀翎助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      孔雀翎在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      孔雀翎经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧孔雀翎，
      它比来的时候重了一点——是沾了故事的重量。

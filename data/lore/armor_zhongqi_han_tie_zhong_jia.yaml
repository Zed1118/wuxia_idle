id: armor_zhongqi_han_tie_zhong_jia
name: 寒铁重甲
default_lore:
  - text: |
      寒铁锻打的全身甲，穿上沉如铁塔，刀枪不入。
      寒铁重甲不是谁都穿得了的——先要有扛住八十斤的体力，
      再要有穿着八十斤还能出拳的力气。

  - text: |
      有人问穿重甲的将军热不热，将军说：「热。
      但被刀砍的时候不热，被刀砍的时候只觉得庆幸。」

continued_lore_obtained:
  - text: |
      于「{source}」得此寒铁重甲。握在手中有些分量，
      像是经过了不少人的手才到这里。
  - text: |
      在{source}偶然所得。寒铁重甲上有旧痕，
      那是时间和使用留下的记号。
  - text: |
      自{source}取得此寒铁重甲。
      初次上手还不习惯，但用过就知道好在哪里。
  - text: |
      {source}得寒铁重甲。有些东西
      要用过才知道值不值得带在身边。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战，寒铁重甲助你胜了{boss_name}。
      战后多了一道看不见的痕。
  - text: |
      {stage_name}一战。{boss_name}倒下时，
      寒铁重甲在手中沉了沉，像替你记住了这一仗。
  - text: |
      斩{boss_name}于{stage_name}。
      寒铁重甲经此一战，似乎也有了几分杀气。
  - text: |
      胜{boss_name}后握紧寒铁重甲，
      它比来的时候重了一点——是沾了故事的重量。

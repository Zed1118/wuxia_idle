id: accessory_liqi_fei_yu_pei
name: 翡玉佩
default_lore:
  - text: |
      一块翡翠雕成的佩，色如春水，中间沁着一缕翠绿——老玉工管这叫'活翠'，
      说是玉在地下埋久了，跟了哪条水脉，便带了哪条水脉的颜色。
      玉的正面雕的是水波纹，背面光素无纹，只在角落里刻了一个极小的'源'字。

  - text: |
      此佩原是一对，一翡一翠，翡为红、翠为绿。持有这对玉的是一对师兄弟，
      师兄佩翡，师弟佩翠。后来师弟早逝，翠玉陪葬，世上便只剩这一块翡玉。
      师兄晚年常常摩挲着玉上的'源'字，对旁人说：'玉成双是缘，剩单是源——
      凡事到了尽头，就回到来处。'

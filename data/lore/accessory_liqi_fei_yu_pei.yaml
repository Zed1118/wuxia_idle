id: accessory_liqi_fei_yu_pei
name: 翡玉佩
default_lore:
  - text: |
      一块翡翠雕成的佩，色如春水，中间沁着一缕翠绿——老玉工管这叫'活翠'，
      说是玉在地下埋久了，跟了哪条水脉，便带了哪条水脉的颜色。
      玉的正面雕的是水波纹，背面光素无纹，只在角落里刻了一个极小的'源'字。

  - text: |
      此佩原是一对，一翡一翠，翡为红、翠为绿。持有这对玉的是一对师兄弟，
      师兄佩翡，师弟佩翠。后来师弟早逝，翠玉陪葬，世上便只剩这一块翡玉。
      师兄晚年常常摩挲着玉上的'源'字，对旁人说：'玉成双是缘，剩单是源——
      凡事到了尽头，就回到来处。'

continued_lore_obtained:
  - text: |
      于「{source}」初得此翡玉佩。色如春水,中间沁着一缕翠——
      老玉工管这叫活翠,你听过。
  - text: |
      在 {source} 拿到这块翡玉。背面角落里那个极小的「源」字,
      你想起师兄说过的话:剩单是源,凡事尽头回到来处。
  - text: |
      于{source}得佩。绳是新的,你换了三个结才系稳——
      它的位置很挑。
  - text: |
      {source}一遭,翡玉归你。原本是一对——
      你忽然觉得手里这一块,是替另一块也在走。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      翡玉在腰间撞了一下,绿沁的那一缕似乎深了一点。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      收手时翡玉贴在腰上凉了一阵——
      你想起「源」字。凡事到了尽头,回到来处。
  - text: |
      胜 {boss_name} 后摘玉对光。
      水波纹的雕痕清晰如旧,
      但你忽然觉得佩背的那个「源」字,比早晨深一点。
  - text: |
      {stage_name}一战胜 {boss_name}。
      翡玉在你手里活着——它在替另一块翠玉也活。

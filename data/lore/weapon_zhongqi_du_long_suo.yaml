id: weapon_zhongqi_du_long_suo
name: 毒龙索
default_lore:
  - text: |
      一条漆黑的铁索，索身缠着极细的铜丝——铜丝上淬过一种苗疆的毒汁，
      沾血即入。但这种毒有一个讲究：只麻不杀。被缠住的人手脚发麻、
      使不上劲，但不会死。制索的人说：'杀人容易，制人难。'

  - text: |
      此索出自湘西一位苗家女子之手。她是寨子里唯一会使索的人——
      苗家祖上传下来的兵器本不是索，是藤条。传到她这一代，她把藤条换成了铁链，
      又在链上淬了毒。寨中长老问她为什么改成毒，她说：'藤条打人疼，毒索打人停。
      疼了人会跑，停了人会听你说一句话。'

  - text: |
      苗寨外的人怕她，叫她'毒龙婆'。但她从不用索对付寨子里的人。
      她在寨门口挂了一条旧索——不是兵器，是吓人的。马匪远远看见那条黑索，
      便绕道走。一条索看了一座寨子三十年，三十年间寨里没丢过一头牛。

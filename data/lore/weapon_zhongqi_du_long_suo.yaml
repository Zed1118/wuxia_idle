id: weapon_zhongqi_du_long_suo
name: 毒龙索
default_lore:
  - text: |
      一条漆黑的铁索，索身缠着极细的铜丝——铜丝上淬过一种苗疆的毒汁，
      沾血即入。但这种毒有一个讲究：只麻不杀。被缠住的人手脚发麻、
      使不上劲，但不会死。制索的人说：'杀人容易，制人难。'

  - text: |
      此索出自湘西一位苗家女子之手。她是寨子里唯一会使索的人——
      苗家祖上传下来的兵器本不是索，是藤条。传到她这一代，她把藤条换成了铁链，
      又在链上淬了毒。寨中长老问她为什么改成毒，她说：'藤条打人疼，毒索打人停。
      疼了人会跑，停了人会听你说一句话。'

  - text: |
      苗寨外的人怕她，叫她'毒龙婆'。但她从不用索对付寨子里的人。
      她在寨门口挂了一条旧索——不是兵器，是吓人的。马匪远远看见那条黑索，
      便绕道走。一条索看了一座寨子三十年，三十年间寨里没丢过一头牛。

continued_lore_obtained:
  - text: |
      于「{source}」初得此毒龙索。索身漆黑,
      缠在指间是冷的——毒在内里,沉得听不见。
  - text: |
      在 {source} 拿到这条毒龙索。铜丝细密缠在铁链上,
      你想起湘西毒龙婆的话:杀人容易,制人难。
  - text: |
      于{source}得索。盘起来不过一握,
      你试甩——索梢落地无声,这是「停人」的索。
  - text: |
      {source}一遭,毒龙归你。索身上有一截色淡——
      是经年累月被人摸过的地方。她在那一截走了三十年。

continued_lore_boss_defeated:
  - text: |
      于「{stage_name}」一战胜 {boss_name}。
      收索时铜丝有一线沾湿——毒留在了 {boss_name} 身上,
      不是杀,是让他听你说一句话。
  - text: |
      斩 {boss_name} 于 {stage_name}。
      索身回到掌心,微凉。
      你想起寨门口那条旧索看了三十年寨子。
  - text: |
      胜 {boss_name} 后盘索回腰。
      铜丝磨亮了一处——毒已尽,
      你想:下一次还要补一回。
  - text: |
      {stage_name}一战胜 {boss_name}。
      你做到了苗家女子的话——藤条打人疼,索打人停。
      停了的人会听。

# =============================================================================
# encounter_skills.yaml · 奇遇专属招式池(C-W14-3-A)
# =============================================================================
# 共 35 招,覆盖 7 阶,每阶 5 招。**与 skills.yaml(21 心法 × 3 招 = 63 招)
# 完全独立**:
#   - parentTechniqueDefId 必须为空(SkillDef 注释:"为空表示武学领悟独立产出")
#   - tier 必填 1-7(skills.yaml 招式 tier 留空)
#   - id 必须以 skill_encounter_ 开头
#
# 加载/红线:GameRepository._loadEncounterSkills + _enforceEncounterSkillRedLines
# 玩家通过奇遇 outcome(OutcomeType.unlockSkill)解锁,持久到
# EncounterProgress.unlockedSkillIds(账号级 unlock 池),通过
# Character.equippedEncounterSkillId 单 slot 装备(角色级)。
#
# 倍率上限(沿用 numbers.yaml techniques.tiers.max_skill_multiplier):
#   tier 1 ≤ 1500 / tier 2 ≤ 2000 / tier 3 ≤ 2500 / tier 4 ≤ 3000
#   tier 5 ≤ 4000 / tier 6 ≤ 5500 / tier 7 ≤ 8000
#
# 既有 6 招(W14-1/W14-2 已在 encounters.yaml unlockSkill outcome 引用)
# 必须包含,标 (★) 标记:
#   - skill_encounter_ting_yu_jian   (tier 3)
#   - skill_encounter_drill_strike   (tier 3)
#   - skill_encounter_relic_blade    (tier 4)
#   - skill_encounter_water_qi       (tier 5)
#   - skill_encounter_night_strike   (tier 5)
#   - skill_encounter_ice_break      (tier 6)
#
# description 占位 TODO_NARRATIVE,DeepSeek 后续补文案(同 skills.yaml 体例)。
# requiresManualTrigger:仅 ultimate=true。
# =============================================================================


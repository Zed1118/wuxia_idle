# 江湖商店商品定义（P1 材料经济 Task 4，GDD §5.1）
# 标价二选一（balance T3 经验丹动态标价）：
#   price             : 银两固定标价（磨剑石/心血结晶等绝对价值材料）
#   price_layer_fraction : 动态标价系数（经验丹，实际价=round(founderEtl×fraction)）
# 两字段互斥，fromYaml 校验，两者皆有/皆无均报 StateError。
# category : 货架分组 key

shop:
  - id: shop_mojianshi
    itemDefId: item_mojianshi
    itemType: moJianShi
    price: 30
    category: material

  - id: shop_xinxue_jiejing
    itemDefId: item_xinxuejiejing
    itemType: xinXueJieJing
    price: 120
    category: material

  # 经验丹（P2 材料经济 + balance T3 动态标价）——小/中档上货架；大档仅掉落（§5.7 守门）
  # price_layer_fraction 占位值，balance T6 校准后更新。
  # 兑换率恒定：银两→经验 = fraction × ETL，无套利窗口。
  - id: shop_jingyandan_small
    itemDefId: item_jingyandan_small
    itemType: jingYanDan
    price_layer_fraction: 1.0   # 占位待 T6 balance 校准
    category: pill

  - id: shop_jingyandan_mid
    itemDefId: item_jingyandan_mid
    itemType: jingYanDan
    price_layer_fraction: 2.5   # 占位待 T6 balance 校准
    category: pill

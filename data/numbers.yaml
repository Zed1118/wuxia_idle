# =============================================================================
# 3. 装备系统
# =============================================================================
# GDD §3.2 7 阶装备 + §6.2 强化 + §6.3 心血结晶 + §6.4 共鸣 + §6.5 开锋

equipment:

  # --- 7 阶装备的基础数值范围 ---
  # 每件具体装备实例（如"青锋剑"）从 EquipmentDef 读取范围，生成时按
  # 范围 random 一次。范围内随机让"同阶装备拉开个体差异"，符合武侠"宝兵
  # 各有特点"的叙事。
  #
  # 设计原则：
  #   - 武器 → 主攻击/速度，少量血量（武器作用是杀敌）
  #   - 护甲 → 主血量，少量速度，无攻击
  #   - 饰品 → 中等血量，少量攻击/速度（小而全）
  #
  # 数值校验：
  #   - 装备攻击上限 2000（GDD §5.2 红线）→ 神物·武器 1500-2000 ✓
  #   - 装备血量贡献 ≤ 3000（避免单装备血量超过基础）→ 神物·护甲 1750-2300 ✓(P0.1 #38 方案 D 重平衡)
  #   - 装备速度贡献 ≤ 100（避免速度膨胀）→ 神物·武器 65-100 ✓

  tiers:

    # === 第 1 阶 寻常货 · 学徒境界开放 ===
    - tier: xunChang
      tier_name: "寻常货"
      weapon:    {attack_min: 100, attack_max: 150, hp_min: 0,    hp_max: 0,    speed_min: 0,  speed_max: 10}
      armor:     {attack_min: 0,   attack_max: 0,   hp_min: 100,  hp_max: 200,  speed_min: 0,  speed_max: 5}
      accessory: {attack_min: 20,  attack_max: 40,  hp_min: 50,   hp_max: 100,  speed_min: 0,  speed_max: 8}

    # === 第 2 阶 像样货 · 三流境界开放 ===
    - tier: xiangYang
      tier_name: "像样货"
      weapon:    {attack_min: 180, attack_max: 280, hp_min: 0,    hp_max: 50,   speed_min: 5,  speed_max: 20}
      armor:     {attack_min: 0,   attack_max: 0,   hp_min: 250,  hp_max: 450,  speed_min: 0,  speed_max: 10}
      accessory: {attack_min: 50,  attack_max: 90,  hp_min: 100,  hp_max: 200,  speed_min: 5,  speed_max: 15}

    # === 第 3 阶 好家伙 · 二流境界开放 ===
    - tier: haoJiaHuo
      tier_name: "好家伙"
      weapon:    {attack_min: 320, attack_max: 450, hp_min: 0,    hp_max: 100,  speed_min: 10, speed_max: 30}
      armor:     {attack_min: 0,   attack_max: 0,   hp_min: 450,  hp_max: 750,  speed_min: 5,  speed_max: 15}
      accessory: {attack_min: 100, attack_max: 160, hp_min: 200,  hp_max: 350,  speed_min: 10, speed_max: 25}

    # === 第 4 阶 利器 · 一流境界开放 · Demo 主线最高级装备 ===
    - tier: liQi
      tier_name: "利器"
      weapon:    {attack_min: 480, attack_max: 650, hp_min: 0,    hp_max: 150,  speed_min: 20, speed_max: 45}
      armor:     {attack_min: 0,   attack_max: 0,   hp_min: 700,  hp_max: 1100, speed_min: 10, speed_max: 25}
      accessory: {attack_min: 180, attack_max: 280, hp_min: 350,  hp_max: 550,  speed_min: 20, speed_max: 35}

    # === 第 5 阶 重器 · 绝顶境界开放 ===
    - tier: zhongQi
      tier_name: "重器"
      weapon:    {attack_min: 700, attack_max: 950, hp_min: 50,   hp_max: 250,  speed_min: 30, speed_max: 60}
      armor:     {attack_min: 0,   attack_max: 0,   hp_min: 1100, hp_max: 1600, speed_min: 15, speed_max: 35}
      accessory: {attack_min: 280, attack_max: 420, hp_min: 550,  hp_max: 850,  speed_min: 30, speed_max: 50}

    # === 第 6 阶 宝物 · 宗师境界开放 ===
    # P0.1 #38 方案 D 重平衡(2026-05-17):armor hp 2300→2000 / accessory hp 1300→1100
    # (min 端按比例收窄:armor 1600→1400 / accessory 850→750)
    - tier: baoWu
      tier_name: "宝物"
      weapon:    {attack_min: 1000, attack_max: 1400, hp_min: 100, hp_max: 400, speed_min: 45, speed_max: 75}
      armor:     {attack_min: 0,    attack_max: 0,    hp_min: 1400, hp_max: 2000, speed_min: 25, speed_max: 50}
      accessory: {attack_min: 420,  attack_max: 600,  hp_min: 750,  hp_max: 1100, speed_min: 45, speed_max: 70}

    # === 第 7 阶 神物 · 武圣境界开放 ===
    # P0.1 #38 方案 D 重平衡(2026-05-17):weapon hp 500→350 / armor hp 3000→2300 / accessory hp 1800→1400
    # (min 端按比例收窄:weapon 200→150 / armor 2300→1750 / accessory 1300→1000)
    - tier: shenWu
      tier_name: "神物"
      weapon:    {attack_min: 1500, attack_max: 2000, hp_min: 150, hp_max: 350, speed_min: 65, speed_max: 100}
      armor:     {attack_min: 0,    attack_max: 0,    hp_min: 1750, hp_max: 2300, speed_min: 40, speed_max: 70}
      accessory: {attack_min: 600,  attack_max: 850,  hp_min: 1000, hp_max: 1400, speed_min: 65, speed_max: 95}

  # --- 强化系统（GDD §6.2）---
  enhancement:
    bonus_per_level: 0.05            # 每级 +5% 数值（GDD 原值）
    max_level_formula: "absolute_level"  # 强化上限 = 持有者境界总层数（最高 +49）

    # 成功率与失败惩罚（GDD §6.2 表）
    # 失败惩罚 material_penalty 含义：
    #   "half"  → 仅扣半数磨剑石
    #   "full"  → 全扣磨剑石
    success_curve:
      - level_range: [1, 10]
        success_rate: 1.00
        material_penalty: "none"
      - level_range: [11, 13]
        success_rate: 0.90
        material_penalty: "half"
      - level_range: [14, 16]
        success_rate: 0.75
        material_penalty: "full"
      - level_range: [17, 19]
        success_rate: 0.50
        material_penalty: "full"
      # +20 及以上：每级成功率 -2%，最低 30%（武圣后期高难度强化）
      - level_range: [20, 49]
        success_rate: null           # 由代码按 max(0.30, 0.50 - 0.02*(level-19)) 计算
        success_formula: "max(0.30, 0.50 - 0.02 * (level - 19))"
        material_penalty: "full"

    # 磨剑石消耗曲线（每级强化一次的消耗）
    # 设计原则：低强化便宜、高强化材料压力大，避免无脑强化
    mojianshi_cost:
      - level_range: [1, 5]
        cost: 1
      - level_range: [6, 10]
        cost: 2
      - level_range: [11, 13]
        cost: 4
      - level_range: [14, 16]
        cost: 7
      - level_range: [17, 19]
        cost: 12
      - level_range: [20, 30]
        cost: 18
      - level_range: [31, 49]
        cost: 25

    # 关键设计：永不破防降级（GDD §6.2 红线）
    never_degrade: true              # 失败仅扣材料，不会从 +18 掉到 +12

  # --- 心血结晶保底（GDD §6.3）---
  xinxue_jiejing:
    gain_per_failure: 1              # 每次强化失败必得 1 颗
    guaranteed_success_costs:
      - level_range: [14, 16]
        crystal_cost: 3              # +14~+16 段消耗 3 颗直接成功
      - level_range: [17, 19]
        crystal_cost: 5              # +17~+19 段消耗 5 颗直接成功
      - level_range: [20, 49]
        crystal_cost: 8              # +20+ 段消耗 8 颗（数值平衡，避免后期囤积无用）

  # --- 共鸣度阶段（GDD §6.4，强制规则）---
  resonance:
    stages:
      - stage: shengShu              # 生疏
        battle_count_range: [0, 100]
        bonus_multiplier: 1.0
        unlocks_joint_skill: false
        has_sword_song_effect: false
      - stage: chenShou              # 趁手
        battle_count_range: [100, 300]   # 根因A:默契边界 500→300,中期可及
        bonus_multiplier: 1.10       # 装备数值 +10%
        unlocks_joint_skill: false
        has_sword_song_effect: false
      - stage: moQi                  # 默契
        battle_count_range: [300, 2000]  # 根因A:下界 500→300(配闭关喂 battleCount,人剑合一中期够得着)
        bonus_multiplier: 1.20       # +20%
        unlocks_joint_skill: true    # 解锁人剑合一招式
        has_sword_song_effect: false
      - stage: xinJianTongLing       # 心剑通灵
        battle_count_range: [2000, null]   # 上不封顶
        bonus_multiplier: 1.30       # +30%
        unlocks_joint_skill: true
        has_sword_song_effect: true  # 暴击附带剑鸣特效

    # 根因A(2026-05-29):闭关挂机也喂 battleCount(折算),让离线推进人剑合一。
    # 叙事=日夜与兵刃相处。明显低于实战(~30-50/h)以保「实战为主」。
    # 72h × 5 = +360 > 默契 300 → 纯挂机也可达;8h ≈ +40 可观推进。
    seclusion_battle_count_per_hour: 5

    # 师承传承时的清零规则（GDD §6.4）
    inheritance_retention: 0.7       # 传给徒弟保留 70%（鼓励"一柄剑用一辈子"）
    # ⚠️ 未消费(2026-06-16 审计 M7):当前无玩家间换主路径,lib 无读取。
    # GDD §6.4 预埋字段,实装换主功能时再接;保留勿删(语义锚)。
    new_owner_retention: 0.0         # 玩家间换主直接清零

  # --- 开锋系统（GDD §6.5）---
  forging:
    slots:
      - slot_index: 1
        unlock_at_enhance_level: 10  # +10 解锁开锋一
        available_types: [attack, speed, lifesteal, pierce]
        bonus_value:
          attack: 15        # 攻击 +15%
          speed: 15         # 速度 +15%
          lifesteal: 10     # 吸血 10%（命中时回血百分比）
          pierce: 15        # 破甲 15%（无视目标 15% 防御）
      - slot_index: 2
        unlock_at_enhance_level: 15  # +15 解锁开锋二
        available_types: [attack, speed, lifesteal, pierce]
        bonus_value:
          attack: 20
          speed: 20
          lifesteal: 15
          pierce: 20
        constraint: "不能与开锋一相同类型"
      - slot_index: 3
        unlock_at_enhance_level: 19  # +19 解锁开锋三
        available_types: [specialSkill]   # 仅可解锁专属技能
        bonus_value:
          specialSkill: 1   # 解锁一个专属技能词条（具体技能由 EquipmentDef 定义）

  # --- 师承遗物（GDD §6.1）---
  lineage_heritage:
    pieces_per_generation_min: 1     # 每代师父最少传 1 件
    pieces_per_generation_max: 2     # 每代师父最多传 2 件
    internal_force_max_bonus: 0.05   # 师承遗物自带内力上限 +5% buff

# =============================================================================
# 4. 心法系统
# =============================================================================
# GDD §3.3 7 阶心法 + §4.3 9 层修炼度 + §4.4 三流派克制

techniques:

  # --- 7 阶心法的属性加成 ---
  # 设计原则：
  #   - 内力增长加成：影响挂机/闭关时内力恢复速率
  #   - 速度加成：直接进入速度公式（GDD §5.6）
  #   - 招式倍率上限：高阶心法的招式倍率封顶值
  tiers:

    - tier: ruMenGong         # 1 入门功
      tier_name: "入门功"
      internal_force_growth_bonus: 1.05    # 内力增长 +5%
      speed_bonus: 0
      max_skill_multiplier: 1500            # 该阶心法招式倍率不超过 1500（普通-中级强力技能）

    - tier: changLianGong     # 2 常练功
      tier_name: "常练功"
      internal_force_growth_bonus: 1.10
      speed_bonus: 5
      max_skill_multiplier: 2000

    - tier: mingJiaGong       # 3 名家功
      tier_name: "名家功"
      internal_force_growth_bonus: 1.15
      speed_bonus: 10
      max_skill_multiplier: 2500

    - tier: menPaiJueXue      # 4 门派绝学
      tier_name: "门派绝学"
      internal_force_growth_bonus: 1.25
      speed_bonus: 15
      max_skill_multiplier: 3000

    - tier: jiangHuMiChuan    # 5 江湖秘传
      tier_name: "江湖秘传"
      internal_force_growth_bonus: 1.40
      speed_bonus: 25
      max_skill_multiplier: 4000

    - tier: shiChuanShenGong  # 6 失传神功
      tier_name: "失传神功"
      internal_force_growth_bonus: 1.60
      speed_bonus: 40
      max_skill_multiplier: 5500

    - tier: chuanShuoShenGong # 7 传说神功
      tier_name: "传说神功"
      internal_force_growth_bonus: 2.00
      speed_bonus: 60
      max_skill_multiplier: 8000           # 含大招（如九阳神功的"龙吟九霄"）

  # --- 9 层修炼度（GDD §4.3，强制规则）---
  cultivation:
    layers:
      - layer: chuKui          # 1 初窥
        bonus_multiplier: 1.00
      - layer: xiaoCheng       # 2 小成
        bonus_multiplier: 1.15
      - layer: zhongCheng      # 3 中成
        bonus_multiplier: 1.30
      - layer: daCheng         # 4 大成
        bonus_multiplier: 1.50
      - layer: yuanMan         # 5 圆满
        bonus_multiplier: 1.75
      - layer: dianFeng        # 6 巅峰
        bonus_multiplier: 2.00
      - layer: tongShen        # 7 通神
        bonus_multiplier: 2.30
      - layer: wuXia           # 8 无瑕
        bonus_multiplier: 2.60
      - layer: jiJing          # 9 极境
        bonus_multiplier: 3.00

    # 升级到下一层所需的招式使用次数
    # 设计：曲线接近指数（每层 ~1.6 倍），让高层修炼度成为长期目标
    progress_to_next:
      - from_layer: chuKui
        progress_required: 100        # 初窥 → 小成
      - from_layer: xiaoCheng
        progress_required: 250        # 小成 → 中成
      - from_layer: zhongCheng
        progress_required: 500
      - from_layer: daCheng
        progress_required: 900
      - from_layer: yuanMan
        progress_required: 1500
      - from_layer: dianFeng
        progress_required: 2500
      - from_layer: tongShen
        progress_required: 4000
      - from_layer: wuXia
        progress_required: 6500       # 极境最难达，是"老玩家追求"

    # 根因A(2026-05-29):insightPoints 凝练兑换主修修炼度 progress 的比率。
    # 闭关挂机→insightPoints→玩家凝练→修炼度,死钱包变 idle→中期成长链路
    # (不开学心法 UI,维持 GDD §7.2 Phase 5+ scoped)。1:1 → 72h 闭关 ~70-91
    # insightPoints ≈ 早期 0.7-0.9 层(初窥→小成 100)。
    insight_to_cultivation_ratio: 1.0

  # --- 散功代价（GDD §4.3，强制规则）---
  # 换主修时的双重惩罚（不可调，是设计底线条款）
  dispersion:
    internal_force_penalty: 0.50      # 当前内力 -50%（不归零）
    cultivation_penalty: 0.50         # 原主修心法修炼度 -50%

  # --- 战败代价（Phase 4 W10，Boss 关战败被动触发）---
  # 仅 stages.yaml isBossStage=true 的关卡战败时对参战角色主修生效。
  # 普通关战败不触发（试错免费）。与 dispersion 数值同 0.50 但语义独立——
  # dispersion=玩家主动换主修，defeat=Boss 战败被动惩罚（不换主修，progress + layer 回退）。
  defeat:
    boss_internal_force_penalty: 0.50 # 战败后角色当前内力 ×0.5（floor）
    boss_cultivation_penalty: 0.50    # 战败后主修 progress ×0.5（再走 layer 反向重算）

  # --- 学习成本（phase2_tasks T23，Pen 拍板）---
  # Demo 阶段统一固定值；领悟点来源待 GDD §7.2 武学领悟系统实装后接入
  learning_cost:
    assist: 100                       # 学辅修消耗领悟点
    main: 500                         # 学主修消耗领悟点

  # --- 三流派克制（GDD §4.4，强制规则）---
  # 关系：刚猛 → 阴柔 → 灵巧 → 刚猛（成环）
  # CLAUDE.md §12.1 #7 收口 v1.4(2026-05-16):extra_effect 数值落地。
  schools:
    counter_relations:
      - attacker: gangMeng              # 刚猛
        target: yinRou                  # 克阴柔
        damage_multiplier: 1.25         # +25% 伤害
        extra_effect: "extra_quake_dmg" # 每招额外震伤
      - attacker: lingQiao              # 灵巧
        target: gangMeng                # 克刚猛
        damage_multiplier: 1.25
        extra_effect: "crit_rate_+0.20" # 暴击率 +20%
      - attacker: yinRou                # 阴柔
        target: lingQiao                # 克灵巧
        damage_multiplier: 1.25
        extra_effect: "internal_injury" # 每招施加内伤 debuff

    # 被克制系数
    countered_multiplier: 0.75          # 被克制时输出 ×0.75
    neutral_multiplier: 1.00            # 同流派或非克制关系时 ×1.0

    # --- 刚猛额外震伤（§12.1 #7 决议)---
    # 主攻击命中且流派克制成立(gangMeng → yinRou)时,追加固定 quake_dmg 数值,
    # 与主伤害同 tick 叠加。穿透守方防御率(语义上是"震"的硬伤),不暴击(暴击只乘主伤害)。
    # 主攻击闪避 → 震伤也不触发(走主攻击 hit/dodge 判定)。
    gang_meng_quake:
      damage: 500                       # 固定每招 +500 震伤
      pierces_defense: true             # 穿透守方防御率
      pierces_critical: true            # 不被暴击乘(独立于 critical_multiplier)
      follows_main_hit: true            # 主攻击命中才触发,闪避不触发

    # --- 阴柔内伤 debuff（§12.1 #7 决议)---
    # 主攻击命中且流派克制成立(yinRou → lingQiao)时,在守方身上施加内伤槽:
    # N=3 守方 tick + 每 tick 扣 200 固定。穿透守方防御率(纯穿透),可致死。
    # 同源刷新(覆盖):同一施加者再次命中同一守方 → 重置 N=3 + 不叠层数。
    # 不同流派 debuff 各占独立 slot(本批仅阴柔内伤 1 种 dot 类 debuff)。
    yin_rou_internal_injury:
      turns_persist: 3                  # 守方 tick 数,首次结算从下一守方 tick 起
      damage_per_tick: 200              # 每 tick 扣 200 固定(玩家 max_hp 20000 约 3% / Boss 50000 约 1.2%)
      pierces_defense: true             # 穿透守方防御率
      stack_rule: "refresh"             # 刷新持续(覆盖):重置 turns_persist,不叠层数
      follows_main_hit: true            # 主攻击命中才施加,闪避不施加

# =============================================================================
# 5. 招式倍率参考表
# =============================================================================
# GDD §5.3：招式倍率分三档。具体每招由 SkillDef 单独定义，本表是设计参考。
# 实际配置时各阶心法的招式倍率不得超过 techniques.tiers[*].max_skill_multiplier

skills:

  # 招式倍率参考范围（按招式类型）
  # 用于 SkillDef.powerMultiplier 字段配置时的指导值
  reference_multipliers:
    normal_attack:
      base: 500              # GDD §5.3 普通攻击固定倍率
      note: "所有普通攻击统一 500，不随心法阶提升"
    power_skill:
      tier_1_2_range: [1000, 1800]   # 1-2 阶心法的强力技能
      tier_3_4_range: [1500, 2500]   # 3-4 阶
      tier_5_6_range: [2000, 3000]   # 5-6 阶
      tier_7_range:   [2500, 3500]   # 7 阶（传说神功的强力技能）
    ultimate:
      tier_1_2_range: [3000, 4500]   # 1-2 阶心法的大招
      tier_3_4_range: [4500, 6000]
      tier_5_6_range: [5500, 7000]
      tier_7_range:   [6500, 8000]   # 7 阶大招（如九阳"龙吟九霄"）
    joint_skill:
      base: 4500             # 人剑合一招式，固定基础倍率（共鸣度默契阶段解锁）
      note: "共鸣度 +20% 后解锁，不分心法阶"

# =============================================================================
# 6. 角色系统
# =============================================================================
# GDD §4.1 四属性 + 6 档稀有度

character:

  # --- 四项基础属性 ---
  attributes:
    point_per_attribute_min: 1        # 单项属性下限（GDD §4.1）
    point_per_attribute_max: 10       # 单项属性上限
    total_points_min: 16              # 总点数下限
    total_points_max: 24              # 总点数上限
    distribution: "normal"            # 正态分布（中段最常见）
    distribution_mean: 5.5            # 正态分布均值
    distribution_stddev: 1.5          # 标准差
    rerollable: false                 # 不可重 roll（GDD 强制规则）

  # --- 6 档稀有度概率（GDD §4.1，强制规则）---
  # 总和必须为 100%
  rarity_distribution:
    - rarity: yongCai     # 庸才
      probability: 0.15   # 15%
      total_points_range: [16, 17]
    - rarity: xunChang    # 寻常
      probability: 0.35   # 35%
      total_points_range: [18, 19]
    - rarity: biaoZhun    # 标准
      probability: 0.25   # 25%
      total_points_range: [20, 20]
    - rarity: ziYou       # 资优
      probability: 0.18   # 18%
      total_points_range: [21, 22]
    - rarity: tianCai     # 天才
      probability: 0.05   # 5%
      total_points_range: [23, 23]
    - rarity: jueShi      # 绝世
      probability: 0.02   # 2%
      total_points_range: [24, 24]

  # --- 奇遇属性加成（GDD §4.1）---
  # 后天弥补先天，但有硬上限
  adventure_attribute_bonus:
    lifetime_cap_per_character: 5     # 每个角色生涯总加成上限 +5(#4③ B2 已接 EncounterService.attributeGainCap)
    # ⚠️ bonus_per_event_min/max/distribution/weights 未运行时消费(#4③ B7 核账):
    # applyOutcome 用各 data/encounters.yaml outcome 写死的 attributeDelta,以下为设计参考。
    bonus_per_event_min: 1            # 单次奇遇最少加 1 点
    bonus_per_event_max: 3            # 单次奇遇最多加 3 点
    distribution: "weighted"          # 大部分加 1，少数加 2-3
    weights: [0.65, 0.25, 0.10]      # 1 点/2 点/3 点的概率

# =============================================================================
# 6b. 奇遇系统
# =============================================================================
# GDD §7.2 武学领悟 · fortune 软概率灵敏度

encounter:
  # fortune 软概率灵敏度:p = baseProbability * (1 + fortune / fortune_sensitivity)
  # (C-W14-1 决策点 Q3 · #4③ B5 从 encounter_service.dart 硬编码 20.0 外置)
  fortune_sensitivity: 20

# =============================================================================
# 7. 闭关系统
# =============================================================================
# GDD §7.3 时间锚点闭关 + §8.3 五张地图

retreat:

  # --- 三档闭关时长（GDD §7.3）---
  durations:
    - hours: 1
      description: "短闭关 · 适合短时间游玩场景"
    - hours: 4
      description: "中闭关 · 适合临睡前安排"
    - hours: 12
      description: "长闭关 · 适合工作日全天"

  # --- 五张闭关地图（GDD §8.3）---
  # 产出率字段：所有 _per_hour 字段是"每小时基础产出"，最终产出还会乘以
  # 时辰加成、节气加成、心法加成等

  # 根因A(2026-05-29):闭关 EXP ×2.5,72h ≈ 3-4 个 Ch3 Boss(6000/Boss)。
  # 原值 100/80/90/70/200 → 250/200/225/175/500。离线成可观但弱于主动战斗的收益。
  maps:

    # === 山林：平均产出，新手地图 ===
    - map_type: shanLin
      map_name: "山林"
      required_realm: xueTu                  # 学徒即可进入
      base_outputs:
        experience_per_hour: 100             # B2 finding 修正(2026-05-29):低 tier 回 ×1.0(原值)·避免挂机优先早期碾压(满挂 72h 二流 16 层→三流 12 层·对 Ch1 学徒差 1 阶不碾压)·根因A ×2.5 保留在 erLiu+ 中期
        mojianshi_per_hour: 1.0
        silver_per_hour: 8.0                 # 银两/小时(T6 balance:山林学徒图,提早期降门槛)
        equipment_drop_rate: 1.0             # 基础掉率（无加成）
        technique_learn_rate: 1.0
        internal_force_growth: 1.0
      biome: mountainForest                  # C-W14-2 奇遇触发维度
      weather: clear
      image_path: assets/maps/shanLin.png
      dropTable:
        - equipmentDefId: weapon_xunchang_tie_jian
          dropChance: 1.0
        - equipmentDefId: armor_xunchang_bu_yi
          dropChance: 1.0
        - equipmentDefId: accessory_xunchang_yu_pei
          dropChance: 1.0

    # === 古剑冢：兵器掉率 +50% ===
    - map_type: guJianZhong
      map_name: "古剑冢"
      required_realm: sanLiu                 # 三流境界解锁
      base_outputs:
        experience_per_hour: 80              # B2 finding 修正(2026-05-29):三流图回 ×1.0(原值)·低 tier 不享根因A ×2.5(中期保留在 erLiu+)
        mojianshi_per_hour: 0.8
        silver_per_hour: 14.0                # 银两/小时(T6 balance:古剑冢三流图)
        equipment_drop_rate: 1.5             # 兵器掉率 +50%（GDD §8.3）
        technique_learn_rate: 1.0
        internal_force_growth: 1.0
      biome: swordTomb
      weather: mist
      image_path: assets/maps/guJianZhong.png
      dropTable:
        - equipmentDefId: weapon_xunchang_zhe_dao
          dropChance: 1.0
        - equipmentDefId: armor_xunchang_duan_gua
          dropChance: 1.0
        - equipmentDefId: accessory_xunchang_tong_ling
          dropChance: 1.0

    # === 藏经阁：心法领悟 +50% ===
    - map_type: cangJingGe
      map_name: "藏经阁"
      required_realm: sanLiu
      base_outputs:
        experience_per_hour: 90              # B2 finding 修正(2026-05-29):三流图回 ×1.0(原值)·低 tier 不享根因A ×2.5(中期保留在 erLiu+)
        mojianshi_per_hour: 0.5
        silver_per_hour: 14.0                # 银两/小时(T6 balance:藏经阁三流图)
        equipment_drop_rate: 1.0
        technique_learn_rate: 1.5            # 心法领悟 +50%
        internal_force_growth: 1.0
      biome: temple
      weather: clear
      image_path: assets/maps/cangJingGe.png
      dropTable:
        - equipmentDefId: weapon_xunchang_ruan_bian
          dropChance: 1.0
        - equipmentDefId: armor_xunchang_mian_jia
          dropChance: 1.0
        - equipmentDefId: accessory_xunchang_yao_nang
          dropChance: 1.0

    # === 悬崖瀑布：内力增长 +50% ===
    - map_type: xuanYaPuBu
      map_name: "悬崖瀑布"
      required_realm: erLiu                  # 二流境界解锁
      base_outputs:
        experience_per_hour: 175             # 根因A ×2.5(原 70)
        mojianshi_per_hour: 0.5
        silver_per_hour: 24.0                # 银两/小时(T6 balance:悬崖瀑布二流主力收入图,校准锚点)
        equipment_drop_rate: 1.0
        technique_learn_rate: 1.0
        internal_force_growth: 1.5           # 内力增长 +50%
      biome: cliffWaterfall
      weather: rain
      image_path: assets/maps/xuanYaPuBu.png
      dropTable:
        - equipmentDefId: weapon_xiangyang_gang_dao
          dropChance: 1.0
        - equipmentDefId: armor_xiangyang_pi_jia
          dropChance: 1.0
        - equipmentDefId: accessory_xiangyang_yin_jie
          dropChance: 1.0

    # === 断崖绝壁：宗师专属，全维度高产出 ===
    - map_type: duanYaJueBi
      map_name: "断崖绝壁"
      required_realm: zongShi                # 仅宗师以上可去（GDD §8.3）
      base_outputs:
        experience_per_hour: 500             # 根因A ×2.5(原 200)
        mojianshi_per_hour: 2.0
        silver_per_hour: 60.0                # 银两/小时(T6 balance:断崖绝壁顶级图)
        equipment_drop_rate: 1.5             # 全维度都加 50%
        technique_learn_rate: 1.5
        internal_force_growth: 1.5
      biome: cliff
      weather: snow
      image_path: assets/maps/duanYaJueBi.png
      dropTable:
        - equipmentDefId: weapon_zhongqi_po_zhen_chui
          dropChance: 1.0
        - equipmentDefId: armor_zhongqi_yin_lin_jia
          dropChance: 1.0
        - equipmentDefId: accessory_zhongqi_qing_yu_huan
          dropChance: 1.0

  # --- 时辰加成（GDD §7.3）---
  # 加成基于"开始闭关时刻"，不会因为跨时辰而动态切换
  # ⚠ time_range 字段为固定时辰文档锚（审计 D6 2026-06-24）：NumbersConfig 只解析
  #   multiplier/effect/target_attribute/applies_to_school，**不解析 time_range**。
  #   实际时段判定硬编码在 seclusion_service.dart `_isZiShi`(h∈{23,0}) / `_isZhengWu`(h∈{11,12})。
  #   子时(23:00-01:00)/正午(11:00-13:00)是固定传统时辰常量、非可调平衡项，编辑此处 time_range 不生效。
  time_of_day_bonus:
    - period: ziShi                          # 子时
      time_range: ["23:00", "01:00"]
      effect: "internal_force_growth"
      multiplier: 1.20                       # 内力增长 +20%
    - period: zhengWu                        # 正午
      time_range: ["11:00", "13:00"]
      effect: "yang_school_techniques"       # 阳刚类武学（刚猛流派）+20%
      multiplier: 1.20
      # CLAUDE.md §12.1 #7 收口 v1.4(2026-05-16):正午阳刚 +20% 加成定向落地。
      target_attribute: "internal_force_points"  # 加成乘到 internalForcePoints(刚猛=内力外放对应)
      applies_to_school: "gangMeng"          # 仅主修刚猛流派 character 触发,非刚猛 character 不加成
    - period: other
      time_range: null                       # 其他时段无加成
      effect: null
      multiplier: 1.00

  # --- 节气日加成（GDD §7.3 + CLAUDE.md §12 #13 决议 2026-05-15）---
  # Demo 阶段方案 A:12 个节气均匀覆盖四季,纯公历 hardcode,不引入农历库。
  # 后续年份由代码读 yaml 取月日(忽略年份)与当前公历日比较即可,二十四节气年际偏差仅 1 天。
  # 中秋是农历节日不是节气,已删除(原 PROGRESS §7 挂账销账)。
  solar_term_bonus:
    multiplier: 1.30                         # 节气日全属性 +30%
    days_2026:
      - {name: "立春", date: "2026-02-04"}
      - {name: "雨水", date: "2026-02-19"}
      - {name: "清明", date: "2026-04-05"}
      - {name: "谷雨", date: "2026-04-20"}
      - {name: "立夏", date: "2026-05-06"}
      - {name: "夏至", date: "2026-06-21"}
      - {name: "立秋", date: "2026-08-08"}
      - {name: "处暑", date: "2026-08-23"}
      - {name: "秋分", date: "2026-09-23"}
      - {name: "立冬", date: "2026-11-08"}
      - {name: "小雪", date: "2026-11-22"}
      - {name: "冬至", date: "2026-12-22"}

  # --- 产出公式系数（§12 #5 决议：2026-05-11）---
  realm_scale_per_tier: 1.3      # 每升一大境界，产出倍率 ×1.3（学徒 ×1.0，武圣 ≈4.83）
  cap_hours: 72                  # 离线结算封顶小时数（超出不累积）
  base_equip_drop_probability: 0.1  # 基础装备触发概率，与 equipmentDropRate 相乘

  # --- 心法领悟 / 内力增长基础锚点（#30 闭关 3 维度接 service,2026-05-15）---
  # technique_learn_rate / internal_force_growth 是地图特色乘数（0.5~1.5），
  # 这两个字段提供「每小时基础点数」锚点，computeOutputs 公式：
  #   techniqueLearnPoints = floor(base × def.techniqueLearnRate × hours × realmScale × solarBonus)
  #   internalForcePoints  = floor(base × def.internalForceGrowth × hours × realmScale × solarBonus × ziShiBonus)
  # 推算依据：
  #   - 内力锚点 5：学徒山林 72h cap +360 内力（500→860 涨 17%）；断崖宗师 72h +2007 内力。
  #     红线内力 15000（GDD §5.4），不破上限。
  #   - 心法锚点 0.5：山林 72h +36 progress；藏经阁 sanLiu 72h +91 progress（≈ 初窥→小成 100）；
  #     极境 6500 progress 即便顶级闭关也需 100+ 天，合「极境=老玩家追求」（GDD）。
  base_internal_force_per_hour: 5      # 内力每小时基础点数
  base_technique_learn_per_hour: 0.5   # 心法领悟每小时基础点数

# =============================================================================
# 7.5 农历节日（GDD §12.4 W16 接口预留 2026-05-16）
# =============================================================================
# **不影响数值红线**（GDD §12.4 明文「节日活动：不影响数值」）—— 此段仅作为 encounter
# trigger 维度 + UI「今日节日」chip 显示来源。农历转公历每年不同，先 hardcode 2026 年，
# 后续年份由 yaml 加 days_<year> 段（沿用 solar_term_bonus.days_2026 体例）。
# 不引入农历库，与 §12 #13 决议保持一致。
#
# 8 个传统节日：除夕 / 春节 / 元宵 / 清明 / 端午 / 七夕 / 中秋 / 重阳（覆盖一年四季）。
# 中秋虽是农历节日，与节气 solar_term_bonus 早期混入「中秋」（§7 挂账）语义不同 ——
# solar_term_bonus 24 节气表已删中秋，festivals 这边重新作为节日列入。
# 清明既是节气（retreat.solar_term_bonus.days_2026 中存在）也是节日 —— 两通道独立各走各的
# （GDD §8.4 节日通道独立于节气通道），同一天双重身份不冲突。
# W17 D-#3 销账后 W17 B 任务扩 chuXi/qingMingJie。

# M2 范围 B 通用被动离线挂机(spec 2026-06-15-m2-offline-passive-idle)。
# 不开闭关退游戏也按真实离线时长涓流产出，≈闭关同时长 25%。初值取入门图
# (exp 100 / moji 1.0)×0.25，base 值待 balance_simulator 校准(见 Task 7)。
passive_idle:
  base_mojianshi_per_hour: 0.25   # ≈ 入门闭关图 1.0 × 0.25
  base_exp_per_hour: 25.0         # ≈ 入门闭关图 100 × 0.25
  realm_scale_per_tier: 1.3       # 复用闭关锚点(学徒 ×1.0，武圣 ≈4.83)
  cap_hours: 72                   # 复用闭关封顶，超出不累积
  min_recap_hours: 1.0            # 离开 ≥1h 才弹告知卡(与范围 A 一致)

battle_report:
  # 失败复盘诊断规则阈值（spec 2026-06-15-battle-report-diagnosis）。
  # 规则 id / priority 写死在 battle_diagnosis.dart（代码顺序即优先级），
  # 此处只承载可调阈值。文案在 UiStrings（§5.6 文案不进 yaml）。
  internal_wound_pct: 0.30          # 内伤占受伤总伤 ≥ 此比例 → killed_by_internal_wound
  minion_damage_pct: 0.35           # 小怪伤害占比 ≥ 此比例 → mob_overrun（§11.4 原值）
  frontline_death_phase_pct: 0.5    # 前排死亡 tick 占总回合 ≤ 此比例 → frontline_fragile
  survivor_hp_pct: 0.5              # 敌方存活者平均 HP ≥ 此比例 → dps_too_low

festivals:
  days_2026:
    - {festival: chuXi,       date: "2026-02-16"}  # 除夕   农历腊月最后一天
    - {festival: chunJie,     date: "2026-02-17"}  # 春节   农历正月初一
    - {festival: yuanXiao,    date: "2026-03-03"}  # 元宵   农历正月十五
    - {festival: qingMingJie, date: "2026-04-05"}  # 清明   公历清明节
    - {festival: duanWu,      date: "2026-06-19"}  # 端午   农历五月初五
    - {festival: qiXi,        date: "2026-08-19"}  # 七夕   农历七月初七
    - {festival: zhongQiu,    date: "2026-09-25"}  # 中秋   农历八月十五
    - {festival: chongYang,   date: "2026-10-18"}  # 重阳   农历九月初九

# =============================================================================
# 8. 30 层爬塔"问鼎江湖"
# =============================================================================
# GDD §8.2：每天 5 次挑战次数，通关层数决定排行榜位置

tower:

  # --- 每日挑战次数（GDD §8.2，强制规则）---
  daily_attempts: 5
  refresh_at: "00:00"                        # 本地时区午夜重置（详见 schema §4.10 时区规则）

  # --- 30 层难度递增曲线 ---
  # difficulty_multiplier 影响敌人 HP / 攻击 / 速度
  # 设计原则：
  #   1-10 简单：玩家境界刚到二流即可挑战
  #   11-20 中等：需要二流圆熟 + 利器装备
  #   21-30 困难：需要一流境界 + 强化高的装备
  #   Boss 层（5/15/25 小，10/20/30 大）额外乘以 boss_multiplier

  difficulty_curve:
    # === 简单段 (1-10) ===
    - layers: [1, 2, 3, 4, 5]
      difficulty_range: [1.00, 1.20]         # 线性 1.0/1.05/1.10/1.15/1.20
      tier: "简单前段"
      recommended_realm: erLiu               # 推荐境界：二流·圆熟
    - layers: [6, 7, 8, 9, 10]
      difficulty_range: [1.25, 1.50]         # 1.25/1.30/1.35/1.40/1.50
      tier: "简单后段"
      recommended_realm: erLiu               # 二流·登峰

    # === 中等段 (11-20) ===
    - layers: [11, 12, 13, 14, 15]
      difficulty_range: [1.60, 2.00]         # 1.60/1.70/1.80/1.85/2.00
      tier: "中等前段"
      recommended_realm: yiLiu               # 一流·启蒙
    - layers: [16, 17, 18, 19, 20]
      difficulty_range: [2.10, 2.60]         # 2.10/2.20/2.30/2.45/2.60
      tier: "中等后段"
      recommended_realm: yiLiu               # 一流·圆熟

    # === 困难段 (21-30) · Demo 顶级挑战 ===
    - layers: [21, 22, 23, 24, 25]
      difficulty_range: [2.80, 3.40]         # 2.80/2.95/3.10/3.25/3.40
      tier: "困难前段"
      recommended_realm: yiLiu               # 一流·登峰
    - layers: [26, 27, 28, 29, 30]
      difficulty_range: [3.55, 4.20]         # 3.55/3.70/3.85/4.00/4.20
      tier: "困难后段"
      recommended_realm: jueDing             # 绝顶·启蒙（Demo 不开放绝顶但供爬塔挑战）

  # --- Boss 层配置（GDD §8.2）---
  # 6 个 Boss：3 小 + 3 大
  boss_layers:
    small_boss_layers: [5, 15, 25]           # 小 Boss
    big_boss_layers: [10, 20, 30]            # 大 Boss
    small_boss_multiplier: 1.5               # 小 Boss 数值 ×1.5
    big_boss_multiplier: 2.0                 # 大 Boss 数值 ×2.0

  # --- Boss 血量校验（GDD §5.4 红线 60000+，2026-06-14 由 50000 上调；终局周目膨胀可破 60000 但不进 1M）---
  # 第 30 层大 Boss：base_hp 12000 × difficulty 4.20 × boss_mult 2.0 = 100,800 ✓
  # 第 10 层大 Boss：base_hp 5000 × difficulty 1.50 × 2.0 = 15,000（前期 Boss 较低）
  # 第 20 层大 Boss：base_hp 8500 × difficulty 2.60 × 2.0 = 44,200（中段 Boss，低于 60000+ 红线）
  # 注：以上 base_hp 由 StageDef 中的具体敌人配置决定，此处仅校验

  # --- 排行榜配置 ---
  leaderboard:
    sync_to_supabase: true                   # 通关后同步到 Supabase
    sync_throttle_seconds: 60                # 节流：每 60 秒最多同步一次
    track_metrics: ["highest_layer", "best_clear_time", "total_attempts"]

# =============================================================================
# 9. 师徒传承
# =============================================================================
# GDD §7.1 解锁节奏 + §6.4 装备共鸣传承

inheritance:

  # --- 解锁节奏（GDD §7.1）---
  unlock_rules:
    can_take_disciple_at: yiLiu              # 突破到一流可收徒
    disciple_can_take_grand_disciple_at: jueDing  # 弟子突破到绝顶可收徒孙
    can_pass_legacy_at: wuSheng              # 武圣后传位（飞升渡劫，Demo 不实现）

  # --- Demo 简化（GDD §7.1）---
  demo_max_characters: 3                     # Demo 阶段最多 3 角色：祖师 + 大弟子 + 二弟子

  # --- 师承遗物（GDD §6.1）---
  # CLAUDE.md §12.1 #10 收口 v1.5(2026-05-16) 规则层 4 子项决议:
  # Q1 传递时机:武圣飞升时自动传(GDD §7.1 原意,Demo 不实装飞升 → Phase 5+ 激活)
  # Q2 多徒弟归属:玩家进选件界面逐件分配(给主动权 + 后期 UI 包不复杂)
  # Q3 多代叠加:只取当代不叠加(数值不爆炸,5 代不会 +25%;UI 可显传承链路但 buff 不叠)
  # Q4 同部位冲突:自动卸下原装入背包 + 新遗物入槽(sane default,不做装备分解违反 §5.1)
  heritage_items:
    pieces_per_generation_min: 1             # 每代师父传 1-2 件
    pieces_per_generation_max: 2
    auto_buff_internal_force_max: 0.05       # 师承遗物自带 +5% 内力上限 buff
    resonance_retention: 0.7                 # 共鸣度保留 70%
    transfer_trigger: "ascend_to_wusheng"    # v1.5:仅武圣飞升触发(P2.3 已实装)
    multi_disciple_allocation: "player_pick" # v1.5:玩家逐件选分配(P2.3 已实装)
    stack_across_generations: false          # v1.5:只取当代不累代叠加(derived_stats 按 instance count 不按 prev len · spec p5_lineage_full §Q4 加 R5.8 防回退测)
    conflict_slot_resolution: "auto_swap"    # v1.5:同部位自动 swap(P5+ 真实装 · AscendService.performAscend 副作用 4:disciple.equipped{Slot}Id 接新遗物 · 旧装 owner 不变入背包 · spec §Q3)

  # --- 祖师爷 buff（GDD §7.1）---
  # P1.1 A1 E.5(2026-05-21,1.0 路线图):决议方案 E.5.A,enabled_when_alive: false → true。
  # 设计依据:GDD §7.1「玩家是开派祖师」直译 — 玩家本人 = active 中 isFounder=true 角色,
  # 自带 sect_wide_buff 作用于 active 中所有角色(`apply_to_disciples_only: false`)。
  # CLAUDE.md §12.2 #11 v1.5 原决议「Demo 不实装,1.0 版本再设计」对应 P1.1 阶段激活。
  # 数值上限:internal_force_max_pct=0.05 + lineage_heritage 4 件 0.20 = 0.25 总,
  # 基础 15000 × 1.25 = 18750 → 待心法 / 装备血量公式叠加后,
  # CharacterDerivedStats 公式层 clamp 到 §5.4 红线 internal_force ≤ 15000 / max_hp ≤ 20000。
  founder_ancestor_buff:
    enabled_when_alive: true                 # P1.1 flip,玩家本人=祖师即享 buff
    sect_wide_buff:
      internal_force_max_pct: 0.05           # 内力上限 +5%
      max_hp_pct: 0.05                       # 最大血量 +5%
      crit_rate_bonus: 0.02                  # 暴击率 +2% (绝对值)
      # ⚠️ 未接公式(H2 audit S3 核账):全 lib/ 无修炼度公式消费此字段,仅 numbers_config
      # 解析。Phase 5+ 接 cultivation 公式后再启用 + 恢复 UI 显示(lineage_panel 已移除
      # 误导性 +3% 行,避免向玩家展示不生效的 buff)。
      cultivation_progress_pct: 0.03         # 修炼度获取 +3%(未生效 · Phase 5+ 接公式)
      apply_to_disciples_only: false         # active 中 founder + disciples 全享

# =============================================================================
# 10. 心法相生组合（GDD §4.5）
# =============================================================================
# 5 个隐藏组合的具体效果数值。组合判定逻辑见 SynergyDef，本段只给数值。

synergies:

  effect_values:
    # 阴阳调和（九阳 + 九阴）：全属性 +20%
    yin_yang_he:
      effect_type: "all_attr_pct"
      effect_value: 0.20

    # 丐帮传承（降龙十八掌 + 打狗棒法）：解锁"亢龙有悔"暴击
    gai_bang_chuan_cheng:
      effect_type: "unlock_skill_crit"
      target_skill_id: "skill_kang_long_you_hui"
      crit_rate_bonus: 0.50

    # 少林正宗（易筋经 + 少林外功）：内力增长 +30%
    shao_lin_zheng_zong:
      effect_type: "internal_force_growth_pct"
      effect_value: 0.30

    # 武当圆融（太极拳 + 太极剑）：反伤 15%
    wu_dang_yuan_rong:
      effect_type: "reflect_pct"
      effect_value: 0.15

    # 华山合璧（紫霞神功 + 华山剑法）：暴击伤害 +50%
    hua_shan_he_bi:
      effect_type: "crit_dmg_pct"
      effect_value: 0.50

# =============================================================================
# 11. 战例验证
# =============================================================================
# 用具体战例反向验证上述数值是否合理。如果改动 combat 段的系数，
# 务必重新跑一遍这些战例确认未突破 GDD §5.2 红线。

validation_examples:

  # --- 战例 A：学徒新手关 ---
  # 验证目标：第一小时所有战斗让玩家轻松取胜（GDD §10.3）
  example_a:
    description: "学徒·入门 主角 vs 学徒·启蒙 山贼"
    attacker:
      realm: "xueTu / ruMen (lv 2)"
      internal_force: 600
      equipment_attack: 130              # 寻常货武器中段
      skill_multiplier: 500              # 普通攻击
      cultivation_multiplier: 1.00       # 初窥
      school_counter: 1.00               # 中性
      critical: 1.00                     # 无暴击
    defender:
      realm: "xueTu / qiMeng (lv 1)"
      max_hp: 3250                       # P0.1 #38: 1000 + 500*0.5 + 5*400 = 1000+250+2000 = 3250(新公式)
      defense_rate: 0.05                 # 学徒 5%
    calculated_damage: "(600*0.4 + 130*1.0 + 500) * 1.0 * 1.0 * 1.0 * (1-0.05) * 1.0 = 826"
    expected_outcome: "约 4 击致死，节奏适合新手期教学战斗 ✓"

  # --- 战例 B：二流圆熟同境界对决 ---
  # 验证目标：普通伤害落在 GDD §5.2 红线 2000-8000 区间
  example_b:
    description: "二流·圆熟 主角 vs 二流·圆熟 对手"
    attacker:
      realm: "erLiu / yuanShu (lv 19)"
      internal_force: 3000
      equipment_attack: 580              # 利器武器中段（其实利器是一流装备，二流主角用利器需通过奇遇）
      skill_multiplier: 1500             # 强力技能（中段）
      cultivation_multiplier: 1.75       # 圆满
      school_counter: 1.00
      critical: 1.00
    defender:
      realm: "erLiu / yuanShu (lv 19)"
      max_hp: 5400                       # P0.1 #38: 1000 + 3000*0.5 + 6*400 + 500 = 1000+1500+2400+500 = 5400(新公式)
      defense_rate: 0.15                 # 二流 15%
    calculated_damage: "(3000*0.4 + 580 + 1500) * 1.75 * 1.0 * 1.0 * 0.85 * 1.0 = 4889"
    expected_outcome: "在 2000-8000 红线内 ✓；约 2 击致死，强力技能节奏合理"

  # --- 战例 C：三流挑战二流（境界差吃亏）---
  # 验证目标：低境界打高境界吃亏明显（GDD §5.5 设计意图）
  example_c:
    description: "三流·登峰 主角 vs 二流·入门 高手（差 1 大境界）"
    attacker:
      realm: "sanLiu / dengFeng (lv 14)"
      internal_force: 2000
      equipment_attack: 280              # 像样货上段
      skill_multiplier: 1500             # 强力技能
      cultivation_multiplier: 1.30       # 中成
      school_counter: 1.00
      critical: 1.00
      realm_diff_modifier: 0.7           # 低境界打高境界（守方修正）
    defender:
      realm: "erLiu / ruMen (lv 16)"
      max_hp: 5100                       # P0.1 #38: 1000 + 2400*0.5 + 6*400 + 500 = 1000+1200+2400+500 = 5100(新公式)
      defense_rate: 0.15                 # 二流
    calculated_damage: "(2000*0.4 + 280 + 1500) * 1.30 * 1.0 * 1.0 * 0.85 * 0.7 = 1972"
    expected_outcome: "勉强达到普通伤害下限 2000；约 4 击致死，三流挑战二流确实吃力 ✓"

  # --- 战例 D：一流大招暴击 + 流派克制 ---
  # 验证目标：大招暴击应达到"上万"（GDD §5.2）
  example_d:
    description: "一流·圆熟 主角刚猛流大招暴击 vs 一流·启蒙 阴柔流对手"
    attacker:
      realm: "yiLiu / yuanShu (lv 26)"
      internal_force: 5000
      equipment_attack: 600              # 利器武器
      skill_multiplier: 5500             # 大招（刚猛 4 阶心法上限附近）
      cultivation_multiplier: 1.75       # 圆满
      school_counter: 1.25               # 刚猛克阴柔
      critical: 2.00                     # 暴击
    defender:
      realm: "yiLiu / qiMeng (lv 22)"
      max_hp: 6400                       # P0.1 #38: 1000 + 3800*0.5 + 6*400 + 1100 = 1000+1900+2400+1100 = 6400(新公式)
      defense_rate: 0.20                 # 一流
    calculated_damage: "(5000*0.4 + 600 + 5500) * 1.75 * 1.25 * 2.0 * 0.80 * 1.0 = 28525"
    expected_outcome: "破万达成（28525），符合 GDD §5.2 大招暴击'上万'目标 ✓；一击秒杀"

  # --- 战例 E：武圣 vs 武圣（终极对决）---
  # 验证目标：高境界数值不崩溃，仍在合理区间
  example_e:
    description: "武圣·登峰 vs 武圣·登峰（神物 +49 强化）"
    attacker:
      realm: "wuSheng / dengFeng (lv 49)"
      internal_force: 15000
      equipment_attack: 3920             # 神物 1750 × (1+49*0.05) = 1750*3.45 = 6037 × 1.30 共鸣 = 7848
                                          # 但平衡后我们用：1750 × 1.30 共鸣 × 1.0(已含强化) = 校验数据
      skill_multiplier: 8000             # 传说神功大招上限
      cultivation_multiplier: 3.00       # 极境
      school_counter: 1.00
      critical: 2.50                     # 顶级暴击
    defender:
      realm: "wuSheng / dengFeng (lv 49)"
      max_hp: 15500                      # P0.1 #38: 1000 + 15000*0.5 + 10*400 + 3000 = 1000+7500+4000+3000 = 15500(新公式,装备血裸值不含强化)
      defense_rate: 0.35                 # 武圣
    note: "本战例数据用于压力测试，确保武圣境界数值不崩盘"
    expected_outcome: "约 19500 / 19500 几乎一击致死，符合武圣对决'电光石火'氛围 ✓；血量未超 20000 红线 ✓"

# =============================================================================
# 11. 动画时序（T15 攻击动画 + 伤害飘字）
# =============================================================================
# 所有时间单位为毫秒（ms），位移单位为逻辑像素（px）。
# 改这里不动代码，便于未来调快 / 调慢整体战斗节奏。

animation:
  # 攻击三段式（总时长 = rush + hold + retreat）
  attack_rush_ms: 150          # 前冲时长
  attack_hold_ms: 100          # 出招停顿
  attack_retreat_ms: 150       # 后撤时长
  attack_rush_offset_px: 40.0  # 前冲位移幅度（逻辑像素）

  # 伤害飘字
  damage_popup_float_px: 50.0  # 向上漂浮幅度
  damage_popup_ms: 700         # 飘字总时长（含淡出）；≤ action_interval_ms 防跨拍渗漏

  # 动作播放间隔（每个 action 间隔时间）
  action_interval_ms: 1000     # 正常速度：单拍给够攻击动画(400)+飘字读完
  fast_forward_interval_ms: 100  # 快进速度（一键扫荡的战斗本体也走此速）
  sweep_inter_battle_gap_ms: 150  # 一键扫荡：连播逐关切换的关间过场停顿

  # 屏震（暴击时触发）
  shake_offset_px: 3.0         # 最大偏移幅度
  shake_duration_ms: 100       # 单次震屏时长

  # 暴击飘字字号倍率
  critical_font_scale: 1.5

  # 弹道/受击表现（P0-2 战斗可见化）
  projectile_ms: 260          # 攻击者→目标弹道笔触线时长
  hit_flash_ms: 150           # 受击闪一层半透明色块淡出时长
  key_moment_hold_ms: 400     # 关键帧(暴击/大招/合一/破招/击杀)额外顿帧

# =============================================================================
# 12. 心魔系统（1.0 P2.2 §12.1，7 关拦截 wuSheng 7 层突破）
# =============================================================================
# spec doc: docs/handoff/p2_x_inner_demon_spec_2026-05-22.md
# 模型：镜像玩家 character snapshot +10-20% 强化 / 失败 = 散功 ×0.5 阉割版 + 心魔余毒 8h
# 4 主轴拍板：B+B+A 微调+B（触发=wuSheng 6 内+1 飞升前=7 关 / 形态=stages.yaml stageType:innerDemon
#                          / 数值=镜像 +10-20% +§5.4 cap / 惩罚=散功阉割版 + 心魔余毒 8h）

inner_demon:
  mirror_buff_per_stage:             # 各关镜像 character 强化比例（加到玩家 build snapshot）
    stage_inner_demon_01: 0.10
    stage_inner_demon_02: 0.12
    stage_inner_demon_03: 0.14
    stage_inner_demon_04: 0.16
    stage_inner_demon_05: 0.18
    stage_inner_demon_06: 0.20
    stage_inner_demon_07: 0.40       # 末关·心魔·真（Batch 2.5.C 决议:R5.1 实测
                                     # _07 @ +20% 与 _06 @ +20% 分布完全一致
                                     # 3/0/47,spec §一「+20% 双镜像 2 副本」未
                                     # 落地;改 +40% 单副本 YAGNI,不动 BattleState
                                     # 6v3 架构。§5.4 cap 强加保证不破红线）

  mirror_caps:                       # §5.4 数值红线 cap（防玩家 build 超时镜像也超）
    hp_max: 20000                    # §5.4 玩家血上限
    internal_force_max: 15000        # §5.4 内力上限
    # Batch 2.5.C 决议(2026-05-23):attack_power_max 2000 → 6000。
    # 原 2000 锚错 §5.4 维度 — GDD §5.4「装备攻击 2000」是 equipment.yaml
    # 单件 baseAttack 上限,不是角色 totalEquipmentAttack(3 件求和)上限。
    # 玩家 wuSheng·dengFeng 满 build totalEquipmentAttack ≈ 2850(R5.2 实测),
    # 镜像 ×(1+buff) clamp 2000 让镜像永远 < 玩家,导致 R5.1 全 rightWins=0。
    # 改 6000 = 3 件 × §5.4 单件 2000,镜像 +40% buff 真生效。
    attack_power_max: 6000

  failure_penalty:                   # 散功 ×0.5 阉割版（GDD §6 散功公式半惩罚）
    internal_force_multiplier: 0.85
    internal_force_floor_pct: 0.50   # 内力扣减地板=internalForceMax×0.50(M6 防无限重试归零)
    main_cultivation_multiplier: 0.90
    sub_cultivation_multiplier: 1.00
    debuff_id: inner_demon_residue
    debuff_clear_via_retreat_hours: 8

  residue_debuff:                    # 心魔余毒 buff 效果（闭关 8h 清）
    battle_output_multiplier: 0.95   # 战斗输出 -5%
    internal_force_recovery_multiplier: 0.80  # 内力恢复 -20%

  unlock_triggers:                   # 触发关 victory → 下一关 unlock 链
    stage_06_05: stage_inner_demon_01
    stage_inner_demon_01: stage_inner_demon_02
    stage_inner_demon_02: stage_inner_demon_03
    stage_inner_demon_03: stage_inner_demon_04
    stage_inner_demon_04: stage_inner_demon_05
    stage_inner_demon_05: stage_inner_demon_06
    stage_inner_demon_06: stage_inner_demon_07
    # stage_inner_demon_07 victory → ascend_a1 飞升 hook（P2.3 spec 接管）

  required_realm_layer:              # 玩家当前境界达到该 layer 才能进入（layer unlock 拦截）
    stage_inner_demon_01: { tier: wuSheng, layer: qiMeng }
    stage_inner_demon_02: { tier: wuSheng, layer: ruMen }
    stage_inner_demon_03: { tier: wuSheng, layer: shuLian }
    stage_inner_demon_04: { tier: wuSheng, layer: jingTong }
    stage_inner_demon_05: { tier: wuSheng, layer: yuanShu }
    stage_inner_demon_06: { tier: wuSheng, layer: huaJing }
    stage_inner_demon_07: { tier: wuSheng, layer: dengFeng }

# =============================================================================
# 轻功对决配置(1.0 P3.1 §12.3,GDD v1.11)
# =============================================================================
# 4 主轴拍板:① 5 关 terrain 分布(yiLiu 3 关 water/rooftop/bamboo + jueDing 2 关
#                              高阶 water/rooftop)
#           ② terrain modifier ≥15% 单维度有效(memory feedback_balance_buff_singledim_no_effect)
#           ③ 架构=LightFootStrategy 组合委派 DefaultGroundStrategy 零代码重复
#                  (memory feedback_avoid_over_engineer_abstraction)
#           ④ 平行支线**不接管 wuSheng 突破链**(isLayerLocked 无 lightFoot 路径)
# 模型:terrain modifier 烘焙到 BattleCharacter critRate/evasionRate/defenseRate
#      + damage_multiplier(LightFootStrategy.runToEnd 入口一次性应用,双方对等)

light_foot:
  terrain_modifiers:                 # 3 terrain × {crit/evasion/defense/damage} delta,双方对等
    water:                           # 水面(渡口/急流):滑步难防 + 水波闪躲
      critical_rate_delta: 0.00
      evasion_rate_delta: 0.15
      defense_rate_delta: -0.10
      damage_multiplier: 1.00
    rooftop:                         # 屋脊(青瓦/飞檐):高处优势 + 瓦上劲风
      critical_rate_delta: 0.10
      evasion_rate_delta: 0.00
      defense_rate_delta: -0.05
      damage_multiplier: 1.15
    bamboo:                          # 竹林(密竹/江南):竹影遮蔽 + 卸力
      critical_rate_delta: 0.00
      evasion_rate_delta: 0.20
      defense_rate_delta: 0.00
      damage_multiplier: 0.90

  stage_terrain:                     # 5 关 → terrainBiome 映射(冗余于 stages.yaml,加速 lookup)
    stage_light_foot_01: water
    stage_light_foot_02: rooftop
    stage_light_foot_03: bamboo
    stage_light_foot_04: water       # 高阶 water(jueDing·qiMeng)
    stage_light_foot_05: rooftop     # 高阶 rooftop(jueDing·jingTong)

  unlock_triggers:                   # 触发关 victory → 下一关 unlock 链(平行支线 不接管 wuSheng)
    stage_06_05: stage_light_foot_01
    stage_light_foot_01: stage_light_foot_02
    stage_light_foot_02: stage_light_foot_03
    stage_light_foot_03: stage_light_foot_04
    stage_light_foot_04: stage_light_foot_05

# =============================================================================
# 群战守城(1.0 P3.2 §12.3,GDD v1.13)
# -----------------------------------------------------------------------------
# 设计原则:① 玩家 3 vs 敌 5-7「以少胜多」(沿 inner_demon mirror 体例,UI 0 改)
#           ② wave-based 守城(玩家 HP/IF 跨 wave 保留 / actionPoint+cd wave 间
#                            重置 / 敌方每 wave 全新生成,§5.5 在线 = 离线)
#           ③ 战前阵型 3 选 1 烘焙(idempotent + clamp [0.0, 0.95] 防破红线)
#           ④ 平行支线**不接管 wuSheng 突破链**(isLayerLocked 无 massBattle 路径)
# 模型:阵型 modifier 烘焙到 leftTeam BattleCharacter critRate/evasionRate/
#      defenseRate/damageMultiplier(MassBattleStrategy.runToEnd 入口一次性 +
#      仅玩家 leftTeam 沾,与 LightFoot 双方对等不同 — 阵型是玩家战略选择)

mass_battle:
  formations:                        # 3 阵型 × {crit/evasion/defense/damage} delta,仅 leftTeam 烘焙
    yanXing:                         # 雁行:攻势启(crit + 略破防)
      critical_rate_delta: 0.10
      evasion_rate_delta: 0.00
      defense_rate_delta: -0.05
      damage_multiplier: 1.00
    baGua:                           # 八卦:守势固(双闪避防)
      critical_rate_delta: 0.00
      evasion_rate_delta: 0.05
      defense_rate_delta: 0.10
      damage_multiplier: 1.00
    fengShi:                         # 锋矢:突击强(damage + crit)
      critical_rate_delta: 0.05
      evasion_rate_delta: 0.00
      defense_rate_delta: 0.00
      damage_multiplier: 1.10

  wave_intermission:                 # wave 间过渡规则(MassBattleStrategy._intermission 消费)
    reset_action_point: true         # wave 间 actionPoint 归 0(走 tick 不快进 · §5.5)
    preserve_hp: true                # wave 间 HP 保留(与 alive_hp_recovery_pct 取 max)
    preserve_internal_force: true    # wave 间内力保留(限大招使用频率)
    preserve_cooldowns: false        # wave 间 cd 重置(给玩家下波大招机会)
    revive_dead_pct: 1.00            # 死角色满血复活(P3.2.C 修法 ① · 守城短歇补员 · 平衡 wave 数量劣势)
    alive_hp_recovery_pct: 1.00      # 活角色 hp 回满 maxHp(P3.2.C 修法 ① · 短歇恢复;与 preserve_hp 取 max 不会反向降 hp)
    alive_if_recovery_pct: 0.50      # 活角色内力恢复 50% maxIF(P3.2.B · 防 wave 3+ IF 耗尽全 draw;与 preserve_internal_force 取 max)

  stage_formations:                  # 5 关默认阵型(玩家未选时 fallback · 主题契合)
    stage_mass_battle_01: yanXing    # 守村:山贼围攻 yiLiu·qiMeng 攻势启
    stage_mass_battle_02: baGua      # 守镇:江湖匪众 yiLiu·jingTong 守势教学
    stage_mass_battle_03: fengShi    # 守县:他派偷袭 yiLiu·dengFeng 突击教学
    stage_mass_battle_04: baGua      # 守关:边镇胡骑 jueDing·qiMeng 沉着守关
    stage_mass_battle_05: fengShi    # 守城:西凉残部 jueDing·jingTong 突击破城

  unlock_triggers:                   # 触发关 victory → 下一关 unlock 链(平行支线 不接管 wuSheng)
    stage_06_05: stage_mass_battle_01
    stage_mass_battle_01: stage_mass_battle_02
    stage_mass_battle_02: stage_mass_battle_03
    stage_mass_battle_03: stage_mass_battle_04
    stage_mass_battle_04: stage_mass_battle_05

  # P3.2.B 残血容差:wave 委派 _delegate.runToEnd 返回 draw 但敌方剩 ≤ 5% HP 时
  # 强判 leftWin(守城清剿叙事 · 解 BattleEngine 末尾「残血 KO 不动」stalemate)。
  # 诊断:R5.1 stage_03-05 全 draws 根因为最后 1 个残血敌方 KO 不掉(玩家 17400/26100 HP
  # 输出充足 · 敌方 554-7000 残血 KO 不掉触 maxTicks)。
  residual_hp_threshold_pct: 0.30

# =============================================================================
# 12. P2.3 飞升 + 遗物 transfer (GDD §7.1 · spec p2_3_ascension_spec_2026-05-24)
# =============================================================================
# 飞升 eligibility 3 条件并存(Q4d 拍板):
#   ① stage_inner_demon_07 cleared(心魔末关)
#   ② stage_06_05 cleared(Ch6 末关)
#   ③ founder.realm == wuSheng·dengFeng(顶级境界)
# 任一未满足 → LineagePanel 飞升按钮 disabled · tooltip 显未达条件清单。
#
# transfer 行为 4 字段语义(inheritance.heritage_items v1.5 决议,P2.3+P5+ lib 端消费):
#   - transfer_trigger=ascend_to_wusheng:仅本批触发(AscendService.performAscend)
#   - multi_disciple_allocation=player_pick:AscensionScreen 下拉选 disciple
#   - stack_across_generations=false:derived_stats.dart §244 按 isLineageHeritage instance
#     count 不按 prev len 累加 buff(P5+ R5.8 加防回退测 · spec p5_lineage_full §Q4)
#   - conflict_slot_resolution=auto_swap:P5+ 真实装(spec p5_lineage_full §Q3)·
#     AscendService.performAscend 副作用 4 真消费 disciple 端 equipped{Slot}Id 接新遗物

ascension:
  unlock_triggers:                   # 3 条件并存 · AscendService.computeEligibility 消费
    cleared_stages:                  # 双关 cleared 拦截
      - stage_inner_demon_07
      - stage_06_05
    required_realm:                  # 境界拦截 founder == wuSheng·dengFeng
      tier: wuSheng
      layer: dengFeng

# =============================================================================
# 13. P3.3 PVP (GDD §12.3 · spec p3_3_pvp_spec_2026-05-24)
# =============================================================================
# Q1-Q5 默认决议(占位 · reviewer 改后只改本段):
#   Q1 B 异步快照战 / Q2 B 3v3 / Q3 A ELO 经典 K=32 / Q4 A Ch5 cleared / Q5 D Noop → Supabase 替换式
#
# 不变量:ELO 段位仅 UI 词 · 不进 BattleEngine · 不引入 attackPowerMultiplier 越权 buff(§5.4)

pvp:
  elo:
    initial: 1200                       # 新玩家初始
    k_factor: 32                        # 标准 K
    draw_factor: 0.5
  match_range:
    elo_window: 100                     # 匹配 ±100 ELO
    fallback_window: 300                # 找不到则扩到 ±300
    min_pool_size: 3                    # 最小可匹配池
  ranks:                                # ELO → §5.2 七阶映射(段窗 200 · 武圣 2000+ 无上限)
    # xueTu 0-999 / sanLiu 1000-1199 / erLiu 1200-1399(初始)/ yiLiu 1400-1599
    # jueDing 1600-1799 / zongShi 1800-1999 / wuSheng 2000+
  unlock:
    requires_stage: stage_05_05         # 主线 Ch5 cleared(Q4 默认)
  sync:
    impl: noop                          # Phase 3 落 NoopPvpSync · Phase 5 切 supabase
    snapshot_ttl_hours: 168             # 快照 7 天过期
  history:
    max_records: 200                    # PvpRecord 滚动覆盖上限

# =============================================================================
# 14. P3.4 门派事件 (GDD §12.1 · spec p3_4_sect_event_spec_2026-05-24)
# =============================================================================
# Q1-Q5 默认决议(占位):
#   Q1 A 玩家自建门派 / Q2 A 比武大会(单 event Demo)/ Q3 A 独立 sect_reputation 轴
#   Q4 B 否 sect_building 纯抽象 sect_level int / Q5 B 独立 schema founderId 弱挂
#
# 不变量:tournament 复用 DefaultGroundStrategy 不引入新数值轴(§5.4 0 碰)
#         字段 sectReputation 独立于 P1.2 reputation,decay timer 独立 30 天 cycle

sect_event:
  tournament:
    trigger_probability: 0.30          # 月触发概率
    cooldown_days: 30
    trigger_realm_min: yiLiu           # 沿 §5.3 三系锁死
    expire_days: 7                     # 7 天不应战 → expired + reputation -5
    narrative_ids:                     # B1 接通:触发时 rng 选一个文案(FK data/lore/sect_event/)
      - tournament_01
      - tournament_02
      - tournament_03
      - tournament_04
      - tournament_05
  reputation:
    initial: 50
    win_delta: 10
    loss_delta: -5
    decay_per_month_idle: 5            # 30 天无 event → -5/月
    max: 100
    min: 0
  sect_level:
    max: 7
    initial: 1
    promote_wins_threshold: 3          # 每累计 3 胜 → +1 sectLevel(clamp ≤7)
  active_events_max: 3                 # 同 sect 同时 pending 上限

# =============================================================================
# 15. P1.2 江湖恩怨 + 声望 (GDD §12.1 + §12.2 · spec p1_2_jianghu_enmity_spec_2026-05-24)
# =============================================================================
# Q1-Q5 默认决议(spec §0):
#   Q1=B 拆批 / Q2=B 稀疏 NpcRelation / Q3=A+B stage_boss+encounter
#   Q4=A+B UI narrative + 战斗 ±15-25% / Q5=A 沿 §5.2 七阶节奏
#
# 不变量:
#   - 7 阶 label 锁 §5.2 7 境界词(xueTu..wuSheng) · 不开新阶
#   - enmity 战斗 mult clamp 1.25 防越 §5.4 红线
#   - 双向对等(player_attack_power_mult == enemy_attack_power_mult)· 不偏护

jianghu:
  reputation_tiers:                # 7 阶沿 §5.2:学徒/三流/二流/一流/绝顶/宗师/武圣
    - { tier: xueTu,    min: -100, max: -71, label: "声名狼藉" }
    - { tier: sanLiu,   min: -70,  max: -41, label: "恶名" }
    - { tier: erLiu,    min: -40,  max: -11, label: "默默无闻" }
    - { tier: yiLiu,    min: -10,  max:  10, label: "薄有微名" }   # 中间区间
    - { tier: jueDing,  min:  11,  max:  40, label: "侠名初显" }
    - { tier: zongShi,  min:  41,  max:  70, label: "声振江湖" }
    - { tier: wuSheng,  min:  71,  max: 100, label: "天下闻名" }
  enmity_combat_modifier:          # Q4=B 战斗整合
    threshold: -50                  # enmity ≥ |threshold| 触发(第 1 档)
    player_attack_power_mult: 1.15
    enemy_attack_power_mult: 1.15
    severe_threshold: -80           # 第 2 档:深仇大恨
    severe_mult: 1.25
    clamp_max: 1.25                 # ≤25% 防越 §5.4 红线
  triggers:                        # Q3=A+B
    stage_boss_kill_delta: 5        # 击杀有派别 boss · 该派 -5
    stage_boss_kill_rival_delta: 3  # 敌对派 +3
    encounter_npc_delta_min: -8
    encounter_npc_delta_max: 8

# ---------------------------------------------------------------------------
# 帮派门派(P4.1 §12.2 · spec p4_1_sect_management_spec_2026-05-25)
# Q1=B 四 batch / Q2=C 双向 fk / Q3=A 复用 Character / Q4=A 静态 territory yaml /
# Q5=A 三阶组织阶位 / Q6=D 全 trigger / Q7=B mission hook / Q8=A 独立 panel
# ---------------------------------------------------------------------------

sect_management:
  member_cap:                      # Q2=C 双向 fk · Sect.memberCount cap 沿 sectLevel 1-7 阶递进
    by_sect_level: [3, 5, 8, 12, 18, 25, 35]  # 不含 founder 本人
  rank_promote_threshold:          # Q5=A 三阶单向升迁阈值(totalWins 贡献)
    inner_min_contribution: 10      # initiate → inner
    elder_min_contribution: 30      # inner → elder
  recruit:                         # 多维 trigger 招收软概率
    encounter_base_prob: 0.15       # Q6 A · encounter NPC 招收 baseProbability
    stage_boss_recruit_prob: 0.40   # P4.1 1.1 Q6 B · 战胜 Boss 后招降 NPC rng pick(spec p4_1_q6b)
    stage_boss_fail_recover_prob: 0.30  # P4.1 v1.10 预留 · 0 caller · 战败收降留 P5+/1.1
    mission_recruit_prob: 0.50      # Q7 B · sect_event mission resolve 触发候选
  territory:
    demo_initial_count: 6           # Q4=A · `data/territories.yaml` 静态 def 数量
    max_per_sect_by_level: [1, 2, 3, 5, 8, 12, 18]  # 沿 sectLevel 1-7 阶递进 cap

# =============================================================================
# 技能装配 (可玩性 P1b · GDD §6)
# =============================================================================
skill_loadout:
  ultimate_power_threshold: 5000   # 主修心法招 powerMultiplier ≥ 此值 → 大招槽(GDD §6)

# =============================================================================
# 招式解锁 (可玩性 P1a · spec §二)
# =============================================================================
skill_unlock:
  # Boss 技能书来源。主线 Boss 首通必给真解(无需概率);爬塔 Boss 概率掉残页。
  fragment_threshold: 5          # 爬塔残页集齐 N 片解锁(§16 #4 默认,可调)
  tower_fragment_drop_prob: 0.20 # 爬塔 Boss 掉残页概率

# =============================================================================
# 爆品展示动画门槛(2026-06-11 真玩验收):装备 tier ≥ 此阶才播印章盖落动画 + reward 音。
treasure_drop:
  min_tier: zhongQi   # 寻常货/像样货/好家伙/利器/重器/宝物/神物 — 默认重器(5阶)及以上

# =============================================================================
# 周目进化 (P1 cycle_evolution · spec p1_cycle_evolution_spec)
# 敌人随挂机周目数增长自动强化，词条参数全部数据驱动（§5.6 不硬编码）。
# charge_skill_id 复用既有蓄力破招技（stages.yaml chargeSkillId 真实 id）。
# =============================================================================
cycle_evolution:
  scale_per_cycle: 0.10        # 每周目敌人基础属性缩放增幅（+10%，2026-06-26 周目平衡:二周目区分感不足,0.06→0.10·真机校）
  max_cycle_mainline: 3        # 主线最大周目数
  max_cycle_tower: 2           # 爬塔最大周目数
  defense_rate_cap: 0.6        # 敌人防御率上限（60%，防越 §5.4 红线）
  traits:                      # 反制词条参数（unit-testable，纯数据）
    yuti:                      # 御体：防御率加成（按周目分档）
      defense_rate_bonus_c2: 0.08   # C2 加成
      defense_rate_bonus_c3: 0.12   # C3 加成
    fanzhen:                   # 反震：受击反伤 DoT
      damage_per_tick: 200
      ticks: 3
    ningjia:                   # 凝甲：受到暴击伤害减免
      crit_damage_taken_mult: 0.5
    zhenqi:                    # 真气：内力上限 ×(1+pct)（→ 多放一次大招），非战斗开场回复
      internal_force_pct: 0.20
    shipo:                     # 识破：蓄力技复用既有招式（青锋绝 stages.yaml chargeSkillId）
      charge_skill_id: skill_qingshan_qingfeng
  assignment:                  # 各场景 / 周目的词条分配表（cycle key 为整数）
    mainline:                  # 主线（非爬塔）
      2: [yuti, zhenqi]        # 2026-06-26 周目平衡:二周目加真气(敌多放一次大招),提升区分感
      3: [yuti, fanzhen, shipo]
    tower_normal:              # 爬塔普通关
      2: [yuti, zhenqi]
    tower_boss:                # 爬塔 Boss 关
      2: [yuti, fanzhen, shipo, ningjia]

# =============================================================================
# 战后体验(第七阶段 批一)。英雄镜头表现参数(纯表现层,不参与战斗结算)。
# =============================================================================
post_battle:
  hero_camera:
    hold_seconds: 3.0       # 自动消失时长(2-4s,点击可跳过)
    portrait_slide_px: 48   # 立绘侧滑入位移
    portrait_scale_from: 0.88  # 立绘起始缩放(放大到 1.0)

# 第七阶段批三·队伍成长:开局单人,命名弟子按主线关卡节点拜入。
lineage_onboarding:
  disciple_joins:
    - stage_id: stage_01_02   # 过荒山野店 → 大弟子拜入(2 人)
      master_slot_index: 1
      role: senior
      narrative_id: lineage_first_disciple_join
    - stage_id: stage_01_04   # 过洛阳城外小Boss → 二弟子拜入(满队迎章末Boss)
      master_slot_index: 2
      role: junior
      narrative_id: lineage_second_disciple_join

# =============================================================================
# 双层伤势系统（第八阶段 · 2026-06-25）
# spec: 第八阶段 双层伤势系统 spec
# =============================================================================
injury:
  light_injury:
    speed_penalty_per_stack: 3      # 每层减速度(base 100+,轻微扣减)
    max_stacks: 5                   # 最大叠层数
  heavy_injury:
    recovery_hours: 8.0             # 疗养时长(同心魔余毒先例)
    internal_force_max_penalty_pct: 0.15   # 内力上限扣减比例
    attack_output_multiplier: 0.85         # 攻击输出乘数
    heavy_win_hp_threshold_pct: 0.25       # 惨胜阈值:存活角色 endHp<25% maxHp 吃重伤

# F1 里程碑装备授予：stageId → dropSourceTags tag。
# 首通该关 → MilestoneEquipmentGrantService.grantForTag(tag) 授予对应 special
# 装备进背包(一次性，重打不重发)。飞升 tag(ascension_reward)是终局事件非关卡，
# 在 performAscend 内直调不入本表。
milestone_equipment_grants:
  stage_mass_battle_05: mass_battle_merit   # 群战5关全清 → 百战甲(利器)
  stage_inner_demon_07: inner_demon_reward  # 降服全部心魔 → 心魔珠(重器)

# 第八阶段 · 角色等级 Lv(全局连续成长轴,独立于境界 · saveVer 0.31)。
# 升级曲线 expToNext(L) = exp_to_next_base + (L-1)*exp_to_next_per_level。
# per-level 加成经 CharacterDerivedStats 注入(hp/内力经 §5.4 clamp 硬守红线,
# 速度无红线)。**初值保守,待真机校**(同伤势系统先例,见 spec A 块)。
level:
  max_level: 100
  exp_to_next_base: 120
  exp_to_next_per_level: 40
  bonus_max_hp_per_level: 15              # @L100 +1500(经血量 20000 clamp 兜底)
  bonus_internal_force_max_per_level: 8   # @L100 +800(经内力 15000 clamp 兜底)
  bonus_speed_per_level: 1                # @L100 +100(速度无红线)

# 第八阶段 E · 稀有彩头掉落(用户拍板:低等级副本也能爆高阶,低概率不为零)。
# 每场战斗除本关固定掉落外,各 tier 档独立 roll,小概率额外掉「高于本关 N 阶」的
# 随机装备(取命中最高阶)。守 §5.3 可拿不可装(境界锁兜底)/ §5.1 低概率非氪金机制。
# 概率随阶差递减但不为零。**初值保守,待真机校**。
rare_bonus_drop:
  enabled: true
  tiers:
    - { offset: 1, chance: 0.05 }    # 高 1 阶 ~5%
    - { offset: 2, chance: 0.015 }   # 高 2 阶 ~1.5%(命中则覆盖 +1·更稀有优先)

# =============================================================================
# 文件结束
# =============================================================================

taohua_island:
  cap_hours: 72                 # 沿用闭关 72h 防无限堆积(满则停产·非 FOMO)
  # cap 自洽原则(2026-06-25 balance·用户拍板「对齐到 72h」):各仓 cap 须 ≥ 该建筑
  # 满速产出 × cap_hours × level,使「离开 72h 一次性 settle」≈ 持续累积(成品取满)。
  # settle 先跑完 source 再跑 processor,故 source cap 必须容得下整段 72h 的源料,
  # 否则提前封顶丢料、加工拿不到足量 → 长挂玩家产量被截。各 cap 用 base=perLevel 的
  # 线性式 cap(L)=base×L,与产出 ×level 同步缩放。派生下界:源 6×72=432 / 磨剑石
  # 1.5×72=108 / 凝神丹 1.0×72=72,均向上取整留余量(450/120/80)。不变量见
  # island_offline_online_invariant_test。
  #
  # 升级成本「节奏 B」(2026-06-25 balance·用户拍板「前低后高 + 境界分阶」):
  # upgrade_silver_levels = per-level 显式曲线(线性公式做不到前低后高),index = level-1,
  # 长度必 = max_level-1。upgrade_realm_levels = 每级升级的祖师境界 gate(单调非减,L4→5 需
  # 一流 realm3,与高阶配方心血/培元同步解锁)。四座全满 ≈ 52,200 银,贯穿二流→一流数境界。
  # 配方比率(input_per_output)/材料成本(base×level)/产速不动。校验见 taohua_island_config.validate
  # + 红线测 island_upgrade_curve_b_test。
  unlock_chapter_index: 1       # 主线第二章(index 1)cleared 解锁
  buildings:
    tie_jiang_chang:            # 铁匠厂(原料)
      kind: source
      output_item: item_jingtie
      base_rate_per_hour: 6.0
      cap_base: 450                # ≥ 6×72=432(容 72h 源料·见段首 cap 自洽原则)
      cap_per_level: 450
      max_level: 5
      upgrade_silver_levels: [500, 1200, 2800, 6000]   # 节奏 B 前低后高(L1→2..L4→5·全满 10,500/座)
      upgrade_realm_levels: [0, 1, 2, 3]               # 升级境界 gate：L2→3 三流/L3→4 二流/L4→5 一流(realm3)
      upgrade_material_item: item_jingtie
      upgrade_material_base: 40
      realm_unlock_index: 0
    cao_yao_yuan:               # 草药园(原料)
      kind: source
      output_item: item_yaocao
      base_rate_per_hour: 6.0
      cap_base: 450                # ≥ 6×72=432(容 72h 源料·见段首 cap 自洽原则)
      cap_per_level: 450
      max_level: 5
      upgrade_silver_levels: [500, 1200, 2800, 6000]   # 节奏 B 前低后高(L1→2..L4→5·全满 10,500/座)
      upgrade_realm_levels: [0, 1, 2, 3]               # 升级境界 gate：L2→3 三流/L3→4 二流/L4→5 一流(realm3)
      upgrade_material_item: item_yaocao
      upgrade_material_base: 40
      realm_unlock_index: 0
    da_zao_tai:                 # 打造台(加工)

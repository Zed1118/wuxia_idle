# =============================================================================
# numbers.yaml · 武侠挂机游戏数值总配置
# =============================================================================
#
# 文档地位：本文件包含所有可调数值。所有 Dart 代码不得硬编码数值，必须通过
#          GameRepository 从本文件加载。改数值不动代码、不动存档结构。
#
# 遵循文档：GDD.md v1.1、data_schema.md v1.1
# 维护者：Mac 端 Claude Code + Opus 4.7
#
# =============================================================================
# 重要：GDD 公式口误标注
# =============================================================================
#
# GDD §5.3 写"装备攻击 × 8"、§5.6 写"内力 × 5"，按字面公式会突破 §5.2
# 数值红线（伤害破万、武圣血量超 80000）。本文件采用经过平衡的系数：
#
#   装备攻击系数：1.0（GDD 字面值 8.0，平衡后调为 1.0）
#   内力血量系数：0.5（GDD 字面值 5.0，平衡后 0.7，P0.1 #38 方案 D 再调 0.5；
#                     生效值见 combat.max_hp_formula.internal_force_factor）
#
# 战例验证（二流·圆熟同境界普通攻击对决）：
#   GDD 字面公式：基础伤害 6340，最终 11095（破红线）
#   平衡后公式：基础伤害 2280，最终 3990（在 2000-8000 区间）✓
#
# =============================================================================

meta:
  version: "0.2.0"             # 与 SaveData.saveVersion 对应；major.minor.patch
  description: "Demo 阶段数值配置 · 覆盖学徒到武圣全程"
  last_updated: "2026-05-10"
  notes: "所有数值基于 GDD v1.1 §5.2 数值红线设计；公式系数见 combat 段"

# =============================================================================
# 1. 战斗公式系数
# =============================================================================
# 对应 GDD §5.3 / §5.4 / §5.6 三大公式。所有系数提取为可调参数，便于未来
# 整体平衡调整。

combat:

  # --- 招式熟练度阶段(可玩性 P1a · spec §三/§2.5) ---
  # 来源=战斗放招次数(含挂机自动战斗,计数源 Technique.skillUsageCount)。
  # damage_mult 全局阶段倍率(统一底,所有招含普攻);末阶 1.30 同时作综合加成 cap
  # (per-skill damage_pct 综合后仍 ≤ 1.30,见 SkillProficiency.combinedMult)。
  skill_proficiency:
    stages:
      - { id: chuShi,   min_uses: 0,   damage_mult: 1.00 }
      - { id: shunShou, min_uses: 30,  damage_mult: 1.05 }
      - { id: shuLian,  min_uses: 100, damage_mult: 1.12 }
      - { id: jingTong, min_uses: 300, damage_mult: 1.20 }
      - { id: huaJing,  min_uses: 800, damage_mult: 1.30 }

  # --- 基础伤害公式 ---
  # GDD §5.3：基础伤害 = (内力 × 0.4) + (装备攻击 × 8) + 招式倍率
  # 平衡后：    基础伤害 = (内力 × 0.4) + (装备攻击 × 1.0) + 招式倍率
  damage_formula:
    internal_force_factor: 0.4       # 内力对伤害的系数（GDD 原值，未变）· 真消费(damage_calculator)
    equipment_attack_factor: 1.0     # 装备攻击系数（GDD 原写 8，平衡后调为 1.0）· 真消费(damage_calculator)
    skill_multiplier_added: true     # ⚠ 纯文档(审计 D7):NumbersConfig 不解析;招式倍率"作为加项"已硬编码在 damage_calculator

  # --- 最终伤害公式（GDD §5.4）---
  # 最终伤害 = 基础伤害 × 修炼度加成 × 流派克制 × 暴击系数 × (1-防御率) × 境界差修正
  # ⚠ 以下 apply_* flags 为纯公式结构文档（审计 D7 2026-06-24）：NumbersConfig 不解析此块，
  #   damage_calculator.dart 恒应用全部乘子（非可关闭开关）。改这些 true→false 不生效，勿误用。
  final_damage_formula:
    apply_cultivation_multiplier: true   # 应用心法修炼度（1.0~3.0）
    apply_school_counter: true           # 应用流派克制（0.75/1.0/1.25）
    apply_critical: true                 # 应用暴击（1.0 或 1.5~2.5）
    apply_defense: true                  # 应用防御率（1 - defense_rate）
    apply_realm_diff: true               # 应用境界差修正

  # --- 最大血量公式 ---
  # GDD §5.6：血量 = 1000 + 内力 × 5 + 根骨 × 500 + 装备血量
  # Phase 1 平衡： 血量 = 1000 + 内力 × 0.7 + 根骨 × 500 + 装备血量
  # P0.1 #38 重平衡(2026-05-17,方案 D):
  #   血量 = 1000 + 内力 × 0.5 + 根骨 × 400 + 装备血量
  # 设计目标:全 7 阶 dengFeng + const 10 + 装备 hp_max 满 极值 ≤ 16667
  #          (心法相生 hpPct 0.20 加成后 ≤ 20000 §5.4 红线,不靠 cap 兜底)
  # 实测极值(方案 D):wuSheng 16550 / zongShi 14750 / 全阶过红线
  max_hp_formula:
    base: 1000                       # 基础血量(GDD 原值)
    internal_force_factor: 0.5       # 内力系数(GDD 原写 5,Phase 1 调 0.7,P0.1 #38 方案 D 调 0.5)
    constitution_factor: 400         # 根骨系数(GDD 原写 500,P0.1 #38 方案 D 调 400)

  # --- 出手速度公式（GDD §5.6 原值，无需调整）---
  # 速度 = 100 + 身法 × 8 + 装备速度 + 心法速度加成
  speed_formula:
    base: 100
    agility_factor: 8

  # --- 暴击率与暴击伤害 ---
  # 暴击率主要由身法和心法决定，灵巧流派额外 +20%（GDD §4.4）
  critical:
    base_rate: 0.05                  # 基础暴击率 5%
    agility_per_point_rate: 0.005    # 每点身法 +0.5% 暴击率
    max_rate: 0.50                   # 暴击率硬上限 50%
    base_damage_multiplier: 1.5      # 暴击伤害基础倍率
    max_damage_multiplier: 2.5       # 暴击伤害信息性上限（当前不作运行时 clamp；
                                     # 暴击走固定档 1.5/2.0 已 ≤ 本值，仅 balance 参考）
    lingqiao_critical_bonus: 0.20    # 灵巧流派额外暴击率 +20%（GDD §4.4，T09 用）
    lingqiao_damage_multiplier: 2.0  # 灵巧流派暴击时的伤害倍率（phase1_tasks T10 §584 简化值，T10 用）

  # --- 闪避率（由身法决定，与速度共享身法属性）---
  evasion:
    agility_per_point_rate: 0.003    # 每点身法 +0.3% 闪避率
    max_rate: 0.30                   # 闪避率硬上限 30%

  # --- 敌人合成默认值（P2-a/b 外部 review：从 stage_battle_setup hardcode 抽出，§5.6 不硬编码）---
  # 敌人不持装备/心法，EnemyDef → BattleCharacter 时用统一默认。
  # P5.2 起按境界查表对称化（internal_force_scale × RealmDef.internal_force_max，满开局，clamp≤15000）。
  enemy_defaults:
    internal_force_scale: 0.20       # 敌人内力 = 同境界 RealmDef.internal_force_max × 此系数（P5.2 平衡旋钮，∈(0,2]，clamp≤15000）。0.20 经 Ch5/Ch6 跨阶红线压测调校：wuSheng Boss 内力 2600 → 招牌传说大招放 1 次（>0.245 放 2 次会击穿满配玩家红线）
    critical_rate: 0.05              # 基础暴击率
    evasion_rate: 0.05               # 基础闪避率

  # --- 数值红线 cap（GDD §5.4 硬上限，单一真相源）---
  # 这两条是战斗派生属性的硬天花板：玩家 build（founder buff / 师承遗物 / 心法相生
  # 乘法叠加）可能把派生值推过红线，各 clamp 点统一读这里，不再散落 hardcode。
  # 消除 derived_stats / stage_battle_setup / game_repository 重复字面量（2026-05-29）。
  # 心魔镜像 cap 走独立 inner_demon.mirror_caps（语义=镜像玩家上限，同值不同来源）。
  red_lines:
    player_hp_max: 20000             # 玩家血量红线（§5.4）
    internal_force_max: 15000        # 内力红线（§5.4）
    boss_hp_max: 60000               # Boss 血量红线（§5.4，2026-06-14 终局周目膨胀调 50000→60000）

  # P0 破招:Boss 蓄力/踉跄
  boss_charge:
    default_charge_ticks: 3       # 招牌技蓄力 tick 数
    default_stagger_ticks: 2      # 被破招后跳过行动 tick 数
    stagger_defense_down: 0.3     # 踉跄期间防御率乘 (1 - 此值)
    interrupt_power_cap: 0.5      # 波A:减防 × (1+interrupt_power_pct) 有效值上限(红线)

  defense_break:            # 第六阶段:破防开窗(破招外的第二开窗来源)
    window_ticks: 3         # 破绽窗口时长(踉跄 default_stagger_ticks=2,破防略长)
    # 减防幅度由 per-skill SkillDef.defenseBreakPct 提供,此处不设全局值

  weakness:                 # 第七阶段批二②:Boss 按攻方流派的弱点/抗性受伤乘子值域
    min_mult: 0.5          # 抗性下限(受伤最多减半)
    max_mult: 2.0          # 弱点上限(受伤最多翻倍,守 §5.4 红线 ≤2.0)
    # 每个 Boss 的实际乘子配在 stages.yaml enemy.schoolDamageTakenMult;
    # 加载期 enforceWeaknessRedLines 校每值 ∈ [min_mult, max_mult]

  # 批次 2.4 打击感表现层三档（纯表现层，真机调手感后定稿；§5.5 只动屏上播放节拍不改逻辑）。
  impact_feedback:
    light:  { hit_stop_ms: 60,  shake_magnitude: 3.0,  flash_strength: 0.12 }
    medium: { hit_stop_ms: 90,  shake_magnitude: 6.0,  flash_strength: 0.20 }
    heavy:  { hit_stop_ms: 120, shake_magnitude: 10.0, flash_strength: 0.30 }

# =============================================================================
# 2. 49 级境界系统
# =============================================================================
# GDD §3.1：7 个大境界 × 7 层 = 49 级
# 关键约束：内力 500-15000（§5.2 红线）、装备/心法品阶随境界开放（§3.4）

realms:

  # --- 境界差距修正（GDD §5.5，强制规则不可调）---
  # 表中数字均从"高境界视角"看：你打对方时的伤害修正 / 对方打你时的伤害修正
  level_diff_modifier:
    same_tier:           # 同大境界
      attacker: 1.0
      defender: 1.0
    diff_1_tier:         # 差 1 大境界（你高对方低）
      attacker: 1.4      # 你打对方：×1.4
      defender: 0.7      # 对方打你：×0.7
    diff_2_tier:         # 差 2 大境界
      attacker: 2.5
      defender: 0.3
    diff_3_or_more:      # 差 3+ 大境界（基本免疫）
      attacker: null     # 已碾压无须放大；数据层兜底 1.0（单位元，与公式层语义统一）
      defender: 0.05     # 低境界打高境界仅 5% 伤害

  # --- 49 级境界完整数值表 ---
  # 字段说明：
  #   absolute_level   : 总层数 1-49（强化等级上限 = 该值）
  #   internal_force_max: 该层内力上限（决定基础属性）
  #   experience_to_next: 突破到下一层所需经验
  #   defense_rate     : 该大境界基础防御率（同大境界内 7 层共用）
  #
  # 设计曲线：
  #   - 内力线性递增到一流，绝顶以上加速
  #   - 经验呈指数递增（每境界总经验约为前一境界 3-5 倍）

# 道具效果定义（材料经济 P2）。
# 经验丹 layer_fraction / 秘籍 unlockSkillId 是道具用途真相源；
# 道具显示名 name 集中此处（3 档经验丹共享 ItemType.jingYanDan，EnumL10n 分不开）。
# layer_fraction 表示使用时推进当前层修炼度的比例（0.0–1.0），由消费层乘以当层所需经验计算实际经验值。
# 字段：
#   defId         : 对应 InventoryItem.defId
#   type          : ItemType 枚举名（jingYanDan / techniqueScroll）
#   name          : 道具显示名（文案）
#   layer_fraction: jingYanDan 专用，使用时推进当前境界层所需经验的比例（0.0–1.0）
#   unlockSkillId : techniqueScroll 专用，使用时解锁的秘传招 id
items:

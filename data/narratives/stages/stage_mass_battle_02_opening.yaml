id: stage_mass_battle_02_opening
title: 守镇御寇 · 启
paragraphs:
  - 镇子叫吕集,在洛水北岸。比村大,有一面短墙、一座旧楼。墙上有箭眼,从不曾用过。
  - 江湖匪众一路绕过来,共三波十七人。头领一身玄衣,手中是钩镰枪,身后两人持长棒,余下皆是游侠刺客之流。
  - 「守城术第二处试炼」——传的是「不乱」。人多,势必杂;势杂,阵便破。阵破之后再守,已是另一回事。
  - 你与镇上两位走得近的旧识立在镇口短墙前。墙不高,够立人。三人各占一角,中间留一线。
  - 这一线是阵的中心。中心若动,阵便散。你按住剑,等第一波人来——肃杀之气先入墙根,再入心。

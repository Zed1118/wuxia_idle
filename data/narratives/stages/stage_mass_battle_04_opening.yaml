id: stage_mass_battle_04_opening
title: 守关御胡 · 启
paragraphs:
  - 关在玉门旧道之东。城楼已废,关楼仍在。胡骑自西北来,共四波二十四人——非寻常匪寇,皆是边外游骑,马上功夫极硬。
  - 为首者三人皆 jueDing 之中较深的:一个万夫长,一身铁甲;一个游骑长,身形如箭;一个铁卫,持长枪不语。其后骑士各异。
  - 「守城术第四处试炼」——传的是「不让」。寸土必争。胡骑长程奔袭,最忌人退;退一寸,便给马一里。
  - 你与两位道上结交的旧识立在关楼之前。关楼下是一段狭路,只够两骑并行。这便是守的「一寸」。
  - 沉静之气从你心里升起来——不是 yiLiu 那一层的沉着,而是 jueDing 这一阶才有的「不动」。
  - 长枪在身后,剑在腰间。第一波胡骑已到狭路口。你不退。

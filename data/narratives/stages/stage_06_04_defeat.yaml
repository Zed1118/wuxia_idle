id: stage_06_04_defeat
title: 昆仑山外 · 殇
paragraphs:
  - 你跪在练武场的青石上，喘息着。三人没乘胜追击，只是站在原地，看着你。守关那一剑没有取要害——他和你心知，这是外门的规矩，外乡人在这里败一次，可以走，但不能上。
  - 心里慢慢回响起师父的第二句遗言——「剑到了一处地方，就要听那处地方的风」。Ch5 那夜在嵩山论剑顶你已经全数听懂了中州的风，今天昆仑山外的风你却没听完。山风干净，但你的剑没有跟上来。
  - 守关把佩剑收回。「下山去吧，」他说，「化境的事不急在一日。山在这里。你下去坐三个月、五个月，等心里那一点不该有的躁意彻底沉下去再上来，外门不拦你。」
  - 你撑着剑站起身。膝盖上一阵闷痛，但走得动。下山的台阶比上山时长了许多。山道两旁的石碑你重新看了一遍——「西渐」「外门」「不入」这些字眼，此刻看起来比来时多了一层重量。

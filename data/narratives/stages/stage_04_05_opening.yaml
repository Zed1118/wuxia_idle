id: stage_04_05_opening
title: 阳关一决 · 启
paragraphs:
  - 出了嘉峪关，再往西七里，是一片黑色的戈壁。这一段没有路，也没有烽燧。月升起来时你到的，整片戈壁被月光照成一种冷得发蓝的颜色，肃杀之气在黑石间漫开。风从更西的方向吹来，没有沙——只有那种深夜独有的、空旷的凉。
  - 那位老名宿临别时说的话，你记下了。但没指望今夜便派上用场。校场散后的第三日，西凉武林里便传开了一个口信——「霸主请你阳关一会」。送口信的人没留下名字，留下一柄断剑做凭。剑柄上刻着两个字，已经磨得模糊：「西凉」。
  - 此刻，他们已在戈壁中央等你。三个人。中间那位站在最前，灰色的长袍被夜风吹得贴在身上——身形不高，肩也不宽，看上去像一位普通的西北客。但他脚下三步之内，月光都暗了一层。左右两位护法分立两侧，一位提一柄大斧，一位握两支短戟，皆是西北上等的兵器。
  - 中间那位没有报名号。也没有问你来意。他只是慢慢地把右手抬起来——掌心朝下，五指自然张开——然后又慢慢地放下。这是西北武林里最古老的一个手势，意思是「请」。寡言之至。
  - 你把剑抽出鞘，剑尖斜垂指地。月光顺着剑身往下流，落在戈壁的黑石上。你忽然想起师父临终时说过的另一句话——「剑到了一处地方，就要听那处地方的风。」此刻这片戈壁的风，正从西边来。
  - 那位灰袍人轻轻动了一下脚踝。月光暗了又暗。出招了。

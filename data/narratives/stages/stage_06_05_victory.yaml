id: stage_06_05_victory
title: 昆仑山顶 · 终
paragraphs:
  - 霸主退到平台边缘，半膝跪地。剑横在身前，并没有再起。三弟子分立两侧，谁都不再上前。雪山的风停了，平台上一时极静。
  - 「这一程的事，到此可以收个尾了。」霸主开口，比开场时还要平静。「你走过的每一处地方，我看过。这一夜的剑，我也认了。」他没把那柄剑递给你，也没把腰间的物件解下——他只是把剑插回身后的剑鞘。「无物可赠。你已经不需要了。」
  - 你站在平台中央，听到这一句的时候，心里那点最后的躁意终于完全沉下去。师父三句遗言——「这世上的事，看不懂的，就先去走一走」、「剑到了一处地方，就要听那处地方的风」、「最后那一段路，也许已说完，下文要自己走」——三句话此刻在昆仑山顶的星空下，第一次完整地照进你心里。
  - 化境的门在这一刻开了。你没有举手取什么，也没有问什么。你只是站着，听最后一段风从山外吹来。下文要自己走——这一段路，你认了。

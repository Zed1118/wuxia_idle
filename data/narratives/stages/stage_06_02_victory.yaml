id: stage_06_02_victory
title: 嵩山再访 · 终
paragraphs:
  - 守关跪了一边，巡山人退到松林背后。两人都没受重伤，但已经动不了——这一次你打得很克制，没有伤到要害。嵩山的规矩你不愿真坏。
  - 道观里有人出来了，是上次辩过经的那位老道，提着一卷新抄的《无为篇》。他没说话，只把经卷递过来，又指了指身上那条暗色的腰带。腰带上挂着一柄软鞭，鞭身缠着白色的雪莲花纹——是中原少见的西域物件，名「雪莲鞭」。
  - 你接过经卷，又接过雪莲鞭。老道看着你，目光里没有上次那种试探，反而有一种「认了」的味道。他低声说了一句：「再往北，就到黄河了。源头的事，你应当自己去看。」
  - 你点了点头，把雪莲鞭收进行囊。下山的时候，雾已经散了。山顶到山脚的台阶，比上次走得快了许多。

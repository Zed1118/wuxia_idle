id: stage_05_05_boss_recruit
title: 中州论剑 · 解佩
paragraphs:
  - 三弟子走到你面前的时候,手里已经没有短匕了。匕插在腰后的鞘里,柄朝外。
  - 他抱拳的姿势和师父一模一样——左掌盖右拳,掌指朝天,拳面朝胸。西凉的礼。
  - 「你赢了三场。我师父的规矩——赢三场的人,有资格提一个要求。」
  - 你没说话。他接着说。
  - 「但你没提。所以这个要求变成了我的。」
  - 他从怀里取出那面小铜镜,和腰间那枚「师」字玉佩放在一起,托在掌心里。
  - 「师父交代过——若遇到一个人赢了三场还不开口的,就把这两样东西一起给他,人也跟着走。」
  - 「我跟你。不是因为你赢了——是因为你赢了之后还站在那里听风。这种人,值得跟。」

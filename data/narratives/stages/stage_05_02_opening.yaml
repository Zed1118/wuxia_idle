id: stage_05_02_opening
title: 嵩山道观 · 启
paragraphs:
  - 嵩山的雾比中原任何一座山都重。山道盘了三百级，每上一段，松针上挂的水珠就密一些。你走到半山的「青松观」时，天还没亮透，观门半掩，里头有人在做晨课。
  - 一个穿青色道袍的中年道士从门内迎出来，眉眼平和，话也不多。「客从西来？」他打量了一眼你身上的剑痕和袖口未洗净的暗褐色血迹。你点了点头。道士也没多问，只让你在偏厢喝口热茶。
  - 茶碗里的水还冒着热气，偏厢的门又被推开。这一回进来三个人：领头的是青松观的道宗弟子，腰间挂着拂尘和一柄短剑；后头跟着一位道家剑客，神情倒是不像方才那道士那么平和；再后头还有一位中年汉子，握刀的手满是茧，一看就是中州地道的武学传人。
  - 「客人是西凉来的。」道宗弟子开口了，语气仍是道家的从容，「西凉的霸主三招便能定输赢——这件事中州武林听了三个月。我们想看看，你这一柄剑，在中州能走几招。」他说完这句，掌中的拂尘往侧一摆。门外的雾，被他这一摆，散了一线。

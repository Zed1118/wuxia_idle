id: stage_05_05_defeat
title: 中州论剑 · 败
paragraphs:
  - 你倒在坪心的青砖上。不是因为剑断了，也不是因为被劈伤——是脚下被三人合围之后封死了角度，最后那一招收不回来，自己卸了气。西凉三弟子的短匕停在你脖子半寸的位置，匕尖几乎挨着皮肤，但没有再向前。他朝你抱了抱拳，慢慢退开。中州论剑顶和嵩山道宗也跟着退开。三个人合站成一线，没有一个人说话。
  - 坪外的本土名宿先站起身，朝石碑抱了一拳；论剑顶门派的几位长者随后起立，朝你也抱了拳。礼数与你在彩棚下败给先锋时一样，但今夜的礼里多了一种你听得见的安静。中州武林对败者向来给礼——不轻易给第二次机会，但礼是要给到底的。「客人若要再战，明日同一时辰，这座山下还设一坪。」执旗的执事走过来，把这句话说得很慢，「中州武林这一回，把第二场留给客人。」
  - 你站起来，朝三人抱了拳，没有说一个字。出坪的时候你听见嵩山夜里第一阵风。这一阵风很轻——比西凉的风要轻得多。师父临终那句「剑到了一处地方，就要听那处地方的风」，你这一夜也全听懂了——只是是从败者这一边听到的。怀里那面小铜镜还在原处。今夜没有玉佩与它合起来。下一回再来时，你想，应该让它们合起来一次。

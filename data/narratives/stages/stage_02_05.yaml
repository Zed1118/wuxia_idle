id: stage_02_05
title: 巷中夜雨
opening: |
  巷子很窄，只容两人并肩。青石板路被雨水浸得发亮。
  那个不留剑鞘的青衫人站在巷子中间，雨水从他没有鞘的剑刃上滑下来。
  「我知道你会跟来。」
  他说话时没有回头。
  「洛阳城里的武人，我这三天见了十七个。你是唯一一个没问我名字的。」
  他转过身来，雨停了。

post_victory: |
  青衫人把剑靠在自己肩头，剑上的雨水顺着领口淌进衣服里。
  「剑鞘归你。」
  他说完便走，走了几步忽又停住，没回头，只挥了下手。
  那只手上有三道旧剑伤，最老的一道已经看不见疤了。

post_defeat: |
  青衫人收了剑，弯腰把墙根下那个剑鞘捡起来，拍干净泥水。
  「记着。没有剑鞘，是为了拔得快。」
  他把剑鞘扔给你。
  「但你还没到那个地步。先收着。」

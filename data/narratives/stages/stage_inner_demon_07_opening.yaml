id: stage_inner_demon_07_opening
title: 心魔·真 · 启
paragraphs:
  - 第六处的空散去之后，松林、山道、旧坟，全都没有再出现。
  - 第七处只剩你自己。
  - 没有镜，没有坟，没有空，没有山道。他坐在你眼前一块青石上，姿态与你一模一样。
  - 你与他对视。他眼里有的，你眼里也有。他眼里没有的，你眼里也没有。
  - 你心里清楚：前六个你，都是某一个「过去的你」或「某一念的你」。唯独这一个——是你此刻的自己，没有任何加减。
  - 你与他都没有先开口。风很静，雪极薄。
  - 你忽然明白：这一关赢不了别人，也赢不了道理，只能赢自己。
  - 可所谓「赢自己」，又赢的是哪一段？
  - 你按住剑。他也按住了他的。化机自然——不在你想，不在你算，只在你出。
  - 你不再想这一关之后是什么，也不再想师父那三句话是不是真完了。你只是抬剑。

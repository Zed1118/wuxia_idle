id: stage_05_01_opening
title: 渭水东渡 · 启
paragraphs:
  - 出嘉峪关一路向东，沙土慢慢被水汽浸湿，戈壁退了，黄土显了出来。再往东，长安的城墙在很远处亮了一下又被一片杏花遮住。中原的春天和西凉的春天不一样——这边的风是软的，带着土腥气，但不刺人。
  - 你过了灞桥，没进长安城，沿着渭水往东走了三日，到了潼关下。关楼比西出那天还旧了一些，匾额上的字几乎看不清。守关的换了一拨人，没认出你。你掏出怀里那面小铜镜，看了一眼镜背上「西凉」二字，又收了回去。这一回，是要把它东带的。
  - 渭水的渡口比西边热闹。船工头一身水汽，腰上别着一把短刀，看见你过去，先是上下打量了一眼，然后把手伸了过来。「过渡的，过路费。」语气平平，但腰里那把刀的位置摆得很正。
  - 你停下脚步。潼关守将和长安刀客这时候也从船棚后面慢慢走出来，三个人围成一个不大不小的半圈。你把背上的剑挪到趁手的位置。中原的规矩你曾经走过——但走过西凉之后再回来，这些规矩看起来比记忆里要钝一些。该出手就出手。

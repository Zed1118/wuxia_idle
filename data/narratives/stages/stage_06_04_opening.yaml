id: stage_06_04_opening
title: 昆仑山外 · 启
paragraphs:
  - 昆仑山脚的风跟中原不同，跟西凉也不同。中原的风有土腥气，西凉的风带砂粒，这里的风是干净的——像被高处的雪洗过一遍，吹到脸上不刺人，但能把你身上的烦意一寸一寸刮干净。
  - 你沿着外门那条道往上走。山道两侧立着不少石碑，碑上的字大多被风蚀得辨不清。偶尔还能看到一行——「西渐」「外门」「不入」之类的字眼。这里是昆仑的外缘，再往上要过守关。
  - 外门的守关营建得不大，三面石墙围着一处小小的练武场。守关人穿一身藏青色的劲装，腰上挂剑，神色平静。他看到你走近，先抬手示意你停步，然后说：「来昆仑的人，要么是来求道的，要么是来挑事的。你是哪一种？」
  - 你没回答。化境前夜，最不该解释的就是这个问题。你把佩剑挪到趁手的位置，外门守关的眼神变了一变，身后的西渐剑客和遁客同时上前一步。这是这一程上最后一关人事。

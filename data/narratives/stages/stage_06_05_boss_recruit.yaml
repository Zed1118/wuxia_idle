id: stage_06_05_boss_recruit
title: 昆仑山顶 · 收剑
paragraphs:
  - 霸主站起身,拍了拍膝上的雪。三弟子在一旁没动。平台上安静得只剩风声。
  - 他走到你面前,站住。你以为他要说什么,但他只是站着,看了你很久。
  - 然后他慢慢把背后那柄剑抽出来。不是递给你——是横在自己面前,双手托着,剑脊朝上。
  - 「刚才说无物可赠。这一句收回。」
  - 「这柄剑也跟了我三十年。和这条命一样长。」
  - 他把剑轻轻放在你脚边的雪地上,退后两步。
  - 「剑留下。人也留下。往后你走哪条路,我替你看住身后那一段。」
  - 「不用答。你站在这山顶上没走,就已经答了。」

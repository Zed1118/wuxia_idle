id: stage_06_05_defeat
title: 昆仑山顶 · 殇
paragraphs:
  - 你跪在昆仑山顶的青石上，喘息着。腰间那枚「师」字玉佩贴着冷石，怀里那面小铜镜被你跪下的姿势压得有些歪。三人没有乘胜追击——西凉霸主收剑入鞘，三弟子分两侧静立。雪山的风把平台上的雪卷起一阵又落下。
  - 「这一夜的剑，差一线。」霸主开口。还是那种平静的声音，但比开场时多了一丝可惜。「化境的门此刻是开过的，但它没能让你走进。今夜的风，你听完了么？」你没回答。心里那一句「剑到了一处地方，就要听那处地方的风」在昆仑山顶的雪里轻响——你听到了，但你没听完。
  - 师父第三句话「最后那一段路——」在你心里转了一圈，又卡住了。你十六岁那年以为那是没说完的一句。今夜你以为那一句已经说完。但今夜你也错了——也许那一句本就在「说完」与「没说完」之间，要走完才知道。
  - 霸主把背对着你。「下山去吧。这一座山不会走。等你心里那一点不该有的躁意彻底沉下去再上来。」雪又下了一阵。下山的路你走得很慢，每一阶台阶都比上山时长。腰间那四件物事都还在身上——昨夜你以为可以放下，今夜你才知道还没到放下的时候。

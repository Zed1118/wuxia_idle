id: stage_05_05_victory
paragraphs:
  - 三人都退了——西凉三弟子退在坪心石碑的一侧，长袍下袖口未乱，但他握短匕的右手低垂下去，匕尖朝地。中州论剑顶被你最后那一剑卸了门户，单膝跪在三柄旧剑前；嵩山道宗的拂尘断成了两截，人站在原地，神色还是道家的澹然，但澹然里多了一点你能看见的安静。
  - 坪外没有喝彩。左座的本土名宿先站起身，朝石碑抱了一拳，再朝你抱了一拳。中座论剑顶门派的几位长者跟着起立。右座的帘子已经放了下来。这是中州武林对一位走完了「彩棚—高台—正脉」三阶的客人所能给出的最高的礼——一种近乎沉默的、不带掌声的礼。
  - 西凉三弟子走到你面前，抬起左手，把腰间那枚刻「师」字的玉佩解下，放到你掌心。他没有说话——西凉的师承体例本就不在话上。他朝你抱了抱拳，转身退出坪外。临走那一步，你看见他怀里似乎还揣着另一面小铜镜——那是给「再下一回」准备的。这一回是「师」字。下一回是什么字，你还不知道。
  - 你站在坪心很久。师父临终的那句话——「剑到了一处地方，就要听那处地方的风」——此刻在心里反复回响。西凉的风你听了一半。中州的风今夜你听全了。你把那枚玉佩与小铜镜并在一起，揣进怀里。东边的天色已经在收暗。再往上的那一段路，不在剑上——师父那句话的另一半，你今夜还没听明白。但你知道方向。

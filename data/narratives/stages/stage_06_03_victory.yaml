id: stage_06_03_victory
title: 黄河之源 · 终
paragraphs:
  - 三个人都退到湖岸的另一边，没有再上前。渔人坐在自己那条小筏上，撑筏人把竿子插进水里，水兵把腰刀放下。湖边重新安静下来。
  - 你从渔人手里得到一件物事——一袭金丝织成的轻甲。渔人说，这是上一辈水神祭的供奉，年年沉湖底，年年又被水推上岸。湖里的人也不要它，外乡人若能走到这里，也算是缘分。你接过来，份量极轻，却暗藏内劲。
  - 你又得了一枚玉佩——黄色的玉，刻着一条简化的龙纹，是水兵从腰带上解下来的。「过路费」，他说，「我们到了这一步，不能不还。」你把玉佩收在身上，与西凉的小铜镜、师承的「师」字玉佩放在一处。三件物事并列。
  - 湖面上的薄冰被风轻轻吹过，发出微弱的响声。再往西，是昆仑山。你站起身，整理行装。源头的话听完了——下一程是登山。

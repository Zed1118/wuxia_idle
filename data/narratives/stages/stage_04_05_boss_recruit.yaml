id: stage_04_05_boss_recruit
title: 阳关一决 · 留镜
paragraphs:
  - 灰袍人站起身,拍了拍膝盖上的沙。两位护法在一旁沉默等着,谁都没动。
  - 他把小铜镜从黑石上拿起来,翻了一面看了看,又翻回去。镜背上「西凉」两字被月光照得发青。
  - 「这东西跟了我二十年。」他把镜递过来,但没松手。
  - 「西凉人留东西不随便。留了,就是认了人。」
  - 他松了手。镜落在你掌心里,比你想的要轻。
  - 「我这把年纪,不说好听的。你要开派,我替你守西面那条路。」
  - 「不必答——点头就行。」他看了你一眼,月光下那张脸上第一次有了一点近似笑意的东西。

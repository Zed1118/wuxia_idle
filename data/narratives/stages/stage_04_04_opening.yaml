id: stage_04_04_opening
title: 西凉论剑 · 启
paragraphs:
  - 嘉峪关内有一座旧校场。校场原本是边军操练用的，这十几年来朝廷顾不上西北，校场便被本地武人借了去，每年秋后开一场「西凉论剑」。不分门派，不立生死状——只论本事。
  - 你随商队到了嘉峪关那一日，正赶上论剑的第二日。校场四周搭着旧木台，台上坐了几十位西北武林的名宿；台下站着年轻一辈的剑客与刀手，议论声压得很低。空气里带着一股西北特有的味道——干牛肉、马汗、和被太阳晒透的木头。
  - 一位年纪不轻的名宿先注意到了你。他穿一件粗布褐袍，腰上挂的不是兵器，是一只酒葫芦。他打量你许久，慢慢从台上走下来，在校场中央站定。「中原来的？」语气里听不出敌意，也听不出客气——是那种走过太多地方的人，老练地问话不动声色。
  - 你点了点头。校场上一下子静了下来。这位老者在西凉是有名的——他叫不出名号的人不多，叫得出的，要么是同辈，要么便是来踢馆的。
  - 「中原人到西北来论剑，少见。」老者把酒葫芦扔给身后一位弟子，慢慢挽起袖子。「咱们这儿不讲门派，不立生死状。你若愿意，便上来走两招。胜了，西凉武林记你的名字；败了——」他顿了一下，目光淡淡地扫过你，「也不会有人为难你。我们只想知道，中原现在的剑，是个什么样子。」
  - 你把背上的剑挪到趁手的位置，走入了校场中央。这一场不是仇杀，也不是求名——只是西凉武林的一种打量。中原讲规矩，西北也讲规矩。你想，便让他们看一看。

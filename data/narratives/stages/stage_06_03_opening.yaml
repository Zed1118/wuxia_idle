id: stage_06_03_opening
title: 黄河之源 · 启
paragraphs:
  - 沿着黄河往上游走。你过潼关那夜走的是渡口，这一次你不渡水，你逆水。中原的黄河浊重，到了陕北还是浊的，到了甘南渐渐转清。再往西，进了高原，水面上飘的不再是泥沙，而是青色的薄冰。
  - 走到第四日傍晚，黄河源头的湖泊出现在视线里。湖名「鄂陵」，水面平如一张铜镜，倒映着远处的雪山。你在湖岸边停下脚步，伸手探了一下水温——清冷，但不刺骨。水声极轻，像有人在远处低声说话。
  - 师父说过：「剑到了一处地方，就要听那处地方的风。」可是黄河之源没有风。湖面上是寂静的水声，岸边是寂静的雪山，雪山上是寂静的天空。你在湖边的石头上坐下，把佩剑横在膝上，听了很久。
  - 听到第三更，湖面那一头慢慢出现了三个身影。一个渔人，一个急流上的撑筏人，一个穿水兵服色的巡逻——三人都不出声，慢慢围拢过来。源头的人也有自己的规矩，外乡人不能在湖边坐一夜。

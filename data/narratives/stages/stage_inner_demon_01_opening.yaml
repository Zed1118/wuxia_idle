id: stage_inner_demon_01_opening
title: 心魔·贪 · 启
paragraphs:
  - 推门出去那一刻，你以为门外只有松林与雪。
  - 第一个自己站在屋前不远的石头上。他和你穿一样的青布袍，背一样的剑。他没有冷意，也没有杀意——只是看着你，眼神比你自己还湛然几分。
  - 「你这一程上山下山，到底是想走到一个『最后』，还是再赢一场？」这句话不是出口问的。是他先想起来，你随后也想起来。
  - 你站住了脚。这十年来你身上「再赢一场」的影子从未真正消散过。从洛阳武林会到嵩山论剑顶，甚至到昆仑山顶——你曾在心里赢过一次又一次。
  - 你想起师父说过的「下文要自己走」。下文不是「再赢一场」。可这一刻你也清楚：要走这一段路，眼前这一个你必须先放下。
  - 他从石头上跳下来，伸手按住背上的剑。你也按住自己背上的那一柄。雪还在落，落到两人之间，落到地上很薄一层。

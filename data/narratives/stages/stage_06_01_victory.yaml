id: stage_06_01_victory
title: 论剑散场 · 终
paragraphs:
  - 巡逻队伍散了。义勇头领按着肩，连退几步，没有再上。你收剑入鞘，没看他们，只是看了一眼天边——傍晚的云被风从西边推到东边，又散开了。
  - 城墙根有一个小贩，没注意刚才那一场动静，还在收摊。他从布袋里翻出一件斧形的兵器，呵呵笑着说是中州论剑结束后从某位大侠手里折价收来的，刃口上还沾着一些黄土。你伸手掂了掂，斧身扎实，份量正合。你把它收进行囊，丢下几枚铜钱。
  - 这是一柄重器，名玄天斧——后来你听说过的名字。你没问出处。
  - 嵩山在北。你低头看了一眼怀里那面小铜镜，又轻轻摸了一下腰间的玉佩。再往北走，是该回的路。

id: stage_06_01_opening
title: 论剑散场 · 启
paragraphs:
  - 中州论剑大会的人群散得很慢。客栈门口、城墙下、长街两侧，还有人三三两两站着复盘那一夜在嵩山论剑顶的胜负。你从人群里慢慢走出来，没回头。
  - 你怀里贴身那面小铜镜还在原处，镜背上「西凉」二字被这一路的汗浸得发暗。腰间多了一枚玉佩，刻着一个简单的「师」字，是嵩山一决那夜从三弟子之一手里接过来的——他临走时只把玉佩搁在地上，没说话。两件东西此刻并放在身上，一西一东，沉甸甸地压住下摆。
  - 出城关向北，前面那条道直通嵩山。你把行装收紧，心里很澄澈，没有那种「再要论一场」的躁意。中州的事终于交代过去了，剩下的路要你自己一个人走。
  - 走到关下时，几个人挡住去路。论剑场散场后留下的巡逻、看不顺眼的中州义勇——眼神里没有恶意，也没有敬意。他们只是在做今天的活计。你停下脚步，把背上的剑挪到趁手的位置。

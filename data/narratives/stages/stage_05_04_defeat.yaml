id: stage_05_04_defeat
paragraphs:
  - 你输了一招——并非剑被打飞，是脚下一滑。先锋的长刀贴着你脖子停在半寸的位置上，又收了回去。台下围观的人没有人喊叫，但你听见一两声低低的、客客气气的笑——那种笑只在中州武林的彩棚下听得到，像一种礼数。
  - 「客人，三场没过。」先锋的语气还是不紧不慢，「中州论剑的规矩，三场不过，明日不能上高台。客人若是不服，七日后这里照样开第二场。」他说完，朝你抱了抱拳，退回到彩棚下。
  - 执旗的执事走过来，递给你一块木牌，上面刻着「列席」二字。「客人下回再来。」他说话也彬彬有礼，但礼里那一层冷淡是听得出的。你把木牌收进怀里，朝彩棚外走去。出场那一刻，怀里那面小铜镜被衣袖蹭得发响——你没掏出来。中州武林的规矩，与西凉的不同。这一回是真听见了。

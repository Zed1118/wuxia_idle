id: stage_03_04
title: 雁门旧事
opening: |
  许昌往北走三日就是雁门关。
  你没打算去雁门关。但在许昌城外十里铺，你遇见了一个人。
  那人牵着匹瘦马，马背上驮着一个人——那个人盖着一块白布。
  牵马的人抬起头来。他脸上有两道很深的疤，从眉骨一直拉到下巴。
  「你姓李。」不是问句。
  「你师父三年前死在西北，下手的人是我师兄。」
  他把缰绳松开，瘦马自己走了。
  「我来还这笔账。」

post_victory: |
  疤脸汉子背靠着枯树坐下，抹了把嘴角的血。
  「你比你师父快。」他咳了一声，「但你师父比你沉。」
  他从怀里摸出一块铜牌，扔在你脚边。
  铜牌上錾着一个字。那个字你没见过，但你知道它在另外十二个州都出现过。

post_defeat: |
  疤脸汉子收了兵器，把铜牌重新塞回怀里。
  「还不够。当年你师父在我师兄手底下走了五十招。」
  他翻身上了瘦马，走之前回头看了你一眼。
  「我在雁门关外等你。」

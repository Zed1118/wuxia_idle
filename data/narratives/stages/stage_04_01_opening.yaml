id: stage_04_01_opening
title: 阳关初渡 · 启
paragraphs:
  - 出潼关一路向西，土越来越黄，树越来越少。过了陕州，官道两边的麦田断了，换成一片片戈壁。风从西边来，带着沙粒打在脸上，是中原闻不到的干燥。
  - 你走了一日，路上没遇见几个行人。傍晚到河西走廊的一处驿道岔口，远远看见三个汉子坐在一棵老榆树下烤野味。他们腰上挂的不是刀就是斧，火光里照出几张被风沙磨粗的脸。
  - 见你走近，最壮的那个慢慢站起来，拍了拍腰里的横刀。「过路的，留下身上的银子。这条道，现在归我们走。」语气里没有怒气，也没有玩笑——只是把一件做惯的事说出来。
  - 你停了下来，沉着地把背上的剑挪到趁手的位置。许昌擂台上那一战之后，你已许久没动过手了。中原的恩怨像潼关的匾额一样被风吹得发白。但脚下的土是新的——这里的规矩，你还要重新摸过一遍。

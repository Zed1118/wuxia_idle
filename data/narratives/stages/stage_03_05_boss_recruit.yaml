id: stage_03_05_boss_recruit
title: 一剑封名 · 空手
paragraphs:
  - 灰衣人站在槐树下,双手空空。风吹过麦田,他的衣摆也跟着晃了晃。
  - 他盯着自己的手掌看了很久。掌纹里嵌着三十年的老茧,现在那双手什么也没握住。
  - 「你知道被人打落兵器是什么感觉吗?」他忽然问你。
  - 你没答。他自己接上了。
  - 「像是冬天脱了棉袄。冷,但松快。」
  - 他弯腰,从落叶里捡起自己的剑,用指腹顺着剑脊摸了一遍。然后把剑横递过来。
  - 「这剑跟了我三十年。你拿着也好,不拿也好。」
  - 「人我是跟定了。三十年没遇见的事,今天遇见了——不跟,我怕再等三十年。」

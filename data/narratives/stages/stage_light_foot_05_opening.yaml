id: stage_light_foot_05_opening
title: 长风万里 · 启
paragraphs:
  - 嵩山再过往东,有一座旧关楼。城已废,关楼独存。
  - 三人立于关楼顶上。皆是 jueDing 之中较深的——一身气息从容,看人时眼神不再追求一招的胜负。
  - 「轻身术第五处,也是最后一处」——在关楼之巅,以远蓄势。这一处没有水可踏,没有瓦可借,没有竹可避,没有崖可越。只有长风。
  - 你登上关楼。长风从西北吹过来,先入袍袖,再入心。
  - 远蓄势。这四个字你曾在嵩山论剑顶上听人说过,当时不解。此刻关楼之巅,长风入袖,远处一线山河——你忽地懂了一半。
  - 三人未动。等你先开口。你按住剑,任长风吹过一阵。
  - 这是从容。是 jueDing 这一阶你要从最后一处取走的东西。

id: stage_02_04
title: 城外校场
opening: |
  洛阳城西门外有一片夯土校场，原是驻军的操练地，
  如今被各路江湖人占了当比武场。
  你到的时候，场上正热闹——一个使棍的光头汉子刚把一个用刀的年轻人扫下了场。
  他柱着棍子环顾四周，眼神停在你身上。
  「新来的？报个名号，或者直接上来。」

post_victory: |
  光头汉子从地上爬起来，拍了拍身上的土。
  他上下打量了你一眼，闷声说了句：「还可以。」
  走过你身边时补了一句：「晚上南门外吃酒，来不来？」
  没等你答应就走了。

post_defeat: |
  光头汉子收了棍。他没有取笑，只是点了点头。
  「底子不错，就是手上的东西不对。」
  「兵器不对？」
  「不是兵器，是握法。」

id: stage_06_02_opening
title: 嵩山再访 · 启
paragraphs:
  - 嵩山的雾还是那场雾。Ch5 来过一次，走过道观、辩过经文、收了那一卷《无为篇》。此刻你再上山道，山色未改，雾色未改，山道旁的青松也未改，只是你自己的步子比上次轻了许多。
  - 山门外没人迎客。守门的两个道童看见你，先是一愣，然后认出来，行了一个礼，没多说，就让开了。你绕过道观正殿，往侧院去。那里是上次坐了一夜的地方。
  - 侧院里多了一只新立的石灯，灯油未燃。你在石灯旁的蒲团上坐下，把佩剑横放在膝。雾从山谷里慢慢漫上来，渗进你呼吸的每一缕。心里那点话——师父第二句遗言「剑到了一处地方，就要听那处地方的风」——此刻在嵩山的雾里又轻响了一下，比 Ch5 那次更清。
  - 坐到一更，山门口有动静。守关的提了灯笼过来，身后跟着巡山人。两人的来意你不必问。嵩山的规矩你懂——能来一回坐一夜，已经是道观的客；要再来一回，就得有更硬的理由。

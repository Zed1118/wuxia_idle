id: stage_inner_demon_05_opening
title: 心魔·疑 · 启
paragraphs:
  - 第五处不在山道上，也不在松林里。你这一次走进了一片你十六岁亲手垒过的地方。
  - 师父的旧坟。
  - 坟前石碑没有刻字，是你当年没敢落笔。第五个你立在你与那座坟之间，不动，也不开口。
  - 你十六岁那年没问出口的那一句，此刻终于出现在他舌尖：
  - 「他真的把第三句说完了吗？」
  - 你想起师父咳血那一夜。最后那半口血止住之后，他确实又看了你一眼。那一眼是说完了，还是还没说完？
  - 你不知道。第五个你也不知道。所以你与他对站着，连风都没有声音。
  - 雪一片一片极慢地落到那座坟上。落到你脚边的剑鞘上。落到第五个你按住剑的手背上。
  - 你心里第一次承认——师父这十六年来在你心里说的话，有几句也许根本不是他说的，是你自己替他续的。

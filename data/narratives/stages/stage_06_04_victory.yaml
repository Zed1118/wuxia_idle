id: stage_06_04_victory
title: 昆仑山外 · 终
paragraphs:
  - 三人都让开了。守关把剑横在身前，单膝点地，没说一个字。西渐剑客和遁客退到练武场的两端，目光低着，像是认了什么。
  - 守关从腰带上解下一枚配饰——是青玉的小璧，雕着一道极简的山形，山外缠着一缕云。「这是昆仑佩。」他低声说，「外门规矩，来到这里的人若过得了我们三个，就可以带它上山。带不带得动，看后面的造化。」
  - 你接过昆仑佩。玉色清润，握在手心里有一种很轻很冷的触感，与中原的玉、与黄河之源的玉、与西凉的铜镜都不同。这是一件你此刻还不能完全发挥的物件——你的境界未到。但你知道它在那里。
  - 守关退到一边，让出山道。再往上，就是昆仑山顶。你深吸一口气，山风干净，雪山很近，前路只剩最后一段。

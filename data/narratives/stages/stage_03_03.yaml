id: stage_03_03
title: 山寺夜话
opening: |
  擂台之后，人散了。你一个人坐在擂台的角落里，听风吹旗子。
  一个灰袍僧人不知什么时候站在了台下。他没出声，就站在那，手里拄着一根竹杖。
  月光照在他脸上，皱纹深得像刀刻的。
  「施主今日这一剑，贫僧见过。」他开口了。
  「二十年前，也是这个擂台，也是这一剑。」
  他的声音很轻，像旧纸翻页。

post_victory: |
  老僧将竹杖靠在擂台边，两只枯瘦的手合了一掌。
  「施主这一剑，比二十年前那人快了三分。轻了三分。」
  他抬起头，眼里没有光。
  「快是好事。轻不是。」
  说完他笑了笑，拄起竹杖，融进了月光里。

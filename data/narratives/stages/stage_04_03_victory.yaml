id: stage_04_03_victory
title: 沙海迷踪 · 终
paragraphs:
  - 沙匪的头领最后一招没出尽，便从马上栽了下来。剩下的几骑一见此景，调转马头往沙丘后头逃。雾还没散，他们的背影很快没进了那一片黄白里——只剩马蹄声渐渐远去。
  - 老布商带着商队从驼队后头小心地走出来。胡商向导没说话，只是把腰上那只铜铃摘下，递到你手里——这是西北商队的规矩，沙海里救过命的人才配带这铃。
  - 雾在午时散尽。你站在沙丘顶上往西望——黄沙的尽头，一道土黄色的关墙横在地平线上。那是嘉峪关。商队的人在身后忍不住低声欢呼了一声，又很快憋了回去。这一段路还没完，但已经看得见尽头。

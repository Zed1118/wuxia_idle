id: stage_inner_demon_07_defeat
title: 心魔·真 · 失
paragraphs:
  - 你与他几乎同时抬剑。可他这一剑里没有多一念，你这一剑里多了一念——多的那一念是「这是最后一关」。
  - 你输了。输得不算难看，也没有难看可言。化机自然里没有「难看」与「不难看」。
  - 第七个你没有走。他坐回那块青石上，与你对视。
  - 「再来。」他说。
  - 你回到茅屋。袖底心魔余毒比前六次都轻，可你心里反而停留得最久。
  - 闭关八时辰。八时辰里你不再想这一关之后是什么，也不再去清算前六关里哪一个你最像自己。你只是坐着。
  - 醒来时夜还在。你推开门。第七个你还在原处，静静地等。这一夜你重新走完。

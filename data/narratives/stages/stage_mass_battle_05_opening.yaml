id: stage_mass_battle_05_opening
title: 守城却敌 · 启
paragraphs:
  - 城在嘉峪关之东三十里，旧名「却月」。城已残，城门半塌，城楼独存。
  - 西凉残部四波二十六人来——为首三人皆 jueDing 之中最深的：一位老将带刀立于队前，一位狂骑横枪，一位刺客背后。其后各骑兵步卒。
  - 「守城术第五处试炼，也是最后一处」——传的是「不忧」。长围之下，从容如初。这一处没有狭路可借，没有阵心可守，没有人能换岗——只有时辰。
  - 你登上城楼。城楼上有一面无字的旗，半卷半垂在长风里。城楼下是平川，远处一线西山。
  - 从容之气在身上慢慢沉下来——这是 jueDing 这一阶在最后一处要取走的东西。
  - 不忧。这两个字最轻，也最重。围你一时辰，你不忧；围你一日，你不忧；围你三日，你仍不忧——这是城楼之巅的全部。
  - 老将立在队前，等你先开口。你按住剑，任长风吹过城楼。城楼之上，城楼之下，皆静。

id: stage_05_04_opening
title: 中州论剑 · 启
paragraphs:
  - 中州论剑场设在嵩山脚下的一片演武坪上。坪心一座青砖筑成的高台，四周扎了九重彩棚，棚下站满了来观礼的人。论剑大会还没开正场——眼下只是前三日的「列席」环节，让来自各方的剑客先在台下三场预演中各显一手。
  - 你进场没换衣，背上那柄剑也没装饰过——这在中州武林这种重门面的地方，本就显眼。你才走到第二重彩棚下，就有人从台上下来：领头的是一位身着深绿短打的中年人，腰里斜挂一柄长刀，刀鞘上刻着「中州」两个字。后面跟了一位执长剑的副手，再后面是一位手持短戟、神情冷淡的助阵。
  - 「客人是西凉来的。」绿短打的中年人开了口，语气有礼，但目光不让人。他自报名号，「在下中州论剑先锋。彩棚下排过队的客人，照规矩要先与我们这一队比过。三场——剑、长兵、短兵——三场都过，才有资格上到论剑高台去等次日的对阵。」
  - 他说完这句，朝你抱了抱拳。礼数做得很满，但已经把刀的位置移到趁手的角度。台下围观的人远远站开，露出一块半丈见方的青石坪。你把背上的剑取下来，握在右手。中州武林的礼，是要你先动手。你动了。

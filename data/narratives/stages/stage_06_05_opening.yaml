id: stage_06_05_opening
title: 昆仑山顶 · 启
paragraphs:
  - 昆仑山顶是一块平台，平台四周是雪，雪外是云，云外是天。没有殿、没有碑、没有别的人——只有一个人站在平台中央，背对着你。藏青色的长袍，腰间无剑，双手负在身后。
  - 那人没回头。「来了。」他开口。声音不大，但你听得清——这是你第一次听到这个人开口。嘉峪关那夜他沉默克敌、出手即决；嵩山一决他没有现身，只让三弟子代行。一路行来，西凉霸主本人此刻在昆仑山顶第一次说话。
  - 平台两侧另外两个人慢慢走出来。一个穿暗色短装，刚猛之气压在身周；一个穿浅色长衫，灵巧之意飘在脚下。这是嵩山一决那夜三弟子里没出场的两个——你腰间那块「师」字玉佩，是他们这一脉的物事。三人合体，此夜复出。
  - 你站定。怀里的小铜镜、嵩山玉佩、黄河玉、昆仑佩——四件物事一并贴在身上。霸主看着你，眼神平静。「这一程的事，要在这里收个尾。」他说，「你走过的每一处地方，我都看过。今夜不靠手势，要靠剑。」语毕，他从背后抽出一柄剑——那是你从未见过的剑式。三弟子同时上前一步。最后一战开始了。

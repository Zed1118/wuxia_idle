id: stage_05_04_victory
paragraphs:
  - 中州论剑先锋的长刀被你最后一招挑出半丈，「当啷」掉在青石坪上。副手单膝着地、长剑横搁在身前；助阵那位倒得最早，短戟脱手，人没什么大伤，只是怔在那儿。台下围观的人这时候才有些低声的议论。
  - 你沉着地收剑入鞘，没有去追。绿短打的先锋把跌出去的长刀捡了起来，朝你深抱了一拳。「客人这三场，过了。」他声音不大，却带着中州武人特有的那种稳，「明日的论剑高台上见。」
  - 一位执旗的执事走下来，把你引到论剑高台西侧的偏厢去歇下。他临走时压低了声音说了一句：「明日上场的，是中州论剑顶。还有一位道宗。还有——一位西凉来的客人，自称三弟子。」你没接话。偏厢的窗子正对着嵩山的方向，山头在夕色里浮着一线青。

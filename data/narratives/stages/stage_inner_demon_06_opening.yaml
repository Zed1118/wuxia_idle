id: stage_inner_demon_06_opening
title: 心魔·空 · 启
paragraphs:
  - 师父的旧坟散去之后，第六处不在松林，也不在山道，也不在坟前。
  - 它是一处「无」的地方。
  - 四周不是雪，不是松，不是夜——是一片什么也没有。这一片什么也没有，比你这一程见过的任何地方都更让你心里发紧。
  - 第六个你立在那一片空里。他的样子和你一样，可在这一片无的地方，他比你更圆融几分——像他比你早走过这一段。
  - 你这一程从未怕过任何东西。论剑顶上你没怕，昆仑山顶你也没怕。可此刻你心里浮起一种凉意：
  - 若你走完了「最后那一段路」，之后没有路了怎么办？
  - 师父没替你走过这一段。所以师父也未必能告诉你那之后是什么。
  - 第六个你不出招，也不答你。他只是让那一片「什么也没有」一寸一寸近过来。
  - 你按住剑。剑还在。你忽然意识到，剑还在，已经是你此刻能抓住的全部回答。

id: stage_03_05
title: 一剑封名
opening: |
  十里铺出来是一条直道，直道尽头是一棵老槐树。
  槐树下站了一个人，背着手，没带兵器。
  他穿一件半旧的灰布长衫，看上去和路边田里的庄稼汉没什么两样。
  但他脚下的土是旋的——三十步内的落叶都绕着那棵槐树打转。
  他看见你胸前挂的那块铜牌，点了点头。
  「我师弟死了，还是没死？」
  语气淡得像问今天下没下雨。

post_victory: |
  灰衣人还站在那棵槐树下，但脚下的落叶已经平了。风也不旋了。
  他看着自己空着的一双手，慢慢地说了一句：「三十年。你是第一个让我空手的。」
  然后他转过身去，走进了麦田。背影越来越小，直到看不见。
  树上挂了一张纸，上头写了两个字——「李寒」。

post_defeat: |
  灰衣人收了内劲，风重新开始打旋。
  「还欠些火候。」他语气还是不紧不慢。
  「给你一年。一年后，还在这棵树下。」
  他走的时候，落叶重新铺满了他刚才站过的地方。

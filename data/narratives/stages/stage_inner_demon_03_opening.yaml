id: stage_inner_demon_03_opening
title: 心魔·痴 · 启
paragraphs:
  - 第二个你散去时风停了片刻。再睁眼，第三个你已经立在松林深处一块青石上。
  - 他手里捧着一面铜镜——那是你早已放在昆仑山顶青石上、被雪埋住的西凉小铜镜。但这一面是他凭执念另造出来的。
  - 镜里映着师父早年讲学的样子。你看见自己十二岁那年坐在课堂下的影子——那一年师父还没病，灯下声音很稳。
  - 你执着的不是那面镜，是那段你以为自己已经放下、其实从未真正过去的时光。
  - 「带回去吧，」他朝你递出镜子。「不算违约。师父也未必反对。」
  - 你没有伸手。你想起师父第一句——这世上的事，看不懂的，就先去走一走。「走过去」与「带回去」，是两件事。
  - 雪落在那面凭空捏出的铜镜上，镜面起了一层很薄的霜。

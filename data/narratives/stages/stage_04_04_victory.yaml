id: stage_04_04_victory
title: 西凉论剑 · 终
paragraphs:
  - 老名宿把刀拄在地上，单膝撑着，慢慢直起腰。他没有伤——你最后一招留了三分手。但他自己心里清楚：再走下去，留手的便是你了。
  - 「中原的剑，还是中原的剑。」他低声说了一句，听不出是赞是叹。然后回头，朝校场四周那几十位名宿点了一下头。台上有几位起身离席，没有说话；也有几位走过来，朝你抱了一下拳，没有报名号。这是西凉武林的礼节——认了你，但不交浅言深。
  - 校场散场之后，老者把酒葫芦递给你。葫芦上刻着两个字，被磨得几乎认不出：「西凉」。他没看你，只是望着关外的方向。「再往西，就不是论剑的地方了。霸主——他不论剑。他出手。」说完转身离去，背影消失在校场尽头那道夕阳里。

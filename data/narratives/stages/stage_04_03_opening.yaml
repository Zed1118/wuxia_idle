id: stage_04_03_opening
title: 沙海迷踪 · 启
paragraphs:
  - 出了玉门古道，路就断了。前面是一片连着一片的沙丘。骡车走不了，商队改成换驼。老布商雇的胡商向导走在最前头，腰上挂着一只铜铃——遇风沙时摇铃，是商队约定的信号。
  - 第三日清晨，沙海里起了雾。这种雾不像中原的水雾，是细沙浮在低空里，太阳一照成了一片黄白。十步之外便看不清人影。胡商向导停了下来，铜铃在他手里晃了两下，却没敢真摇响——他在听。
  - 沙丘后头先是一声闷响——像是马蹄踩进了厚沙。然后是第二声，第三声。不止一骑。胡商向导慢慢退到驼队后头，朝你低声说了一句：「沙匪。这一带最大的一伙，刘三爷的人。他们不留活口。」
  - 雾里的马蹄声渐渐清晰，呈合围之势从三个方向压过来。最先看清的是几柄横刀和一两张弓——刀都已磨亮，弓弦上箭已经搭好。沙匪的头领坐在一匹枣红马上，没说话，只是用马鞭在沙里画了一个圈。这是收网的意思。
  - 你把商队的人推到驼队后面，自己一个人走出去三步。沙地很软，每一步都陷下去半寸。这种地形要打——这是开战之前你给自己提的醒。

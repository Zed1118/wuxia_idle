id: stage_04_05_defeat
title: 阳关一决 · 败
paragraphs:
  - 第一招你没接住。
  - 灰袍人脚下的月光只暗了一瞬。等你看清他的手势，肩头上已经多了一道斜痕。剑还在你手里，但握剑的那一截手腕已经知道——这一招你没接住。
  - 第二招你听见了。但没看见。剑出鞘的时候自己的腿先弯了下去。戈壁的黑石很硬，膝盖磕上去没什么声音，因为风把声音都带走了。
  - 第三招没有出。灰袍人慢慢退了半步，把右手又抬起来，掌心朝下——还是那个西北最古老的手势。这一次的意思是「住」。
  - 「中原来的，」他终于开口，声音平得像戈壁上的月光，「再练十年，再来。」说完转身。两位护法跟在身后，背影没入更西的夜色里。
  - 你伏在戈壁上，听着马蹄声远去。师父临终那句话此刻才听明白前一半——「这世上的事，看不懂的，就先去走一走。」你走了三年，到了这里，看不懂的还是看不懂。但你已经知道——剑往上走的那一段路你确实已经走完了。

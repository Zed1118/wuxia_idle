id: stage_inner_demon_05_defeat
title: 心魔·疑 · 失
paragraphs:
  - 你与他对站在师父旧坟前，最后还是你先动了剑。可你这一剑出得不全——心里有半口气问着「他到底说完没说完」。
  - 剑落空。你站不住，半跪到雪里。第五个你没有进一步出招，只是看着你。
  - 「这一夜不是你赢得了。」他说。
  - 你回到茅屋，坐下来。袖底有一种细细的疑，比躁更难散——它不冲，只是一直在。
  - 闭关八时辰。前半段你反复回到十六岁那一夜，看师父最后那一眼。后半段你慢慢学会让这一眼留在那里，不再每次都去问。
  - 醒来时你再推开门。这一关你不再要逼师父替你回答。

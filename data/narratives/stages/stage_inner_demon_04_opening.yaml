id: stage_inner_demon_04_opening
title: 心魔·慢 · 启
paragraphs:
  - 第三个你散去之后，松林里没有立刻出现下一个。你走了一段，到了山口外那道熟悉的山道尽头。
  - 第四个你叉腰立在那里。他与你一样的剑、一样的眉，神情却比你身上从未真正流露的还要松。
  - 「走到这里你已经够了。」他说。「师父也未必到过这一层。」
  - 这话半真半假。师父晚年咳血不止，未必到过 wuSheng·jingTong。你心里曾经升起过这一念，甚至在嵩山论剑顶时一闪而过。
  - 此刻它换了脸，直接站在你面前。
  - 「歇一刻吧。这一程已经够了。」他朝你挥手，意思是不必再走。
  - 你也想坐下歇一刻。可你想起师父第三句——最后那一段路，本来就只有这一句，剩下的，是要他自己走。
  - 你按住剑，没有坐下。

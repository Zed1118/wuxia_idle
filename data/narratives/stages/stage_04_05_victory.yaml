id: stage_04_05_victory
title: 阳关一决 · 终
paragraphs:
  - 三个人都倒了。两位护法在两侧，伤得很重，但还活着。中间那位灰袍人——西凉霸主——单膝撑在戈壁上，长袍前襟被你最后一剑划开了一道斜口，血却不多。他抬起头，看了你一眼。月光重新亮了起来。
  - 「中原的剑——」他终于开了口，声音比你想的还要平。「比我想的——快了半寸。」说完便不再多言。他从怀里取出一物，是一面尺余长的小铜镜，镜背上铸着两个字：「西凉」。他把镜放在戈壁的黑石上，慢慢站起身，朝两位护法点了一下头。三人转身，往更西的方向去了。背影没入夜色里——竟和那位灰衣人当年没入麦田里时的样子隔了十年又有些像。
  - 你坐在关楼的石阶上，背靠着冷的关墙。东边的天慢慢有了一点亮色——长安的方向。你想起师父，想起十二个州，想起许昌擂台上那阵风。从学武出山到名扬江湖，你一直以为自己是在往「高处」走。今夜才看清——并非。剑往上走的那一段路你已走完。再往上的那一段，不在剑上。是在另一处，你还没看见的地方。
  - 风从西边吹来，关楼上的旗子在头顶慢慢转了个方向。那面小铜镜仍留在戈壁的黑石上，被夜色压得很静。你看了一眼，没去取。

id: stage_inner_demon_06_defeat
title: 心魔·空 · 失
paragraphs:
  - 那一片「什么也没有」一寸一寸逼近时，你心里那一点凉变成了一整片凉。剑握得紧，可整个人慢了半招。
  - 第六个你没有出手——他不必出手。空自己就是这一关的剑。
  - 你被压回茅屋，靠在门内的木柱上。袖底心魔余毒不疼，是一种「之后什么都没有」的凉。
  - 闭关八时辰。前半段你一直在心里看那一片空。后半段你慢慢承认——之后是什么不必这一夜就知道，知道了也未必更好走。
  - 醒来时炉火低着。你按住剑柄。这一关你已经知道：圆融不是把它填满，是先承认它在那里。
  - 推开门，外面松林还在。

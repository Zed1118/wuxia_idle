id: stage_inner_demon_02_defeat
title: 心魔·嗔 · 失
paragraphs:
  - 你出剑的那一刻，心里有一口气没压住。那一口气替他出了半招。剑落下来的时候，伤到的不是他，是你自己手腕上那一段旧筋。
  - 他没有还手，只是站着等你把剑撑住地。
  - 「这一招你替谁出的？」他问。
  - 你也答不上来。黑风岭的山贼、洛阳那一招、阳关与嵩山没说完的字——这些今夜不该再借你的剑出。
  - 雪落到剑刃上。你把剑勉强收回鞘。
  - 茅屋里炉火低着。你坐下来闭关八时辰。袖底心魔余毒散得比上一次慢——这一关被旧账带进去的不止一次心念，是十年来一直未真正放下的几口气。

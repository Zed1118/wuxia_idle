id: stage_06_05_boss_fail_recover
title: 昆仑山顶 · 收剑（败后）
paragraphs:
  - 你倒在雪地里，背上的伤让你呼吸都带着血腥。昆仑的风刮得人睁不开眼。
  - 霸主站在三步外，把剑收回鞘里。他没走，就那么站着，等你喘完。
  - 「死在这里的人不少。你不是第一个，也不会是最后一个。」
  - 他停了停，又说：「不过活着爬起来的，你是第一个。」
  - 他走到你身边，把背后那柄剑抽出来，横放在你身旁的雪里。
  - 「我原本说无物可赠。但看你这个样子——剑留给你，权当见面礼。」
  - 「等你下得了山，来北坡那间石屋找我。我替你看一段路。」

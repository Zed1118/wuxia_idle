id: stage_05_05_opening
title: 嵩山一决 · 启
paragraphs:
  - 嵩山论剑大会的正场设在山腰一座露天的广坪上。坪中央立着三柄象征「中州武林正脉」的旧剑，剑前一块石碑，碑上刻着历代论剑过名的人名。坪四周九重彩棚换成了三层正座——左座中州本土名宿，中座论剑顶门派，右座这一回临时加设的「客座」。
  - 你上场的时候，左座的本土名宿没有动；中座的论剑顶站起身，朝你抱了拳，那一抱拳很慢，是郑重的礼。右座原本空着——直到你站到坪心石碑之前，右座的帘子才被人从里面掀开。
  - 三个人走了出来。当头那一位身穿一袭素色长袍，腰间挂的不是剑也不是刀，是一柄半尺长的短匕。他走到坪心，停在你五步开外，朝你抱了抱拳——一句话没说。他袖口绣的那个字是「师」。他腰间还挂了一枚玉佩，玉佩的样子你认得——和你怀里那面小铜镜，是一对。
  - 紧接着上场的是中州论剑顶——那位你昨日没能在彩棚下过的先锋的师父；再后一位是嵩山道宗，长袖如云，神情澹然。三人合站在你对面，没人开口。坪外的风停了一停，山间肃杀之气渐渐沉凝。中州武林正脉的旧剑在石碑前微微颤了一下——那不是风。是这一战之前，整座嵩山自己的一次屏息。

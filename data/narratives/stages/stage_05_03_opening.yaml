id: stage_05_03_opening
title: 黄河义渡 · 启
paragraphs:
  - 黄河的水比渭水浑、比渭水急。义渡的渡口在两岸之间架了一道粗麻绳，船一离岸就被水推得斜出去半丈。岸边等船的人挤了几十口，背着货箱、拎着包裹，没人说话——这种水势，话多了，船工要嫌烦。
  - 你走到队尾。一个穿短打的汉子从船棚后绕过来，眼神在你腰间的剑上停了一瞬。「客人，借步说话。」他往河滩的芦苇丛里指了指。你跟过去——三步之后，从苇丛里又走出两个：一个是漕帮舵主，肩膀宽，手里提着一柄断刃刀；另一个是黄河水寇打扮的精壮汉子，腰间别着两把短叉。
  - 漕帮舵主看了一眼你怀里露出的剑柄。剑柄的缠绳是西凉那种粗厚的麻绳，与中原的丝绳颇不一样。他笑了一下，但笑得不松。「客人这柄剑，留下。」他说，「黄河上凡是好剑都要留个买路。」
  - 你没动。河风把芦苇吹得哗啦哗啦响。义渡这边的规矩你早听人说过——漕帮的「买路」从来不是商量。你把右手按在剑柄上，没拔。这一回不是因为犹豫，是因为他们三个站位太散，拔得太早，倒先输了气势。等他们自己围上来。

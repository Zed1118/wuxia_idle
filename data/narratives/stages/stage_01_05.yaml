id: stage_01_05
title: 风雨渡口
opening: |
  渡口的风雨说来就来。
  黄河水翻着浊浪，摆渡的老艄公蹲在船舷上抽烟，斗笠上雨水成串。
  对岸码头上站了五个人，当中一个撑着油纸伞，看不清脸。
  老艄公吐了口烟：「那几位爷，等你半天了。」

post_victory: |
  油纸伞落在地上，被风刮进了黄河。
  撑伞的人单膝跪在泥里，手中那柄剑断了三截。
  你收起剑，看着老艄公慢悠悠地撑开了船。
  「上船吧。天快黑了。」

post_defeat: |
  撑伞的人没有追。他只是站在雨里，看着你退回渡口。
  隔着黄河的雨幕，你听见他说了一句什么。
  风太大，没听清。

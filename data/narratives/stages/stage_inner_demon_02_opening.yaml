id: stage_inner_demon_02_opening
title: 心魔·嗔 · 启
paragraphs:
  - 第一个你散去之后，松林里的雪停了一刻，又重新下起来。第二个你已经站在更近一些的地方。
  - 他和你穿一样的衣，背一样的剑。可眼里多了一分冷意——那是你身上未曾真正显出来的，未尽的旧仇。
  - 黑风岭那个寒夜没追完的山贼；洛阳武林会上没赢回的一招；阳关那夜没出口的话；嵩山顶上那一声未说完的「师」字。这些旧账他都替你记着。
  - 「你怕走完这一段路就再没机会算。」他说。「这一夜还赶得上。」
  - 你听见自己心里有一个声音说「也该算」。可你想起师父第二句——剑到了一处地方，就要听那处地方的风。
  - 这松林山口的风，不是为讨债的人吹的。你按住背上的剑。他也按住了他的。

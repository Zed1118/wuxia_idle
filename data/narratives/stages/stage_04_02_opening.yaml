id: stage_04_02_opening
title: 古道行商 · 启
paragraphs:
  - 沿着河西走廊一路向西，第七日抵玉门古道。这一段是商队必经的口子，两侧山岭夹着，路宽不过两丈。岭上的烽燧每隔十里一座，土砖砌的，有的还冒着烟，有的早已坍了半边。
  - 古道口设了一处关卡。一面褪了色的旗影在风里斜斜地飘，旗下站着十几个守关兵——披着旧甲，脸上的风沙比甲胄还厚。一位把总从兵丛里走出来，手按腰刀，目光在你身上停了一停。
  - 「过关要交『过路银』，五两。这两年关里出过几次匪事，多收一份，是给兵爷们辛苦的茶水钱。」把总说得不紧不慢，像念熟了的口诀。身后两名校尉已经把手按在了刀柄上。
  - 一旁停着一支商队，三辆骡车。商队的主事——一个老布商，正悄悄朝你使眼色：商队的「过路银」已交过，再交一次便要散伙。这关卡早已不在朝廷的名册里。它只属于眼前这位把总，和他手下这群被风沙磨成另一种人的兵。
  - 你站着没动。中原讲规矩，西北讲规矩——只是讲法不同。你想看看这位把总到底想怎么个讲法。

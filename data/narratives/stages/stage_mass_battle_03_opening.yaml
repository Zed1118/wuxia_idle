id: stage_mass_battle_03_opening
title: 守县拒敌 · 启
paragraphs:
  - 县在洛水之南，城已不算城，城墙塌了一半。三波十九人——不是匪众，是他派门徒。
  - 为首者一身青衫，手里没拿兵器，身后两位护法各执剑与刀。再后是门徒十数人，行步整齐，不像贼，像兵。
  - 「守城术第三处试炼」——传的是「不溃」。他派偷袭，先取你的阵心。阵心一散，城便不守自破。
  - 你已是 yiLiu 之中较深的——十年江湖，这一阶在身上沉得稳了。你立在残墙之前，看着青衫人。他亦看着你。
  - 老练之气从两边压过来。剑未出鞘，你已知道下一招；他亦未动手，也知道你下一刀。
  - 内有一线，外可承万钧。这一线不在剑上，在心上。心不溃，墙便不溃。

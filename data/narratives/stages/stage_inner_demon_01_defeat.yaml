id: stage_inner_demon_01_defeat
title: 心魔·贪 · 失
paragraphs:
  - 你这一招出得快，可他比你还快一线——那一线刚好是你心里那一念「赢这一关也算赢一场」的多。
  - 剑被压住。你退一步，再退一步，最后靠到那块石头上。
  - 他没有再追。只是看着你，眼神比开战之前更湛然几分。
  - 「你看，这一关你也想赢。」
  - 这一句不是出口说的，是从你自己心里浮出来的——和他几乎同时。
  - 你回到松林深处那座茅屋。袖底有一种说不出的躁劲，浮浮的，像茶汤底没沉的渣。心魔余毒——你已经知道是怎么回事。
  - 你坐到榻上，把剑放在膝头，闭关清调。八时辰之后这一股躁会散尽。今夜你要重新推门一次。

id: tie_sha_zhang
name: 铁砂掌
origin: |
  外家刚猛掌法。修习者须每日将双掌插入烧热的铁砂之中反复插拔，
  初练时手掌皮开肉绽，愈后掌心起一层厚茧，茧越厚掌力越沉。
  此掌法不讲招式，不讲身法——打人就一招：正面硬拍。
  被铁砂掌拍中的人，不是血从嘴里出来，是骨头先裂。

moves:
  - id: tie_sha_kai_bei
    name: 开碑手
    description: >
      一掌竖直劈下，力道自肩、肘、腕三层递进，最后聚于掌缘。
      可碎石碑，可裂盾面。这一掌打完，自己手腕会抖——不是伤，是劲太大了没收住。

  - id: tie_sha_tui_men
    name: 推门见山
    description: >
      双掌齐出向前平推，不求快，求稳。像是推一扇极重的铁门。
      门推开了，人就飞出去了。推不开——对方站得住，那就再来一掌。

  - id: tie_sha_huo_yan
    name: 火眼金刚
    description: >
      将铁砂搓热，双掌通红，拍出时掌风都带热浪。
      此招不是用热度伤人——是让对方的眼睛在热风中不由自主地眨一下。
      眨一下，就够了。

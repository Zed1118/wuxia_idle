id: she_hun_da_fa
name: 摄魂大法
origin: |
  阴柔一脉走得最远的一门功夫。不以力胜，不以招赢——以目。
  练此法者须先练眼：对烛凝视一个时辰，直至烛火在眼中不再晃动。
  再练心：目之所及，心亦随之。大成者一眼望去，对方心神微滞，
  虽然只滞一瞬——一瞬就够了。此术在南疆流传数百年，中原极少有人接触，
  接触过的也不太愿意谈起。

moves:
  - id: she_hun_ning_mu
    name: 凝目
    description: |
      不动声色的凝视。眼神平平无奇，但被盯住的人会发现自己不由自主地去数
      对方的呼吸——数着数着，自己的呼吸就被带偏了。呼吸一乱，招式便散。

  - id: she_hun_duo_she
    name: 夺舍
    description: |
      在对方出招瞬间用目光锁定其瞳孔。功成者可在这一瞬打断对方的发力节奏——
      不是真的夺了魂魄，是在对方脑中种了一个"我这一招会不会已经迟了"的念头。
      这个念头比硬接任何一招都要命。

  - id: she_hun_an_du
    name: 暗度
    description: |
      此招不正面交锋，而是借对方的余光暗中影响——你站的位置、你手的角度、
      你呼吸的节奏，都是暗示。让对方在无意识中顺着你预设的角度出招。
      这是心战，比拳战耗费十倍心力。

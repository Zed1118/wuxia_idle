id: chi_yang_jin_gang_quan
name: 赤阳金刚拳
origin: |
  西北戈壁边上有一座小寺，寺中只有一位老和尚和七棵胡杨。
  某年夏天他要重修山门，独自一人伐木一百天，每日从日出砸到日落。
  那年的胡杨格外硬，砍到第七十天他的拳头比斧头还利落——
  斧头钝了换一把，拳头钝了练一夜便又利了。
  山门修好那日他坐在木堆上写了三句话：「拳如日出。砸不在斧。劲在阳。」
  这便是赤阳金刚拳。打出去每一招如金石相击，拳面有炽热感却不烧人。

moves:
  - id: chi_yang_pi_shan
    name: 赤阳劈山
    description: |
      一拳直下，劲力如正午阳光垂直洒落。这一拳不偏不斜，
      只走最短的一条直线——拳锋下去可破石不伤土。
      老和尚说：「砸石头不靠重，靠正。砸不正的人砸一百天还是砸不开。」

  - id: chi_yang_xi_fang
    name: 赤阳熄锋
    description: |
      接对方兵刃，以拳面磕击其侧，劲力震入兵器三寸。
      被磕中的刀剑铿然作响，刃口虽不卷不折，握刀人却觉手心一麻——
      那一刻刀已被赤阳之劲渗入，三息之内挥砍如握木棍。

  - id: chi_yang_man_yin
    name: 赤阳满印
    description: |
      贴身而入，整条手臂顺势按上对方胸腹，拳劲透过三层布料留下一个温热的掌印。
      掌印不伤皮，不破肉，却让被印之人当夜睡不沉——
      梦里总像有人按着他的胸口，胸口处温温的，醒来摸却什么也没有。
      此招是老和尚最得意的一招：「劲到人不死，留个念想。」

id: tai_xu_wu_xiang_gong
name: 太虚无相功
origin: |
  江湖上只在大约七十年前出现过一次。使用者是一个连名字都没报的人，
  他在华山绝顶打了一场，对手是当时公认的天下第一。
  打完之后，天下第一自封其剑，隐居不出。有人追问败者那是什么功夫，
  他只说了两个字：「没有。」——不是不说，是真的没有。
  太虚无相，无形无相。你用什么招对它，它就是什么。

mantra: |
  大象无形，大音希声。
  赤手无招，万象若存。

moves:
  - id: tai_xu_ru_jing
    name: 入静
    description: |
      不攻不守，只是站定。全身每一个关节都松到一个临界点——
      再松就要倒了，但没倒。在这个状态里，对方的出手"看"得比别人清楚十倍。
      因为你不急。不急的人可以等，等得到那个"一瞬间"。

  - id: tai_xu_qian_ying
    name: 千影
    description: |
      连出数招，每一招都是不同门派的功夫。不是模仿——是真的会。
      太虚无相功最令人窒息之处在此：它不是一个招式库，是一个"镜子"，
      你用什么，它就回什么。而且回得比你更快。

  - id: tai_xu_wu_wo
    name: 无我
    description: |
      放弃自己的招式，完全跟随对方的节奏而动。对方快你也快，对方慢你也慢。
      不是模仿，是融为一体——在你的节奏里打败你，用的恰好是你最熟的招。
      此招用后极度耗神。因为你不是在打一个人，是在"成为"那个人。
      哪怕只有片刻，也足够把自己的一身武学全部重组。

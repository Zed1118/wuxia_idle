id: tai_yi_xuan_shen_jue
name: 太一玄神诀
origin: |
  终南山某道观相传有一卷自周朝传下的内功秘籍，藏于《道藏》某册的夹页里。
  后世翻遍道藏只在残页中找到九个字：「太一者，万法之初也」。
  其余尽佚。自宋元以来，山中道人各自演绎那九个字，
  有人练成一套呼吸法，有人练成一套静坐法，也有人练成内劲收发的功夫。
  谁也不敢说自己练的是「真」太一玄神诀——
  因为真正的那一本早不在人间了。如今所传，皆是后人借着九个字搭起来的骨架。
  但骨架之下，仍隐隐有一股古朴气息，自周代道家一路传到今日。

mantra: |
  太一未分，玄牝未启。
  一念归息，万象归一。
  返朴抱真，神不外驰。
  寂兮寥兮，独立不改。

moves:
  - id: tai_yi_xuan_xi
    name: 太一玄息
    description: |
      静坐一念之间，内息回流至脐下三寸，如有山林雾气在丹田中缓缓打转。
      此时身体的细微动作——指节、眼皮、喉头的咽——皆静止下来，
      但内息并未停，反而比常时更长更匀。
      坐到第七息时，整个人像一截浸在山泉里的木头，不沉不浮。

  - id: tai_yi_gui_yi
    name: 太一归一
    description: |
      内劲收敛至极致，周身气息若有若无，敌人在身前三尺仍读不出你的气场。
      此招用时不出招也不防招，只是站着——
      站到对方的判断开始动摇，他出手前会迟疑半息。
      就是那半息，让先后手在不知不觉间换了一次。

  - id: tai_yi_fan_pu
    name: 太一返朴
    description: |
      内息回到最初的一缕，身轻如初学者，连出手的姿势都返回最稚拙的样子。
      但这一刻所有招式都从头处生——你出的那一拳没有任何流派印记，
      对方读不出招式从何来，也读不出招式往何去。
      返朴不是退步。返朴是把所有学过的招都暂时放下，
      让最朴素的那一拳出来。

id: bing_pian_xin_jue
name: 冰魄心诀
origin: |
  北地寒山脚下有一座无名道观，观主是一位连法号都没留下的女道长。
  她在观中住了四十年，每年冬至独坐冰封的后山池畔三日不动。
  她临去时把一卷薄薄的册子压在蒲团下，纸上只写了内息走法，没有名字。
  后人翻到此书，照着练，练成者周身冰凉，掌心可结一层薄霜——
  但奇怪的是这种人看人的眼神是暖的，比常人还暖几分。
  江湖里于是替她补了一个名字：冰魄心诀。

mantra: |
  寒不在外，在息内行。
  心若寒潭，目自温明。
  阴极生阳，魄定神清。
  一念不起，万境澄凝。

moves:
  - id: bing_pian_ru_jing
    name: 冰魄入境
    description: |
      静坐三时，将一缕内息引至命门，绕过周身十二正脉，
      所过之处寒气内敛，痴热尽褪。坐到第三时辰百脉自通，
      呼出的气息有微不可见的白雾——那不是冷，是体内最后一丝燥气离体。

  - id: bing_pian_an_du
    name: 冰魄暗渡
    description: |
      一掌击出无声无息，掌风甚至带不动对方衣袖。
      但被击者三日后方觉脏腑里有一缕凉意盘旋不散，七日后才知是中招了。
      用此招的人极少出手——出了手便不必赶时间。

  - id: bing_pian_xue_chen
    name: 冰魄雪沉
    description: |
      内劲化作寒冰般沉重，一掌落地对方双足如生根。
      不是定身术——是对方的内息被你这一掌的寒气稳稳压在丹田之下，
      想拔脚动一步便要先把那口压住的气吐出来。但你不让他吐。

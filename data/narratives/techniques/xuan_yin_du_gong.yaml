id: xuan_yin_du_gong
name: 玄阴毒功
origin: |
  阴柔一脉走到极端便是毒。此功采瘴气凝于丹田，以自身精血为引——
  每一掌送出时内劲中夹一缕毒。不是猛毒——是"慢毒"。
  中毒者当时不觉，数日后伤口溃烂、内息紊乱，非得下毒者亲手解。
  此功源出云南深山的蛊毒体系，传入中土后演变为阴柔流派的禁区功法。
  练此功者终身不能再学医。

moves:
  - id: xuan_yin_yin_du
    name: 阴毒手
    description: >
      一指点出，指尖微紫。沾衣便能透毒——不是剧毒，是一种让内力运转
      越来越慢的冷。被点中的人当时还能战，越战越软，两个时辰后便用不上内力。
      此招最怕对方速胜——拖延是你的武器。

  - id: xuan_yin_du_zhang
    name: 毒掌
    description: >
      蓄毒于掌心，一掌印在对方兵器或甲胄上。毒不攻对方——攻装备。
      剑锋沾毒，握剑的手每日会麻一分，七日后麻感蔓延至肩。
      对方换了剑，手上麻感依然不退。玄阴毒不是随刀剑去的——是随经络走的。

  - id: xuan_yin_bi_guan
    name: 闭关化毒
    description: >
      以自身经脉为熔炉，将所有残余毒菌逼入丹田深处再以真气箍住。
      此招不出手——是出手之后的恢复。时间一到，毒自行化解。
      但化解期半分内力不能动用。

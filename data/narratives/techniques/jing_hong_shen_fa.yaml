id: jing_hong_shen_fa
name: 惊鸿身法
origin: |
  "惊鸿"二字出自曹植《洛神赋》——「翩若惊鸿，婉若游龙」。
  此身法乃灵巧一脉的中阶功夫，创始人是唐代公孙大娘门下一位舞剑弟子。
  她从剑舞中提炼出这套身法：不飞、不跃、不跑——只转。
  在方寸之间通过连续旋转与侧移将自身的方位变得无法预测。
  惊鸿不是速度。惊鸿是一瞬间你换了三个方向。

moves:
  - id: jing_hong_pian_ying
    name: 翩影
    description: >
      脚尖为轴，原地转半圈——转到一半忽然反向转一圈。
      对方还没看清你转了多少度，你已到了他侧后方的死角处。
      身法不难，难的是转的时候眼睛能一直锁定对手的影子不放开。

  - id: jing_hong_rao_yun
    name: 绕云
    description: >
      三步快移，每一步都变一次方向：左、右、正。三步走完，
      你的身形和他之间已经换了两个遮蔽点。
      对手只觉得自己被绕了两道"云"，看不到你的实影何在。

  - id: jing_hong_jing_hong
    name: 惊鸿一瞥
    description: >
      在对手出招的前一瞬闪到他的正前方——不是躲，是逼近。
      向前一步侧一脚踹，目标是对方的前足脚踝。
      被踹中的人不是摔倒——是摔出一步。一步，便决定了谁先手。

id: qing_gang_xin_fa
name: 青冈心法
origin: |
  青冈山一派的入门内功，相传为开派祖师在青冈林中观松柏悟得。
  此功不求刚猛，不求灵巧，只求根基稳固。行功时内力如松根入地，
  一寸一寸往下扎，不急不躁。
  青冈山规矩：入山弟子须修满三年方可下山。修不满的，不是功夫不到家，
  是性子没磨够。

mantra: |
  松立千尺，根在寸土。
  风来不动，雪压不伏。

moves:
  - id: qing_gang_gu_ben
    name: 固本培元
    description: |
      沉肩坠肘，气沉丹田。出手时看似迟缓，实则每一式都重过前一式。
      不为败敌，为先立己。

  - id: qing_gang_an_jin
    name: 暗劲透骨
    description: |
      将内力化为暗劲，一招送出后劲力不散，沿兵刃或拳面透入对方体内。
      此招重在时机——早了劲力不到，晚了对方已退。

  - id: qing_gang_zhang_ya
    name: 松崖压顶
    description: |
      运起全身内力，一掌压下，力道自上而下层层叠加，如断崖之上松根破岩。
      此招耗力极大，非绝境不轻用。

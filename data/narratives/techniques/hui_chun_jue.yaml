id: hui_chun_jue
name: 回春诀
origin: |
  此术来历不明。有人说是终南山一位道人所创，也有人说是一位还俗的僧人
  在行医半生后悟出来的。不论来处，修习此诀之人皆可引天地间残余生机
  为己用，疗伤续骨，平复内息。
  江湖中人大多不屑此术——觉得"治伤是郎中干的，不是武人干的"。
  活下来的人不这么想。

moves:
  - id: hui_chun_ning_xi
    name: 凝息归元
    description: |
      长吸一口气，将散乱的内息重新捋顺。呼吸之间，周身百骸似浸温水。
      不能杀人，不能败敌，但能让你再站一次。

  - id: hui_chun_jie_du
    name: 驱毒化淤
    description: |
      运内力沿经脉走一周天，借体温逼出侵入皮肉的毒与瘀。
      走完这一周天需半柱香——半柱香里不能动，不能分神，不能后悔。

  - id: hui_chun_jiu_ji
    name: 救急续骨
    description: |
      将自身内力注入重伤者体内，以己之息续彼之息。施术者内力损耗极大，
      一日之内不可再用。师门有训：「救人之前，先掂自己有几斤沉。」

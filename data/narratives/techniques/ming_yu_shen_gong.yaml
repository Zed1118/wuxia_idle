id: ming_yu_shen_gong
name: 冥玉神功
origin: |
  失传百年的阴柔禁功。此功源自一处废弃的古墓——修炼者须先背对古碑、
  面对黑暗，承受三日绝对的静与绝对的冷。在这三日的尽头，
  体内的阴寒之气将被转化为极致的"冥玉之气"——不是冰，是比冰更深的冷。
  传说修冥玉神功者，面容会留一缕永久的灰白色——
  那是阴气在内功循环中留下的印记，不是伤。

moves:
  - id: ming_yu_ning_zhi
    name: 凝指
    description: >
      将冥玉之气凝于指节。一指点出，对方皮肤无伤——但皮下的血液停流了一瞬。
      被凝指碰过的肌肉，三日内会出现灰色的冻斑。这不是冻伤——是阴气停驻。

  - id: ming_yu_cui_gu
    name: 摧骨
    description: >
      一掌拍在对方身上不往回收，而是微微下压——冥玉之气如暗潮渗透骨骼。
      骨不裂，但骨缝间原有的滑液被瞬间冻断。此后关节一动便痛，
      如碎玻璃在骨间碾磨。此招阴狠，练成者极少出手。

  - id: ming_yu_huan_sheng
    name: 还生
    description: >
      反向催动冥玉神功将体内阴气吸回——不是伤敌，是救己。
      在自身经脉被寒气重创的一瞬，用还生法将自己冻住片刻——
      伤不恶化，命便留一线。片刻后自行解冻，但解冻时内力已消耗大半。

id: wu_ying_shi_dao
name: 无影十刀
origin: |
  阴柔与刚猛的奇诡结合——刀法以刚猛为基，出刀时却以阴柔收势
  让刀光的残影留在空气中久久不散。一柄刀挥出，十道残影随之，
  对手无法判断哪一刀是实、哪一刀是余影。创始人为北宋年间一个
  被灭门的老刀头。他在绝谷中独自练了十年，练成时头发全白。

moves:
  - id: wu_ying_po_kong
    name: 破空
    description: >
      极速一刀划过，刀已收回，刀痕还滞在空中一截——
      对方以为是第二刀来了，举手格挡已来不及，实刀已从另一个方向送入。

  - id: wu_ying_can_xiang
    name: 残像
    description: >
      连续三刀以特定的用力角度劈出——刀痕彼此重叠叠成一片刃墙。
      看不见你新劈的那一刀——它藏在之前所有刀的"影子"下面。
      此招耗腕力极大，劈完三刀后指节必麻。

  - id: wu_ying_gui_yi
    name: 归一
    description: >
      将十刀的刀影在最后一刀全部收回——所有刀痕轨迹骤缩为刀尖一点。
      这一点集中了十刀的全部余劲，戳出时不出声——不是快，是太锐。
      刀尖破风后风才发出闷响。

id: hun_yuan_gui_yuan_gong
name: 混元归元功
origin: |
  传说级的归宗心法，不分刚猛灵巧阴柔——归元者，万法归宗。
  创始人不可考，但据闻千年来只有五人练成——三人成了宗师，两人成了武圣。
  此功不教你新招式，它只是把你身上所有的武学"统"起来：
  你练过的每一招、挨过的每一掌、走过的每一步，都被混元之力重新编成一体。
  你不是在学功夫，你是在"回收自己所有散落的工夫"。

mantra: |
  散而为万，合而归一。
  气不定形，意不拘器。

moves:
  - id: hun_yuan_gui_yuan
    name: 归元
    description: >
      静坐调息，将全身混乱的真气在丹田重新排列——不是排成一行，
      是排成一个圆。内息在丹田中自己转，你微微一动，内息便随之而转。
      归元之后，周身劲力如一，不再有"左手强右手弱""拳法快剑法慢"的割裂。

  - id: hun_yuan_wan_xiang
    name: 万象
    description: >
      将此前所通的每一种武学同时在动作中唤出——你出拳的同时身体借了剑法的
      转腰，拳落时脚下的步法又借了身法的碎步。一拳之内，藏着你在江湖上
      所有交过手的经验。这不是模仿——是你的肌肉已记下了一切。

  - id: hun_yuan_wu_ji
    name: 无极
    description: >
      归元的尽头：你暂时忘了所有招式的名字，全部化为感觉——
      对方的动念、空气的流动、地面的震感，一切都在你的感知中"归"入一圈。
      在这一圈里，你不出招——你只是正好在对的时间，站在了对的位置上。
      这种状态不能持续太久——它会燃烧你的意识，燃完了就空。

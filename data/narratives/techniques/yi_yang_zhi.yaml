id: yi_yang_zhi
name: 一阳指
origin: |
  灵巧指法之极，相传为大理段氏的祖传绝学，后来流入中土。
  以极短时间内将所有内力聚于一指之上点出——指尖刺出的速度
  比长剑还要快三分。但这个"一阳"之名另有深意：一阳指每用一次
  对手腕关节的损耗极大，久用者手指会弯不回来。
  一阳指不是用来杀人多的——是只杀一个。就一个，最对得起这只手。

moves:
  - id: yi_yang_dian_xue
    name: 点穴
    description: >
      一指点中穴位，内力沿经络封锁对方一处筋脉的循环。
      点中则半身酸麻，点不中——退后三步，重新找角度。
      经络如河，一指如坝。

  - id: yi_yang_po_zhao
    name: 破招
    description: >
      在对方招式将发未发之际，一指点向其发力关节——
      对方的招式还未完全成形便被打断。打断的不是动作，是脑子给肌肉的"发"令。
      时机稍纵即逝，决断力比眼力更重要。

  - id: yi_yang_guan_tong
    name: 贯通
    description: >
      将三指连点三穴——每穴间隔半息。三指打通一条直线上的三个穴位，
      三穴连贯后真气贯注，对方一条经脉被彻底封断——非致命，
      但一个时辰内此脉所控的所有动作全废。

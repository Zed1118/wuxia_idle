id: da_jin_gang_lun_quan
name: 大金刚轮拳
origin: |
  失传三百年的西域密教护法神功。拳意刚猛到极点之后自生圆融——
  大金刚轮，轮，就是圆。据密教经文载，此拳为护法神所传，
  只授给发下护誓的人。中土最后一次有记录的大金刚轮拳传人
  是元初的一位番僧，他在大都城外以一敌百，打完之后盘腿坐下，
  入寂了。

moves:
  - id: jin_gang_jiang_mo
    name: 降魔印
    description: |
      一拳自胸腹前平平推出，无招无式。拳面过处，空气先被压出一声闷响。
      此拳不追人，人自己撞上拳劲——拳未到，拳意已罩住你全部的退路。

  - id: jin_gang_suo_long
    name: 锁龙桩
    description: |
      双脚不动，只靠双拳在极小空间内连打七拳——每一拳都打一个方向，
      封锁对手所有变招路线。七拳打完，对手被困在原地，不是不会动，
      是被"算死了"。这七拳是三百年前密教斗法场上的定局拳。

  - id: jin_gang_lun_hui
    name: 轮回斩
    description: |
      将全部内力聚于一步一跃一拳，拳力未至，拳风先到——这一拳被形容为
      "像是从上一世打到这一世的"。但打完之后自身真气虚空片刻，
      若打不中——也就不用考虑接下来了。

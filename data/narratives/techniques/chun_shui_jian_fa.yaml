id: chun_shui_jian_fa
name: 春水剑法
origin: |
  洛阳春水堂万掌柜的独门剑法，传自万家的祖上。万家祖上不姓万——
  姓什么没人说得清。只知道万家先祖是南宋末年一位隐退的剑客，
  在洛河边开了家铁铺，从此不言武事，只锻剑。但这套剑法，代代只传一个人。
  万掌柜今年五十有三，还没找到他想传的人。

moves:
  - id: chun_shui_bo_guang
    name: 波光潋滟
    description: |
      剑尖连点三下，每一剑的落点都在前一剑的旁边半寸。
      三剑连成一片光，对方眼前全是剑尖——分不清哪一剑是实的。
      实的那一剑永远在最后。

  - id: chun_shui_chun_han
    name: 春寒料峭
    description: |
      剑走偏锋，自下往上撩——不是撩对方的咽喉，是撩对方握兵器的手。
      万掌柜说：「春水不是杀人的剑法。是劝人放下兵器的剑法。」

  - id: chun_shui_liu_shen
    name: 流深无声
    description: |
      仗打到中段忽然停下，剑尖朝下，人不动。三息之间不攻不守，
      让对方自己把招式使完。《道德经》云"大音希声"——
      万掌柜把这句话刻在了春水堂的剑架底下。静不是不动，是待。

id: jin_zhong_zhao
name: 金钟罩
origin: |
  少林硬功之首。外炼皮骨、内炼真气，功成之后周身如罩在一口无形金钟之内，
  刀枪不入，水火难侵。但学成极难。入门从站桩开始——每日寅时起，
  光着上身站在风口，先站一百天。站不住的，连"金"字都碰不到。
  历代少林金钟罩大成者不出十人。十人中七人是哑巴——
  因为常年闭气熬练，嗓子坏了。

moves:
  - id: jin_zhong_ning_shen
    name: 凝神守钟
    description: |
      气沉丹田，意念中幻化一口大钟罩住全身。此刻呼吸放缓，皮膜收紧，
      来招打在身上的力道被钟壁"化"去——不收不反，只让它过去，如风过铃。

  - id: jin_zhong_weng_ming
    name: 钟鸣反击
    description: |
      在承受一击的同时猛震真气，钟壁"嗡"地一声弹开——来招的力道被原路弹回，
      对方自己没有防备的话，震麻的是他自己的手。此招讲究时机，震早了力道还没到，
      震晚了力道已入体。

  - id: jin_zhong_po_ji
    name: 破钟一击
    description: |
      主动散去外层护体真气，将所有防御力集中于一处——舍弃全身防护，
      换来一个部位在瞬间的无懈可击。此招用于应对致命一击，
      救了你自己也暴露了你自己的空门。用对了活，用错了死。

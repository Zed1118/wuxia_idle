id: po_jun_quan
name: 破军拳
origin: |
  唐代军拳，由边军教头编成，传至今日招式已残了大半。原版破军拳打的是
  "一进不退"——沙场上一退就踩到身后同袍的脚。
  现存十八式口诀散佚到只剩三句：「拳出不收，收拳必折。腿出无回，回腿必跌。势来不挡，挡必双亡。」

moves:
  - id: po_jun_chong_zhen
    name: 冲阵
    description: >
      直步上前一记沉拳，拳风破空如铁骑冲锋。这一拳不来别的——就是你的体重、
      你的腰力、你的膝盖下压和你的拳头加起来。打中不必补第二招。被打中也不必。

  - id: po_jun_she_qiang
    name: 折枪
    description: >
      侧身切入对方兵刃内圈，用前臂格挡对方的兵器杆，另一拳同时砸——
      专砸握兵器的手。折的不是枪——是握枪的手腕。

  - id: po_jun_duan_hou
    name: 断后
    description: >
      假意后退三步，退到第三步时猛然反冲——三步的退势转换成一步的冲势，
      将所有后退的力量在一瞬间翻到拳面上打出去。
      此招赌命。因为你退三步时给了对方最好的追击窗口——
      赌就赌在这一拳比他追的那一剑更快。

id: han_bing_mian_zhang
name: 寒冰绵掌
origin: |
  阴柔一路的内家掌法。掌力不重、不猛、不快——但冷。
  每一掌拍出都附着一层极寒内劲，打在身上不疼，几日后淤血处才开始发青发紫。
  创这套掌法的人原是长白山脚下一个猎户，在雪地里埋伏猎物时悟道：
  「冷比痛可怕。疼是当下的，冷是慢慢来的。」

moves:
  - id: han_bing_tou_gu
    name: 透骨寒
    description: |
      掌力极柔，挨上去和指尖轻按差不多。但内劲入体三日后方显——
      被按过之处脉络凝涩，出手迟缓。对头越拖越不利，治起来却只有施掌者自己会解。

  - id: han_bing_san_cun
    name: 三寸霜
    description: |
      连出三掌，分别打在对方腕、肘、肩三处——不取要害，只封关节。
      三掌打完，对方一条手臂便如浸冰水。不是废了，是不听使唤了。

  - id: han_bing_han_mei
    name: 寒梅印
    description: |
      运掌如拈花，轻轻印在对方胸前。掌印不退，七日方消。期间每逢阴雨天，
      掌印处便会隐隐作痛。不讲杀力，只讲给对手留个"到此一游"的提醒。

id: pan_long_gun_fa
name: 盘龙棍法
origin: |
  少林武僧的入门兵器功。一根齐眉棍，平中见锋、直中见圆——横扫千军
  时棍身如龙尾甩过，挑、点、戳、扫四势相通。少林武僧下山化缘时常背一根
  齐眉棍，不是要打谁——是这棍法的站桩本身就是修行。

moves:
  - id: pan_long_sao_tang
    name: 扫堂
    description: >
      棍尖贴地扫过半弧，扫的不是人——是人的下盘。
      对方跳起来躲，棍已收回。落地时等待他的是棍的另一头。
      此招单对多时最好用：一圈扫出去，都给逼退三步。

  - id: pan_long_tiao_deng
    name: 挑灯
    description: >
      棍尖自下往上一挑，力道集中在一寸的棍尖，专挑对方握兵器的那只手。
      挑中了兵器便脱了手。挑不中——你也已经近了他的身。

  - id: pan_long_shen_long
    name: 神龙摆尾
    description: >
      整根棍向后倒甩，握住棍尾，借离心力将棍头的速度甩到极限。
      这一棍打在身体任何部位都是骨裂。但甩完之后自己也转了一圈半——
      如果没打中，你露出的后背就是对方的礼物。

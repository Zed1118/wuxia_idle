id: liu_yun_qing_ling_shen_fa
name: 流云轻灵身法
origin: |
  川中有一位剑客自悟身法，姓什么没人记得，只记得他闲时爱看云。
  他常在峨眉山腰一坐就是半日，看云从一山飘到另一山，
  看云怎么在风里折一道弯，又怎么在山口慢下来。
  他后来说：「云走的不是路，是势。我的身法也不走路，走云走的那个势。」
  这便是流云轻灵身法。脚下若有还无，行进间像在云气里推一推、让一让。

mantra: |
  云不行步，势自往来。
  足下若虚，心中若实。
  一翻一卷，遁形于风。
  来无所急，归无所归。

moves:
  - id: liu_yun_du_jiang
    name: 流云渡江
    description: |
      一步跨过三丈，落地无声。诀窍不在跳得高，在于落地前内息先一步收回，
      整个人像被云气托住的羽毛轻轻放下。踩在水面上能荡起一圈涟漪，
      涟漪还没散开，人已到对岸的草地上。

  - id: liu_yun_fan_pian
    name: 流云翻篇
    description: |
      身形侧转九十度，转的瞬间像风过书页——一翻便过。
      对方挥出的兵刃刚到原处，那一处只剩半缕衣角的余风。
      此招最难处不在转，在于转过去之后立刻把脚步稳住，
      不能让对方从衣角的飘势上读出你下一步的方向。

  - id: liu_yun_gui_yan
    name: 流云归雁
    description: |
      疾跃出去三步后忽然回身，身法在空中划出一道弧，
      如雁折翅归来。这一弧不是为了躲——是为了让对方追错方向。
      回到原地时对方正朝着你刚才跃出去的那条直线追。
      你在他身后半步，他还没察觉风已经反了。

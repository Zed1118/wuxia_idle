id: chan_si_jin
name: 缠丝劲
origin: |
  阴柔内功，将内力化为极细极韧的丝状——不是真丝，是"劲丝"。
  一掌拍出，内劲如丝线缠绕对方的肢体，一根丝不碍事，一百根丝缠上去，
  手脚便慢了——不是不能动，是每个动作都要多费一倍的内力。
  创始人是江南一位织绸的妇人。她不会武功，只是有一天发现她纺的丝
  可以在不知不觉中拉住一片飘落的叶子。

moves:
  - id: chan_si_rao_zhi
    name: 绕指
    description: >
      将劲丝聚于指端，一指点出——不是戳，是"绕"。指端沾对方手腕便往回一勾，
      一道无形丝迹缠住对方的关节。被缠住的人只觉得手腕发软，不痛不麻，
      但就是使不上劲。一根丝是缠不住人的，但它能缠回来你刚拔出的剑。

  - id: chan_si_bu_wang
    name: 布网
    description: >
      将劲丝在空中层层铺开，形成一张无形的网。网不会伤人——但会拖慢人。
      对方穿过网时觉得空气变稠了，每一招每一式都比平时慢了半拍。
      这张网是给你自己铺的——在对方发现自己慢了之前，你已经出手了。

  - id: chan_si_chou_si
    name: 抽丝剥茧
    description: >
      数道劲丝一缕一缕缠上对方的兵刃——不是打掉，是"拉偏"。
      丝多了，刀便歪；歪了一分，便是死生之差。
      老裁缝说过：再好的针，被一根线缠住了，也是一样。

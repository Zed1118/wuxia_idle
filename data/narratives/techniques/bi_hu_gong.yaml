id: bi_hu_gong
name: 壁虎功
origin: |
  灵巧一路的攀爬轻功。修习者先在沙地上用手指与脚尖爬——不是走，是爬，
  像壁虎。练到能在打滑的青砖墙面上攀行数丈而不掉。
  此功出自南方群山中，猎户们用它攀崖采药、盗贼们用它翻墙入室。
  前者用了几百年，后者也用了。

moves:
  - id: bi_hu_tie_qiang
    name: 贴墙
    description: >
      背心贴墙，四肢张开，借指尖与鞋底的摩擦力将自己固定在垂直墙面上。
      挂在墙上的人从下面看——就像凭空躺在了墙中间。
      夜间用此招藏在巷道中，对方从你脚下经过都不会抬头。

  - id: bi_hu_you_yan
    name: 游檐
    description: >
      沿飞檐边缘横向行走，一步一扣，脚跟不碰檐边一厘。在屋檐下绕到
      对手身后落地——对方还在看着前院的门，你已经站在他背后的阴影中。

  - id: bi_hu_chuan_liang
    name: 穿梁
    description: >
      跃上房梁后四肢齐动，从一根梁无声地移到另一根梁。
      不是飞——是"挂"。每一移手之前都要先确认梁上无灰、灰落必出声。
      以这招在梁上行走的人，楼下的人还在喝酒。喝完酒抬头，楼上已无人。

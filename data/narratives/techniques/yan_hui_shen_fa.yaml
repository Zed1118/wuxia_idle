id: yan_hui_shen_fa
name: 燕回身法
origin: |
  轻功中最常见也最实用的一种，传闻是峨眉派一位女侠观屋檐下燕子绕梁
  悟出的身法。不追求飞檐走壁的高度，专攻"在一小片空间里如何不被击中"。
  修习此功的弟子头三个月不练步法，只练一件事：看燕子飞。
  看懂了燕子在檐口转身的那个折角，才算入了门。

moves:
  - id: yan_hui_qing_dian
    name: 轻点回旋
    description: |
      脚尖点地，身形拔起半尺，随即侧旋半周，整个人像被风吹翻的一页纸。
      此招不求快，求飘——飘得对方看不清你下一脚落在哪。

  - id: yan_hui_dao_zhuan
    name: 倒转乾坤
    description: |
      故作前冲之势，在对方出手拦截的同一瞬后仰倒翻，双手撑地借力弹回。
      整套动作在半息之内完成，观者只觉眼前一花，人已经到了另一个方位。

  - id: yan_hui_chuan_lin
    name: 穿林绕影
    description: |
      连续数次短促变向，每一步都踩在一个对手想不到的死角上。
      此招在多人围攻时最见效用——步法绕得好，敌人自己会撞上同伴的兵器。

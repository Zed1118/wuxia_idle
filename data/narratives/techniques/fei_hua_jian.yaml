id: fei_hua_jian
name: 飞花剑
origin: |
  灵巧一路的中阶剑法，相传是一位落第书生在落花时节悟出的——
  他一生没中举，但把"花落之前的那一瞬身法"练到了极致。
  飞花剑不追求一击致命，追求"对手的剑碰不到你"——打不过可以等，
  等不到可以走，走不掉可以再打。书生骨子里的东西。

moves:
  - id: fei_hua_luo_ying
    name: 落英
    description: >
      剑尖在身前画出一片剑花——不是刺，是"散"。每一剑都在不同的角度，
      连成一片碎碎的光。对方眼前全是剑，不知道挡哪一剑。
      兵法云「备前则后寡，备后则前寡」，此招打的就是这个道理。

  - id: fei_hua_nian_hua
    name: 拈花
    description: >
      剑身轻转，用剑脊轻轻一托——托对方的剑身，让它滑偏一隙。
      不挡不劈不接，只"帮"对方的剑换个方向。对方剑偏了空门自然露。

  - id: fei_hua_san_ban
    name: 三瓣
    description: >
      连刺三剑：一剑封左、一剑封右、一剑直取中宫。三剑不是同时发出的——
      是一剑比一剑快。第一剑对方还能挡，第二剑勉强跟住，第三剑跟不上。
      书生说的：「天下功夫，无坚不破，唯快不破。」

id: fu_hu_zhang
name: 伏虎掌
origin: |
  少林七十二绝技之一，由达摩院首座亲传。此掌法取意"降龙伏虎"——
  降龙是克制外魔，伏虎是收束己心。十八式掌法每一式都看似刚猛，
  实则刚中有柔，正如伏虎——用力太猛虎必反噬，劲道恰到好处虎才服。

mantra: |
  猛虎卧荒丘，潜伏爪牙忍受。
  一朝发掌，十步无人。

moves:
  - id: fu_hu_jiang_long
    name: 降龙伏虎
    description: |
      双掌齐出，一掌取上盘一掌攻下盘，力道同步推进——对方无论上挡下撤，
      都会落入另一掌的劲道之中。此招虚实不定，虚招可随时变实。

  - id: fu_hu_hu_yue
    name: 虎跃山涧
    description: |
      前踏一步凌空劈掌。力道全在脚尖离地那一瞬——离地越短，掌力越沉。
      久练者可一步跃出丈外，掌锋未至，劲风先到。

  - id: fu_hu_lie_yang
    name: 烈阳碑手
    description: |
      聚内力于掌面，一掌拍出，掌心通红如烙铁。此招非攻人身，专破金铁——
      拍在兵器上可将对方兵刃震脱，拍在甲胄上可留下一个掌印。

  - id: fu_hu_hui_tou
    name: 猛虎回头
    description: |
      背身一瞬突然回身发掌，力道自腰轴拧转而出，出掌幅度极小但劲道极沉。
      此招不抢先手，专打"你以为赢了"的那个间隙。

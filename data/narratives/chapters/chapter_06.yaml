id: chapter_06
title: 飞升
prologue: |
  嵩山论剑大会散场之后的第二日清晨，李寒离了偏厢。

  山顶坪上那三柄旧剑还立在石碑前。
  中州武林的执事昨夜来过一回，没说话；
  道家青松观留下的那壶茶始终没碰。
  他过去也只是看了一眼，没有多停留。
  ——这是中州的事情，留给中州自己收尾就好。

  下山之前，他把怀里那面小铜镜重新摸了一下。
  又把腰间那枚刻「师」字的玉佩贴了贴。
  两件东西一西一东，在身上压成一种很奇怪的稳。
  Ch4 那一夜在阳关，他原本是不打算去取镜子的。
  Ch5 这一夜在嵩山，他更不曾想要这枚字。
  ——可是它们到了，他就带着走。

  下山的路他走得比上山轻。
  脚下的台阶比想象中短。
  半道上他停了一停，没回头。
  山道边一株旧松上挂着前夜散场未取的灯笼，
  红纸已经被夜雨打褪了色。

  他走出嵩山的山门那一刻，
  心里浮上来一句话——那是师父临终时的第三句。
  那一句他从十六岁那年起一直当作「没说完」。
  昨夜他改了主意：那一句也许已经说完了。
  「最后那一段路」——本来就只有这一句，
  剩下的，是要他自己走。

  ——可是「自己走」往哪里走？
  师父没说。
  他自己也还没全想明白。

  从嵩山往北，是黄河。
  黄河之源在更西。
  源头再往西，是昆仑。
  这一程他没有路引，也没有客栈的灯。
  风从西边吹过来，澄澈干净，
  没有西凉那种砂粒的刺，也没有中原那种土腥气。
  ——他已经听过两处地方的风。
  这一程要听的，是第三处。
  也是最后一处。

  他扶了一下背上的剑，朝北走了一步，又走一步。
  铜镜与玉佩在胸口轻轻碰了一下，
  发出一声极轻的金石之响。
  这一声响他在嵩山山门外听过一次，
  在中州论剑场散场时也听过一次。
  这一回再听，玄妙处比前两次更近——
  像有谁在身后轻声叫了他一下，
  又像只是风从胸口穿过。
  他没有回头。
epilogue: |
  昆仑山顶那一夜过后，平台上只剩李寒一个人。

  西凉霸主在最后一句之后，没有再开口。
  他没把那柄剑递过来——
  「无物可赠。你已经不需要了。」这是他说的最后一句话。
  那柄剑插回鞘中。他下了山。
  三弟子分两侧让开路，跟着他一同下山。
  雪山的风停了一刻，又重新起来。

  李寒在平台中央站着。
  他没有取什么，也没有问什么。
  腰间那枚「师」字玉佩、怀里那面西凉小铜镜、
  黄河源头水兵给的那枚龙纹玉佩、外门守关给的那枚昆仑佩——
  四件物事一并贴在身上。
  他把手探进怀里，把它们一件一件取出来，放在平台中央的青石上。

  四件东西并列。
  他没动。
  雪又下了一阵。下完了，又停了。

  「最后那一段路——」他在心里重念了一遍这一句。
  师父咳过血以后说的那一句。
  十六岁那年的雨夜里。
  ——也许已说完。
  下文要自己走。

  这一刻，师父留下的那三句话第一次完整地连成一句。
  「这世上的事，看不懂的，就先去走一走。」
  「剑到了一处地方，就要听那处地方的风。」
  「最后那一段路——」
  三句话之间没有连接词。
  可它们在他心里此刻是一句。

  化境的门在这一刻开了。
  他没有举手。
  他只是站着，听最后一段风从山外吹来。
  风很轻，很玄妙——比黄河源头还要远的一处地方的风。
  ——下一回他要去听的，已经不在嵩山，
  也不在昆仑。

  下山之前，他没有把那四件东西带走。
  ——他没有再需要它们。
  雪会把它们埋起来。

  下文要自己走。
  这一段路，他认了。

id: chapter_02
title: 武林初识
prologue: |
  洛阳的夏天闷热难当。
  李寒在城南的客栈住了三日，每日只做一件事——坐在二楼临街的窗口，
  看楼下往来的人。

  穿绸衫的商贾、挑担子的货郎、腰间佩刀的公门中人、光着膀子扛米袋的苦力。
  偶尔也有江湖人——背剑的少年、牵马的老镖师、一身皂衣的捕快。
  每一个人走路的样子都不一样。师父说过：「看一个人走路，
  就看得出一半的功夫。」

  第三日黄昏，楼下有人抬头看了他一眼。
  那人穿一件洗得发白的青衫，腰间的剑没有鞘。他看了李寒一眼，笑了一下。
  然后转身走进了巷子深处。

  李寒放下手中的茶碗，跟了上去。
epilogue: |
  洛阳城的灯火在身后一盏一盏灭了。
  李寒走出城门时，值夜的兵丁正靠着城墙打盹。
  他这三天见了三种剑法、两门拳术、和一种他叫不出名字的身法。
  那些人有的报出了名号，有的没有。
  青衫人最后在巷子里说了句话：「洛阳只是第一站。剩下的路，得你自己走。」
  说完把剑鞘留在了墙根下。

  李寒背着两柄剑出了城。一柄是自己的，一柄没有鞘。
  夜风从黄河的方向吹过来，带着水腥味。

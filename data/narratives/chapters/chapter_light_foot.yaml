id: chapter_light_foot
title: 轻功试炼
prologue: |
  江湖中流传一段老话：身重则滞，步轻则远。
  这话不是哪一家武学的箴言，也不属任何门派。
  说得久了，渐成五处试炼——
  水面、屋脊、竹海、险崖、关楼。
  五处皆与一种古老的轻身术有关，
  无名，无谱，只在江湖人之间口传。

  你这一程行至西出阳关、中州论剑之间，
  听过多次。每听一次，心里便多一分动念。
  你的剑沉，你的步也沉。
  这一沉是十年练出来的，不是错。
  可若步法只剩一沉，
  长程奔波之时便慢上一线，
  短兵相接之时便少一寸余地。

  你不是为了快。
  你只是想知道——
  这一寸余地，究竟有没有。

epilogue: |
  五处皆已走过。

  水面那一处教你「踏」——
  脚不离水，水亦不沉脚。
  屋脊那一处教你「追」——
  瓦上劲风，从风借力。
  竹海那一处教你「听」——
  竹影叠动，以影避影。
  险崖那一处教你「越」——
  下临深涧，心不慌则身不坠。
  关楼那一处教你「远」——
  长风万里，以远蓄势。

  五处加起来，
  你的步法多了一寸余地。
  不是更快，
  是更宽。

  剑还是那柄剑。
  步还是那个步。
  只是再走江湖，
  从此身上少了一分滞，
  多了一分回旋。

  五处试炼的传授者从未现身。
  你也未曾追问。
  江湖人但凡走过此五处，
  心里皆有一个无名的师承。
  这一份师承，
  无谱无名，
  亦无需谱与名。

id: chapter_04
title: 西出阳关
prologue: |
  许昌一战后第十七日，李寒到了潼关。
  关楼上「天下第一关」的匾额被风雨打得发白，
  关下守军没认出他，只当是个过路的剑客，挥手放行。

  许昌的擂台他没拿名号。光头汉子的棍子断成了两截，
  四下里没人喝彩，也没人挽留——他就这么走了下来。
  三年里走过的十二个州都没留下他的名字，
  许昌也没留下。这一点李寒并不在意。
  师父临终时说过：「这世上的事，看不懂的，就先去走一走。」
  他在走。

  过了潼关，路就分了两条。一条往南，回中原；一条往西，去更荒的地方。
  李寒选了西。
  陕州、华州、长安——长安他没进城，只在城外的灞桥上坐了半日。
  柳树早已不绿，但桥下的水还在淌。
  长安以西是凤翔，凤翔以西是陇右，陇右以西便是河西走廊。
  土越走越黄。树越走越少。风从西边来，干燥得能把人的喉咙磨出血。

  到酒泉那一日，李寒在客栈听见两个商人对饮。
  「再往西，就不是中原的规矩了。」
  「玉门那一段还好，过了玉门，沙海里的事，不是讲规矩讲得通的。」
  「都说西凉里有位霸主——出手三招，无人能过。」
  「中原的剑客？呵，到了那一段，剑也得换种握法。」

  李寒坐在角落里没说话。他把碗里的酒喝完，付了钱，背上剑，出了客栈。
  风从西边来。他朝那个方向走。
  他想去看一看。
epilogue: |
  嘉峪关的旗子在夜里垂着，被风一阵阵吹得猎猎。
  李寒坐在关楼石阶上，身上几处刀伤还在渗血。
  关外那片戈壁的黑石上，霸主留下的那面小铜镜还在原处。
  他没去取。

  夜很长。风从更西的方向吹来，没有沙——只有那种深夜独有的、空旷的凉。
  李寒抬头看天。星子很密，比中原的天要冷一些。
  他忽然想起师父临终时说过的另一句话。
  「剑到了一处地方，就要听那处地方的风。」
  那时候他没听懂。今夜听懂了一半。

  许昌擂台上，他以为自己已经站到了剑的尽头。
  阳关一战之后他才看清——
  剑往上走的那一段路，他确实已经走完了。
  但再往上的那一段，不在剑上。
  是在另一处。他还没看见的地方。

  这一夜李寒没睡。东方有了一点亮色的时候，他站起来，
  把袖口结成的血痂掸了掸，朝关楼下走去。
  关外的风慢慢转了个方向。
  天亮以后，他还要继续走。

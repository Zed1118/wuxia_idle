id: chapter_04
title: 西出阳关
prologue: |
  [章首待精修]

  许昌一战之后第十七日，李寒到了潼关。
  关楼上「天下第一关」的匾额被风雨打得发白，
  关下守军没认出他，只当他是个过路的剑客，挥手放行。
  （～600 字章首：自许昌至潼关再望玉门的心境过渡，闯过武林会后的释然，
  西北风物初见——风沙、烽燧、马蹄、关楼、旗影，
  留 hook 西凉武人传说。）
epilogue: |
  [章尾待精修]

  嘉峪关的旗子在夜里垂着，被风一阵阵吹得猎猎。
  李寒坐在关楼石阶上，身上几处刀伤还在渗血。
  （～500 字章尾：与西凉霸主一战之后的余韵，
  「已知不足」的哲学顿悟——一流到绝顶之间还隔着一层看不见的东西，
  境界拐点暗示，留 hook Ch5。）

id: chapter_mass_battle
title: 守城试炼
prologue: |
  江湖中另有一段老话：剑客一身，挡不住人潮。
  这话是真的，十年间他见过无数次。
  人多则势盛，势盛则不退。
  一柄剑、三个人，挡在城前——
  从来不是「能不能赢」的问题，
  而是「能撑几个时辰」的问题。

  说得久了，渐成五处试炼——
  村、镇、县、关、城。
  五处皆与一种古老的守城术有关，
  无名，无谱，只在江湖人之间口传。
  传授者是谁，从无人见过。
  只是江湖人但凡愿意立在那五处，
  挡过一阵风，挡过一波人，
  心里便多一份「不能让人潮过去」的执念。

  你这一程西出阳关，本是为江湖学艺。
  路过五处时，皆未走过。
  这一次回头——
  你停下来了。
  不是为剑，是为「身后那点没名字的东西」。

epilogue: |
  五处皆已守过。

  村那一处教你「不躁」——
  人来不退，自有一线生机。
  镇那一处教你「不乱」——
  阵不破，势便不散。
  县那一处教你「不溃」——
  内有一线，外可承万钧。
  关那一处教你「不让」——
  寸土必争，守住一寸是一寸。
  城那一处教你「不忧」——
  长围之下，从容如初。

  五处加起来，
  你的剑还是那柄剑，
  你的人还是那个人。
  只是再走江湖，
  从此面对人潮之时，
  心里多了一处可以立足的地方——
  不是「能不能挡住」，
  是「立在那里，就够了」。

  五处试炼的守城人从未现身。
  你也未曾追问。
  江湖人但凡走过此五处，
  心里皆有一份无名的承担。
  这一份承担，
  无谱无名，
  亦无需谱与名。

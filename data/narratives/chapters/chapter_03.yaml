id: chapter_03
title: 名扬江湖
prologue: |
  秋分那日，李寒到了许昌。
  许昌不大，但许昌的擂台不小——每年秋分后三日，
  河南道上的武人都会聚到许昌城外，比一场不问生死、不问门派的擂台。
  赢的人不拿银子，只拿一个名号：当年的"许昌擂主"。

  名号不值钱。但在江湖上，值钱的东西从来不是银子。
  李寒到的时候，擂台上已经倒了一个人。
  那人趴在地上，手指还抓在擂台的木板缝里，一动不动。
  台下没有人出声。

  擂台上站着一个光头汉子，手里提着一根齐眉棍。
  他环顾四周，目光从李寒脸上扫过。
  「下一个。」
  风把擂台边的旗子吹得猎猎响。
epilogue: |
  旗子落在地上。光头汉子单膝跪在擂台中央，棍子断成了两截。
  台下的声音很远，像是从另一个人间传来的。

  李寒站在台上，抬头看天。
  天很蓝。秋天了，一行大雁正往南飞。
  他想起师父临终说的那句话：「这世上的事，看不懂的，就先去走一走。」
  三年了。走过十二个州，打过擂台，收过一柄没有剑鞘的剑。
  他还是没看懂。但他已经不怕了。

  他把断棍拾起来，放在光头汉子脚边。
  然后转身走下擂台，头也没回。

id: chapter_01
title: 学武出山
prologue: |
  庆元三年，江南。
  这一年的春天来得迟，桃花到清明才开。
  洛阳到杭州的官道上，多了一个背剑的少年。

  少年姓李，单名一个寒字。
  他的师父三年前死在西北，临终前说了一句话：
  「这世上的事，看不懂的，就先去走一走。」

  少年走了三年，走过了十二个州。
  他走到江南这一年，刚满十八岁。

  桃花开了，雪还没全化。
epilogue: |
  那一年的夏天来得很慢。
  李寒离开洛阳时，带走了一柄剑、一本心法、和一个仇人的名字。
  他没有再回头看身后的城。
  洛阳的夏天向来漫长，桃花谢了，蝉声起了。
  路还很长。

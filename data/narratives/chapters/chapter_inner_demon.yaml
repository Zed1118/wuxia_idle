id: chapter_inner_demon
title: 心魔
prologue: |
  李寒从昆仑山顶下来，不带走那四件物事。
  雪正下，把它们埋成一处不大的丘。

  下山之后他没有回到嵩山，也没有再朝西去。
  他选了一处没有名字的山口住下，
  背后是一片旧松林，松针落了一地。
  没有客栈，没有路引。
  风从松梢吹过来——
  不是嵩山的，不是昆仑的。
  这是第四处。

  师父留下的那三句话，
  昨夜已经完整地连成一句。
  可在松林里独行的时候，他偶尔仍会停一停。
  那一句听完了。
  下文确实要自己走。
  ——只是下文的形状还没有显出来。

  他在松林深处搭了一座极简的茅屋。
  青木为柱，松枝为顶。
  昼则采水煮茶，夜则静坐。
  日子不分长短。

  某一夜，炉中余炭照出他自己的影子，
  映在松木的墙壁上。
  影子站着没动。
  他静坐之中，也没动。

  ——影子先开了口。
  「再走一段？」它说。
  声不是从外面来的，
  是从他自己心里来的。

  他起身，握起靠在榻边的剑，
  推门出去。
  门外松林里，
  七处地方都站着一个他自己。
epilogue: |
  第七处的影子化作雪也散了。
  李寒收剑回鞘。

  七处他自己，七次他都赢了。
  赢的姿态各不相同——
  有时只是默立，有时一招出，
  有时是不出。
  心魔余毒在他袖底散过几次，
  他也清过几次。
  有过赢得艰难的，
  也有过败下来重起的。
  都过去了。

  茅屋还在。炉里的茶已经凉了。
  他没有再添柴。

  夜里下了一场极薄的雪。
  他坐在屋外的青石上，
  把剑横在膝上。
  最后那一段路——
  师父没替他走，
  他自己走完了。

  铜镜与玉佩——昆仑山顶那一夜已经放下。
  此刻身上空净，
  只一柄旧剑。
  风从更高更远的地方吹过来，
  比黄河源头还远，
  比昆仑山顶还远，
  比松林山口还远。

  下一处他要去的地方，
  不在四处人间。

  他没有走出茅屋，也没有举手。
  但门已经开了。
  开门的不是他，也不是那一阵风。
  他只是坐着——
  等该来的时候自己来。

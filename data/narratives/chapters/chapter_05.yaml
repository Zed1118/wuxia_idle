id: chapter_05
title: 征东
prologue: |
  嘉峪关之后第七日，李寒动身往东。

  关外的戈壁他来时走了二十二天，回去只用了七天。
  不是脚程快了——是不必再绕那些避不开的客栈。
  风从西边吹来，把他的旧袍子吹得鼓鼓的；他不去理。
  到玉门那一日，他在驿道边坐了一刻，
  从怀里掏出那面小铜镜，看了一眼镜背上「西凉」二字，
  又把它收了回去。当夜在嘉峪关外的那一战之后，
  他原本是不打算去取的。第三日清晨，他还是回去了。
  关外戈壁的黑石上，镜子被沙打了三日，但还在原处。
  他把镜子捡起来，揣进了怀里。
  ——这不是要带回去给谁看。是要带着它，回去看一些东西。

  陇右、凤翔、长安——长安他这一回也没进城。
  灞桥上的柳已经发了新芽，桥下水还是同一道水。
  他在桥头站了一刻，没坐。坐过一次就够了。
  过了灞桥再往东，是潼关。
  关楼上那块发白的匾额没换；守城的人换了。
  他这一回也没被认出来——三年里走过十二个州都没留下他的名字，
  嘉峪关的事情中原大概也未必知道。这倒省了他一些麻烦。

  过了潼关，路又分两条。一条往南，回中原腹地；
  一条往东北，去嵩山。师父临终时说过两句话，
  他在西凉听懂了前一句的一半——
  「这世上的事，看不懂的，就先去走一走。」
  那一半他在阳关一战之后才彻底听明白。
  第二句师父留下的是：「剑到了一处地方，就要听那处地方的风。」
  西北的风他在嘉峪关外那一夜听到了一半。
  中原的风——他还没真正听过。
  许昌擂台、武林会、镖局护送，那些都不算。
  那时候他还没有「听」的耳朵。

  「再往东三百里是嵩山。」客栈里夜话的商人这么说，
  「嵩山脚下今年开论剑大会。中州九派全在。」
  「说是道家的青松观也出弟子上场。」
  「还有从更远地方来的客人——西凉那边好像也有人来。」

  李寒坐在角落听完那句，给小二多丢了一枚铜钱，付完酒钱出了店。
  门外天已经在转凉。他朝东走了一步，再走一步。
  怀里那面小铜镜不重，但贴着胸口，是有温度的。
epilogue: |
  嵩山论剑大会散场以后的那一夜，李寒在偏厢里坐了很久。

  烛芯爆了两次。窗外是嵩山的夜——比西凉的夜潮一些，
  也比西凉的夜安静一些。坪上那三柄旧剑被人重新立回石碑前。
  中州武林的执事走来过一回，朝他抱了拳，没说话；
  道家青松观的人也来过，留了一壶茶，茶冷了一半也没去碰。

  他从怀里把那面小铜镜与那枚刻「师」字的玉佩并放在桌上。
  烛光下，两件东西的轮廓贴在一起，像一件东西的两边——
  西凉霸主出过手，未现身；三弟子现了身，没出过那一道气。
  这是西凉那边的师承体例。中州武林是看不出来的，
  但李寒看出来了——因为他怀里今夜起多出了一枚字。

  他想起师父临终时还有一句话，那是第三句，最短的一句。
  在他十六岁那一年的雨夜里，师父咳过血以后才说出来的：
  「最后那一段路——」
  师父说到这里就没再说下去。咳了一声，闭了眼。
  当时李寒只当那是没说完的一句。
  这十几年里他一直以为，那一句是没说完。
  今夜他不那么以为了。
  ——也许师父那一句已经说完了。
  「最后那一段路」——本来就只有这一句，没有下文。
  下文要他自己走。

  他把镜与玉佩重新揣回怀里。
  烛火又跳了一下。他站起来，走到偏厢窗前。
  山道下还有几盏散场未归的灯火。
  东方还没有亮。

  这一夜他没有写信，也没有动剑。
  他只是站着，听了很久那座山自己的声音。
  风从坪心石碑那边吹过来，
  比西凉的风轻，比中原任何一处的风都更安静。
  ——「剑到了一处地方，就要听那处地方的风。」
  这句话今夜他全听懂了。
  下一回再走到一处地方时，他还要听。
  那处地方在哪里，他还没看见。
  但他知道，那不在剑上。
  也不在嵩山。

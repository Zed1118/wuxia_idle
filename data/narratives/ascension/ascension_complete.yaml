id: ascension_complete
title: 飞升 · 别山
paragraphs:
  - |
    弟子接过了那件遗物。
    他没有跪，也没有谢——
    师父一辈子最不喜欢的就是这两样虚礼。
    他只是把那件兵刃或甲胄贴在胸口，
    然后稳稳地收进背上的行囊里。

  - |
    雪又下起来了。
    昆仑的风从北面吹来，
    把他们两个人和马一起，朝山下推了一推。

  - |
    他朝两个弟子点了点头。
    没有说话。
    话已经在这一辈子里说够了。
    剩下的，要他们自己去走。

  - |
    弟子转身，沿山道往下。
    他在山门口站着，看他们走远。
    直到马的影子被一片白雪盖住，
    直到山道上再也没有人。

  - |
    然后他自己也转身。
    不是往山下走——
    是往山顶那块青石的方向。
    四件物事还在那里。
    雪已经把它们埋了一半。
    他坐在青石边上，把背上的剑解下来，放在四件之旁。
    第五件了。

  - |
    化境的门，这一刻是真的开了。
    门外是一片他不认识的风。
    他听了一会儿，
    然后站起来，朝那风走了一步。

    ——下文不属于江湖。
    江湖里此后还有人在走，
    那是他的弟子。

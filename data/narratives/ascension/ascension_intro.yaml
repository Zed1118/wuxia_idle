id: ascension_intro
title: 飞升 · 临行
paragraphs:
  - |
    昆仑的雪落了又停。
    山顶平台上的四件物事，被昨夜的雪薄薄盖了一层。
    他没有把它们带走——
    那是给天地的留物，不是给江湖的传承。

    可是江湖里还有人在等他。

  - |
    山门外的弟子已经在那里站了一夜。
    两人都没说话。
    大的那个手里牵着马，小的那个抱着一柄旧木剑。
    雪从他们的肩上落下来，又被山风吹走。

  - |
    他从平台上回身，朝山门方向走了一步。
    腰间的剑没动。
    背上的甲胄没动。
    可是怀里那点重量——
    剑的、甲的、配饰的、心血的——
    他知道有些是要留下的。
    有些是要带走的。
    还有一二件，是要交出去的。

  - |
    门派要存续。
    弟子要往前走。
    而他自己——
    这一段路他已经走到尽头了。

  - |
    他把目光从雪山收回来，
    停在弟子的肩上。
    选一件，或两件。
    那是他用过最久的兵刃，
    或者陪他最远的甲胄。
    要让弟子接着用下去。

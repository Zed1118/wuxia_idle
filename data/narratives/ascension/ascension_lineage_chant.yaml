# 文化锚点:Tier wuSheng 跨阶(湛然 / 寂照 / 圆融 / 化机)· 三代叙事弧(太祖 → 师父 → 我)
id: ascension_lineage_chant
title: 飞升 · 续灯
paragraphs:
  - |
    他在青石边坐了很久。
    四件物事在他面前。
    其中一件，是当年师父亲手交给他的——
    那柄剑。
    剑身上没有名字，只有岁月把它磨得湛然。

  - |
    师父走的那一日，雪也是这样下。
    那时候他还是弟子，
    站在山门口看着师父一个人朝青石走去，
    朝那风走了一步。
    后来他再也没看见过那个背影。
    但他记得师父说过的最后一句话——
    化境的门，自己去推。

  - |
    他这一辈子，也没再见过太祖。
    可这把剑在背上挂了几十年，
    他总觉得太祖也在山里。
    在他每一次推开化境之门的间隙里，
    寂照之间，有人站着看他。

  - |
    现在轮到他了。
    他把剑从背上解下来，
    放在自己当年那把师父给的剑旁边。
    两件并排，圆融如一。
    剑身上的岁月光泽，在雪光里几乎分不出哪件是老的，哪件是新的。

  - |
    他抬眼看了看身后。
    新的弟子站在山门口。
    那双眼睛和他当年看着师父走开的眼睛，一模一样。

    他点了点头，
    没有说话——
    话已经在他师父那一辈，
    在他这一辈，
    说够了。

  - |
    化机已动。
    他朝那风，迈了一步。

    ——山顶的青石上，
    五件物事旁边，又添了一件。
    江湖里此后还有人在走，
    那是他的弟子。
    也是他师父的弟子的弟子。

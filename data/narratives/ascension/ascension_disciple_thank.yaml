id: ascension_disciple_thank
title: 飞升 · 弟子接物
paragraphs:
  - |
    大弟子双手接过。
    他没有说话。
    雪落在他的肩上，他没有掸。
    手里那件东西，他贴在胸口握了一会儿，
    才慢慢收进行囊。

    「师父——下山的路，我替您走。」
    这是他这一辈子第二次把这句话说出口。
    第一次是十年前，山门外那一夜。
    那一次师父没答。
    这一次师父也没答。
    可是这一次，他知道答案了。

  - |
    二弟子站在大师兄身后。
    他没有上前去接。
    他知道——
    传给师兄就是传给整个门派。
    门派往下，他自然有他的那一份。

    可是当大师兄把行囊背好之后，
    师父从怀里又取出一件，
    径直递给了他。
    他怔了一下。
    然后他接过来，没说谢。
    只是把它捧在手里，看了很久。

    「我懂了。」他在心里说。
    「往下走。」

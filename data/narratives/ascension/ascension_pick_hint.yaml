id: ascension_pick_hint
title: 飞升 · 择物
paragraphs:
  - |
    择一件兵刃——
    那柄你斩过最多敌人的剑，或者那把陪你过黄河、过阳关、上昆仑的旧刀。
    它们身上沾的不是血，是路。

  - |
    或者择一件甲胄——
    那身在山贼围困中没碎过的甲、那件在嵩山雨夜里没透过的袍。
    它们替你挡过的，弟子来日也要挡。

  - |
    或者择一件配饰——
    腰间最常摸的玉佩、怀里最常贴的小镜。
    那是你出门前最后看的一眼，
    也该是弟子启程时最先摸的一处。

  - |
    一件，或两件。不多。
    传得多了反而沉，弟子背不动。
    传得少了——
    便是给他自己的余地。

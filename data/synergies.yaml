# =============================================================================
# synergies.yaml · 心法相生(W18-A1,GDD §4.5 "5-8 个隐藏组合")
# =============================================================================
# 主修 + 第 1 辅修达到触发条件时,激活隐藏 buff(view layer 注入战斗 init 时
# 的角色属性副本,不动 Isar 持久层)。Demo 阶段实装 5 组合(GDD ≥ 5 下限)。
#
# 设计理由(GDD §4.5):彩蛋向 + 玩家口碑传播 + 不放进引导。
#
# 触发优先级:schoolPair > sameSchool > sameTier(严格类型先匹配,
# detectActive 遍历顺序保证)。
#
# 数值红线:multiplier 各项 ≥ 0 ≤ 0.30(SynergyMultipliers.isWithinRedLine)。
#   - internalForceMaxPct=0.25 在内力 12000 角色上 → 15000(刚好红线),OK
#   - speedPct=0.25 在身法 baseSpeed 200 角色上 → 250,远低 §5.4 间接
#
# 触发条件 enum(lib/data/defs/synergy_def.dart SynergyRequirementType):
#   schoolPair:严格 mainSchool + assistSchool 匹配(顺序敏感)
#   sameSchool:mainSchool == assistSchool(tier 任意)
#   sameTier  :mainTier == assistTier(流派任意)
#
# multiplier 字段全部可选,缺省 0:
#   attackPct / defensePct / speedPct / hpPct
#   internalForceMaxPct / internalForceGrowthPct
# =============================================================================

synergies:

  # ── 1. 阴阳调和:刚阳与阴柔相济,内息圆融(攻速防血 4 维中等 buff) ──────────
  # W18-A1.2 恢复原设计 defensePct=0.10(battle_engine 加法注入到 defender.defenseRate,
  # GDD §5.5 防御率叠加,realm max 0.35 + synergy 0.10 = 0.45 ≤ 红线 0.65)。
  - id: synergy_yin_yang_he_xie
    name: 阴阳调和
    description: 刚阳与阴柔本是两极,主刚辅阴时内息圆融,百骸通泰
    requirement:
      type: schoolPair
      mainSchool: gangMeng
      assistSchool: yinRou
    multipliers:
      attackPct: 0.10
      speedPct: 0.10
      defensePct: 0.10
      hpPct: 0.20

  # ── 2. 刚柔并济:刚猛为骨,灵巧为筋(身法侧重) ──────────────────────────
  - id: synergy_gang_rou_bing_ji
    name: 刚柔并济
    description: 刚猛为骨,灵巧为筋,出招既快且重
    requirement:
      type: schoolPair
      mainSchool: gangMeng
      assistSchool: lingQiao
    multipliers:
      speedPct: 0.25

  # ── 3. 阴影迅捷:阴损与灵巧合流(攻速并重) ────────────────────────────
  - id: synergy_yin_ying_xun_jie
    name: 阴影迅捷
    description: 阴损之招配灵巧身法,如影随形,守者难防
    requirement:
      type: schoolPair
      mainSchool: yinRou
      assistSchool: lingQiao
    multipliers:
      attackPct: 0.15
      speedPct: 0.15

  # ── 4. 同流派精进:主辅同流派,招式纯熟(攻击侧重) ─────────────────────
  - id: synergy_tong_pai_jing_jin
    name: 同流派精进
    description: 主辅同流派,内劲一脉,招式纯熟无杂
    requirement:
      type: sameSchool
    multipliers:
      attackPct: 0.20

  # ── 5. 同辈互补:主辅同 tier,境界齐头(内力上限 + 闭关增长双维) ────────
  # W18-A1.2 恢复原设计 internalForceGrowthPct(seclusion_service.computeOutputs
  # 在 internalForcePoints 末乘 (1 + growthPct))。原 0.25 太高,新平衡到 0.10
  # 与 maxPct 0.25 分担,合计语义「内力相生」更克制(单维 ≤ 红线 0.30)。
  - id: synergy_tong_bei_hu_bu
    name: 同辈互补
    description: 主辅同辈,境界齐头并进,内力相生
    requirement:
      type: sameTier
    multipliers:
      internalForceMaxPct: 0.25
      internalForceGrowthPct: 0.10

  # ── 6. 刚阴互制:主阴辅刚,以柔克刚,守者难破(防血侧重) ────────────────
  # 与第 1「阴阳调和」(主刚辅阴 atk+spd+def+hp 4 维)互为反向,本组 def+hp 2 维
  # 语义「以守为攻」体现阴柔为主时的守者百骸坚韧。
  # 数值核:realm max defense 0.35 + synergy 0.15 = 0.50 ≤ §5.5 红线 0.65;
  # hpPct 0.15 ≤ 0.30 红线下不会突破。
  - id: synergy_gang_yin_hu_zhi
    name: 刚阴互制
    description: 主修阴柔,辅修刚阳,以柔克刚,守者百骸坚韧
    requirement:
      type: schoolPair
      mainSchool: yinRou
      assistSchool: gangMeng
    multipliers:
      defensePct: 0.15
      hpPct: 0.15

  # ── 7. 灵刚汇流:主灵辅刚,身法为先,刚为根脉(攻速并重) ──────────────
  # 与第 2「刚柔并济」(主刚辅灵 spd 0.25)互为反向,但本组 atk+spd 双维而非单 spd,
  # 语义「灵巧借刚为根」体现攻击力强化。各维 ≤ §5.4 红线。
  - id: synergy_ling_gang_hui_liu
    name: 灵刚汇流
    description: 主修灵巧,辅修刚阳,身法迅捷而招招带力
    requirement:
      type: schoolPair
      mainSchool: lingQiao
      assistSchool: gangMeng
    multipliers:
      attackPct: 0.10
      speedPct: 0.20

  # ── 8. 太极初成:主刚猛传说 + 辅阴柔传说,两极合元(specificTechniques 类型) ──
  # 2026-05-21 候选 2 实装 · GDD §4.5 触上限 8 重设计 · 新 SynergyRequirementType.
  # specificTechniques 枚举值 · 贴 GDD §4.5 原意「具体心法对」彩蛋(九阳+九阴
  # 类例子)· 优先级最高(detectActive 遍历 specificTechniques > schoolPair >
  # sameSchool > sameTier),避免被 synergy 1「阴阳调和」(gangMeng+yinRou
  # schoolPair)抢走 · 数值红线:attack 0.20 + def 0.15(realm max 0.35 + 0.15 =
  # 0.50 ≤ §5.5 红线 0.65)+ internalForceMax 0.25(挨 0.30 红线)+ hp 0.10,
  # 「攻防内 4 维强化 + 彩蛋触上限」语义。
  - id: synergy_tai_ji_chu_cheng
    name: 太极初成
    description: 主修刚猛传说,辅修阴柔传说,两极合元,内气如太极转动不息
    requirement:
      type: specificTechniques
      mainTechniqueId: tech_gangmeng_chuanshuo
      assistTechniqueId: tech_yinrou_chuanshuo
    multipliers:
      attackPct: 0.20
      defensePct: 0.15
      hpPct: 0.10
      internalForceMaxPct: 0.25

  # ── 9. 灵阴化蝶:灵巧传说 + 阴柔传说,如蝶穿花,防守化无形 ──────────────
  # P2.1 Batch 4 2026-05-28 · specificTechniques 类型(优先级最高,不与
  # schoolPair 3「阴影迅捷」(yinRou→lingQiao) 冲突,因为本组是 lingQiao→yinRou
  # 方向且限传说 tier 彩蛋)。
  # 数值红线:speedPct 0.20 + defensePct 0.10 + IFgrowthPct 0.15 各 ≤ 0.30。
  - id: synergy_ling_yin_hua_die
    name: 灵阴化蝶
    description: 灵巧身法与阴柔暗劲皆修至传说,出手如蝶穿花,守者不觉
    requirement:
      type: specificTechniques
      mainTechniqueId: tech_lingqiao_chuanshuo
      assistTechniqueId: tech_yinrou_chuanshuo
    multipliers:
      speedPct: 0.20
      defensePct: 0.10
      internalForceGrowthPct: 0.15

  # ── 10. 龙虎交泰:灵巧传说 + 刚猛传说,龙虎同修,攻守兼备 ──────────────
  # P2.1 Batch 4 · specificTechniques · 灵巧为龙刚猛为虎,三维均衡 buff。
  # 数值红线:attackPct 0.15 + speedPct 0.15 + hpPct 0.15 各 ≤ 0.30。
  - id: synergy_long_hu_jiao_tai
    name: 龙虎交泰
    description: 灵巧为龙,刚猛为虎,龙虎同修至传说,攻守兼备气吞山河
    requirement:
      type: specificTechniques
      mainTechniqueId: tech_lingqiao_chuanshuo
      assistTechniqueId: tech_gangmeng_chuanshuo
    multipliers:
      attackPct: 0.15
      speedPct: 0.15
      hpPct: 0.15

  # ── 11. 幽影穿花:阴柔传说 + 灵巧传说,暗劲与灵动合流,攻之极致 ────────
  # P2.1 Batch 4 · specificTechniques · 与 9「灵阴化蝶」(lingQiao→yinRou)
  # 互为反向,本组主阴柔偏攻击性语义。
  # 数值红线:attackPct 0.25 + internalForceMaxPct 0.15 各 ≤ 0.30。
  - id: synergy_you_ying_chuan_hua
    name: 幽影穿花
    description: 阴柔暗劲配灵巧身法皆至传说,出招无影,伤敌于无形
    requirement:
      type: specificTechniques
      mainTechniqueId: tech_yinrou_chuanshuo
      assistTechniqueId: tech_lingqiao_chuanshuo
    multipliers:
      attackPct: 0.25
      internalForceMaxPct: 0.15

  # ── 12. 金刚不坏:刚猛防御传说 + 阴柔防御传说,两极防御合元 ──────────────
  # P2.1 Batch 4 · specificTechniques · 需两本防御变体传说心法同修,极深彩蛋。
  # 数值红线:defensePct 0.20 + hpPct 0.20 + internalForceMaxPct 0.10 各 ≤ 0.30。
  # realm max defense 0.35 + synergy 0.20 = 0.55 ≤ §5.5 红线 0.65。
  - id: synergy_jin_gang_bu_huai
    name: 金刚不坏
    description: 刚猛与阴柔两派防御传说合一,铜皮铁骨且筋脉坚韧,百招不破
    requirement:
      type: specificTechniques
      mainTechniqueId: tech_gangmeng_chuanshuo_fang
      assistTechniqueId: tech_yinrou_chuanshuo_fang
    multipliers:
      defensePct: 0.20
      hpPct: 0.20
      internalForceMaxPct: 0.10

  # ── 注:P2.1 Batch 4 扩充 8→12,4 新组合全为 specificTechniques 类型(传说
  # tier 彩蛋),不新增 schoolPair(6 方向已满)以保留 sameTier 独立触发空间
  # (lingQiao main + yinRou assist 同 tier → sameTier 命中)。

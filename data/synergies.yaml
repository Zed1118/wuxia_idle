# =============================================================================
# synergies.yaml · 心法相生(W18-A1,GDD §4.5 "5-8 个隐藏组合")
# =============================================================================
# 主修 + 第 1 辅修达到触发条件时,激活隐藏 buff(view layer 注入战斗 init 时
# 的角色属性副本,不动 Isar 持久层)。Demo 阶段实装 5 组合(GDD ≥ 5 下限)。
#
# 设计理由(GDD §4.5):彩蛋向 + 玩家口碑传播 + 不放进引导。
#
# 触发优先级:schoolPair > sameSchool > sameTier(严格类型先匹配,
# detectActive 遍历顺序保证)。
#
# 数值红线:multiplier 各项 ≥ 0 ≤ 0.30(SynergyMultipliers.isWithinRedLine)。
#   - internalForceMaxPct=0.25 在内力 12000 角色上 → 15000(刚好红线),OK
#   - speedPct=0.25 在身法 baseSpeed 200 角色上 → 250,远低 §5.4 间接
#
# 触发条件 enum(lib/data/defs/synergy_def.dart SynergyRequirementType):
#   schoolPair:严格 mainSchool + assistSchool 匹配(顺序敏感)
#   sameSchool:mainSchool == assistSchool(tier 任意)
#   sameTier  :mainTier == assistTier(流派任意)
#
# multiplier 字段全部可选,缺省 0:
#   attackPct / defensePct / speedPct / hpPct
#   internalForceMaxPct / internalForceGrowthPct
# =============================================================================

synergies:

  # ── 1. 阴阳调和:刚阳与阴柔相济,内息圆融(攻速防血 4 维中等 buff) ──────────
  # W18-A1.2 恢复原设计 defensePct=0.10(battle_engine 加法注入到 defender.defenseRate,
  # GDD §5.5 防御率叠加,realm max 0.35 + synergy 0.10 = 0.45 ≤ 红线 0.65)。
  - id: synergy_yin_yang_he_xie
    name: 阴阳调和
    description: 刚阳与阴柔本是两极,主刚辅阴时内息圆融,百骸通泰
    requirement:
      type: schoolPair
      mainSchool: gangMeng
      assistSchool: yinRou
    multipliers:
      attackPct: 0.10
      speedPct: 0.10
      defensePct: 0.10
      hpPct: 0.20

  # ── 2. 刚柔并济:刚猛为骨,灵巧为筋(身法侧重) ──────────────────────────
  - id: synergy_gang_rou_bing_ji
    name: 刚柔并济
    description: 刚猛为骨,灵巧为筋,出招既快且重
    requirement:
      type: schoolPair
      mainSchool: gangMeng
      assistSchool: lingQiao
    multipliers:
      speedPct: 0.25

  # ── 3. 阴影迅捷:阴损与灵巧合流(攻速并重) ────────────────────────────
  - id: synergy_yin_ying_xun_jie
    name: 阴影迅捷
    description: 阴损之招配灵巧身法,如影随形,守者难防
    requirement:
      type: schoolPair
      mainSchool: yinRou
      assistSchool: lingQiao
    multipliers:
      attackPct: 0.15
      speedPct: 0.15

  # ── 4. 同流派精进:主辅同流派,招式纯熟(攻击侧重) ─────────────────────
  - id: synergy_tong_pai_jing_jin
    name: 同流派精进
    description: 主辅同流派,内劲一脉,招式纯熟无杂
    requirement:
      type: sameSchool
    multipliers:
      attackPct: 0.20

  # ── 5. 同辈互补:主辅同 tier,境界齐头(内力上限 + 闭关增长双维) ────────
  # W18-A1.2 恢复原设计 internalForceGrowthPct(seclusion_service.computeOutputs
  # 在 internalForcePoints 末乘 (1 + growthPct))。原 0.25 太高,新平衡到 0.10
  # 与 maxPct 0.25 分担,合计语义「内力相生」更克制(单维 ≤ 红线 0.30)。
  - id: synergy_tong_bei_hu_bu
    name: 同辈互补
    description: 主辅同辈,境界齐头并进,内力相生
    requirement:
      type: sameTier
    multipliers:
      internalForceMaxPct: 0.25
      internalForceGrowthPct: 0.10

  # ── 6. 刚阴互制:主阴辅刚,以柔克刚,守者难破(防血侧重) ────────────────
  # 与第 1「阴阳调和」(主刚辅阴 atk+spd+def+hp 4 维)互为反向,本组 def+hp 2 维
  # 语义「以守为攻」体现阴柔为主时的守者百骸坚韧。
  # 数值核:realm max defense 0.35 + synergy 0.15 = 0.50 ≤ §5.5 红线 0.65;
  # hpPct 0.15 ≤ 0.30 红线下不会突破。
  - id: synergy_gang_yin_hu_zhi
    name: 刚阴互制
    description: 主修阴柔,辅修刚阳,以柔克刚,守者百骸坚韧
    requirement:
      type: schoolPair
      mainSchool: yinRou
      assistSchool: gangMeng
    multipliers:
      defensePct: 0.15
      hpPct: 0.15

  # ── 7. 灵刚汇流:主灵辅刚,身法为先,刚为根脉(攻速并重) ──────────────
  # 与第 2「刚柔并济」(主刚辅灵 spd 0.25)互为反向,但本组 atk+spd 双维而非单 spd,
  # 语义「灵巧借刚为根」体现攻击力强化。各维 ≤ §5.4 红线。
  - id: synergy_ling_gang_hui_liu
    name: 灵刚汇流
    description: 主修灵巧,辅修刚阳,身法迅捷而招招带力
    requirement:
      type: schoolPair
      mainSchool: lingQiao
      assistSchool: gangMeng
    multipliers:
      attackPct: 0.10
      speedPct: 0.20

  # ── 8. 灵阴归一:主灵辅阴,如影随形,内息内化(速度+内力上限双维) ──────
  # 与第 3「阴影迅捷」(主阴辅灵 atk+spd)互为反向,本组速度 + 内力上限组合,
  # 语义「身法快+内力深」体现绝顶之上的内化境界。各维 ≤ §5.4 红线。
  - id: synergy_ling_yin_gui_yi
    name: 灵阴归一
    description: 主修灵巧,辅修阴柔,如影随形,内息归元
    requirement:
      type: schoolPair
      mainSchool: lingQiao
      assistSchool: yinRou
    multipliers:
      speedPct: 0.10
      internalForceMaxPct: 0.20

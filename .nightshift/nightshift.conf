# Nightshift 项目配置 · 由 nightshift-init.sh 拷贝并按项目特化
# 编辑后保存即可,无需 chmod。dispatcher.sh 会 source 本文件。

# === 必填 ===
PROJECT_ROOT="/Users/a10506/Desktop/挂机武侠"          # 项目根绝对路径
PROJECT_TYPE="flutter"          # flutter | node | generic
WORKTREE_BASE="/Users/a10506/Desktop"        # worktree 父目录(通常项目同级)
WORKTREE_PREFIX="wuxia-idle"    # 沿 wuxia_idle 旧 nightshift 体系英文 prefix(避免中文 worktree 路径)

# 任务清单(bash array,顺序敏感,串行跑)
# T17-T22: 6h 挂机批 · 1.0 P1.2 全推 + narrative 补 + 技术债清 + 跨系统 audit + P4.1 spec + 总收尾
# T17 = P1.2 §12.1+§12.2 江湖恩怨+声望 全 4 batch 一次过(schema + service + UI + R5 + closeout · 单 worktree 累积 4 commit · TIMEOUT 120 容大 spec)
# T18 = P3.3 PVP + P3.4 sect_event narrative 双合一(PVP 10 条 + sect 8 条 + R4 loader 双测)
# T19 = 技术债 3 清(numbers_config PvpDef/SectEventDef 强类型 + Sect/SectEvent/PvpRecord/PvpSnapshot Isar 真持久化 + systemClockProvider)
# T20 = 跨系统数值红线 audit(P2.2/P3.1/P3.2/P1.2 attackPowerMultiplier 链 + R5 6-10 测 · 0 lib 改动)
# T21 = P4.1 §12.2 帮派门派 Phase 0 + spec 起草(Q1-Q8 默认决议 · 0 实装 · 0 lib 改动)
# T22 = 总收尾(stage_audit 2026-05-25 + ROADMAP v1.3 + 6h handoff + PROGRESS 顶段)
TASKS=(T17 T18 T19 T20 T21 T22)

# === 可选(都有默认值) ===
MAIN_BRANCH="main"                        # 基线分支
TASK_TIMEOUT_MIN=120                      # 单 task 超时(opus 120 容 T17 P1.2 全 4 batch 大 spec · 其他 task 远低于 120 不阻塞)
TASK_BUDGET_USD=8                         # 单 task 美元上限(opus 8 / sonnet 5)
INTER_TASK_BUFFER_SEC=30                  # task 间隔
CLAUDE_MODEL="opus"                       # opus | sonnet | haiku
CLAUDE_PERMISSION_MODE="bypassPermissions"  # 长 task 必用 bypass,auto 会卡 permission prompt

# Output token cap(memory feedback_nightshift_max_output_token)
# 32K 默认会让大文件 Write 任务被截断,opus 复杂任务必拉 64K
export CLAUDE_CODE_MAX_OUTPUT_TOKENS=64000

# 黑名单词表(verify_blacklist_words 默认词表覆盖)
# 注:wuxia_idle 用古风克制语感词;React/CRM/通用项目可清空或自定义
# BLACKLIST_WORDS="legendary epic awesome"

# 全局禁区 regex(verify_path_guard 用,默认覆盖 .env/密钥/签名/.mcp.json/.claude.json)
# GLOBAL_FORBIDDEN_RE='(^|/)(\.env($|\.)|.*\.pem$|...)'

# === Per-task override(B3,v2 P1)===
# 切外部已有分支跑 task(避免在 nightshift/T0X 默认分支建 worktree 撞 A1 隔离红线)
# dispatcher 会 fetch origin <branch> + git worktree add <worktree> <branch>(不带 -B,保留远端 head)
# TASKS_T01_BRANCH="feat/p1_2_spec"

# 复用已有 worktree 路径(默认 $WORKTREE_BASE/$WORKTREE_PREFIX-T0X)
# 若目录已存在 dispatcher 不重建,直接 cd 进去跑 task(prerun + claude + verify)
# TASKS_T01_WORKTREE="/Users/a10506/Desktop/wuxia-idle-p12-spec"
